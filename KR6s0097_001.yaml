body:
  text: 西京西明寺沙門圓照撰謹按舊録云夫目録之興也蓋所以別真偽明是非記人代之古今摽卷部之多小托拾遺漏刪夷駢贅欲使正教合理金言有緒提綱舉要歷然可觀也但以法門幽邃化網恢弘前後翻傳年移代謝屢經散滅卷軸參差復有異人時增偽妄致令混雜難究蹤由是以先德儒賢製斯條録今其存者殆六七家然猶未極根源尚多疏闕升以庸淺久事披尋參練異同指陳臧否成茲部帙庶免乖違幸諸哲人俯共詳覽今觀先賢所撰冠絶群英伏從庚午以來增七十祀三藏繼踵于今四朝聖上欽明翻譯相次一百餘部經律特明纍降鴻私許令修述圓照等才智短淺思不延文祇奉皇恩俯仰恭命今所譯者約以類分隨三藏文相次附入自惟以索繼組以礫次金疑則闕之以俟來哲也稽首善逝牟尼尊無上丈夫調御士亦禮三乘淨妙法五部祕密總持門并及八輩應真僧普賢妙德諸菩薩五眼三身咸照世至誠歸命願加威我撰經録護法城三寶垂慈幸冥祐唯願法燈長夜照迷徒因此得慧明正法遐久住世間依學速登無上地自後漢孝明皇帝永平十年歲次丁卯至大唐聖神文武皇帝貞元十六年庚辰之歲凡七百三十四載內從開元十八年庚午至今庚辰加七十一歲也中間傳譯緇素總一百八十七人所出大小二乘三藏聖教及賢聖集傳并及失譯總二千四百四十七部內新加一百三十九部矣合七千三百九十九卷其見行闕本並該前數內新加三百四十二卷新定目録合三十卷開為總別總録分二初奉承恩制次總集群經別録亦二初分乘藏差殊次明賢聖集傳總中分為一十九卷別中分成一十一卷就別分乘藏中更有七門今先敘科條餘次編載總録二文上初特承恩旨録有三右新譯華嚴經一三朝翻譯經律論二大佛名經一部等三斯皆特降絲綸許編目録具列如左二總集群經録右從漢至唐所有翻述具帝王年代并譯人本事所出教等以人代先後為倫不依三藏之次兼敘目録新舊同異別録二文下初分乘藏差殊録右別録之內典分為七一有譯有本二有譯無本三支派別行四刪略繁重五拾遺補闕六疑惑再詳七偽邪亂正就七門中二乘區別三藏殊科具悉委曲兼明部偶二明賢聖集傳録右集傳之內有二不同一梵本翻譯謂集自西方流傳東夏三藏碩德翻譯奉行二此方撰述謂此土高僧撰成傳記三寶三藏悉以甄明神異感通戒定慧行備如文列詳而鏡諸第一特承恩旨録有三者初華嚴經崇福寺新譯華嚴經四十卷左右監門衛將軍知內侍省事馬承倩奏臣得光宅寺寫一切藏經院撿挍寫經僧智通狀稱撿藏經開元目録上都華嚴寺沙門玄逸撰集釋教目內未入藏經數中書門下牒右街功德使牒奉敕宣令所司附入目録牒至準敕故牒貞元十五年九月八日牒中書侍郎平章事鄭餘慶門下侍郎平章事崔損撿挍右僕射平章事韋使撿挍左僕射平章事劉使右僕射平章事賈耽撿挍司徒兼中書令渾使撿挍大尉兼中書令王使百九十一卷經當街新譯華嚴經等及三朝先於京城等處翻譯未入開元目録經總二百三十二卷又新編上十卷四十卷新譯華嚴經等準敕見入目録次一百九十一卷先翻譯請準華嚴經例入目録又新編上十卷玄宗朝三藏無能勝等譯大威力等經五卷大威力烏樞瑟摩明王經三卷穢迹金剛説神通大滿陀羅尼法術靈要門一卷穢迹金剛法禁百變法一卷已上五卷並北天竺國三藏無能勝譯普遍智藏般若波羅蜜多心經一卷東天竺國三藏沙門法月譯金剛頂瑜伽修習毗盧遮那三麼地法一卷千手千眼觀世音菩薩大身呪本一卷千手千眼觀自在菩薩廣大圓滿無礙大悲心陀羅尼呪本一卷不動使者陀羅尼祕密法一卷千臂千鉢曼殊室利經十卷保大中拾遺編上已上十四卷南天竺國三藏沙門金剛智譯肅宗代宗朝三藏大廣智不空譯金剛大教王等經一百四十二卷金剛頂瑜伽真實大教王經三卷金剛頂瑜伽般若理趣經一卷觀自在菩薩授記經一卷瑜伽念珠經一卷奇特佛頂經三卷觀自在菩薩最勝明王心經二卷金剛頂瑜伽文殊師利菩薩經二卷阿唎多羅阿魯力經一卷普賢行願讚一卷地藏菩薩問法身讚一卷出生無邊門經一卷大吉祥天女經一卷底哩三昧耶經一卷十一面觀自在菩薩經三卷吉祥天女十二名號經一卷金剛頂瑜伽十八會指歸一卷金剛頂瑜伽三十七尊分別聖位法門一卷菩提場所説一字頂輪王經五卷寶篋經一卷金剛壽命陀羅尼經一卷大孔雀明王經三卷大雲請雨經二卷雨寶陀羅尼經一卷蘘麌利童女經一卷稻𦾮喻經一卷大寶廣博樓閣經三卷菩提場莊嚴經一卷除一切疾病陀羅尼經一卷能淨一切眼陀羅尼經一卷施焰口餓鬼陀羅尼經一卷三十五佛名經一卷八大菩薩曼茶羅經一卷葉衣觀自在菩薩陀羅尼經一卷訶利帝母經一卷毗沙門天王經一卷觀自在菩薩説普賢陀羅尼經一卷文殊問字母品經一卷金剛頂蓮華部心念誦法一卷金剛頂瑜伽千手千眼觀自在念誦法二卷無量壽如來念誦儀軌一卷阿閦如來念誦法一卷佛頂尊勝念誦法一卷金剛頂勝初瑜伽普賢菩薩念誦法一卷金剛王菩薩祕密念誦法一卷普賢金剛薩埵念誦法一卷金剛頂瑜伽金剛薩埵五祕密修行念誦儀軌一卷金剛壽命念誦法一卷一字頂輪王瑜伽經一卷一字佛頂輪王念誦儀軌一卷仁王般若念誦法一卷如意輪念誦法一卷大虛空藏菩薩念誦法一卷瑜伽蓮華部念誦法一卷聖觀自在菩薩心真言觀行儀軌一卷觀自在多羅瑜伽誦念法一卷甘露軍吒利瑜伽念誦法一卷花嚴入法界四十二字觀門一卷文殊讚法身禮一卷受菩提心戒儀一卷金剛頂瑜伽三十七尊禮一卷般若理趣釋二卷大曼荼羅十七尊釋一卷金剛頂瑜伽護摩儀一卷都部陀羅尼目一卷大乘緣生論一卷七俱胝佛母陀羅尼經一卷大虛空藏菩薩所問經八卷仁王經二卷密嚴經三卷仁王念誦儀軌一卷大聖文殊師利菩薩佛剎功德莊嚴經一部三卷成就妙法蓮華經王瑜伽觀智儀軌一卷金剛頂勝初瑜伽經中略出大樂金剛薩埵念誦儀軌一卷大樂金剛薩埵修行成就儀軌一卷大藥叉女歡喜母并愛子成就法一卷普遍光明大隨求陀羅尼經二卷金剛頂超勝三界經説文殊五字真言勝相一卷五字陀羅尼頌一卷聖閻曼德迦威怒王立成大神驗念誦法一卷文殊師利菩薩根本大教王金翅鳥王品一卷不空羂索毗盧遮那佛大灌頂光真言一卷聖迦抳忿怒金剛童子菩薩成就儀軌經三卷大威怒烏芻澀摩成就儀軌一卷佛説摩利支天經一卷金剛頂經一字頂輪王成佛儀軌一卷佛為優填王説王法政論經一卷大方廣如來藏經一卷佛説一髻尊陀羅尼經一卷速疾立驗摩醯首羅天説迦婁羅阿尾奢法一卷太日經略攝念誦隨行法一卷大毗盧遮那成佛神變加持經略示七支念誦隨行法一卷木槵經一卷金剛頂經瑜伽文殊師利菩薩儀軌供養法一卷曼殊室唎童子菩薩五字瑜伽法一卷金剛頂降三世大儀軌一卷文殊師利菩薩及諸仙所説吉凶時日善惡宿曜經二卷金剛頂經觀自在王如來修法一卷金剛頂瑜伽中發阿耨多羅三藐三菩提心論一卷瑜伽金剛頂經釋字母品一卷修習般若波羅蜜菩薩觀行念誦儀軌一卷仁王般若陀羅尼釋一卷成就大悲觀自在蓮華部瑜伽念誦法門一卷大孔雀明王畫像壇場儀軌一卷金剛手光明灌頂經一卷末利支提婆花鬘經一卷大聖天歡喜雙身毗那夜迦法一卷觀自在菩薩如意輪瑜伽一卷金輪王佛頂輪念誦法一卷金剛頂瑜伽降三世成就極深密門一卷金剛頂瑜伽他化自在天理趣會普賢修行念誦儀軌一卷此一卷元進數中無欠者已上並三藏沙門大廣智不空譯今朝罽賓國三藏般若等譯大乘理趣新花嚴等經七十卷守護國界主陀羅尼經十卷本生心地觀經八卷大乘理趣六波羅蜜多經一部十卷大花嚴長者問佛那羅延力經一卷般若波羅蜜多心經一卷新譯花嚴經一部四十卷已上六部共七十卷並般若三藏奉詔譯十力經一卷已上一經龜茲國三藏勿提犀魚唐言蓮華精進於安西譯回向輪經一卷十地經九卷已上二經共十卷並于闐三藏尸羅達摩於北庭譯右句當右街功德所都句當右街諸寺觀釋道二教事千福寺上座僧靈邃進狀前件經謹具分析如前其新譯花嚴經狀準今年九月八日敕入開元目録其先翻譯及安西所進經得翻譯臨壇大德圓照等狀上件經未入目録伏緣是三朝翻譯時乞聞奏請同新花嚴經例入開元目録則天下諸寺依目傳寫皆入一切經藏庶免失墜金言廣敷仍請改舊目為貞元新定釋教目録豈唯事超昔帝抑亦道冠真宗介福無窮上資皇祚中書門下牒僧靈邃牒奉敕宜依牒至準敕故牒貞元十五年十月二十三日牒中書侍郎平章事鄭餘慶門下侍郎平章事崔損撿挍右僕射平章事韋使撿挍左僕射平章事劉使右僕射平章事賈耽撿挍司徒兼中書令渾使撿挍太尉兼中書令王使敕右街功德使牒都句當大德靈邃三朝先翻譯未入目録經一百七十三卷牒奉進止前件經宜令都句當大德靈邃與西明寺僧圓照同取前件經送光宅寺令寫入藏經者準敕牒都句當大德靈邃者故牒貞元十五年十月二十三日牒使右監門衛將軍第五守亮三大佛名經等大佛名經一部十六卷或十八卷法琳別傳一部三卷續開元釋教録三卷左右監門衛將軍知內侍省事馬承倩奏前件經目等未入藏目中書門下牒右街功德使牒奉敕宜令所司附入目録牒至準敕故牒貞元十五年十月二十三日牒中書侍郎平章事鄭餘慶門下侍郎平章事崔損撿挍右僕射平章事韋使撿挍左僕射平章事劉使右僕射平章事賈耽撿校司徒兼中書令渾使撿校太尉兼中書令王使第二總集群經録中分為一十九卷起第一盡十九此粗顯綱條若一一具明在十九卷內第一卷後漢明帝初譯經至四不可得經為第一卷所謂漢魏二代緇素譯人所出經戒羯磨等及新舊失譯并附出譯人別傳第二卷後漢之餘從藥王藥上菩薩觀經至曹魏末大般涅槃經二卷第三卷吳晉二代緇素譯人所出經戒等并新舊失譯諸經同前附出譯人別傳初從吳孫氏至西晉代更出阿闍世王經二卷第四卷西晉之餘從彌勒成佛經至為西晉失源云第五卷東晉符秦二代緇素譯人所出律論等并新舊失譯別傳同前第六卷姚秦西秦前涼北涼四代緇素譯人所出經律論并新舊集失譯經等第七卷宋齊二代緇素譯人所出經律論等并新集失譯經等第八卷宋朝之餘從觀世音菩薩受記至蕭齊之末第九卷梁元魏高齊三代緇素譯人所出經律論等并新集失譯經律集等第十卷周陳隋三代緇素譯人所出經律論及傳集録等第十一卷至十二十三十四十五十六十七卷初從大唐李氏都長安至頻又固請乃蒙降許第十二卷皇朝緇素譯人所出經律論及傅録等從帝曰至佛陀波利竟第十三卷從大方廣佛華嚴經不思議佛境界分至三藏義淨竟第十四卷從大寶積經一百二十卷至幸諸來哲無貽誚焉第十五卷從玄宗肅宗代宗三朝所譯經至批不空三藏謝經序賀慶雲表竟第十六卷從六軍使賀慶雲表至不空三藏建塔立碑竟第十七卷從今朝譯大乘理趣六波羅蜜多經至安西北庭進十地等經竟乃至都數帙同一無欠少第十八卷及第十九二卷敘古舊諸家目録部帙多小及詳顯異第十九卷從大唐開元釋教録至貞元新定釋教目録畢別録二文下之中初別分乘藏録中分為一十一卷起第二十盡第三十此粗顯綱條若一一具述在別録中十二卷內第二十卷從別分藏下至寶星陀羅尼經第二十一卷從華嚴部至七俱胝佛母陀羅尼經一卷竟第二十二卷從觀自在菩薩隨心呪經至大乘論第二十三卷從有譯有本聲聞三藏賢聖集傳畢第二十四卷從別録中有譯無本録至大乘經律論畢第二十五卷別録中有譯無本録小乘闕本經至律論賢聖集傳畢第二十六卷別録中支派別行録別生經律論傳等第二十七卷刪略繁重別生同本異經等刪除目録補闕拾遺舊譯大小經律論大周入藏中遺漏不上目録及新譯大小乘經律論集傳等新編入藏目録第二十八卷疑惑再詳目録偽妄亂真新編偽經及群經録中偽經并諸家集鈔等目録并準敕除附正録第二十九卷大乘經律論入藏目録兼出異名及用紙多少等第三十卷小乘經律論賢聖集傳入藏目録卷末兼出刪除不入藏經等目録二總集群經録上之一後漢劉氏都洛陽從明帝永平十年丁卯至獻帝延康元年庚子凡十一帝一百五十四年緇素一十二人所出經律論并新舊集失譯諸經總二百九十二部三百九十五卷於中九十七部一百三十一卷見在一百九十五部二百六十四卷闕本以為後漢經録云於中直云帝者為直兼斥名者是偽年代甲子依唐司隸甄鸞國子博士王道圭二家年曆參定後漢沙門迦葉摩騰一部一卷經沙門竺法蘭四部一十五卷經沙門支婁迦讖三十三部六十七卷經集沙門安世高九十五部一百一十五卷經律集沙門竺佛朝二部三卷經優婆塞安玄二部三卷經集沙門支曜十一部一十一卷經集沙門康巨一部一卷經沙門嚴佛調五部八卷經沙門康孟詳六部九卷經律沙門竺大力一部二卷經沙門曇果一部二卷經新舊諸失譯經一百四十一部一百五十八卷五十九部七十六卷舊集八十二部八十二卷新附四十二章經一卷永平十年丁卯於白馬寺與法蘭共譯初出舊録云孝明皇帝四十二章右一部一卷其本見在沙門迦葉摩騰或云竺葉摩騰亦云攝摩騰群録互存未詳孰是先來不譯所以備彰中印度人婆羅門種幼而聰敏博學多聞思力精拔特明經律嘗遊西印度有一小國請騰講金光明經俄而鄰國興師而來既將踐境輒有事礙兵不能進彼國兵衆疑有異術密遣使覘但見群臣安然共聽其所講大乘經明地神王護國之法於是彼國請和上求法明帝以永平七年甲子夢見金人身長丈六項佩日輪光明赫奕飛在殿前明日博問群臣此何神異通人傅毅進奏對云臣聞西域有得道者號之曰佛陛下所夢將必是乎帝以為然詔遣郎中蔡愔郎將秦景博士弟子王遵等一十八人往適天竺尋訪佛法於大月支國與摩騰相遇時蔡愔等固請於騰遂與同來至于洛邑明帝甚加賞接所將佛經及獲畫像馱以白馬同到洛陽因起伽藍名白馬寺諸州競立報白馬思騰於白馬寺出四十二章經初緘蘭臺石室第十四間內自爾釋教相繼雲興沙門信士接踵傳譯依録而編即是漢地經法之祖也舊録云此經本是外國經抄元出大部撮要引俗似孝經十八章出舊録及朱士行録僧祐出三藏記等道安録中不載騰以大化初至人未深信蘊其妙解不即多翻且撮經要以導時俗騰後終於洛陽載其由委備如朱士行漢録及高僧傳等升尋録之源始意述譯經之來須有由致故傍採衆説以廣異聞雖於文為繁而緣敘備矣十地斷結經八卷或四卷亦云十住初出與竺佛念十住斷結經同本永平十三年出見朱士行漢録及高僧傳長房録等法海藏經一卷一本無藏字初出與法海經等同本見高僧傳及長房録等佛本行經五卷永平十一年出見高僧傳及長房録等佛本生經一卷見高僧傳及長房録等右四部一十五卷其本並闕沙門竺法蘭亦中印度人自言誦經論數萬章為天竺學者之師時蔡愔既至彼國蘭與摩騰共契遊化遂相隨而來會彼學徒留礙蘭乃間行而至既達洛與騰同止少時便善漢言初共騰譯四十二章經騰卒蘭自譯十地斷結經等四部昔前漢帝穿昆明池底得黑灰問東方朔朔云非臣所知可問西域胡人法蘭既至追以問之蘭云此是劫燒時灰朔言有徵信者甚衆又秦景使還於月支國得釋迦像是優填王栴檀像師第四作也來至洛陽帝即敕令圖寫置清涼臺及顯節陵上供養自爾丹素流演迄今蘭後終於洛陽時年六十餘矣又長房等録云蘭譯二百六十戒合異二卷者不然細詳名目非蘭所翻委求同異如下別録闕本中述道行般若波羅蜜經十卷題云摩訶般若波羅蜜道行經亦云般若道行品經或八卷初出與明度小品及大般若第四會等同本光和二年七月八日出見敏祐二録無量清淨平等覺經二卷亦直云無量清淨經第二出與大阿彌陀及寶積無量壽會等并同本見吳録阿閦佛國經二卷建和元年譯或一卷初出與寶積不動如來會等同本見朱士行漢録及僧祐録亦云阿閦佛剎諸菩薩學戒品經或無國字佛遺日摩尼寶經一卷安公云出方等部初與寶積普明菩薩會等同本一名古品遺日説般若經一名大寶積經一名摩訶述寶嚴經見僧祐長房二録般舟三昧經三卷一名十方見在佛悉在前立定經舊稱云大般舟三昧經或二卷光和二年譯初出與大集賢護經等同本見聶道真録及吳録兜沙經一卷見僧祐録吳録是華嚴經名號品異譯伅真陀羅所問經二卷初出伅真陀羅所問寶如來三昧經舊録云伅真陀羅尼王經或三卷初出與大樹緊那羅經同本安録無見朱士行漢録及僧祐録阿闍世王經二卷初出與普超三昧經等同本見僧祐録安云出長阿含者非也內藏百寶經二卷亦云內藏百品初出與世高譯者小異安公云出方等部見僧祐録文殊師利問菩薩署經一卷亦直云問署經見僧祐録及吳録安云出方等部新譬喻經一卷凡十一事祐云失譯房見別録已上見在已下闕大方等大集經二十七卷初出與曇無讖等出同本見李廓録般舟三昧經一卷是後十品重翻祐有此一卷無三卷者靜泰録或加大字第三出祐録云光和二年十月八日出梵般泥洹經二卷或一卷初出與大般涅槃經等同本見朱士行漢録或加大字第三胡般改為梵象腋經一卷初出見法上録諸法勇王經一卷初出見法上録光明三昧經一卷初出祐云出録安房云亦見吳録孛本經二卷初出見僧祐録首楞嚴經二卷中平二年十月八日出第一譯又云三卷見朱士行漢録及僧祐録吳録大方便報恩經一卷出吳録阿闍世王問五逆經一卷亦云阿闍世王經初出見長房録禪經一卷初出房云見別録阿育王太子壞目因緣經一卷佛涅槃後一百餘年育王方出故非佛説或無經字初出見長房録右二十三部六十七卷雜譬喻上一十部二十六卷見在大集經下一十二部四十卷闕本沙門支婁迦讖亦直云支讖月支國人操行純深性度開敏稟持法戒以精勤著名諷誦群經志在宣法桓靈之代遊于洛陽從桓帝建和元年丁亥至靈帝中平三年景寅於洛陽譯道行等經二十三部審得本旨曾不加飾可謂善宣法要弘道之士也河南清信士孟福張蓮筆受而舊譯云胡般泥洹者竊所未安上代翻經已來賢德筆受每至度語無不稱云譯胡為漢胡乃是西天邊俗類此之有氐羌今乃稱胡豈關印度深為楚越可不詳焉但佛所説經皆合稱為梵本梵者此言清淨昔劫初時梵世光音天來下彼土有食地肥者身重不得復去因遂為人即五天之本祖也仍其天號而立稱焉若彼稱胡理將何出但彼稱梵語如此土所謂漢言蓋有所憑非為謬耳如舊日僧悉稱俗姓從符秦世有沙門道安獨拔當時居然超悟云既剃落紹繼釋迦子而異父豈曰承襲今出家宜悉稱釋及翻四含其文果云四姓出家同一釋種衆咸歎伏四姓者一剎帝利二婆羅門三毗舍四戍達羅而安正當晉秦之世刊定目録刪經論自號彌天楷摸季葉猶言譯胡為秦有五失三不易此蓋通人一蔽未盡美歟上代已來有胡言處今並改為梵字庶無紕謬使談者得其正焉又長房等録支讖譯中復有大寶積經一卷今以與佛遺日摩尼寶經既是同本不合再出又尋文句非讖所翻別録之中皆為失譯今依別録為正故讖録除之大乘方等要慧經一卷初出與寶積彌勒問八法會同本見長房録太子慕魄經一卷初出六度集中異譯見長房録長者子制經一卷一名制經初出與逝童子經等同本見長房録寶積三昧文殊問法身經一卷一名遺日寶三昧文殊師利菩薩問法身經初出與法界體性經同本見長房録自誓三昧經一卷題下注云獨證品第四出比丘淨行中初出與法護出者大同小異見長房録溫室洗浴衆僧經一卷亦直云溫室經初出見長房録明度五十校計經二卷或直云明度校計亦直云五十校計元嘉元年出見朱士行漢録及僧祐録佛印三昧經一卷見長房録八大人覺經一卷見寶唱録舍利弗悔過經一卷亦直云悔過經初出見長房録人本欲生經一卷永壽二年出長阿含第十卷異譯道安注解兼製序見朱士行漢録及僧祐録尸迦羅越六向拜經一卷或云尸迦羅越六方禮經出長阿含第十一卷異譯見長房録長阿含十報法經二卷一名多增道章經或直云十報經出長阿含第九卷異譯舊録亦云出長阿含見僧祐録一切流攝守因經一卷出中阿含第二卷異譯舊録云一切流攝經吳録云流攝守因經亦云受固亦有云流攝亦云一切流攝守固見朱士行及僧祐四諦經一卷出中阿含第七卷異譯見僧祐録安公云出長阿含者或誤也本相倚致經一卷出中阿含第十卷異譯吳録云大相倚致與本致經同本或作倚字見朱士行漢録及僧祐録是法非法經一卷出中阿含第二十一卷異譯見士行僧祐二録漏分布經一卷出中阿含第二十七卷異譯見朱士行漢録及僧祐録安云出長阿含者或誤也婆羅門子命終愛念不離經一卷出中阿含第十六卷異譯見長房録十支居士八城人經一卷出中阿含第六十卷異譯見長房録普法義經一卷亦云普義經一名具法行經普法義作舍利日俱法行作舍利弗餘並同云出中阿含元嘉二年出與唐廣義法門經同本見朱士行僧祐二録婆羅門避死經一卷出增一阿含第二十六卷異譯見長房録阿那邠𮟴化七子經一卷出增一阿含第四十九卷異譯見長房録阿難同學經一卷題云出增一阿含檢無見長房録七處三觀經一卷出增一阿含中首末總三十經從初標名故也或二卷元嘉元年出見朱士行漢録及僧祐録五陰譬喻經一卷或無譬字一名水沫所漂經出雜阿含第七卷異譯見朱士行漢録僧祐録轉法輪經一卷或云法輪輪轉經出雜阿含第十五卷異譯與其本經後同前異見僧祐録八正道經一卷出雜阿含第二十六卷異譯見士行僧祐二録摩鄧女經一卷或名摩耶女一名阿難為蠱道女惑經見長房録初出與摩鄧伽經等同本鬼問目連經一卷初出與餓鬼報應經同本見長房録阿難問事佛吉凶經一卷或云阿難問事經亦云事佛吉凶經見長房録初出與阿難分別經等同本奈女祇域因緣經一卷初出或無因緣字亦云奈女見房録罪業應報教化地獄經一卷初出或云地獄報應經見長房録堅意經一卷初出一名堅心正意亦名堅心經見長房録大安般守意經二卷或一卷或無守意字或云安般經安公云小安般兼注解及製序祐録別載大安般一卷房録更載一卷重也見士行僧祐李廓三録陰持入經二卷或一卷祐云際持入誤也亦云注陰持入安公注解製序房録陰持入外別存際持入者誤也見士行僧祐二録處處經一卷見長房録罵意經一卷見長房録分別善惡所起經一卷見長房録出家緣經一卷一名出家因緣經見長房録阿鋡正行經一卷一名正意經見長房録十八泥犁經一卷或云十八地獄經見長房録法受塵經一卷見僧祐録禪行法想經一卷見僧祐寶唱二録長者子懊惱三處經一卷一名長者夭惱三處經亦直云三處惱經見長房録揵陀國王經一卷或無國字見長房録父母恩難報經一卷亦云勤報見長房録出中阿含檢無九橫經一卷房云出中阿含撿無見長房録禪行三十七經一卷或加品字見寶唱録犯戒報應輕重經一卷出目連問毗尼經亦云犯戒罪報輕重或云目連問經見長房録大比丘三千威儀經一卷或四卷亦云僧威儀經道地經一卷初出加大字見僧祐録迦葉結經一卷初出見長房録阿毗曇五法行經一卷或無行字見僧祐録已上見存已下闕本無量壽經二卷初出與寶積無量壽等同本房云見別録如幻三昧經二卷或一卷初出與寶積善住意會等同本見長房録月燈三昧經二卷出大日燈經第七異譯見長房録十二因緣經一卷初出亦云聞城十二因緣經見僧祐録內藏經一卷第二出一名內藏百品或云百寶元嘉二年十月出見朱士行録四不可得經一卷初出或無可字見房録
