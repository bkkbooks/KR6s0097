body:
  text: 西京西明寺沙門圓照撰別録中疑或再詳録第六一十四部一十九卷疑或録者自梵經東闡年將七百教有興廢時復遷移先後翻傳卷將萬計部帙既廣尋閲難周定録之人隨聞便上而不細尋宗旨理或疑焉今恐真僞交參是非相涉故為別録以示將來庶明達高人重為詳定毗羅三昧經二卷決定罪福經一卷慧定普遍國土神通菩薩經一卷余親見其本全非聖言救護身命濟人病苦厄經一卷與救疾經文勢相似一真一僞將為未可最妙勝定經一卷與最妙初教經文勢相似一真一僞亦將未可觀世音三昧經一卷清淨法行經一卷記說孔老顏回事五百梵志經一卷亦名五百婆羅門問有無經經云從五教生右毗羅三昧經下八部九卷古舊録中皆編僞妄大周刊定附入正經尋閲宗徒理多乖舛論量義句頗涉凡情且附疑科難從正録或云貶量聖教罪有所歸佛有誠言此非責難經云於我所說若生疑者尚不應受況如是等准其道理須簡是非仍俟諸賢共詳真僞上之八經舊録編僞今此僞録之次亦存而不削舊僞經目録刊為正者更有數部今未見本故此不論法社經二卷內題云業報輪轉償債引道地獄慈善莊嚴法社經右一經大周録云西晉三藏竺法護譯謹按長房等録竺法護所譯有法社經一卷腳注云注為疑此應多是舊僞録中法社經前經初題復云皇鹵三藏翻胡經出然尋此文意狀涉人情題注參差難為揩准且編疑録待更詳之淨度三昧經三卷蕭子良抄撰中有淨度三昧經三卷疑此經是益意經二卷僧法尼誦中有益意經二卷疑此經是右二部五卷大周録中編之入藏尋閲文句亦涉人情事須重詳且編疑録優婁頻經一卷僧法尼誦中有名疑此經是右一經長房內典二録直云梁天監十五年木道賢獻上更辨委由既無其本真僞難定且附疑録淨土盂蘭盆經一卷五紙右一經新舊之録皆未曾載時俗傳行將為正典細尋文句亦涉人情事須審詳且附疑録三厨經一卷右一經新舊諸録並未曾載然尋文理亦涉人謀依而行之獲驗非一復須詳審且附疑録別録中僞妄亂真録第七三百九十三部一千四百九十一卷僞經者邪見所造以亂真經者也自大師韜影向二千年魔教競興正法衰損自有頑愚之輩惡見迷心僞造諸經誑惑流俗邪言亂正可不哀哉今恐真僞相參是非一槩譬夫崑山寶玉與瓦石而同流贍部真金共鉛鐵而齊價今為件別真僞可分庶涇渭殊流無貽後患要行捨身經一卷三紙餘後有捨身願文共有五紙右一經不知何人所造邪黨盛行經初又云三藏法師玄奘譯按法師所譯無有此經僞謬之情昭然可見且述四件用曉愚心一僞經初云王舍城靈鷲山者靈鷲山名古譯經有奘法師譯皆鷲峯今言靈鷲一僞彰也一僞經初又云靈鷲山尸林側者按諸傳記其鷲峯山在摩伽陀國山城之內宮城東北十四五里豈有都城之內而安棄尸之處事既不然二僞彰也一僞經中又云佛說過去然燈佛時初願捨身者然燈如來是釋迦牟尼佛第二無數劫滿授記之師豈有得記當成方能死捨事與理乖三僞彰也一僞經中又云若有人殺害有情遍索訶界四重五逆謗方等經及盜常住現前僧物如是等罪合墮地獄若能捨身罪必消滅者謗經造逆合墮阿鼻死捨得除便無重報如外道妄計殑伽河浴罪垢消除輕命自泛生天受福此言死捨除罪與彼妄計何殊愚夫造惡用此除愆智者當思勿被欺誑永淪惡趣無解脫期事與理乖四僞彰也訛舛極多不能備記瑜伽法鏡經二卷或一卷兼有僞序右一經即舊僞録中像法決疑經前文增加二品共成一經初云佛臨涅盤為阿難說法住滅品此品乃取奘法師所譯佛臨涅槃記法住經改換增減置之於首次是地藏菩薩讚歎法身觀行品後是常施菩薩所問品此品即是舊經據其文勢次第不相聯貫景龍元年三階僧師利僞造序中妄云三藏菩提流志三藏寶思惟等於崇福寺同譯師利云有梵夾流志曾不見聞以舊編入僞中再造望蠲疑録僞上加僞訛舛尤多目閲可知不勞廣敘撰録者曰余曾以此事親問流志三藏口云吾邊元無梵夾不曾翻譯此經三藏弟子般若丘多識量明敏具委其事恐時代綿遠謬濫真詮故此指明以誡於後其僧師利因少鬪訟聖躬親慮時令還俗豈非上天不祐降罰斯人歟彌勒下生遣觀世音大勢至勸化衆生捨惡作善壽樂經一卷亦直云壽樂經十紙光愍菩薩問如來出世當用時普告經一卷八紙隨身本宮彌勒成佛經一卷賢樹菩薩問佛品金剛密要論經一卷亦名萬明王緣起經或無論兼說彌勒下生十四紙右上四經並是妖徒僞造其中說彌勒如來即欲下生等事謹按正經從釋迦滅後人間經五十七俱胝六十百千歲贍部洲人壽增八萬彌勒如來方出世豈可壽年減百而有彌勒下生耶以斯妖妄誘惑凡愚淺識之流多從信受因斯墜沒可謂傷哉故此甄明特希詳鑒耳佛升忉利天後阿難為諸四部衆說禮佛持齊經一卷亦云佛升忉利天彌勒摩尼佛說開悟佛性經一卷經後題云人身因緣開悟佛性經九紙持齊儀式經一卷七紙淨行優婆塞戒經一卷或云淨行優婆塞戒經感應品第十三改遺教經作六紙甲申年洪水災大水經一卷與彼佛鉢記中甲申年水事不同二紙自省經一卷二紙父母恩重經一卷經引丁蘭董黯郭巨等故知人造十紙如來正教祕要藏經一卷八紙毗尼藏經一卷頂蓋經一卷內題云佛說深妙法義論說深義生死道七紙天地八陽經一卷卷末題云八陽神呪經與正經中八陽神呪義理全異此說陰陽吉凶禳災除禍法八紙嫉妬新婦經一卷亦云妬婦經右一經近代人造忘其人名緣妻能妬僞造此經以誑之於中說嫉妬之人受報極重央崛摩羅經二卷亦直云央崛經與真經名同蕭子良抄撰中有央崛摩羅經二卷疑此經是重樓戒經一卷清淨居士子度人經一卷摩登耆經一卷譬喻經一卷宋慧簡譯中有譬喻經一卷時間無本與此名同真僞相濫故兩存之目連問經一卷與真經名同語意全異小法滅盡經一卷與真經中法滅盡經文意全異鳴鍾經一卷持戒法經一卷金決口經一卷地獄經一卷漢代失譯有地獄經一卷疑即此是兩存之優鉢祇王經一卷阿難請福報論一卷阿難請問毗尼論一卷或即阿難請問戒律論是決正二部毗尼論一卷或即毗尼決正論是沙門論一卷或即是內典録中沙彌論獨乞辟支迦論一卷毗尼請問論一卷地獄傳一卷央崛經下一十九部合二十卷並義理乖背僞妄昭然章疏共引靡知虛僞故載斯録傳示後賢儻悟非真希同革弊又僞經之類其數實繁更待尋求續編此例舊録云從佛名下三十九部今除佛名一部入藏餘合有三十八今缺一部但三十七未詳從要行捨身經下三十七部四十一卷承前諸録皆未曾載今開元新録搜集編上定行三昧經一卷一名摩訶目揵所問經或云佛遺定行經真諦比丘慧明經一卷或云惠明比丘經或云清淨真諦經尼吒國王經一卷或云尼吒黃羅國王經或云黃羅王經胸有萬字經一卷或云胸現萬字經薩惒菩薩經一卷舊録云國王薩惒菩薩或云薩法經善信女經二卷或云善信經護身主妙經一卷一名度世經有云十二好者誤度護經一卷或云度護法經法經録云度法經毗羅三昧經二卷善王皇帝經二卷或云善王皇帝功德尊經或為一卷惟務三昧經一卷或作惟無三昧阿羅呵公經一卷或云相國阿羅訶公經慧定普遍神通菩薩經一卷舊經云慧定普遍國土神通菩薩經陰馬藏經一卷或云陰馬藏光明經法經録云一身十一王所問治國經大阿育王經一卷云佛在波羅奈者四事解脫經一卷或云四事解脫度人經大阿那律經一卷非是八念者貧女人經一卷名難陀者舊銘云貧女難陀經謹按賢愚經第十一卷有貧女難陀經若與彼同即是非僞鑄金像經一卷四身經一卷普慧三昧經一卷阿秋那經一卷兩部獨證經一卷法本齊經一卷云西京州來覓歷所傳大比丘尼戒一卷周録云異比丘尼戒本尸梨蜜弟子覓歷所傳右定行三昧經下二十五部二十八卷符秦沙門彌天釋道安録中僞疑經安公僞録本有二十六卷經今以寶如來三昧經翻譯有源以曾兩譯編之正録故此除之安公云外國僧法學皆跪而口受同師所受若一二十轉以授後學若有一字異者共相推覆得便擯之僧法無縱也經至晉土其年未遠而喜事者以沙糅金斌斌如也而無撿正何以別真僞乎農者禾草俱存后稷為之歎息金匱玉石同緘卞和為之懷耻安敢豫學次見經淆雜龍蛇並進豈不恥之今列意謂非佛經者如右以示將來學士共知鄙倍焉比丘應法行經一卷亦云如來初度五比丘即說應供行經僧祐録云此經前題云羅什出祐按經卷舊無譯名兼羅什所出又無此經故入疑録居士請僧福田經一卷祐云此前題云曇無讖出按讖所出無此經故入疑録灌頂度星招魂斷絶復連經一卷法經録云此經更有一小本盡是人作無為道經二卷長房等録云無讖譯復云世注為疑隋法經及仁壽録並云大乘妙法右一經余親見本似是漢魏之代此方撰集非梵本翻周録之中編之入正今以名濫真經依祐編之僞録決定罪福經一卷法經録云一名惠法經仁壽録云二卷情離有罪經一卷題云情離有罪經品下燒香呪願經一卷一云呪願經安墓呪經一卷法經録云安墓神呪經長房録云簫齊道備撰觀月光菩薩記一卷或有經字佛鉢記一卷或云佛鉢記甲申年大水及月光菩薩事彌勒下教經一卷或在鉢記後九十六種道經一卷法經録云九十五種道經仁壽録云二卷具題云除去九十五種邪道雜類神呪經右一十二部經記僧祐録云或義理乖背或文偈淺鄙故入疑録庶耘蕪穬以顯法寶祐録又有灌頂藥師經一卷云宋代惠簡依經抄撰今以此經出灌頂新舊已經四譯所以僞録除之提謂波利經二卷宋武時北國比丘瞿靖撰舊別有題謂經一卷與此真僞全異寶車經一卷或云妙寶車經北國淮州沙門曇辨撰青州比丘道侍改治右比丘應供經下一十四部一十六卷梁僧祐録中僞經祐録略云祐校閲群經廣集同異約以經律頗見所疑真經體趣融然深遠假託之文辭意淺雜玉石朱紫無所逃形也今區別所疑注之於録并近世妄撰亦標于末並依倚雜經而自製名題進不聞遠適西域退不見承譯西賓我聞興於戶牖印可出於胸懷誑誤後學良足寒心既躬所見聞寧敢默已嗚呼來葉慎而察焉祐録云又有菩提福藏法化三昧經一卷衆經要覽法偈二十一首一卷並云沙門道歡所撰准長房録道歡更有僞經故從於彼一處編上九傷經一卷房云見別録菩提福藏法化三昧經一卷房云武帝世出見藏記及寶唱録七佛各說偈經一卷房云見吳録深自智身偈經一卷房云見吳録祐云失譯衆經要覽法偈二十首一卷梁天監三年撰見三藏及長房録右五部五卷長房録中簫齊沙門釋道備撰備後改名道歡雖見衆録然並注入疑經今依舊編長房録中道備更有安墓呪經一卷祐録雖不題造人以僞顯録此不重載淨土經七卷簫齊永元元年出時年九歲寶頂經一卷永元元年出時年九歲正頂經一卷永元元年出時年九歲法華經一卷永元元年出時年九歲勝鬘經一卷永元元年出時年九歲藥草經一卷永元二年出時年十歲太子經一卷永元二年出時年十歲伽耶波經一卷永元二年出時年十歲波羅㮈經一卷中興元年出時年十二優婁頻經一卷中興元年出時年十二益意經二卷梁天監元年出時年十三智遠承旨般若得經一卷天監元年出時年十三智遠承旨華嚴瓔珞經一卷天監元年出時年十三智遠承旨出乘師子吼經一卷天監三年出時年十五踰陀衛經一卷天監四年出時年十六臺內花光殿出阿那含經二卷天監四年出時年十六妙音師子吼經三卷天監四年出時年十六優曇經一卷妙莊嚴經四卷維摩經一卷序七世經一卷右二十一種經凡三十五卷如前所列算得三十四卷梁僧祐録云齊末大學博士江泌處女尼子所出初尼子年在齠齔有時閉目靜坐誦出此經或說上天或稱神授發言通利如有宿習令人寫出俄而還止經歷旬朔續復如前京都道俗咸傳其異今上敕見面問所以其依事奉答不異常人然篤信正法少修梵行父母欲嫁之誓而弗許後遂出家名僧法住青園寺祐既收集正典檢集異聞事接耳目就求省視其家祕隱不以見示唯得妙音師子吼經三卷以備疑經之録此尼天監年三月亡有好事者得其文疏前後所出定二十餘卷厥舅孫質以為真經行疏勸化收合傳寫既染毫牘必在於世昔漢建安末濟陰丁氏之妻忽如中疾便能胡語又求紙筆自為胡書復有西域胡人見其此書云是經莂推尋往古不無此事但義非金口又無師譯取捨兼懷附之疑例長房以為重習有內置之正目仁壽録及內典等録以非梵本翻傳編於僞録今依仁壽等定亦編僞中高王觀世音經一卷亦云小觀世音經半紙餘右一經昔元魏天平年中定州幕士孫敬德在防造觀世音像年滿將還在家禮事後為賊所引不堪考楚遂妄承罪明日將刑其夜禮懺流淚忽如夢睡見一沙門教誦救生觀世音經經有諸佛名令誦千遍得免苦難敬德覺記夢所緣了無參錯遂誦一百遍有司執縛向市且行且誦臨刑滿千刀下斫之折為三段皮肉不傷易刀又斫凡經三換刀折如初監司問之具陳本末以狀聞丞相高歡乃為表請免死因此廣行于世所謂高王觀世音經也敬德還設齊迎像乃見項上有三刀痕見齊書及辨正論內典録撰録者曰此經周録之內編之入藏今則不然此雖冥授不因傳譯與前僧法尼所誦何殊何得彼入僞中此編正録例既如此故附此中薩婆若陀眷屬莊嚴經一卷二十餘紙右一經僧祐録云梁天監九年郢頭陀道人妙光戒歲七矯以勝相諸尼嫗人僉稱聖道彼州僧正議欲驅擯遂潛下都住普弘寺造作此經又寫在屏風紅紗映覆香華供養雲集四親嚫供噎塞事源顯發敕付建康辨覆款伏抄略諸經多有私意妄造借書人路琰屬辭潤色獄牒妙光巧詐事應斬刑路琰同謀十歲謫戍即以其年四月二十一日敕僧正慧超令喚京師能講大法師宿德如僧祐曇准等二十人共至建康前辨妙光事超即奉旨與曇准僧祐法寵慧令慧集智藏僧旻法雲等二十人於縣辨問妙光伏罪事事如牒衆僧詳議依律擯治天恩免死恐於偏地復為惑亂長繫東治即收拾此經得二十餘本及屏風於縣燒除然猶有零散恐亂後生故復略記薩婆若陀長者是妙光父名妙光弟名金剛德體弟子名師子撰録者曰餘録之中略述由委今具明者欲使委悉根源共同鑒勗阿那含經二卷余親見一本一卷成部亦是人造右按長房等代録及失譯録俱有此經僧法尼誦中復有阿那含經二卷既並無本詮定真僞難分且各存其目像法決疑經一卷清淨法行經一卷龍種尊國變化經一卷與安公僞録中四事解脫經大同觀世音十大願經一卷仁壽録云一名大悲觀世音經具題云大悲觀世音弘猛慧海十大願品第七百觀世音三昧經一卷大乘蓮華馬頭羅剎經一卷亦云寶達菩薩問報應沙門經空淨三昧經一卷一名空靜天感應三昧經謹按代録已經兩譯恐濫竊真名故兩存其名初波羅曜經二卷大法尊王經三十二卷十方佛決狐疑經一卷八方根八十佛名經一卷亦云根本普賢菩薩說此證明經一卷彌勒成佛本起經十七卷仁壽録云七十卷彌勒下生觀世音施珠寶經一卷彌勒成佛伏魔經一卷一名救度衆生經妙法蓮華度量天地經一卷亦云妙法蓮華經度量天地品第二十九觀世音詠託生經一卷滅七鄣莊嚴成佛經一卷空寂菩薩所問經一卷一名法滅盡經亦云法沒盡經法經録云此經僞妄炳然固非竺法護所譯右空寂所問經謹按群録已經兩譯恐濫竊真名故存其目又有法滅盡經一卷即此異名不復重載其法滅盡大小二乘僞録皆載者誤也照明菩薩方便譬喻治病經一卷照明菩薩經一卷一加頭陀字首羅比丘見月光童子經一卷阿難現變經一卷般若玄記經一卷幽深玄記經一卷玄記經二卷周録云一卷大契經四卷周録云一名彌勒下生結大善契經或三卷發菩提心經一卷今有兩卷者是其經此雖名同卷名少異菩薩求五眼經一卷聶道真所譯有此經名此中復載應僞竊真名所以真僞俱有般泥洹後諸比丘經一卷按僧祐録即小般泥洹名異小般泥洹經一卷一名大法滅盡經右按安世高譯處有小般泥洹經此既名同復無本可定且二處俱載五濁惡世經一卷又有大五濁經應即此是妙法蓮華天地變異經一卷花嚴十惡經一卷觀世樓炭經一卷小樓炭經一卷須彌四域經一卷王化內外經一卷一名老子化胡經傳録云晉時祭酒王浮作魔化比丘經一卷支謙録內有此經名恐僞竊真名且兩存其目善信神呪經二卷羅什録內有善信摩訶神呪經二卷名目相濫真僞未分且兩存其本五濁經一卷又有小五濁經應此經是華鮮經中說罪福經一卷亦直云華鮮經五龍悔過經一卷一名五龍悔過護法經一名空慧悔過戒具三昧道門經一卷最妙勝定經一卷天竺沙門經一卷救護身命濟病苦厄經一卷亦直云救護身命經亦云護身命右此經更有一本題云佛頂陀羅尼經初云婆羅門三藏流支譯加呪一首餘文大同撰録者曰經題流支未詳何者若流支再譯經語與舊合殊今乃呪異餘同未能令人除惑推尋無據不可妄編故依舊録列之於此大那羅經一卷慧明正行經一卷天皇梵摩經一卷安墓經一卷安冢經一卷安宅經一卷正録中安宅神呪經與此異天公經一卷度生死海神船經一卷救蟻沙彌經一卷謹按雜寶藏經第四卷有沙彌救蟻如與彼同即非是僞此既未覩且復存之北方禮佛呪經一卷敬福經一卷具題云如來在金棺囑纍清淨莊嚴敬福經阿羅訶條國王經一卷五百梵志經一卷一名亦有亦無經修行方便經一卷偈令經一卷度世不死經一卷齊法清淨經一卷無為法道經一卷呪媚經一卷正齊經一卷安世高譯中有正齊經竺法護録中亦有恐濫竊真名各存其目尸陀林經一卷招魂魄經一卷亦云招魂經周録云招魂經法社經一卷法經録云披尋古録更應別有法社制度但未見此經無假且顯右此單卷法社經曾見三本說處雖同文辭乃異尋其文義竝是人造一本三紙名為法社罪福報應經一本兩紙一本一紙餘太子讚經一卷比丘法藏見地獄變經一卷人民求願經一卷閻羅王東太山經一卷七寶經一卷字論經一卷救護衆生惡疾經一卷亦云救疾經五果譬喻經一卷孤兒孤女經一卷度人王并庶民受五戒正信除邪經一卷遺教法律三昧經二卷右按長房等代録及失譯録俱有此經既並無本詮定實難且各存其目撰録者曰此經余雖不覩全本見所引者多是人造二百五十戒經一卷法經録云諸録並云有六七種異先所出故入疑右按梁僧祐録隋費長房録唐道宣録等並云齊武帝時沙門釋法度出而不言譯未詳出字其意云何為是集出為是僞出其本復闕詮定實難且依法經録中載之僞録異威儀一卷法經録云宋元嘉世曇摩耶舍弟子法度造五凡夫論一卷右阿那含經下八十六部一百四十一卷隋開皇十四年敕沙門法經等所撰衆經録內僞疑經録云並名號乖真或首掠金言而未申謠讖或初論世術後記法詞或引陰陽吉凶或明神鬼禍福諸如此比僞妄灼然今宜祕寢以救世患然法經録中以隨願往生經藥師經梵天神策經仁王經寶如來三昧經占察經梵經五苦章句經安宅神呪經遺教論等編疑僞者不然隨願往生等三經出大灌頂經仁王等七經並翻譯有源編為疑僞將為未可今編正録此中不載金剛藏經三十卷周録云或三十一卷隨葉佛說須菩提經二卷一名須菩提經般若得道經一卷法經録云般若得經或可般若得經即是僧法尼所誦者造天地經一卷蒺梨園經一卷危脆經一卷竺曇無蘭譯中有此經名既未見本實難詮定且兩存之墮落優婆塞經一卷後漢支曜譯中有名既無本定且各為存之銀蹄金角犢子經一卷或云孝順變破惡業修行經後母經一卷應行律一卷或云應律行或有經字大空般若論一卷右金剛藏經下一十一部四十一卷隋仁壽二年敕請興善寺大德與翻經沙門及學士等共定衆經録內僞疑經撰録者曰此僞録中復有大光明菩薩百四十八願經僧祐録內注云抄經今別生録載僞録除之諸佛下生大法王經六十卷宣律師云余於汾都親見此文方廣滅罪成佛經三卷亦云大通方廣懺悔罪莊嚴成佛經亦直云大通方廣經法句經二卷罪福決疑經一卷五辛經一卷周録云大乘般若五辛經初教經一卷一云最妙初教經與最妙勝定經文勢相似罪報經一卷日輪供養經一卷乳光經一卷其文全異於正經云不得服乳服之獲罪福田報應經一卷寶印經一卷究竟大悲經一卷或三卷亦云八卷獨覺論一卷毗尼決正論一卷優波離論一卷或云優波離經普決論一卷或云惟識普決論阿難請問戒律論一卷迦葉問論一卷或云迦葉問毗尼論大威儀請問論一卷或云大威儀請問經寶鬘論一卷沙彌論一卷或云彌沙論文殊請問論一卷右大法王經下二十二部八十七卷大唐麟德元年京師西明寺沙門道宣所撰內典録中僞經宣云諸僞經論人間經藏往往有之其本尚多待見更録撰録者曰內典中復有金棺囑纍經一卷即是法經録中敬福經是故不重載又有占察經遺教論並翻傳有據文義可觀編之僞録將為未可已編正録僞中不載諸佛下生經二十卷善惡因果經一卷內三十七品經一卷或無內字戒正信邪經一卷達空道士分別善惡度苦經一卷老子教人服藥修常住經一卷佛道定行經一卷今疑是佛遺定行經決要惠經一卷須彌像圖山經一卷今疑與法録中須彌四域經文同名異滿子經卷下一卷法王經一卷其題云蹬力梯解脫道甘露藥流淥泉如來智心造服者除煩惱法王經一名涅槃般若波羅經決疑經一卷不死經一卷大辨邪正法門經一卷佛性海藏經二卷具題云佛性海藏智慧解脫破心相經心王菩薩說頭陀經一卷新像法決疑經一卷護身經一卷今疑是護身命經勝德長者所問菩薩觀行經一卷內天兄弟五人得天品經一卷反流盡源經一卷師子鳩摩羅所問經一卷大方廣不謗佛經一卷本事經一卷無量門淨除三障陀羅尼經一卷三昧經童子菩薩四重問品一卷天地圖像經一卷大乘無盡藏經一卷梵天王經一卷側土經一卷彌勒下山經一卷聖水經一卷彌勒下生救度苦厄經一卷菩薩決定經一卷新觀世音經一卷延壽經一卷或云延年益壽經閻羅王經一卷續命經一卷益算經一卷亦七佛神符經亦云益算神符經大周僞録分為三經者誤也四讚偈及七佛名字禮懺經一卷閻羅王說免地獄經一卷花光經一卷三塗纍劫不竟經一卷慈教經一卷去要除病經一卷慈力王經一卷寶登王太子經一卷勇意菩薩將僧忍見彌勒并示地獄經一卷天宮經一卷折刀經一卷五戒本行經一卷修善行經一卷大通菩薩普利廣度經一卷佛悲海中涌出一如無二行經一卷流炭經一卷如來成道經一卷阿彌陀佛覺諸大衆觀身經一卷十往生阿彌陀佛國經一卷撰録者曰此上二經余親見其本但前廣後略餘並無異律藏經一卷日藏觀世音經一卷一紙半救度大劫燒三災起經一卷一乘不假羊鹿經一卷聞善生信回惡經一卷彌勒下生甄別罪福經一卷大薩若經一卷摩訶薩埵經一卷祕要經一卷五無經一卷清淨精進無上真諦太比丘慧法經一卷佛初置塔經一卷今疑是法經録中天公經異名太子成道經一卷恆伽達緣經一卷寶圖經卷下一卷譬喻折羅漢經一卷降棄魔菩薩經一卷蜜多三昧經一卷發問罪福應經一卷五戒經一卷現報當受經一卷觀音無畏論一卷隋日有人僞造釋高王觀世音經右諸佛下生經下八十部一百一卷大唐天后天冊萬歲元年敕東都佛授記寺沙門明佺等刊定衆經録中僞經周録云古來相傳皆云僞謬觀其文言冗雜義理澆浮雖偷佛說之名終露人謀之狀迷墜群品罔不由斯故具疏條列之如上撰録者曰此八十經自古僞録皆未曾載周録獨編雖云古來相傳皆云僞謬而不別顯出何録中且依周録件之如上佛法有六義第一應知經一卷祐無經字房録中有六通無礙六根淨業義門經一卷祐無經字房録中有右二部二卷梁僧祐録云齊武帝時比丘釋法願僞造然既立名號則成部卷擢後代疑亂故明注于録長房録云世皆共列用為疑經故復載後賢識源幸同鑒勗佛所制名數經五卷右一部五卷梁僧祐録云齊武帝時比丘釋王宗所撰抄集衆經有似數林但題稱佛制懼亂名實故注于録長房録云首題經名編預於録既非正經世所疑惑戒果莊嚴經一卷或無經字有八章頌右一部一卷隋翻經學士費長房録云簫齊武帝代永明五年常侍庚頡採經意撰録者曰採意為頌不同僞造既別立經名恐濫於聖典隋仁壽録及大周録在僞中今亦同彼編於僞録抄華嚴經一十四卷長房録云十三卷抄方等大集經一十二卷抄菩薩地經一十二卷長房録云抄地持抄法句譬經三十八卷長房録云抄百喻抄阿差末經四卷仁壽録云十四卷抄淨度三昧經四卷仁壽録云三卷抄摩訶薩耶經三卷抄胎經三卷抄報恩經二卷抄頭陀經二卷抄義足經二卷抄法華藥王品一卷抄維摩所說佛國品一卷抄維摩方便品一卷抄維摩問疾品一卷抄安般守意經一卷抄菩薩本業經一卷抄菩薩本業行品一卷抄四諦經要數一卷抄法律三昧經一卷抄照明三昧不思議事經一卷抄諸佛要集經一卷抄大乘方等要慧經一卷抄普賢觀懺悔法一卷抄樂瓔珞莊嚴方便經一卷抄未曾有因緣經一卷抄阿毗曇五法行一卷抄諸法行經一卷抄無為道經一卷抄分別經一卷抄德光太子經一卷抄魔化比丘經一卷抄優婆塞受戒品一卷抄優婆塞受戒法一卷抄貧女為國王夫人經一卷右僧祐録云從華嚴經至貧女為國王夫人經凡三十六部經並齊竟陵文宣王所抄凡抄字在題上者皆文宣所抄也抄妙法蓮華經五十九卷抄阿毗曇毗婆沙五十九卷抄維摩經二十六卷抄菩薩決定要行經十卷亦云淨行優婆塞經法經録云菩薩決定經抄成實論九卷長房録云八卷右成實論梁僧祐録云永明七年文宣王請定林上寺釋僧柔小莊嚴寺釋慧次等於普弘寺共抄出抄勝鬘經七卷法華經下六部長房録云是文宣王抄出抄為法捨身經六卷仁壽録云三卷已上一經內典録云是文宣所抄右華嚴經下四十三部二百九十八卷勘校群録並是南齊司徒竟陵文宣王蕭子良所抄長房録云王愛好博尋躬自緝撰備忘擬歷不謂傳行後代學人相踵抄讀世人參雜惑亂正文故舉本綱庶知由委但上題抄字者悉是其流類例細尋始末自別內典録云既異本經題抄顯別令後尋者知有所因然風味彌通義理愜附接蒙俗之繁博考性欲之殊途有道存焉義非疑妄而祐長房等諸録並注疑經莫不恐涉澆浮餘波失本故也淨度三昧抄一卷律經雜抄一卷本起抄一卷祐云舊録所載睒抄經一卷祐云舊録所載五百梵律經抄一卷大海深嶮抄經一卷祐云上六經並是舊抄法華經一百八十九卷祐云此一經近代集據撰群經以類相從雖立號法華經入抄數右從佛法六義下五十四部五百一卷並名濫真經文句增減或新糅異義別立名題若從正收恐玉石斯濫若一例為僞而推本有憑進退二途實難詮定且依舊録編之僞末後學尋覽幸詳得失耳
