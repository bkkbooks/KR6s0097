body:
  text: 西京西明寺沙門圓照撰總集群經録上之三吳孫氏前都武昌後都建業從孫權諡太祖文皇帝黃武元年壬寅至孫皓無諡天紀四年庚子凡經四主五十九年緇素五人所出經等并及失譯總一百八十九部四百一十七卷於中六十一部九十二卷見在一百二十八部三百二十五卷闕本吳沙門維祇難二部六卷經集沙門竺律炎四部六卷經集優婆塞支謙八十八部一百一十八卷經律集沙門康僧會七部二十卷經集沙門支強梁接一部六卷經魏吳兩代諸失譯經八十七部二百六十一卷阿差末菩薩經四卷初出與西晉法護阿差末及無盡意經等同本見吳別二録法句經二卷初出亦云法句集尊者法護撰與律炎支謙共出謙製序見僧祐録吳録云五卷未詳右二部六卷法句經二卷見在阿差末四卷闕本沙門維祇難吳云障礙本印度人世奉異道以火祠為上時有天竺沙門習學小乘多行道術經遠行逼暮欲寄難家既奉異道猜忌釋子乃處之門外露地而宿沙門夜密加呪術令難家所事之火欻然變滅於是舉家共出啓請沙門入室供養沙門還以呪術變火令生難既覩沙門神力勝已即於佛法大生信樂乃捨本所事出家為道依此沙門以為和上受學三藏妙善四含遊化諸國莫不皆奉與同伴竺律炎發自西域因到江右孫權黃武三年甲辰於武昌郡共律炎出阿差末等經二部而祇難及炎既未善方音翻梵之際頗有不盡志存義本辭近朴質摩登伽經三卷見法上録與支謙共出與舍頭諫經等同本或二卷第四譯三摩竭經一卷初出見始興録與忿怒檀王經同本異出一名須摩提女經一名難國王一名恕和檀王經與支越共出非是全典從大經出佛醫經一卷或佛醫王經見寶唱録梵志經一卷見始興録右四部六卷前三部五卷見在後一部一卷闕本沙門竺律炎中印度人也解行清勵內外博通與維祇難同遊吳境維祇卒後以孫權黃龍二年庚戌於揚都譯摩登伽等經四部其名群録不同或云將炎或云持炎云律炎未詳孰是故備列之大明度無極經四卷第二出或六卷亦直云大明度經與道行小品等同本見竺道祖魏吳録及僧祐等録阿彌陀經二卷內題云佛説諸佛阿彌陀三耶三佛薩樓佛檀過度人等道經第三出亦名無量壽見竺道祖僧祐二録與世高等譯小異菩薩本業經一卷亦直名本業經亦名淨行品經是華嚴經淨行品異譯見僧祐録長房中本業之外別載淨行品者誤也維摩詰經二卷維摩詰説不思法門之稱一名佛法普入道門三昧經第二出或三卷見竺道祖僧祐二録與魏漢佛調等小異慧印三昧經一卷亦直云慧印經一名寶因慧印三昧經初出與如來智印經同本道祖僧祐二録九色鹿經一卷出六度集異譯見法上録老女人經一卷安公云出阿毗曇吳録直云老女經或云老母經初出見僧祐録犢子經一卷見法上録初出與乳光佛經等同本貝多樹下思惟十二因緣經一卷見長房録第三出與唐譯緣起聖道經等本同了本生死經一卷安公云出生經祐按五卷生經無此名見僧祐録與稻芉經同本異出謙自注并製序云漢末出謙注龍施女經一卷初出與龍施菩薩本起經同本祐云別録所載安録無八吉祥神呪經一卷初出或無神字或云吉祥經與八陽神呪經等同本房云見古録無量門微密持經一卷亦直云微密持經一名成道降魔得一切智經初出與出生無量門同本見僧睿二秦録及僧祐録華積陀羅尼神呪經一卷見寶唱録或無神字與花聚陀羅尼等同本持句神呪經一卷初出見長房録與陀鄰尼鉢經等同本亦云陀羅尼句私訶三昧經一卷第二出或云私訶亦一名菩薩道樹亦名道樹三昧見安支敏度僧祐等三録祐云此經即是菩薩道樹菩薩生地經一卷一名差摩竭經初出見竺道祖吳録及僧祐録孛經一卷亦云孛抄經祐云今孛經一卷即此是第二出見僧祐録及別録月明菩薩經一卷或加三昧字一名月明童子經一名月明童男經見僧祐録三品弟子經一卷一名弟子學有三輩經見長房録法律三昧經一卷亦直云法律經第三出見長房録梵志阿颰經一卷一名阿颰摩納經安録直云阿拔經亦名佛聞梵志阿颰經出長阿含第十三卷異譯見房録梵網六十二見經一卷一名梵網經房云見別録出長阿含第十四卷異譯七知經一卷或作七智見長房録出中阿含第一卷異譯釋摩男本經祐録無本字一名五陰因事經安録云出中阿含第二十五異譯見竺道祖吳録諸法本經一卷出中阿含第二十八異譯見長房録弊魔試目連經一卷一名魔嬈亂經房云見舊録出中阿含第三十卷異譯賴吒和羅經一卷或云羅漢賴吒和羅經與後漢支曜出者少異出中阿含第三十一異譯祐云別録所載安公録中無梵摩喻經一卷或作渝字見道祖僧祐二録出中阿含第三十一異譯齋經一卷一名持齋經見別録及僧祐録出中阿含第五十五異譯須摩提女經一卷出增一阿含第二十二異譯見長房録不自守意經一卷或無意字或云自守亦不自守經出雜阿含第十一卷異譯見長房録五母子經一卷見長房録初出與沙彌羅經同本太子瑞應本起經二卷黃武年譯第四出亦云太子本起瑞應亦直云瑞應本起與孟詳出者小異陳郡謝鏘吳郡張洗等筆受魏東阿植詳定見始興僧祐二録龍王兄弟經一卷一名難龍王經或無王字一名降龍王經初出見長房録長者音悅經一卷一名長者音悅不蘭迦葉經亦直云音悅經初出見長房録七女經一卷亦云七女本經安公云出阿毗曇初出見僧祐録八師經一卷見竺道祖吳録及僧祐録初出萍沙王五願經一卷或作瓶字一名弗沙迦王經見長房録初出安公録云出中阿含檢無義足經二卷見竺道祖吳録及僧祐寶唱二録初出有一十六經須摩提長者經二卷一名會諸佛前亦名如來所説示現衆生見長房録阿難四事經一卷見僧祐録及別録未生怨經一卷見長房録四願經一卷見竺道祖吳録及僧祐録黑氏梵志經一卷房録云見別録猘狗經一卷見長房録孫多耶致經一卷或云梵志孫多耶致經見長房録安公云出中阿含撿無戒銷災經一卷亦云戒銷伏災經見舊録撰集百緣經十卷見內典録菩薩本緣經三卷亦云菩薩本緣集經或二卷或四卷天竺沙門僧伽斯耶撰見長房録惟日雜難經一卷見長房録摩訶般若波羅蜜呪經一卷或無摩訶字見寶唱録法鏡經二卷或一卷第二出祐云見別録安録中無又長房録更有郁伽長者經二卷亦云支謙譯即是此經不合重載阿闍世王女阿術達菩薩經一卷初出見長房録阿差末菩薩經四卷見吳録第二出與維祇難所譯本同文異小阿差末經二卷見別録及僧祐録加小字與次前經應非同本大般泥洹經二卷第三出此略本序分哀歎品為二卷後三紙異見竺道祖吳録安云出長阿含祐云長阿含與此異佛以三車喚經一卷見長房録云出法華應出第二卷譬喻品不莊校女經一卷初出見寶唱録須賴經一卷或云須賴菩薩經第三出與白延等出者同本見竺道祖吳録及僧祐録菩薩修行經一卷初出見寶唱録演道俗業經一卷初出見舊録或無業字方等首楞嚴經二卷黃武年譯第二出與後漢支讖等出者同本見竺道祖吳録安録中無祐云無方等字云見別録惟明二十偈經一卷初出或無經字見僧祐録法滅盡經一卷初出或云法沒盡或云空寂菩薩所問經見長房録七佛神呪經一卷一本無經字見長房録摩訶精進經一卷亦云大精進經見長房録十二門大方等經一卷安録無祐云見別録佛從上所行三十偈經一卷或無經字見僧祐録四十二章經一卷第二出與摩騰譯者小異文義無正辭句可觀見別録禪祕要經四卷或無經字初出見吳別二録堅意經一卷或云堅心經第二出見長房録勸進學道經一卷一本無勸字初出見長房録恆水戒經一卷或無戒字第二出見舊録七漏經一卷房云見別録悔過法經一卷或無法字一名向十方禮拜悔過文見僧祐録賢者德經一卷見僧祐録梵志結淨經一卷見長房録阿質國王經一卷見長房録惟婁王師子潼譬喻經一卷一本無譬喻字見長房録藍達王經一卷一云目連功德經亦云目連因緣功德經見吳録百喻經一卷見長房録五陰事經一卷見長房録魔化作比丘經一卷見長房録優多羅母經一卷一本無母字見僧祐録人民求願經一卷見長房録修行方便經二卷亦云修行方便禪經見吳録法句經二卷第二出亦云法句集見別録及僧祐録右八十八部一百一十八卷惟日雜難經上五十一部六十九卷見在摩訶般若呪下三十七部四十九卷闕本優婆塞支謙字恭明一名越大月支人也祖父法度以漢靈帝世率國人數百歸化拜率善中郎將越年七歲騎竹馬戲於鄰家為狗所囓脛骨傷碎鄰人欲殺狗取肝傅瘡越曰天生此物為人守吠若不往君舍狗終不見囓此則失在於我不關於狗若殺之得瘥尚不可為況於我無益而空招大罪且畜生無知豈可理責由是鄰人感其言至遂不復殺十歲學漢書十三學婆羅門書並得精妙兼通六國語音初桓靈世支讖譯出法典有支亮字紀明資學讖謙又受業於亮博覽經籍莫不究練世間藝術多所綜習其為人細長黑瘦眼多白睛黃時人為之語曰支郎支郎眼中黃形體雖細是智囊其本奉大法精練經旨獻帝之末漢室大亂與鄉人數十共奔於吳初發日唯有一被有一客隨之大寒無被越呼共眠夜將半客奪其被而去明旦同侶問被所在越曰昨夜為客所奪同侶咸言何不相告答曰我若告發卿等必以劫罪罪之豈宜以一被而殺一人乎遠近聞者莫不歎服後吳主孫權聞其博學有才慧即召見之因問經中深隱之義越應機釋難無疑不析權大悅拜為博士使輔導東宮甚加寵秩越以大教雖行而經多梵文莫有解者既善華戎之語乃收集衆本譯為吳言從權黃武二年癸卯至亮建興二年癸酉三十餘載譯大明度等經八十八部曲得聖義辭旨文雅又依無量壽中本起經製讚菩薩連句梵唄三契注了本生死經皆行於世後太子登位遂隱於穹隘山不交世務從竺法蘭道人更練五戒凡所遊從皆沙門而已後卒於山中春秋六十吳主孫亮與衆僧書曰支恭明不救所疾其業履沖素始終可高為之惻愴不能已其為時所惜如此謙所出經部卷多少諸説不定其僧祐三藏記唯載三十六部祐録謙傳云出三十七經慧皎高僧傳乃有四十九經長房録中便載一百二十九部今以房録所載多是別生或異名重載今隨次刪之如後所述鹿子經與西晉竺法護所出鹿母經文同申日經亦與法護所出月光童子經同出家功德經今有三本一是秦譯附於秦録二從賢愚抄出今附別生録中金剛清淨經亦云金剛三昧本性清淨不滅不壞經後漢失譯録中復載詳文非是支謙所出今移附秦録大慈無減經寶女問三十二相經魔女聞佛説法得男身經無減等三經並出大集經寶海梵志成就大悲經出悲華經普廣菩薩經即別行隨願往生經是出灌頂經摩調王經出六度集經佛為訶到曠野鬼説法經或云訶利出中阿含枯樹經或上加大字鷹鷂獦經鵄鳥事經枯樹等三經並出增一阿含色無常經諸漏盡經或無漏字雪山無獼猴經或作無猿猴或無無字無母子經不淨觀經三種馬經四種良馬經壽命促經河中草龜經國王成就五法久存於世經佛為外道須深説離欲經色無常等十一經並出雜阿含是我所經梵志經上二經並出生經桀貪王經出義足經外道仙尼説度梵志經上二經小乘抄瞎鱉經梵志問佛世間增減經三魚失水經甘露道經降千梵志經梵志子死稻敗經護口意經梵志問佛師經法施勝經水上泡經瞎鱉等十經並出出曜經修行慈經出修行道地經度脫狗子經出雜譬喻右大慈無減經等三十八部三十八卷長房等録並云謙譯今按隋代二本衆經録及新括出別生抄經等此等並從諸經抄出不足為翻譯之數今存實録故刪之六度集經八卷或九卷或云六度無極經或無極集或云雜無極經見竺道祖吳録僧祐録舊雜譬喻經二卷內典有舊字房録中無亦云雜譬喻集經或無集字見高僧傳及長房録吳品經五卷祐録無經字云凡有十品第三出房云即是小品般若出僧祐録菩薩淨行經二卷是大集寶髻品異譯或直云淨律經赤烏年出見竺道祖吳録權方便經一卷與順權方便經等同本初出見吳録及別録記菩薩二百五十法經一卷或二卷以此贊大僧二百五十戒示皓者是見高僧傳及長房録坐禪經一卷見長房録右七部二十卷六度等二部十卷見在吳品等五部十卷闕本沙門康僧會其先康居國人世居印度其父因商賈移于交址會年十餘歲二親並亡以至性奉孝服畢出家勵行甚峻為人弘雅有識量篤志好學明解三藏博覽六經天圖地緯多所綜涉辨於樞機兼善文翰時孫權稱制江左而佛教未行先有優婆塞支謙宣譯經典既初染大法風化未全僧會欲使道振江左興立圖寺及杖錫東遊以吳赤烏十年初達建業營立茅茨設像行道時吳國以初見沙門覩形未及其道疑為矯異有司奏曰有胡人入境自稱沙門容服非恆事應撿察權曰吾聞漢明夢神號稱為佛彼之所事豈其遺風耶即召會詰問有何靈驗會曰如來遷世忽逾千載遺骨舍利神曜無方昔阿育王起塔乃八萬四千夫塔寺之興所以表遺化也權以為誇誕乃謂會曰若能得舍利者當為造塔如其虛妄國有常刑會請期七日乃謂其屬曰法之興廢在此一舉今不至誠後將何及共潔齋靖室以銅瓶加几燒香禮請七日期畢寂然無應求申二七亦復如之權曰此實欺誑將欲加罪更請三七權又特聽會謂法屬曰宣尼有言文王既沒文不在茲乎法雲應降而吾等無感何假王憲當以誓死為期耳三七日暮猶無所見莫不震懼既入五更忽聞瓶中鎗然有聲會自往視果獲舍利明旦呈權舉朝集觀五色光焰照輝瓶上權自手執瓶寫于銅盤舍利所衝盤即破碎權肅然驚起曰希有之瑞也會進為言曰舍利威神豈直光相而已乃劫燒之火不能焚金剛之杵不能碎權命令試之會更誓曰法雲方被蒼生仰澤願更垂神迹以廣示威靈乃置舍利於鐵砧上使力者擊之於是砧鎚俱陷舍利無損權大嗟服即為建塔以始有佛寺故號建初寺因名其地為佛陀里由是江左大法遂興至孫皓即政法令苛虐廢棄淫祀乃及佛寺並欲毀壞皓曰此由何而興若其義教真正與聖典相應者當存奉其道如其無實皆悉焚之諸臣僉曰佛之威力不同餘神康會感瑞大皇創寺今若輕毀恐貽後悔皓遣張昱詣寺詰會昱雅有才辨難問縱橫會應機騁詞文理鋒出自旦至夕昱不能屈既退會送于門時寺側有淫祀者昱曰玄化既孚此輩何故近而不革會曰震霆破山聾者不聞非音之細苟在理通則萬里懸應如其阻塞則肝膽楚越昱還歎會才明非臣所測願天鑒察之皓大集朝賢以馬車迎會會就坐問曰佛教所明善惡應報何者是耶對曰夫明主以孝慈訓世則赤烏翔而老人見仁德育物則醴泉涌而嘉禾出善既有瑞惡亦如之故為惡於隱鬼得而誅之為惡於顯人得而誅之易稱積善餘慶詩詠求福不回雖儒典之格言即佛教之明訓皓曰若然則周孔已明何用佛教會曰周孔所言略示近迹至於釋教則備極幽微故行惡則有地獄長苦修善則有天宮永樂舉茲以明勸沮不亦大哉皓當時無以折其言皓雖聞正法而昏暴之性不勝其虐後使宿衛兵入後宮治園於地得一金像高數尺呈皓皓使著不淨處至四月八日以穢汁灌之共諸群臣笑以為樂俄爾之間舉身大腫陰處尤痛叫呼徹天太史占言犯大神所為即禱祝諸廟而苦痛彌劇婇女先有奉法者因問訊云陛下就佛圖中求福不皓舉頭問曰佛神大邪婇女云佛為大聖天神所尊皓為心悟其語意故婇女即迎像置殿上香湯洗數十過燒香懺悔皓叩頭于枕自陳罪狀有頃痛間遣使至寺問訊諸道人請會説法會即隨入皓具問罪福之由會為敷析詞甚精要皓先有才解欣然大悅因求看沙門戒會以戒文祕禁不可輕宣乃取本業百二十五願分為二百五十事行住坐臥皆願衆生皓見慈願廣普益增善意即就會受五戒旬日疾瘳乃於會所住更加修飾號為天子寺宣示宗室莫不必奉會在吳朝亟説正法以皓性凶麁不及妙義唯敘報應近事以開其心至吳天紀四年三月皓降晉九月會遘疾而終是歲晉武太康元年也至晉成咸和中蘇峻作亂焚會所建塔司空何充復更修造平西將軍趙誘世不奉法徹蔑三寶入此寺謂諸道人曰久聞此塔屢放光明虛誕不經所未能信若必自覩所不論耳言竟塔即出五色光照曜堂剎誘肅然毛竪由此信敬於寺東更立小塔遠由大聖神感近亦康會之力故圖寫厥像傳之于今孫綽為之贊曰會公蕭瑟實惟令質心無近纍情有餘逸厲此幽夜振彼尤黜超然遠詣卓矣高出會權大元元年辛未於所創建初寺譯六度等經七部並妙得經體文義允正又傳泥洹唄聲清靡哀亮一代摸式又長房等録更有阿難念彌經鏡面王經察微王經梵皇王經上之四經雖云會譯然並出六度集中不合為正譯之數今載別録中復有法鏡經注解二卷道樹經注解一卷安般經注解一卷已上三經會兼製序三經會雖注解本非僧所翻故亦不為會譯之數兼前七部今並刪之法華三昧經六卷一本有正字初出與法護正法華等同本見竺道祖魏録亦見始興録右一部六卷本闕沙門支強梁接吳云正無畏西域人以孫亮五鳳二年乙亥於交州譯法華三昧經沙門竺道馨筆受長房內典二録編於曹魏之代今依交州及始興記判入吳録不思議功德諸佛所護念經二卷出界經録或云不思議功德或直云功德經七佛父母姓字經一卷舊録云七佛姓字經出增一阿含第四十五異譯雜阿含經一卷見舊録出雜阿含中異譯阿毗曇甘露味論二卷或無論字亦云甘露味阿毗曇或云甘露味經尊者瞿沙造已上見在已下闕蜀普曜經八卷似是蜀土所出無端底持經一卷舊録云無端底總持經第二出蜀首楞嚴經一卷見舊録釋蜀土所出第三出後出首楞嚴經二卷見舊録云有十偈第四出阿惟越致轉經十八卷見舊録摩訶乘經十四卷或云摩訶衍摩訶衍優婆提舍經五卷祐云摩訶乘三昧王經五卷梵王請問經五卷佛從兜率降中陰經四卷出王宗經四天王經四卷疑一部四本魔王請問經四卷釋提桓因所問經三卷大梵天王請轉法輪經三卷法華光瑞菩薩現壽經三卷今疑抄正法華經普賢菩薩答難二千經三卷今疑抄度世品梵天王請佛千首經二卷又大梵天王經卷似此菩薩常行經一卷見舊録螢火六度經一卷舊録有明度經一卷一名螢火明度經內禪波羅蜜一卷見舊録六波羅蜜經一卷見舊録大總持神呪一經見舊録云總持呪經阿惟越致菩薩戒經一卷舊録無菩薩字雜數經二十卷見舊録那先譬喻經四卷見舊録長者子誓經一卷見舊録第二出太子試藝本起經二卷深斷連經二卷摩訶目揵連與佛捔能經一卷見舊録阿難得道經一卷見舊録阿難般泥洹經一卷見舊録阿那律念復生經一卷見舊録沙門分衛見怪異經一卷見舊録弟子本行經一卷見舊録高僧傳云白法祖譯為壽盡天子説法經一卷舊録云命盡天子經魔試佛經一卷見舊録阿須倫問八事經一卷見舊録云阿須倫所問八事經摩竭王經一卷舊録云摩竭國王經薩波達王經一卷見舊録祐録云薩和達王經年少王經二卷見舊録是光太子經一卷見舊録長者難提經一卷見舊録女利行經一卷見舊録四婦因經一卷見舊録須多羅經一卷舊録云須多羅入胎經墮迦經一卷見舊録晉言堅強既曰晉言合編晉録或作慎字盤達龍王經一卷見舊録牛米自供養經一卷舊録無養字行牧食牛經一卷見舊録或作放字墮釋迦牧牛經一卷見舊録作墮字法嚴經一卷見舊録疑即是等入法嚴經譬四經一卷見舊録止寺中經一卷見舊録安般行道經一卷見舊録解慧微妙經一卷見舊録失道得道經一卷見舊録心情心識經一卷見舊録云有注撿意向正經一卷見舊録道德果證經一卷見舊録父子因緣經一卷見舊録小觀世樓炭經一卷見舊録大四諦經一卷見舊録五方便經一卷見舊録五惟越羅名解説經一卷見舊録五陰經一卷見舊録中五濁世經一卷見舊録大七車經一卷見舊録八正邪經一卷見舊録祐云八正八邪經八總持經一卷見舊録八輩經一卷見舊録大十二因緣經一卷見舊録拾八難經一卷見舊録五十二章經一卷見舊録別有孝明四十二章經百八愛經一卷見舊録似抄五蓋疑結經小安般舟三昧經一卷見舊録禪數經一卷見舊録群生偈經一卷見舊録大戒經一卷見舊録衣服制經一卷見舊録沙彌離威儀經一卷見舊録道本五戒經一卷見舊録威儀經一卷見舊録法經中無經字雜譬喻經八十卷見舊録已上八十七部僧祐録右八十七部二百六十一卷不思議等四部六卷見在蜀普耀等八十三部三百五十五卷闕本長房等録魏吳失譯總有一百一十部一百九十一卷云並是古舊二譯諸經今結附此以彰遠年無所依據今以餘二十三部三十卷或翻譯有源或別名異號或大部流出或疑偽非真今並刪除庶免繁雜略述如左不退轉經四卷北涼失譯中有此中復載故如是重僧祐録云安公涼土異經今存涼録此中除之小本起經二卷後漢支曜譯四輩經或云四輩弟子經亦云四輩學經上録西晉竺法護譯建慧三昧經一名文殊師利問菩薩十事行經單卷月燈經異名禪行𣫍意經亦云禪行撿意經阿難律八念經異名濡首菩薩經二卷即濡首菩薩清淨分衛經是名但略耳度無極譬經三卷或四卷出大品經尸呵遍王經或作尼字太子法慧經或作惠字尸呵等二經出六度集經淫人曳踵行經出義足經人詐名為道經貧女聽經蛇齧命終經亦云貧女聽經蛇齧命終生天經國王癡夫人經賣智慧經初受道經學經福經學福共是一經八部僧行名經化譬經亦云化喻經人詐名等八經並出雜譬喻五百波羅門問有無經五百梵志經異名薩和菩薩經亦云國王薩和菩薩慧定普遍神通菩薩經亦云慧定普遍國土神通菩薩經貧女人經亦云貧女難陀經阿秋那經亦云阿秋那三昧經五百婆羅門等五經並在疑偽録西晉司馬氏都洛陽亦云北晉起武帝太始元年乙酉至愍帝建興四年景子凡經四帝五十二年緇素一十二人所出經戒集等及新舊集失譯諸經總三百三十三部合五百九十卷於中一百五十六部三百二十一卷見在一百七十部二百六十九卷闕本西晉沙門竺法護一百七十五部三百五十四卷經戒集沙門強梁婁至一部一卷集沙門安法欽五部一十六卷經集沙門無羅叉一部三十卷經優婆塞竺叔蘭二部五卷經沙門白法祖一十六部一十八卷經沙門釋法立四部一十二卷經集沙門釋法炬四十部五十卷經律清信士聶承遠二部三卷經清信士聶道真二十四部三十六卷經律沙門支法度四部五卷經沙門若羅嚴一部一卷經新舊諸失譯經五十八部五十九卷三部三卷五十三部五十六卷新譯光讚般若波羅蜜經十五卷初出或十卷與大般若第二會及放光大品並同本亦云光讚摩訶般若經凡二十七品太康七年十一月二十五日出見安録及僧祐録密迹金剛力士經七卷或五卷或四卷或八卷太康元年十月八日出亦直云密迹經見支敏度竺道祖及僧祐三録今編入寶積當第三會菩薩説夢經二卷見法上録今編入寶積當第四會改名淨居天子會法上録云護公所出詳文乃非且依上録為定寶髻菩薩所問經二卷一名菩薩淨行經舊録直云寶髻經是別譯大集寶髻品大熙元年七月十四日出見道真僧祐二録今入寶積當四十七會普明品經一卷初出亦云普門經與寶積文殊普會等同本太康八年正月十一日出見聶道真録及僧祐録胞胎經一卷舊録云胞胎受身經太康二年八月一日出初出與寶積處胎會同本見聶道真録及僧祐録文殊師利佛土嚴淨經二卷或直云嚴淨佛土經亦直云佛土嚴淨經太熙元年譯初出與寶積文殊授記會同本見竺道祖晉世雜録及僧祐録郁伽羅越問菩薩行經二卷或云郁伽長者經即大郁伽經或二卷第四出與安玄法鏡及寶積郁伽長者會同本見道安敏度僧祐三録幻士仁賢經一卷或云仁賢幻士經初出與寶積授幻師記會同本見聶道真録及僧祐録須摩提經一卷初出亦直云須摩經亦云須摩提菩薩經與寶積妙慧會等同本見聶道真竺道祖僧祐等三録阿闍貰王女阿術達菩薩經一卷第二出亦云阿闍貰女經亦云阿述達女經建武元年譯見真敏祐等三録祐序三録別存無憂施經祐録更載阿闍貰經二俱誤也離垢施女經一卷初出太康十年十二月二日出與寶積無垢施會等同本見道真僧祐二録內典録中更載無垢施應辨經者誤也彼道真譯如後所譯如幻三昧經二卷第二出或三卷或四卷與寶積善住意會等同本見僧祐録太子刷護經一卷初出見法上録與寶積阿闍世王子會等同本慧上菩薩問太善權經二卷第二出或一卷太康六年六月十七日出或云太善權經或云慧上菩薩經或云善權方便經或云善權方便所度無極見真祐二録彌勒菩薩所問本願經一卷初出太安二年五月十一日譯或無所問二字亦云彌勒本願經一名彌勒難經與寶積彌勒所問會等同本見道真道祖僧祐三録阿差末經七卷題云晉曰無盡意或四卷或五卷出大集第三譯元壽元年十二月一日出或加菩薩字見真祐二録祐房二録重載無盡意經四卷誤也大哀經八卷舊録云如來大哀經元康元年七月七日出八月二日訖有二十八品別譯或六卷或七卷見竺道祖晉世雜録及僧祐録寶女所問經三卷太康八年四月二十日出是大集寶女品異譯或四卷亦直云寶女經或云寶女問慧經亦云寶女三昧經見道真僧祐二録無言童子經二卷或云無言菩薩經是大集無言品異譯或一卷見聶道真録及僧祐録菩薩十住行道品一卷是華嚴十住品異譯見隋沙門法經録祐房二録直云菩薩十住即此道品是漸備一切智德經五卷一名十住又名大慧光三昧或十卷元康七年十一月十一日出是華嚴十地品異譯見聶道真及僧祐二録等目菩薩所問三昧經二卷一名普賢菩薩定意或直云等目菩薩經或三卷是新華嚴十定品異譯舊經無此品見僧祐録如來興顯經四卷一名興顯如幻經元康元年十二月二十五日出是華嚴經如來性起品及十忍異譯見聶道真及僧祐二録度世品經六卷或云度世經或五卷元康元年四月十三日出是華嚴離世間品異譯見聶道真僧祐二録方等般泥洹經二卷初出與隋譯四童子同本或無般字三卷或云大般泥洹經太始五年七月二十三日出見道真僧祐録普曜經八卷一名方等本起安公云出方等部永嘉二年五月於天水寺出第二譯與唐譯方廣莊嚴經等同本沙門康珠白法祖等筆受見古真祐三録正法華經十卷或云方等正法花或七卷二十七品太康七年八月十日出第三譯清信士張仲正聶承遠等筆受見真祐二録曇邃誦之且遍遂感神請九十日畢施白馬一匹羊五口絹九十六匹大方等頂王經一卷初出安公云出方等部亦直云頂王經一名維摩詰子問經亦云善思童子經凡四名見支敏度録及僧祐録佛升忉利天為母説法經二卷初出或三卷亦云佛升忉利天品與道神且經等同本太始元年出見聶道真及僧祐録阿惟越致遮經三卷初出或四卷或云阿惟致經太康五年十月十四日於燉煌出與不退轉經廣博嚴淨經同本異譯見真祐二録等集衆德三昧經三卷初出舊録云等集衆德經或直云等集經與集一切福德經等同本或二卷見聶真録及僧祐録持心梵天經四卷一名莊嚴佛法又名等御諸法凡十七品或六卷初出或加所問二字或直云持心經太康七年三月十日出聶承遠筆受見舊真祐三録持人菩薩經四卷初出持人菩薩所問陰種諸入以了道慧經初出或三卷與持世經同本異出僧祐録濟諸方等學經一卷天竺薩和鞞月僧加或無學字竺法首筆受初出與方廣總持經同本見竺道祖録及僧祐録文殊師利現寶藏經三卷初出或無現字與方廣寶篋經同本太始六年十月出或二卷亦直云寶藏經見僧祐長房録中別載寶藏經二卷誤之甚也無極寶三昧經一卷初出或云無極寶經與寶如來三昧經同本永嘉元年三月三日出見別録聶道真僧祐二録普越三昧經三卷第二出或四卷一名阿闍世王品太康七年十二月二十七日出或無三昧字或上加文殊師利安録云更出阿闍世王經見祖祐二録無所希望經一卷第二出或作悕字一名象步經與象腋經等同本見聶道真録及僧祐録大淨法門經一卷題云大淨法門品上金光首女所問傅首童真所開化經初出與大莊嚴法門經等同本建興元年十二月二十六日出見聶道真及僧祐二録順權方便經二卷一名轉女身菩薩經或作惟權舊録云順權女經亦云隨權女經第二出或一卷見真僧祐二録祐房二録別存隨權女經誤也太子沐魄經第三出六度集第四卷異譯或作暮魄見僧祐録月光童子經一卷初出一名月明童子經或名申日經與德護長者經等同本見僧祐録乳光佛經一卷第二出亦名乳光經與犢子經等同本異出見僧祐録無垢賢女經一卷第二出或名胎藏經與轉女身經等同本見聶道真録祐房二録載胎藏經即此無垢賢女經是決定總經一卷初出或云決總持經亦云決定總持經與謗佛經同本見僧祐録如來獨證自誓三昧經一卷亦云獨證自誓三昧經或云如來自誓三昧經第二出與漢安世高自誓三昧經同本見僧祐録龍施菩薩本起經一卷舊録云龍施本經或云龍施經第二出與龍施女經同本見僧祐録八陽神呪經一卷亦直云八陽經第二出與八吉祥呪經等同本見長房録盂蘭盆經一卷亦直云盂蘭經與報恩奉盆經同本見房録四不可得經一卷第二出聶道真譯正度僧祐等三録梵女首意經一卷初出一名首意女經見僧祐録寶網經一卷初出亦云寶網意子經見聶道僧二録菩薩行五十緣身經一卷初出舊録云菩薩像身五十事經亦云五十緣身行經見竺道祖録及僧祐録須真天子經三卷初出或二卷或加所問二字亦云問四事經太始二年十一月八日於長安青門外白馬寺出安文惠等僧聶承遠等筆受至十二月三十日訖見道祖僧祐二録海龍王經四卷初出或三卷太康六年七月十日出見聶道真及僧祐録諸佛要集經二卷天竺曰佛陀僧祇提亦直云要集經初出見僧祐録賢劫經十三卷題云颰陀劫三昧經晉曰賢劫定意經永康元年七月二十一日出趙文龍筆受初出或十七卷或十卷見道真僧祐二録房録別存颰陀劫三昧經誤也弘道廣顯三昧經四卷一名阿耨達龍王所問決諸狐疑清淨品亦名入金剛問定意經凡十二品或二卷永嘉二年十二月出見真祐二録內典中別載阿耨達經誤也心明經一卷一名心明女梵志婦飯汁施經見祐録滅十方冥經一卷光熙元年八月十四日出或云十方滅冥經見聶道真録及僧祐録鹿母經一卷又別有鹿子經一卷與此全同見僧祐録魔逆經一卷太康十年十二月二日於洛陽城西白馬寺出聶道真筆受見僧祐録及經後記德光太子經一卷或云賴吒和羅所問光德太子經太始六年九月三日出見竺道祖録及僧祐録般泥洹後灌臘經一卷或云般泥洹後四輩灌臘經亦直云灌臘經見房録四輩經一卷或云四輩弟子經亦云四輩學經見法上録當來變經一卷或云當來變識經見道真僧祐二録過去佛分衛經一卷舊録云過去世佛分衛經見僧祐録文殊師利淨律經一卷初出又直云淨律經太康十年四月八日於白馬寺出老遇西域寂志誦出經本後尚有數品其人忘但宣憶者道真筆受見祖祐二録文殊悔過經一卷初出或加師利字亦云文殊五體悔過經見僧祐録離經一卷出中阿含第二十卷異譯見房録受歲經一卷出中阿含第二十三卷異譯見房録樂想經一卷出中阿含第二十六卷異譯見房録尊上經一卷出中阿含第四十三卷異譯見房録應法經一卷亦出中阿含第四十五異譯見房録鴦崛摩經一卷或作魔字或云指髻經或云指鬘經出增一阿含第三十一異譯見真祐二録力士移山經一卷亦直云移山經見僧祐録出增一阿含第三十六異譯四未曾有法經一卷或無法字亦云四未有經見長房録亦出增一阿含第三十六異譯聖法印經一卷天竺名阿遮曇摩文圖出雜阿含第三或無法字亦云慧印經元康四年十二月二十日於醴泉郡竺法首筆受見真祐唱三録舍頭諫經一卷題云舍頭諫晉曰太子二十八宿經一名虎耳經與摩登伽經等同本第五出與漢世高者少異見道安録祐云虎耳意經所欲致患經一卷初出太安三年正月譯見道真王宗僧祐三録琉璃王經一卷第二出或作琉離見僧祐録生經五卷初出或四卷太康六年正月十九日出有云有五十五經見真録及祐録分別經一卷舊云與阿難分別經等同本者非也見房録五百弟子自説本起經一卷大安二年五月譯或云佛五百弟子自説本起舊五百弟子自説本來經亦云五百弟子本起經見真祐二録大迦葉本經一卷或云迦葉本經見祐録四自侵經一卷安公云阿毗曇見僧祐録身觀經一卷云出雜阿含撿無見房録修行道地經六卷初卷題云揄遮加後彌經晉曰修行道地太康五年二月二十三日出或七卷二十七品第三出亦直云修行經見祐唱二録法觀經一卷見房録已上見在已下闕新道行經一卷亦云小品或七卷祐云更出小品太始八年譯第四出與舊道行等同本房云更載小品七卷誤也見房祐二録藏中者非此本先闕仁王般若經一卷或二卷三十一紙初出房云見晉世雜録無量壽經二卷一名無量清淨平等覺經永嘉二年正月二十一日出第六譯與漢世高支讖等所出本同文異見竺祖録及祐録菩薩藏經三卷初出見房録般舟三昧經二卷安云更出般舟三昧經第五出見祐録菩薩十地經一卷亦云大方廣經亦直云十地經初出見祐録薩藝芬陀利經六卷太始元年譯見道祖晉世雜録第二出録云薩曇藝者恐誤祐録中無維摩詰所説法門經一卷太安二年四月一日譯第四出見聶道真録直云維摩詰經祐録又有那維摩詰經祐云意謂先出維摩繁重護那出逸偈也間居經十卷與悲花經同本異譯初出見祐録更出阿闍世王經二卷第四出見祐録若準安録但有更出阿闍世主王經無普超三昧祐房二録雙載二經既梵本同不合載出
