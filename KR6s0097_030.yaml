body:
  text: 西京西明寺沙門圓照撰小乘入藏録下小乘經律論等三百三十部一千八百九卷一百七十帙賢聖集傳附此卷末此直列經名及標紙數餘如廣録小乘經二百四十部六百一十八卷四十八帙小乘律六十一部四百九十三卷五十帙小乘論三十六部六百九十八卷七十二帙小乘經重單合譯一百五十三部三百九十四卷三十一帙長阿含經二十二卷二帙四百三十一紙中阿含經六十卷或五十八卷六帙一千一百四十六紙增一阿含經五十一卷或五十卷或四十三卷或六十卷或三十三卷五帙八百一十紙雜阿含經五十卷五帙一千六十九紙別譯雜阿含經二十卷二帙三百九紙佛般泥洹經二卷或直泥洹經四十七紙大般涅槃經二卷或三卷五十一紙般泥洹經二卷或直云泥洹經亦云大般泥洹經諸藏中一卷者唯是上卷缺下卷四十五紙人本欲生經一卷一十五紙尸迦羅越六向拜經一卷或云尸迦羅越六方禮經四紙梵志阿颰經一卷一名阿颰摩納經安録直云阿拔經亦名佛解梵志阿拔經一十四紙梵網六十二見經一卷一名梵網經一十一紙寂志果經一卷一十六紙上八經十一卷同帙起世經十卷一帙一百六十七紙起世因本經十卷恐二本相濫題下別云起世因本經一帙諸藏多是前本此本稍稀一百七十紙樓炭經六卷或云大樓炭經或八卷或五卷一百三紙長阿含十報法經二卷亦名多增道章經或云十報經二十七紙中本起經二卷或云太子中本起經四十七紙上三經十卷同帙七知經一卷或云七智二紙鹹水喻經一卷或云鹹水譬喻經二紙一切流攝守因經一卷或云流攝經或云一切流攝經亦名攝守固經五紙四諦經一卷九紙恆水經一卷亦云恆河喻經四紙本相倚致經亦云大相倚致三紙緣本致經一卷三紙頂生王故事經一卷亦直云頂生王經六紙文陀竭王經一卷四紙閻羅王五天使者經一卷一名鐵城泥梨經三紙鐵城泥犁經一卷五紙古來世時經一卷五紙阿那律八念經一卷或云八念經一名禪行斂意經舊録云禪行檢意四紙離睡經一卷三紙是法非法經一卷四紙求欲經一卷十紙受歲經一卷四紙梵志計水淨經一卷一名五陰因事經二紙苦陰經一卷五紙釋摩男本經一卷一名五陰因事經四紙苦陰因事經一卷六紙樂想經一卷二紙漏分布經一卷七紙阿耨風經一卷晉言依次六紙諸法本經一卷一紙瞿曇彌記果經一卷七紙瞻婆比丘經一卷或云瞻波四紙伏淫經一卷三紙魔嬈亂經一卷一名魔王入目連蘭腹經一名弊魔試目連經八紙弊魔試目連經一卷一名魔嬈亂法五紙上三十經三十卷同帙賴吒和羅經一卷一名羅漢賴吒和羅經十一紙善生子經一卷七紙數經一卷四紙梵志頞羅延問種尊經一卷或云頞婆羅延七紙三歸五戒慈心厭離功德經一卷一紙須達經一卷亦云須達長者經四紙佛為黃竹園老婆羅門說學經一卷四紙梵摩喻經一卷九紙尊上經一卷四紙鸚鵡經一卷亦名兜調經或作凶者誤也九紙兜調經一卷四紙意經一卷三紙應法經一卷四紙泥犁經一卷或云中阿含泥犁經十一紙優波夷墮舍迦經一卷三紙齊經一卷一名持齊經四紙鞞摩肅經一卷四紙婆羅門子命終愛念不離經一卷四紙十支居士八城人經一卷亦直云十支經三紙邪見經一卷二紙箭喻經一卷四紙普法義經一卷一名具法行經亦名普義經九紙廣義法門經一卷九紙誡德香經一卷或云戒德經二紙四人出現世間經一卷四紙波斯匿王太后崩塵土坌身經一卷三紙須摩提女經一卷六紙婆羅門避死經一卷一紙食施獲五福報經一卷一名施色力經一名福德二紙頻毗娑羅王詣佛供養經一卷亦云頻婆五紙長者子六過出家經一卷三紙鴦崛摩經一卷或有作魔字或云指髻經亦云指鬘經六紙上三十二經三十二卷同帙鴦崛髻經一卷六紙力士移山經一卷亦直云移山經六紙四未曾有法經一卷亦云四未有經或無法字二紙舍利弗摩目揵連遊四衢經一卷三紙七佛父母性字經一卷或云七佛姓字經四紙放牛經一卷亦云牧牛經四紙緣起經一卷亦云十二緣起經三紙十一想思念如來經一卷或云十一思惟念如來經一紙四泥犁經一卷或云四大泥犁經二紙阿那邠邸化七子經一卷四紙大愛道般泥洹經一卷或作涅槃七紙佛母般泥洹經一卷四紙國王不犁先尼十夢經一卷或作泥五紙舍衛國王夢見十事經一卷或直云十夢經或云波斯匿王十夢經四紙阿難同學經一卷三紙五蘊皆空經一卷一紙七處三觀經一卷或二卷一十七紙聖法印經一卷亦直云聖印經亦云慧印經天竺名阿遮曇摩文面二紙雜阿含經一卷二十一紙五陰譬喻經一卷或無譬字一名水沫所漂經二紙水沫所漂經一卷一名河中大聚沫經一名聚沫譬經二紙不自守意經一卷或云自守亦不自守經或云不自守經一紙滿願子經一卷二紙轉法輪經一卷或云法輪轉經京中諸藏竝是轉法輪論非是本經應須簡擇二紙三轉法輪經一卷五紙八正道經一卷三紙難提釋經一卷四紙馬有三相經一卷亦有善馬有三相經一紙馬有八態譬人經一卷一名馬有弊惡態經亦直云馬有八態經一紙相應相可經一卷二紙治禪祕要一卷或云治禪病祕要法無經字或云禪要祕治病經或三卷二十八紙上三十一經三十一卷同帙摩鄧女經一卷一名阿難為蠱道女惑經亦云摩鄧女三紙摩鄧女解形中事經一卷三紙摩登伽經三卷或二卷三十四紙舍頭諫經一卷題云舍頭諫晉曰太子二十八宿一名虎耳經二十六紙鬼問目連經一卷四紙雜藏經一卷九紙餓鬼報應經一卷一名目連說地獄餓鬼因緣經五紙阿難問事佛吉凶經一卷或名阿難問事經亦名事佛吉凶經五紙慢法經一卷二紙阿難分別經一卷亦名阿難問事佛吉凶經或名分別經五紙五母子經一卷二紙沙彌羅經一卷二紙玉耶女經一卷或云玉瑘經二紙玉耶經一卷一名長者諸佛說子婦無敬經或玉耶女經五紙阿遬達經一卷二紙修行本起經二卷一名宿行本起經三十二紙上十六經十九卷同帙太子瑞應本起經二卷亦云太子本起瑞應經亦直云瑞應本起經三十一紙過去現在因果經四卷九十五紙法海經一卷三紙海八德經一卷三紙四十二章經一卷七紙奈女耆域因緣經一卷或云奈女耆域經或直云奈女經有云奈女耆域國者誤也一十七紙罪業應報教化地獄經一卷或云地獄報應六紙龍王兄弟經一卷一名難龍王經亦云降龍王經二紙長者音悅經一卷或云長者悅不蘭迦葉經亦直云音悅經五紙上九經十三卷同帙禪祕要經三卷或云禪祕要法無經字或四卷八十四紙七女經一卷一名七本經六紙八師經一卷四紙越難經一卷一名難長者經一名難經二紙所欲致患經一卷六紙阿闍世王問五逆經一卷五紙五苦章句經一卷一名諸天五苦經一名五道章句經一名淨除罪蓋娛樂佛法經十三紙堅意經一卷一名堅心正意經一名堅心經二紙淨飯王涅槃經一卷或加般字七紙進學經一卷或云勸進學道經一紙得道梯隥錫杖經一卷題云得道梯隥經錫杖品第十二亦云錫杖經三紙貧窮老公經一卷一名貧老經三紙三摩竭經一卷一名須摩提女經一名難國王經一名怒和檀王經八紙瓶沙王五願經一卷一名沙迦王經或作瓶字七紙琉璃王經一卷或作流璃上十五經十七卷同帙生經五卷或四卷一百九紙義足經二卷四十紙上二經七卷同帙小乘經單譯八十七部二百二十四卷一十七帙正法念處經七十卷七帙一千二百五紙佛本行集經六十卷或名皆集六帙八百七十七紙本事經七卷九十五紙興起行經二卷亦名誡宿經三十一紙業報差別經一卷一十五紙上三經十卷同帙大安般守意經二卷亦直云大安般經或無大字安公云忘安般經或一卷三十二紙陰持入經二卷或云除持入誤也或一卷亦云住陰持入二十二紙處處經一卷一十五紙罵意經一卷一十五紙分別善惡所起經一卷一十五紙出家緣經一卷一名出家因緣經一十五紙阿鋡正行經一卷一名正意經四紙十八泥犁經一卷或云十八地獄經六紙法受塵經一卷一紙禪行法想經一卷一紙長者子懊惱三處經一卷一名長者大惱三處經亦云三處惱經三紙揵陀國王經一卷或無國字二紙須摩提長者經一卷一名會諸佛前亦名如來所說示現衆生八紙阿難四事經一卷四紙未生怨經一卷四紙四願經一卷三紙黑氏梵志經一卷三紙猘狗經一卷祐云與𤢴狗同三紙分別經一卷五紙八關齊經一卷二紙阿鳩留經一卷四紙孝子經一卷亦名孝子報恩經二紙上二十二經二十四卷同帙五百弟子自說本起經一卷或云佛五百弟子自說本起亦云五百弟子自說本末經亦云五百弟子起經二十一紙大迦葉本經一卷或無大字五紙四自侵經一卷五紙羅云忍辱經一卷或直云忍辱經三紙佛為年少比丘說正事經一卷二紙沙曷比丘功德經一卷三紙時非時經一卷亦直云時經二紙自愛經一卷或云自愛不自愛五紙忠心經一卷亦云忠心正行經或云大忠心經亦云小忠心經五紙見正經一卷一名生死變識經八紙大魚事經一卷三紙阿難七夢經一卷亦直云夢經二紙呵鵰阿那含經一卷一名荷鵰或作苛字二紙燈指因緣經一卷九紙婦人遇辜經一卷一名婦遇對經二紙四天王經一卷二紙摩訶迦葉度貧女經一卷四紙十二品生死經一卷一紙罪福報應經一卷一名輪轉五道罪福報應經亦名轉輪五道經亦云五道輪經四紙五無返復經一卷一名五覆大義經或作附字二紙佛大僧大經一卷二兒名七紙耶祇經一卷二紙末羅王經一卷二紙摩達國王經一卷或無國王字二紙旃陀越國王經一卷或無國王三紙五恐怖世經一卷或云恐怖經二紙弟子死復生經一卷或云死更生經六紙懈怠耕者經一卷或云懈怠耕兒經二紙辨意長者子經一卷或云長者辨意經或加所問字九紙無垢優婆夷問經一卷三紙上三十經三十卷同帙賢者五福經一卷一紙天請問經一卷二紙僧護經一卷或云僧護因緣經亦云因緣僧護經二十紙護淨經一卷二紙木槵子經一卷或作患字亦作檈二紙無上處經一卷一紙盧志長者因緣經一卷十紙五王經一卷五紙出家功德經一卷非是賢愚中抄出者五紙栴檀樹經一卷三紙頞多和多耆經一卷三紙普達王經一卷四紙佛滅度後棺斂葬送經一卷一名比丘師經亦名師比丘經三紙鬼子母經一卷四紙梵摩難國王經一卷二紙父母恩難報經一卷亦云勤報二紙孫多耶致經一卷三紙新歲經一卷六紙群牛譬經一卷二紙九橫經一卷二紙禪行三十七經一卷或云禪行三十七品經三紙比丘避女惡名欲自殺經一卷一紙比丘聽施經一卷一名聽施比丘經三紙身觀經一卷二紙無常經一卷亦名三啓經三紙八無暇有暇經一卷七紙長爪梵志請問經一卷三紙譬喻經一卷二紙略教誡經一卷三紙療痔病經一卷亦名療痔瘻經二紙上三十經三十卷同帙小乘律六十一部四百九十三卷五十帙摩訶僧祇律四十卷或云三十卷四帙九百九十七紙十誦律六十一卷六帙一千四百三十紙根本說一切有部毗奈耶五十卷五帙八百七十五紙根本說一切有部苾芻尼毗奈耶二十卷二帙一百五十九紙根本說一切有部毗奈耶雜事四十卷四帙六百四十四紙根本說一切有部尼陀那目得迦十卷前五卷尼陀後五卷目得迦或八卷一帙一百二十五紙五分律三十卷亦云彌沙塞律或三十四卷三帙五百九十七紙四分律六十卷或四十五卷或七十卷或四