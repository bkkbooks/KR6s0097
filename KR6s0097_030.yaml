釋教録三卷七十五紙大唐長安西明寺沙門圓照奉敕集貞元新定釋教録三十卷七百四紙大唐長安西明寺沙門圓照奉敕集貞元新入目録一切經音義二十五卷七百六十八紙新譯華嚴音義二卷四十九紙上二集二十七卷四帙第一帙六卷下三帙各七卷大唐西域記十二卷二百三十四紙集古今佛道論衡四卷或三卷九十九紙續集古今佛道論衡一卷二十三紙上三集十七卷二帙上帙八卷下帙九卷東夏三寶感通録三卷亦云集神洲三寶感通録九十七紙集沙門不拜俗議六卷九十七紙上二集九卷同帙大唐慈恩寺三藏法師傳十卷一帙一百七十紙大唐西域求法高僧傳二卷三十五紙法顯傳一卷亦云歷遊天竺記傳二十九紙高僧傳一十四卷一卷是録目二百九十紙上三集十七卷二帙上帙九下帙八續高僧傳三十卷七百三十紙上一集三十卷分為四帙第一第二各八下二帙各七辨正論八卷一帙一百七十八紙破邪論二卷或一卷四十五紙別傳三卷貞觀年中僧法琳撰四十五紙開元録不入目今於貞元十五年奉敕編入目録流行甄正論三卷三十六紙十門辨惑論二卷或三卷二十七紙弘明集十四卷二百八十九紙上五集二十四卷上帙十二下帙十二廣弘明集三十卷七百七十紙上一集三十卷分為四帙第一帙十第二帙七第三帙七下帙六集諸經禮懺儀二卷五十八紙大唐南海寄歸內法傳四卷八十七紙比丘尼傳四卷四十二紙別說罪要行法一卷或無別字四紙受用三水要法一卷或云要行法四紙護命放生軌儀一卷或云軌儀法二紙上六集十三卷同帙貞元新定釋教目録卷第三十次後不入藏目録密迹金剛力士經七卷或五卷菩薩夢經二卷改名淨居天子會法界體性無分別經二卷十法經一卷加名大乘十法會大菩薩藏經二十卷佛為難陀說出家入胎經二卷改名入胎藏會文殊師利授記經三卷菩薩見實三昧經十六卷或十四卷菩薩藏經三卷改名富樓那會護國菩薩經二卷郁伽長者所問經一卷迦葉經二卷加名摩訶迦葉會義譬菩薩所問經二卷無畏德女經一卷無垢施菩薩分別應辨經一卷大方等善住意天子問經四卷大乘方便經三卷移識經二卷改名賢護長者會大方等善住意天子問經四卷彌勒菩薩所問經一卷改名彌勒問八法會大寶積經一卷改名普明菩薩會寶梁經二卷寶髻菩薩所問經二卷右密迹力士經下二十三部合八十四卷並編入大寶積經藏中故無別本金光明經七卷或六卷二十二品右二部一十卷與藏中八卷者文句不異其八卷本品數備足故留入藏此二皆闕故不存之其八卷本有二十四品新道行經七卷或十卷撿諸藏本皆與文同而題目異故不別寫其道行正本尋之未獲大方等大集經八卷即是合大集經第六帙今存別本初兩卷是明度五十校計經下六卷是無盡意阿耨達龍王經二卷與藏中道廣顯三昧經文句全同合道神足經三卷與藏中道神足無極變化經文句全同哀泣經三卷與藏中方等般泥洹經文句全同寶由慧印三昧經一卷與藏中慧印三昧經文句全同鹿子經一卷與藏中鹿母經文句全同小無量壽經一卷與藏中阿彌陀經文句全同胎藏經一卷與藏中無垢賢女經文句全同聞城十二因緣經一卷與藏中貝多樹下思惟十二因緣經文句全同大安般經一卷與藏中大安般守意經上卷文句全同申日經一卷與藏中月光童子經文句全同輪轉五道罪福報應經一卷與藏中罪福報應經文句全同旃陀越經一卷與藏中旃陀越國王經文句全同真僞沙門經一卷與藏中迦葉禁戒經文句全同轉法輪經一卷撿諸藏本竝是轉法輪論其轉法輪與此全別賓頭盧為王說法經一卷與藏中賓頭盧突羅闍為優陀延王說法經文句全同阿蘭若習禪法經二卷與藏中坐禪三昧經文句全同禪祕要經五卷撿諸藏本入極文錯非是本經不堪流布其經正本尋之未獲右新道行等一十九部共四十二卷或是一經兩名或時無正本故存一經重者不録無畏德女經一卷第一義法勝經一卷彌勒菩薩所問本願經一卷發菩提心經二卷亦云論法句經二卷亦云論攝大乘釋論十二卷或十五卷右六部一十九卷同録入藏重載兩本今存一虛空藏所問經八卷或五卷是大集經虛空藏品全一品虛空藏菩薩問持經得幾福經一卷即抄前虛空藏品一切施主所行檀波羅蜜經一卷抄六度集施度中大方廣如來性起微密藏經二卷是舊花嚴經寶王如來性起品全一品隨願往生經一卷舊藥師經一卷是灌頂經第十一卷佛遊維耶離者是灌頂經第十二卷密迹金剛力士經二卷出五卷密迹經第四卷第五卷增一阿含經一卷出增一阿含經第二十一行七行現報經一卷出增一阿含經第二十一十二因緣經一卷出增一阿含經第十六戒相應法經一卷出雜阿含經第三十卷比丘問佛多優婆塞命終經一卷出雜阿含經第三十卷獨富長者經一卷出雜阿含經第四十六卷有衆生三世作惡經一卷出出曜經第八卷出家功德經一卷佛在迦蘭陀竹園者抄賢愚經出家功德品從虛空藏下一十五部二十四卷既從大經流出即是別生准衆經録別生之經不須抄寫故入藏録除之不載摩竭魚因緣經一卷尊者塢陀夷引導諸人禮佛僧經一卷還本國度父王經一卷水生太子經一卷施物法非法經一卷教誡羅怙羅經一卷五趣生死轉輪經一卷善來苾芻因緣經一卷七有事無事福業經一卷摩竭魚因緣下九經並出根本說一切有部毗奈耶中火生長者受報經二卷尊者善和好聲經一卷五種水羅經一卷勝鬘夫人本緣經一卷勝光王信佛經一卷誅釋種受報經二卷大世主苾芻尼入涅槃經一卷敬法捨身經一卷度二邪見童子得果經一卷清淨威儀經一卷或云洗淨大目連受報經一卷初誕生現大瑞應經一卷度迦多演那經一卷㗨羅鉢龍王業報因緣經一卷安樂夫人因緣經一卷增養因緣經三卷妙光因緣經一卷降伏外道現大神通經一卷大藥善巧方便經二卷佛從天下贍部洲經一卷文瘦瞿答彌經一卷訶利底母因緣經一卷法與尼在家得果經一卷樹生婆羅門憍慢經一卷弟子事師經一卷七種不退轉經一卷佛為長者說放逸經一卷地動因緣經一卷四種黑白法印經一卷佛將入涅槃度善賢經二卷佛般涅槃行雨大臣告王經一卷八大國王分舍利經一卷火生長者下三十二經並出根本說一切有部毗奈耶雜事中從摩竭魚因緣經下四十一部四十七卷並是說一切有部律中緣起三藏義淨鈔出流行既類別生亦不編載幻師阿夷鄒呪經一卷寶積經論四卷寶性論四卷幻師下三部九卷並周録入藏見經今尋本未獲所以録中不載其新譯經未得本者不能繁記淨土三昧經三卷法杜經二卷毗羅三昧經二卷決定罪福經一卷益意經二卷救護身命濟人病苦厄經一卷最妙勝定經一卷觀世音三昧經一卷清淨法行經一卷高王觀世音經一卷淨度經下十部一十五卷並是古舊録中僞疑之經周録雖編入正文理並涉人謀故此録中除之不載已上都有一百一十八部二百四十七卷多是諸録見入藏經今以皆是繁重或有尋求未獲故並不為定見之數恐不知委且略述之若欲委知根由並如刪繁録中廣述
