body:
  text: 西京西明寺沙門圓照撰總集群經錄上之八觀世音菩薩受記經一卷一名觀世音受決經第三出與西晉法護道真出者同本見王宗僧祐李廓法上等錄及高僧傳右一部一卷其本見在沙門釋法勇名曇無竭本姓李氏幽州黃龍國人也幼為沙彌便修苦行持戒誦經為師所異甞聞法顯寶雲諸僧躬踐佛國慨然有忘身之誓遂以宋永初之元招集同志沙門僧曇朗之徒二十五人共齎幡蓋供養之具發跡北土遠適西方初至河南國仍出海西郡進入流砂到高昌郡經歷龜茲沙勒諸國前登蔥嶺雪山棧路險惡驢馬不通層氷峨峨絕無草木山多瘴氣下有大江浚急如箭於東西兩山之脇繫索為橋相去極遠十人一過到彼岸已舉煙為識後人見煙知前已度方得更進若久不見煙則知暴風吹索人墮江中行蔥嶺三日方過復上雪山懸崖壁立無安足處石壁皆有故弋孔處處相對人各執四弋先拔下弋手攀上弋展轉相待三日方過乃到平地相待料撿同侶失十二人進至罽賓國禮拜佛鉢停歲餘學梵書竟便解梵語求得觀世音受記經梵文一部無竭同行沙門餘十三人西行到新頭那提河此云師子口緣河西入月氏國禮拜佛肉髻骨及覩自沸木船後至檀特山南石留寺住僧三百餘人雜三乘學無竭便停此寺受具足戒天竺沙門佛陀多羅此云覺救彼方眾僧云其已得道果無竭請為和尚漢沙門志定為阿闍梨於寺夏坐三月日復北行至中天竺曠絕之處常齎石蜜為糧其同侶八人路亡五人俱行屢經危棘無竭所齎觀世音經常專心繫念進涉舍衛國中野逢山象一群無竭稱名歸命即有師子從林中出象驚怖奔走後渡恒河復值野牛一群鳴吼而來將欲害人無竭歸命如初尋有大鷲飛來野牛驚散遂得免害其誠心所感在險克濟皆此類也後於南天竺隨舶汎海達廣州所歷事迹別有記傳元嘉末年達于楊都手自宣譯觀世音授記經一部今見傳于世後不知所終觀彌勒上生兜率天經一卷亦云彌勒上生經見道慧宋齊錄及僧祐錄祐錄先在高昌郡譯出於彼齎還諫王經一卷初出亦云大小諫王經與唐譯勝光王經及勝光天子經同本房云見別錄治禪病祕要經一卷或云治禪病祕要法無經字或云禪要祕密治病經或二卷或出雜阿含孝建二年九月八日於竺園寺出其月二十五日訖見僧祐寶唱等錄淨飯王涅槃經一卷或加般字第二出與法炬出者同本房云見別錄進學經一卷或云勸進學道經第二出與支謙等出者同本房云見別錄八關齋經一卷異出本房云見別錄五無返復經一卷一名五返覆大義經或作附字房云見別錄佛大僧大經一卷二兒名房云見別錄耶祇經一卷房云見別錄末羅王經一卷房云見別錄摩達國王經一卷房云見別錄或無國王字旃陀越國王經一卷或無國王字房云見別錄五恐怖世經一卷或云五恐怖經房云見別錄弟子死復生經一卷或云死亡更生經房云見別錄迦葉禁戒經一卷一名摩訶比丘經亦云真偽沙門經第二出房云見別錄已上存已下闕菩薩誓經一卷第五出與長者子制經等同本房云見別錄中陰經一卷房云見別錄觀世音觀經一卷先在高昌郡譯出於彼齎來見僧祐錄波斯匿王喪母經一卷或云波斯匿王經祐云波耶匿王經房云見別錄出增一阿含第十八卷異譯佛母般泥洹經一卷孝建二年於建山定林上寺出一名大愛道般泥洹經見僧祐錄出增一阿含第五十卷異譯弟子慢為耆域述經一卷亦云弟子為耆域述慢戒羽弟子戲誕經第四出與阿難問事佛吉凶經等同本房云見別錄長者音悅經一卷第二出與支謙出者同本房云見別錄五苦章句經一卷第二出與曇無蘭出者同本房云見別錄分惒檀王經一卷第二出竺律炎三摩竭經同本房云見別錄弟子事佛吉凶經一卷祐云弟子問事佛吉凶經房云見別錄生死變識經一卷今疑是藏中見正經異名房云見別錄優婆塞五戒經一卷亦云五相經第二出與五戒相經同本房云見別錄賢者律儀經一卷亦云威儀房云見別錄右二十八部二十八卷迦葉禁戒上一十五部一十五卷見在菩薩誓經下一十三部一十三卷闕本居士沮渠京聲即北涼河西王蒙遜從弟安陽侯也魏併涼後南奔于宋晦志卑身不交世務常遊上塔寺以居士自畢丹陽尹孟顗見而善之請與相見一面之後雅相崇愛亟設供饌厚相優贍京聲以孝武帝孝建二年乙未於楊都竹園及鍾山定林上寺譯彌勒上生經等二十八部通習積久臨筆無滯京聲居絕妻拏無欲榮利從容法侶宣通經典是以建業白黑咸敬而嘉焉以大明之末遘疾而卒普明王經梵摩皇經上二經並出六度集夷比丘經優婆塞五法經上二經並出中阿含釋種問優婆塞經出雜阿含清信士阿夷扇經亦云阿夷扇持父經出生經五百梵志經群錄注疑普明王等七經六是別生一是疑偽今為實錄故並刪之閻羅王五天使者經一卷一名鐵城泥犁經見長房錄出中阿含第十二異譯瞿曇彌記果經一卷出中阿含第二十八異譯見長房錄長者子六過出家經一卷出增一阿含第二十七卷異譯見長房錄佛母般泥洹經一卷出增一阿含第五十卷異譯見長房錄貧窮老公經一卷或云貧老經第二出見長房錄懈怠耕者經一卷舊錄云懈怠耕兒經見長房錄請賓頭盧法一卷或加經字見長房錄第二出善生子經一卷亦云異出六向拜經見長房錄出中阿含第三十三卷異譯佛般涅槃後諸比丘經一卷云出雜阿含見房錄譬喻經一卷見長房錄右一十一部一十一卷請賓頭上七部七卷見在善生子經下三部三卷闕本沙門釋惠簡未詳何許人也以孝武帝大明元年丁酉於鹿野寺譯五天使者等經十部真偽沙門法經與京聲所出迦葉禁戒經文句全同乃是使者經異名錄家錯上藥師琉璃光經亦名灌頂拔除過罪生死得度經出大灌頂經祐錄注為疑經者非釋迦畢罪經殺身濟賈人經上二經並出六度集阿難見水光瑞經一云水光經大乘抄經商人求財經瞿曇彌經上二經並出中阿含舍衛城中人喪子發狂經學人亂意經亦云母子作比丘比丘尼亂意經上二經並出增一阿含大力士出家得道經亦云力士跋陀經二老男女見佛出家得道經上二經並出雜阿含旃闍摩暴志謗佛經出生經竊為沙門經褐師捨家學道經上二經并出出曜經呪願經祐載偽錄真偽沙門等一十五部長房等錄並云慧簡所出今以多是別生等經故刪之不存也菩薩念佛三昧經六卷或直云念佛三昧經或五卷第一譯與隋笈多出者同本是大集別分見道惠宋齊錄及僧祐錄無量門破魔陀羅尼經一卷或直云破魔陀羅尼經第七譯見僧祐錄與支謙無量門微密持經等同本右二部七卷其本並在沙門功德直西域人也道契既廣善誘日新以孝武帝大明六年壬寅遊至荊州寓禪房寺沙門玄暢請出念佛三昧等經二部暢刊正文義詞旨婉密而暢舒手出香掌中流水莫之測也後適成都止大石寺即是阿育王塔乃手自作金剛密迹等十六神像傳至于今直留荊數年後不知所終矣十誦羯磨比丘要用一卷或云略要羯磨法房云二卷祐云一卷見僧祐錄右一部一卷其本見在沙門釋僧璩姓朱吳國人出家為僧業弟子總銳眾經尤明十誦兼善史籍頗製文藻始住吳虎丘山孝武欽其風聞勅出楊都為僧正悅眾止于中興寺璩以大明七年癸卯撰十誦羯磨一部十誦比丘尼戒本一卷亦云十誦比丘尼波羅提木叉戒本或云十誦比丘尼大戒見僧祐寶唱二錄右一部一卷其本見在沙門釋玄頴俗姓索氏燉煌人十三出家為法香弟子住涼州公府寺與同學法力俱以律藏知名頴伏膺已後學無再請記在一聞研精律部博涉經論元嘉末至建業止新亭寺孝武以頴學業兼明勅為都邑僧正後辭任還多寶寺常習定閑房亦時開律席後移住長干寺以明帝太始元年中集出十誦尼戒一部兼出羯磨流行於代無盡意經十卷第五出與阿差末經等同本見始興僧祐寶唱等錄阿述達菩薩經一卷第四出與寶積無畏德會等同本太始年於廣州出見始興寶唱等錄海意經七卷見始興僧祐寶唱等錄如來恩知不思議經五卷見始興僧祐等錄寶頂經五卷見始興僧祐寶唱等錄三密底耶經一卷宋言賢人用律經見始興僧祐寶唱等錄右六部二十九卷其本並闕沙門竺法眷印度人也志性彌簡開利為務亦以明帝或太始年中於廣州譯無盡意等經六部濡首菩薩無上清淨分衛經二卷一名決了諸法如幻三昧經第二出與漢獻嚴佛調譯者及大般若那伽室利分並同本見始興錄右一部二卷其本見在沙門釋翔公亦云朔公在南海郡譯濡首菩薩經一部群錄直云宋世不顯年名未詳何帝佛藏大方等經一卷亦名問明顯經明難品異譯見始興錄及法上錄瓔珞本業經二卷一名菩薩瓔珞經第三出見始興錄及法上錄右二部三卷其本並闕沙門釋道嚴於宋世譯佛藏方等經等二部群錄直云宋世不顯帝年梵女首意經一卷第二出見始興錄及趙錄法上錄空淨三昧經一卷亦云空淨天感應三昧經第二出見始興錄及趙錄法上錄勸進學道經一卷亦名勸進經與梁史共出第三譯見始興錄及趙錄法上錄右三部三卷其本並闕沙門釋勇公於宋世譯梵女首意等經三部群錄雖云宋世不顯帝年車匿經亦名車匿本末經出六度集中是尸呵遍王經異名群錄雖云勇公所出今以別生抄經故刪之不存也寂調音所問經一卷一名如來所說清淨調伏經與西晉法護文殊淨律經等同本第四出見始興錄及法上錄樂瓔珞莊嚴方便經一卷一名大乘瓔珞莊嚴經亦名轉女身菩薩經第四出與西晉法護順權方便經等同本見始興錄及僧祐法上錄右二部二卷前寂調音見在後樂瓔珞經闕本沙門釋法海於宋世譯寂調音等經二部群錄注云宋世譯出既不顯年未詳何帝月燈三昧經一卷一名文殊師利菩薩十事行經一名建慧三昧經出大月燈經第七卷異譯見趙錄及法上錄右一部一卷其本見在沙門釋先公於宋世譯月燈經一部群錄注云宋世不顯譯年未詳何帝彌沙塞律抄一卷見寶唱錄亦名提阿波檀那眷屬鼻膩經右一部一卷闕本沙門僧伽跋彌師子國人也譯彌沙塞律抄一部大周錄中指寶唱錄不言帝代其寶唱錄尋本且寄於宋錄以彰有據耳又據僧祐法苑云晉義凞八年三月十日於廬山般若臺東精舍與師子國律師僧伽跋彌出眷屬律抄同集僧一百二十人已編此錄未暇移改新集失譯諸經如來智印經一卷一名諸佛法身第二出與慧印三昧經同本老母經一卷第二出與老女人經等同本法滅盡經一卷甚深大迴向經一卷佛為黃竹園老婆羅門說學經一卷出中阿含第四十卷異譯優波夷墮舍迦經一卷出中阿含第五十五異譯或無迦字邪見經一卷出中阿含第六卷異譯大沙門百一羯磨法一卷或云大沙門羯磨法出十誦律迦丁比丘說當來變經一卷或直云迦丁比丘已後闕本十方佛名經一卷華嚴淨經一卷三十七品經一卷祐載兩本並云異出今且存一七佛各說偈經一卷乳王如來經一卷或云乳王經今經與乳光經同本現在十方佛名經一卷過去諸佛名經一卷千五百佛名經一卷五百七百佛名經一卷觀世音成佛經一卷文殊因緣經一卷文殊本願經一卷文殊觀經一卷彌勒須呵經一卷導師問佛經一卷颰陀菩薩百二十難經一卷持身菩薩經一卷賢首菩薩二百問經一卷金剛女菩薩經一卷善意菩薩經一卷菩薩從兜率天降中陰經一卷菩薩行喜經一卷菩薩淨本業經一卷菩薩初業經一卷菩薩四事經一卷菩薩十六願經一卷菩薩五十德行經一卷菩