人弘厚有識度善於接誘勤躬行道夙夜匪懈是以外國僧眾萬里歸集南海商人悉共宗事供贈往來歲時不絕性頗畜積富於財寶然營建法事已無私焉於建鄴淮側造正觀寺重閣層門殿房整飾養徒施化德業甚著以中興二年冬卒摩訶摩耶經一卷第二出一名佛昇忉利天為母說法亦直云摩耶經或二卷見王宗寶唱法上等三錄未曾有因緣經二卷度羅睺羅沙彌序亦直云未曾有經第二出見始興錄右二部三卷其本並在沙門釋曇景不知何許人於齊代譯摩耶經等二部群錄直云齊世譯出既不顯年未詳何帝腹中女聽經一卷第五出與無垢賢女經等同本房云見古錄右一部一卷闕本沙門釋法化以廢帝寶卷永元年中誦出胎中女聽經一部眾錄相承並云誦出未詳誦意依而列之以有先譯故免疑失長房內典錄云齊時江州沙門道政刪改彌勒成佛經一卷此不然如後大乘錄中廣述房等復云齊代沙門法度於楊都出灰河經一卷毘跋律一卷今以灰河經出雜阿含其毘跋律隋法經錄云法度偽造以濫律名今廢不立房等又云齊代沙門釋法尼譯益意經二卷今以此經即是齊末梁初僧法尼閉目誦出者今見有本文理差舛不可流行若言齊末出者祐錄何故不載今編疑部正錄不存房等又云齊代沙門道備出九傷等經五部五卷群錄注疑今依舊為定
