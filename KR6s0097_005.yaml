body:
  text: 西京西明寺沙門圓照撰總集群經錄上之五東晉司馬氏都建康亦云南晉從元帝建武元年丁丑至恭帝元熙二年庚申凡一十一帝一百四年緇素一十六人所譯經律論竝新舊集失譯諸經總一百六十八部四百六十八卷八十五部三百三十六卷見在八十三部一百三十二卷闕本東晉沙門帛尸梨蜜多羅三部一十四卷經沙門支道根二部七卷經沙門竺曇無蘭六十一部六十三卷經戒集沙門瞿曇僧伽提婆五部一百一十八卷經論教授法沙門迦留陀伽一部一卷賢聖集沙門康道和一部三卷經沙門佛陀𧿡陀羅一十三部一百二十五卷經律論集沙門曇摩一部二卷律要沙門卑摩羅叉二部五卷律雜事沙門釋法顯七部二十六卷經戒論集沙門祇多蜜二十三部四十五卷經居士竺難提三部五卷經沙門竺法力一部一卷經沙門釋嵩公三部三卷經集沙門釋退公一部一卷經沙門釋法勇一部一卷經新舊諸失譯經四十部四十八卷二部三卷舊集二十八部四十五卷新附大灌頂經十二卷或無大字錄云九卷未詳此灌頂總十二部經後人分之卷別各一房云見雜錄大孔雀王神呪經一卷見竺道祖錄及僧祐錄初出孔雀王雜神呪經一卷見竺道祖錄及僧祐錄第三出右三部一十四卷初一部十二卷見在後二部二卷闕本沙門帛尸梨蜜多羅晉言吉支西域人國王之子當承繼世而以國讓弟闇軌大伯既而悟心天啟遂為沙門蜜天姿高朗風神超邁直爾對之便卓出於物況其聰辯言悟者乎西晉永嘉中始到此土仍過江右止建初寺丞相王導一見而奇之以為吾之徒也由是名顯太尉庾元規光祿周伯仁大常謝幼璵廷尉桓茂倫皆一代名士見之終日累歎披襟致契導甞詣蜜蜜解帶偃伏晤言神解時尚書令卞望之亦與蜜致善須臾望之至蜜乃𣫍襟飾容端坐對之有問其故蜜曰王公風道期人卞令軌度格物故其然耳諸公於是歎其精神灑落皆得其所桓廷尉甞欲為蜜作目久之未得有云尸梨蜜可謂卓朗於是桓乃咨嗟絕歎以為標題之極大將軍王處沖在南夏聞王周諸公皆器重蜜疑以為失鑒及自見蜜乃欣振奔至一面盡虔王公甞謂蜜曰外國有君一人而已耳蜜笑而答曰若使我如諸君今日豈得在此當時以為佳對蜜性高簡不學晉語每與諸公言論雖因傳譯而神領意解盡其傳致以為自然縱狀非常情所測也蜜善持呪術所向皆驗時人呼為高座法師於元帝代譯灌頂等經三部又授弟子覓歷高聲梵唄傳響迄今年八十餘咸康中卒諸公聞之痛惜流涕蜜常在石子崗東行頭陀既卒因葬于此成帝懷其風為樹剎塚所後有關右沙門來遊建康廼於塚處起寺陳郡謝混贊成其業追旌往事仍曰高座寺也阿閦佛剎諸菩薩學成品經二卷太康年出第二譯與漢支讖出者大同小異見竺道祖晉世雜錄方等法華經五卷右二部七卷其本並闕沙門支道根履味遊方懷道利物以成帝咸康元年乙未譯阿閦佛剎等經二部長房等錄並云阿閦佛經太康年在西晉武帝代與咸康相去向六十年同是一人兩朝出經者恐是大懸也此應傳寫差誤多是咸康耳採蓮違王上佛授決號妙華經一卷亦直云採蓮違王經第二出與阿闍世王受決經同本陀隣尼鉢經一卷亦云陀隣鉢呪經第二出與持句神呪經等同本房錄陀隣鉢經外更存持句神呪經者非也摩尼羅亶經一卷亦云摩尼羅壇神呪經玄師颰陀所說神呪經一卷錄云幻師無所說字或作拔字亦云波陀古錄云幻王颰陀經寂志果經一卷出長阿含第十七卷異譯鐵城泥犁經一卷出長阿含第十二卷與五天使經同本阿耨風經一卷晉言依次出中阿含第二十七卷異譯梵志頞羅延問種尊經一卷亦云頞羅延出中阿含第三十七卷異譯泥犁經一卷或云中阿含泥犁經出中阿含第五十三卷異譯戒德香經一卷或云戒德經出增一阿含第十三卷異譯五十一卷異譯水沫所漂經一卷一名河中大聚沫經一名聚沫譬經與五陰譬喻經同本出雜阿含經第十卷異譯玉耶經一卷一名長者詣佛說子婦無敬經或云玉耶女經第二出與阿遬達經等同本五苦章句經一卷初出一名諸天五苦經一名五道章句經一名淨除罪蓋娛樂佛法經自愛經一卷或云自愛不自愛經房云見舊錄中心經一卷或云中心正行經舊錄云大忠經亦云小忠心經房錄云出六度集今撿無見正經一卷一名生死變識經大魚事經一卷阿難七夢經一卷或直云七夢經呵鵰阿那含經一卷一名荷鵰或作苛字新歲經一卷比丘聽施經一卷一名聽施比丘經佛般泥洹摩訶迦葉赴佛經一卷亦名迦葉赴佛般涅槃經犢牛經一卷一云犢子經第二出與乳光經等同本孔雀王呪經一卷第三出與吉支所譯者同本七佛所結麻油述經一卷祐失譯錄重載兩本一云異本大神母結誓呪經一卷伊洹法願神呪經一卷解日厄神呪經一卷六神名神呪經一卷檀持羅麻油術呪經一卷麻油述呪經一卷摩尼羅亶神呪案摩經一卷醫王惟婁延神呪經一卷或云阿難所問醫王惟婁延神呪經龍王呪水浴經一卷十八龍王神呪經一卷請雨呪經一卷止雨呪經一卷嚫水經一卷幻師阿夷鄒神呪經一卷呪水經一卷藥呪經一卷呪毒經一卷呪時氣病經一卷呪小兒經一卷呪齒經一卷祐失譯錄更載一本名與此同題云異本一云虫齒二云𮯔呪牙痛經一卷祐失譯錄更載一本名與此同題云異本或作齒痛呪眼痛經一卷五眼文經一卷今疑是聶道真所出求五眼法異名離欲優婆塞優婆夷戒文一卷亦云具行二十二戒文罪業報應經一卷與罪業應報教化地獄經同本八師戒經一卷第二出萍沙王五願經一卷一名弗沙迦王經第二出義足經二卷房云見吳錄亦云異出第二出十善十惡經一卷第二譯吳錄云異治禪法經一卷梵天策數經一卷舊錄云諸天事經諸天地經一卷十誦比丘戒本一卷大元六年合僧純曇摩特竺僧舒三家本以為此一卷見寶唱錄當第二出二百六十戒三部合異二卷序加大比丘字大元六年六月二十日於謝鎮西寺合僧詳重校見舊錄及寶唱右六十一部六十三卷佛般泥洹上二十四部二十四卷在犢牛經下三十七部三十九卷闕本沙門曇無蘭晉云法正西域人也以孝武帝大元六年辛巳至大元二十年乙未於楊都謝鎮西寺譯採蓮違王等經六十一部見長房錄又長房等錄更有四十八經亦云法正所譯今以並是別生抄經或是疑偽故並刪之如後所述救護身命經亦云救護身命濟人病苦厄經同錄編入正經舊錄云偽今依舊編諸天問如來警誡不可思議經見水世界經已上二經並出大集龍王結願五龍神呪經大將軍神呪經上二經出灌頂無吾我經出普超經彌蘭經或云彌連亦云彌蓮摩天國王經阿難念彌經彌蘭等三經並出六度集賢劫千佛名經出賢劫經序云賢劫經說二千一百諸度無極以拘樓孫佛為首此千佛名有別譯本拘樓提佛以為初首三十七品經安公云出律經僧祐錄云晉大元二十年歲在景申六月在謝鎮西寺撰出三十三天園觀經比丘成就五法入地獄經學人亂意經上三經出增一阿含佛為比丘說大熱地獄經釋提桓因詣目連放光經目連見大身眾生燃鐵纏身經見一眾生舉體糞穢塗身經眾生頂有鐵磨盛火燃經羅婆鳥為鷹所捉經十法成就惡業入地獄經蛇行法經比丘俗遇天子放光經天於修羅欲鬪戰經天帝釋受戒經比丘問佛釋提桓因緣經四天王案行世間經佛見梵天頂經帝釋慈心戰勝經天神禁寶經阿育王供養道場樹經勸行有證經戒相應法經禪思滿足經佛為比丘說下二十經並出雜阿含野鷄經鱉獼猴經蟲狐烏經或作鳥字弟子命過經驢駞經拘薩羅國烏王經或無羅字孔雀經夫婦經野鷄等八經並出生經中群牛千頭經集修行土經暴烏經群牛等三經並出出曜經地獄眾生相害經出修行道地經赤𭉨烏喻經阿難多洹羅云母經赤𭉨烏等二經出雜譬喻抄中阿含經六十卷第二出或五十八卷隆安元年十一月十日東京亭寺出二年六月二十五日記與曇摩難提出者同本沙門同道等筆受道慈製序見道祖錄增一阿含經五十一卷第二出隆安元年正月出與難提本小異竺道祖筆受或四十二或三十三無定亦有六十卷成者見道祖及寶唱錄阿毘曇心論四卷或云阿毘曇心無論字尊者法勝造大元十六年在廬山為惠遠法師譯出道慈筆受遠公製序見僧祐錄三法度論二卷大元十六年在廬山為遠法師出遠公製序第二譯與難提出者大同小異或三卷別錄云一卷或直云三法度無論字或云經或云經論見僧祐錄教授比丘尼法一卷房云見別錄亦云在廬山出右五部一百一十八卷前四部一百十七卷本在後一部一卷本闕沙門瞿曇僧伽提婆晉云眾天或云提和音訛故也罽賓國人入道修學遠訪明師學通三藏多所誦持尤善阿毘曇心洞其纖旨常誦三法度晝夜嗟味以為道之府也為人㑺朗有深鑒儀止溫恭務在誨人詢詢不怠苻秦建元中來入長安宣流法化譯論二部備於秦錄後以晉孝武帝世太元十六年辛卯遊化江左先是廬山慧遠法師翹勤妙典廣集經藏虛心側席延望遠賓聞其至止即請入廬嶽即以其年請出阿毘曇心及三法度等提婆乃於般若臺手執梵文口宣晉語去華存實務盡義本今之所傳蓋其文也至安帝隆安元年丁酉來遊建康晉朝王公風流名士莫不造席致敬時尚書令衛軍東亭侯瑯瑘王珣準高僧傳僧祐錄長房錄等並云王珣中阿含經序云王元琳元琳乃是珣之字也雅有信慧荷持正法建立精舍廣招學眾提婆既至珣即延請仍於其舍講阿毘曇名僧畢集提婆宗致既精詞旨明析振發義奧眾咸悅悟其冬珣集義學沙門釋惠持等四十餘人更請提婆於其寺譯中增一阿含罽賓沙門僧伽羅叉執梵本提婆翻為晉言至來夏方訖豫州沙門道慈筆受吳國李寶唐化共書提婆於廬山建康二處共出五部一百一十八卷提婆歷遊華戎備悉風俗從容機警善於談笑其道化聲譽莫不聞焉不知所終十二遊經一卷第二出與畺良譯者少異見竺道祖晉世雜錄見寶唱錄右一部一卷其本見在沙門迦留陀伽晉言時水西域人弘喻有方懷道遊國以孝武帝太元十七年壬辰譯十二遊經一部益意經三卷第二出見竺道祖晉世雜錄朱士行漢錄云二卷不顯譯人右一部三卷本闕沙門康道和戒德有儀軌範群物以孝武帝太元二十一年景申譯益意經一部大方廣佛華嚴經六十卷初出元五十卷後人分為六十沙門支法領於于闐得梵本來義熙十四年三月十日於道場寺出元熙二年六月十日訖法業筆受見祖祐二錄出生無量門持經一卷或云新微密持經於廬山譯第五出與支謙無量門微密經等同本見祖祐房等錄別存新微密持誤也大方等如來藏經一卷或直云如來藏經第三出元熙二年於道場寺譯見竺道祖晉世雜錄及僧祐錄觀佛三昧海經十卷或云觀佛三昧經或八卷見竺道祖晉世錄亦見僧祐錄或云宋世出摩訶僧祇律四十卷或云三十卷梵本是法顯摩竭提國將來義熈十二年十一月於鬪場寺共法顯出見竺道祖錄祐在顯錄據共譯故耳僧祇比丘戒本一卷亦云摩訶僧祇戒本第二出於道場寺譯見寶唱錄祐在法顯與覺賢共出年載皆得達摩多羅禪經二卷一名庾迦遮羅浮迷譯言修行道地於廬山出一名不淨觀亦名修行方便禪經祐云修行方便凡十七名遠公製序見僧祐錄文殊師利發願經一卷或加偈字元熙二年於鬪場寺出見僧祐寶唱二錄經後記云外國四部眾禮佛時多誦此經以發願求佛道新無量壽經二卷宋永初二年於道場寺出見僧祐寶唱二錄第八譯與世高支讖支謙僧顗等所出同本菩薩本業經一卷亦直云本業經是華嚴淨行品見僧祐長房二錄大周入藏有今闕且復存之淨六波羅蜜經一卷見僧祐長房二錄方便心論一卷共法業出見高僧傳初出過去因果經四卷房云見別錄第五譯右一十三部一百二十五卷文殊發願上八部一百一十六卷見在新無量壽經下五部九卷闕本沙門佛陀𧿡陀羅晉言覺賢本姓釋氏迦維羅衛國人甘露飯王之苗裔也祖父達摩提婆此云法天甞商旅於北天竺因而居焉父達摩修利耶此云法日少亡賢三藏孤與母居五年復喪母為外氏所養從祖鳩摩利聞其聰敏兼悼其孤露乃迎還度為沙彌至年十七與同學數人但以習誦為業眾皆一月賢一日誦畢其師歎曰賢一日敵三十夫也及受具戒修業精勤博學群經多所通達少以禪律馳名甞與同學僧伽達多共遊罽賓同處積載達多雖服其才明而未測其人也後於密室閉戶坐禪忽見賢至驚問何來答云暫至兜率致敬彌勒言訖便隱達多知是聖人未測深淺後屢見賢神變反敬心祈問方知得不還果常欲遊方弘化備觀風俗會有秦僧智嚴西至罽賓覩法眾清勝乃慨然東顧曰我之同輩斯有道志而不遇真匠發悟莫由即諮訊國眾孰能流化東土僉云有佛陀跋陀羅者出生天竺那呵梨城族姓相承世遵道學其童齔出家已通解經論少受業於大禪師佛大仙仙時亦在罽賓乃謂嚴曰可以振維僧徒宣授禪法者佛陀其人也嚴既要請苦至賢遂愍而許焉於是捨眾辭師裹糧東逝涉驟三載綿歷寒暑既度蔥嶺路經六國國主矜其遠化並欣懷資俸至交阯乃附舶循海而行經一島下賢以手指山曰可止於此舶主曰客行惜日調風難遇不可停也行二百餘里忽風轉吹舶還向島下眾人方悟其神咸師事之聽其進止後遇便風同侶皆發賢曰不可動舶主乃止既而有先發者一時覆敗後於闇夜之中忽令眾舶俱發無肯從者賢自起收纜唯一舶獨發俄爾賊至留者悉被抄害頃之至青州東萊郡聞鳩摩羅什在長安即往從之什大欣共論法相振發玄微多所悟益因謂什曰君所釋不出人意而致高名何耶什曰吾年老故耳何必能稱美談什每有疑義必共諮決時秦主姚興專志經法供養三千餘僧並往來宮闕盛修人事唯賢守靜不與眾同後語弟子云我昨見本鄉有五舶俱發既而弟子便告外人關中舊僧咸以為顯異惑眾又賢在長安大弘禪業四方樂靜者並聞風而至但染學有淺深得法有濃淡澆偽之徒因而詭猾有一弟子因少觀行自言得阿那含果賢未即檢問遂致流言大被謗讟將有不測之禍於是徒眾或藏名潛去或踰牆夜走半日之中眾散殆盡賢乃夷然初不介意時舊僧僧䂮道恒等謂賢曰佛尚不聽說己所得法先言五舶將至虛而無實又門徒誑惑互起同異既於律有違理不同止宜可時去勿得久留賢曰我身若流萍去留甚易但恨懷抱未申以為慨然耳於是與弟子慧觀等四十餘人俱發神志從容初無異色識真者咸歎惜焉白黑送者數千人姚興聞去悵恨乃謂道恒曰佛賢沙門挾道來遊欲宣遺教緘言未吐良用深慨豈可以一言之咎令萬夫無導因勅令追之賢謂使曰誠知恩旨無預聞命於是率侶宵征南指廬岳沙門慧遠素飲風德乃遣使入關致書祈請後至廬岳忻然如舊遠以賢之被擯過由門人若懸記五舶止說在同意亦於律無犯乃遣弟子曇邕致書姚主及關中眾僧解其擯事遠乃請出禪數諸經賢志在遊化居無求安停山歲許復西適江陵遇外國舶主既而訊訪果是天竺五舶先所見者也傾境士庶競來禮事其有奉施悉皆不受持鉢分衛不問豪賤時陳郡袁豹為宋武帝太尉長史宋武南討劉敦豹隨府屆于江陵賢將弟子慧觀詣豹乞食豹素不敬信待之甚薄未飽辭退豹曰似未足且復小留賢曰檀越施心有限故今所設已罄豹即呼左右益飯飯果盡豹大慚愧既而問慧觀曰此沙門何如人觀曰德量高邈非凡所測豹深歎異以啟太尉太尉請與相見甚崇敬之資供備至俄而太尉還都請與俱歸安止道場寺賢儀軌率素不同華俗而志韻清遠雅有淵致楊都法師僧弼與名德沙門寶林書曰鬪場禪師甚有大心便是天竺王何風流人也其見稱如此先是沙門支法領於于闐國得華嚴梵本三萬六千偈未有宣譯到義熙十四年吳郡內史孟顗右衛將軍褚叔度即請為譯匠乃手執梵文共沙門法業慧嚴曇義等百有餘人於道場寺譯出詮定文旨會通華戎妙得經體故道場寺猶有華嚴堂焉又沙門法顯於天竺所得僧祇梵本復請賢譯賢從安帝隆安二年戊戌訖宋永初二年辛酉於楊都廬山二處譯華嚴等經總一十三部並究其幽旨妙盡文意賢以宋元嘉六年泥洹春秋七十有一矣又僧祐長房二錄復云賢出新微密持經即出生無量門持經是不合雙載對彼支謙先譯故加新字又有菩薩十住及本業經此之二經並是華嚴別品覺賢既譯大部不合別出此經其本業一經同入藏錄有未見其本且復存之十住一經刪之不立雜問律事二卷初出見長房錄右一部二卷本闕沙門曇摩晉翻云法善於律學以安帝隆安四年庚子三月二日於楊都尚書令王法度精舍沙門釋僧遵等二十餘德請譯雜問律事序具卷首明佛法僧物互相交涉分齊差殊甚要須善防護十誦律毘尼序三卷亦云十誦律序今合入十誦末後三卷是房云毘尼誦注云是十誦後善誦也其善誦有四卷是十誦中第十誦也見二秦錄雜問律事二卷右二部五卷前毘尼序三卷見在後雜問事二卷本闕沙門卑摩羅叉晉云無垢眼罽賓國人沈靜有志力出家履道苦節成務為人眼青時亦號為青眼律師先在龜茲弘闡律藏四方學者競往師之鳩摩羅什時亦預焉及龜茲陷沒乃避地烏纏頃之聞什在長安大弘經藏又欲使毘尼勝品復洽東國於是杖錫流沙冒險東入以姚秦弘始八年達自關中什以師禮敬待又亦以遠遇欣然及羅什棄世又以安帝義熙年中乃出遊關左逗于壽春止石澗寺律徒雲聚盛闡毘尼羅什所譯十誦五十八卷最後一誦謂明受戒法及諸成善法事逐其義要名為善誦又後改善誦為毘尼誦故猶二名存焉復出三卷律序置之於後總成六十一卷高僧傳及長房錄乃云開前五十八卷為六十一卷者小非詳審也其毘尼序三卷或有近代經本編在第九誦後第十誦前卷當第五十五六七者非也今撿古十誦本乃在第十誦後卷當第五十九至六十一今者依古本為正頃之南適江陵於辛寺夏開講十誦既通晉言善相領納無作妙本大闡當時析文求理者其聚如林明條知禁者數亦殷矣律藏大弘叉之力也後出雜問律事二卷道場慧觀筆受高僧傳云道場慧觀深撿宗旨訖其所制內禁輕重撰為二卷送還京師僧尼披尋競相傳寫時閭里諺曰卑羅鄙語慧觀才錄都人繕寫紙貴如玉今謂雜問律事乃是道場慧觀於教有疑隨事諮問卑摩為決聞便錄之撰成二卷流行於世即非別有梵本卑摩譯之其曇摩出者亦即此是錄家誤載也冬復還壽春石㵎卒於寺焉春秋七十有七大般洹經六卷經記云方等大般洹經或十卷第四譯義熙十三年十月一日於道場寺共覺賢出寶雲筆受至十四年正月二日訖見道祖僧祐二錄大般涅槃經三卷或二卷是長阿含初分遊行經異譯群錄並云顯出方等泥洹者非即前大泥洹經加方等字此小乘涅槃文似顯譯故見僧祐寶唱二錄雜藏經一卷第二出與鬼問目連餓鬼報應經等同本見僧祐寶唱二錄僧祇比丘尼戒本一卷亦云比丘尼波羅提木叉僧祇戒本共覺賢譯見長房錄歷遊天竺記傳一卷亦云法顯傳法顯自撰述往來天竺事見長房錄雜阿毘曇心十三卷第二出與符秦僧伽提婆等所出同本見僧祐錄房云顯與覺賢共譯佛遊天竺記一卷見僧祐錄右七部二十六卷前五部一十二卷見在後二部一十四卷闕本沙門釋法顯本姓龔平陽人也顯有三兄齠年次喪其父恐懼及顯數歲便放出家居家數年病篤欲死因送還寺信宿便差不肯復歸母欲見之不能得為立小屋於門外以擬去來十歲遭父憂叔父以其母寡獨不立逼使還俗顯曰本不以有父而出家也正欲遠塵離俗故入道耳叔父善其言乃止頃之母喪至性過人葬事既畢仍即還寺甞與同學數十人於田中刈稻時有飢賊欲奪其穀諸沙彌悉奔走唯顯獨留語賊曰若欲須穀隨意所取但君等昔不布施故此生飢貧今復奪人恐來世彌甚貧道預為君憂故相語耳言訖即還賊棄穀而去眾僧數百人莫不歎服及受大戒志行明潔儀軌肅然常慨經律舛闕誓志尋求以安帝隆安三年與同學慧景道整慧應慧嵬等發自長安西度沙河上無飛鳥下無走獸四顧茫茫莫測所之唯視日以准東西人骨以標行路耳屢有熱風惡鬼遇之必死顯任緣委命直過險難有頃至葱嶺冬夏積雪有惡龍吐毒風雨沙礫山路艱危壁立千仞昔有人鑿石通路傍施梯道凡度七百餘梯又躡懸絙過河數十餘皆漢時張騫甘父所不至也次度小雪山遇寒風暴起慧景噤戰不能前語顯云吾其死矣卿可時去勿得俱殞言絕而卒顯撫之泣曰本圖不果命也奈何復自力孤行遂過山險凡所經歷三十餘國至北天竺次往中國未至王舍城三十餘里有一寺逼暮仍停明旦顯欲詣耆闍崛山寺僧諫曰路甚艱險且多黑師子亟經噉人何由可至顯曰遠涉數萬誓到靈鷲身命不期出息非保豈可使積年之誠既至而廢耶雖有險難吾不懼也眾莫能止乃遣兩僧送之顯既至山中日將曛夕遂欲停宿兩僧危懼捨之而去顯獨留山中燒香禮拜翹感舊跡如覩聖儀至夜有三黑師子來蹲顯前舐脣搖尾顯誦經不輟一心念佛師子乃低頭下尾伏顯足前顯以手摩之呪曰汝若欲相害待我誦竟若見試者可便退去師子良久乃去明晨還反路窮幽深榛木荒梗禽獸交橫止有一徑通行而已未至里餘忽逢一道人年可九十容服麁素而神氣俊遠顯雖覺其韻高而不悟是人須臾進前逢一年少道人顯問曰向耆年是誰耶答曰頭陀弟子大迦葉也顯方惋慨良久既至山前有一大石橫塞室口遂不得入顯乃流涕致敬而去今謂顯所涉者是鷄足山大迦葉波入寂之所非佛舊居處鷲峰山也又至迦施國精舍裏有白耳龍每與眾僧約令國內豐熟皆有信効沙門為起龍舍並設福食每至夏坐訖日龍輒化作一小蛇兩耳悉白眾咸識是龍以銅盂盛酪置於其中從上坐至下行之似若問訊遍乃化去年輒一出顯亦親見此龍後却至中天竺於摩竭提巴連弗邑阿育王塔南天王寺得摩訶僧祇律又得薩婆多律抄雜阿毘曇心綖經方等般泥洹等經此方等泥洹即六卷大般泥洹經之梵本也准經後記名為方等大般泥洹經非謂二卷方等泥洹也顯留三年學梵書語躬自書寫於是持經像寄附商客到師子國顯同旅十餘或留或亡顧影唯己常懷悲慨忽於玉像前見商人以晉地一白團扇供養不覺悽然下淚停二年復得彌沙塞律長雜二阿含及雜藏本並漢土所無其師子國中有佛齒每年三月彼之國王預前十日莊嚴白象遣一貴重辯說智臣著王衣服象上擊鼓大聲唱言如來在世四十五年說法度人無量億數眾生緣盡乃般泥洹自爾已來一千四百九十七載世間長昏眾生可愍却後十日佛齒當出無畏精舍可辦香華各來供養時正當晉義熙元年計從義熙元年太歲乙巳至今開元十八年歲次庚午便成一千八百二十二載矣既而附商人大舶循海東還舶有二百許人值大暴風舶壞水入眾人惶怖即取雜物棄之顯恐商人棄其經像唯一心念觀世音乃歸命漢土眾僧舶任風而去得無傷壞行九十日達耶婆提國停五月復隨他商侶東趣廣州舉帆月餘日夜忽大風合舶震懼眾共議曰坐載此沙門使我等狼藉不可以一人故令眾俱亡欲推棄之法顯檀越厲聲呵商人曰汝若下此沙門亦應下我不爾便當見殺漢地帝王奉佛敬僧我至彼告王必當罪汝商人相視失色僶俛而止既水盡糧竭唯任風隨流忽至岸見藜藿菜依然知是漢地但未測何方即乘小舶入浦尋村遇獵者二人顯問此何地耶獵人曰是青州長廣郡牢山南岸獵人還以告太守李嶷嶷素敬信忽聞沙門遠至躬自迎勞顯持經像頃之欲南歸時刺史請留過冬顯曰貧道投身於不反之地志在弘通所期未果不得久停遂南造建康於道場寺就外國禪師佛陀跋陀羅譯大般泥洹經等六部撰遊天竺傳一卷顯既出大泥洹經流布教化咸使見聞有一家失其姓名居近楊都朱雀門世奉正化自寫一部讀誦供養無別經室與雜書共屋後風火忽起延及其家資物皆盡唯泥洹經儼然具存煨燼不侵卷色無異楊都共傳咸稱神妙後到荊州卒于辛寺春秋八十有六眾咸慟惜焉菩薩十住經一卷是華嚴十住品異譯見長房錄寶如來三昧經二卷或一卷一名無極寶三昧經第二出與無極寶經同本見房錄大智度經四卷第五出與支讖道行經及大般若第四會等同本房云見南來新錄普門品經一卷第一出與法護普門品及寶積文殊普門會同本見僧祐錄及竺道祖錄阿述達經一卷第三出與寶積無畏德會等同本見長房錄如幻三昧經二卷第三出與世高如幻三昧及寶積善住意會等同本見竺道祖晉錄彌勒所問本願經一卷第二出與法護彌勒本願及寶積彌勒所問會同本見長房錄十地經一卷第三出與法護菩薩十地經等同本見長房錄維摩詰經四卷第五出與嚴佛調古維摩經等同本房云見南來新錄無所悕望經一卷第三出與象腋經等同本見長房錄浮光經一卷或作乳光第四出與犢子經同本見房錄如來獨證自誓三昧經一卷第三出與世高自誓三昧經同本見長房錄普賢觀經一卷初出一名觀普賢菩薩房云見道慧錄瓔珞經十二卷一名現前報初出與竺佛念菩薩瓔珞同本或十四卷房云見南來新錄昭明三昧經一卷第二出見長房錄禪經四卷房云見南來新錄法沒盡經一卷見長房錄菩薩正齋經一卷第三出見長房錄威革長者六向拜經一卷或作威華第二出見長房錄出中阿含第三十三異譯指鬘經一卷或作指髻出增一阿含第三十一異譯見長房錄所欲致患經一卷第二出見長房錄五蓋疑結失行經一卷第二出見長房錄分衛經一卷見長房錄右二十三部四十五卷初二部三卷本在大智度下二十一部四十一卷闕本沙門祇多蜜或云祇蜜多晉云謌支西域人識性通敏聰達宏遠志存弘化無憚遠遊爰於晉代譯菩薩十住等經二十三部諸錄盡云祇多蜜晉世譯未詳何帝若非咸洛應是江南一部見僧祐錄房云已外並彰雜別諸錄又有寶施女經出大集經摩調王經出六度集既是別生刪之不錄大乘方便經三卷元熈二年譯第三出或二卷與法護大善權經等同本見始興錄今編入寶積當第三十八會請觀世音菩薩消伏毒害陀囉尼呪經一卷亦直云請觀世音經第二出見法上錄威革長者六向拜經一卷晉宋間於廣州譯出中阿含第三十三卷異譯見始興及寶唱錄右三部五卷前二部四卷本在後一部一卷本闕居士竺難提晉翻云喜西域人志道無倦履遠能安解悟幽旨言通晉俗以恭帝元熙元年己未爰暨宋世譯大乘方便經等三部無量壽至真等正覺經一卷一名樂佛土樂經一名極樂佛土經第七譯正度錄與世高支讖支謙僧鎧白延法護等所出同本右一部一卷本闕沙門竺法力西域人業行清高智道崇峙善通方語妙稱經微以恭帝元熙元年己未二月譯無量壽至真等正覺經一部日難經一卷第二出即是越難經後說事少異見趙錄及始興錄蓱沙王五願經一卷亦名弗沙王經第三出見趙錄及始興錄迦葉結集戒經一卷第三出見趙錄及始興錄右三部三卷其本並闕沙門釋嵩公或云高公於晉末譯日難等經三部群錄並云晉末不知何帝之年迦葉禁戒經一卷一名摩訶比丘經一名真偽沙門經初出見始興錄右一部一卷本闕沙門釋退公譯迦葉戒經一部云於晉末未詳何帝之年佛開解梵志阿颰經一卷出長阿含第十三卷異譯見趙錄右一部一卷闕本沙門釋法勇譯梵志阿颰經一部云晉末出亦未詳何帝之年那先比丘經二卷或云那先經或三卷初出見僧祐失譯錄賢聖集見在陀羅尼章句經一卷祐無章字見僧祐失譯錄第三出與持句神呪經等同本大乘經闕本右二部三卷長房等錄東晉失譯總有五十三部五十七卷今除二部三卷之外餘五十一部五十四卷並是房錄錯上或後漢失譯錄中已載之者及有譯人別生經等委列如右觀無量壽佛經三世三千佛名經千佛因緣經五十三佛名經八部佛名經十方佛名經賢劫千佛名經稱揚百七十佛名經南方佛名經滅罪得福佛名經比丘諸禁律經摩訶僧祇律比丘要集優波離問佛經沙彌威儀比丘尼十戒經受十善戒經沙彌尼戒經賢者五戒經優婆塞威儀經波若得經觀世樓炭經般舟三昧念佛章經庾伽三摩斯經禪要呵欲經七佛所結麻油術呪五龍呪毒經齲齒呪七佛安宅神呪安宅呪已上二十呪部二十九卷後漢失譯錄中已有此中復載故知重也三歸五戒帶佩護身呪經七萬二千神王護比丘呪經十二萬神王護比丘尼呪經百結神王護身呪經宮宅神王守鎮左右經塚塞因緣四方神呪經伏魔封印大神呪經摩尼羅亶大神呪經召五方龍攝疫毒神呪經梵天神策經普廣經已上一十一部一十一卷並是尸梨蜜所譯大灌頂經從第一卷至第十一遺教三昧經二卷或云遺教三昧法律經西晉法炬譯偽錄中亦有阿那含經二卷晉智嚴譯偽錄亦有未曾有因緣經二卷或直云未曾有經已曾再譯一存一闕禪定方便次第法經後漢安世高譯七佛神呪經吳支謙譯賢者五福經西晉白法祖譯摩尼羅亶神王呪案摩經或無王字竺曇無蘭譯本行六波羅蜜經宋求那跋陀羅譯優婆塞五戒經宋沮渠京聲譯三歸五戒神王名經抄灌頂經定意三昧經出十住斷結經已下新附此錄決定毘尼經一卷一名破壞一切心識初出與寶積優婆離會同本異譯祐云眾錄並云於燉煌出不顯譯人傳云晉世未詳何帝時彌勒來時經一卷第三出與羅什彌勒下生經等同本見法上錄稻芉經一卷與了本生死經等同本造立形像福報經一卷與作佛形像經同本報恩奉盆經一卷與盂蘭盆經同本師子奮迅菩薩所問經一卷華聚陀羅尼呪經一卷上二經同本異出六字呪王經一卷與六字神呪王經同本善法方便陀羅尼經一卷金剛祕密善門陀羅尼經一卷上二經同本異出菩薩本行經三卷七佛所說神呪經四卷初出亦云七佛十一菩薩說大陀羅尼神呪經薩羅國經一卷或云薩羅王經般泥洹經二卷或直云泥洹經亦云大般泥洹經是長阿含初分遊行經異譯諸藏中一卷者唯是上卷欠下卷也緣本致經一卷出中阿含第十卷異譯古來世時經一卷出中阿含第十三卷異譯梵志計水淨經一卷出中阿含第二十三卷異譯三歸五戒慈心厭離功德經一卷出中阿含第三十九卷異譯箭喻經一卷出中阿含第六十卷異譯食施獲五福經一卷一名施色力經一名福德經出增一阿含第二十四卷異譯滿願子經一卷僧祐失譯錄中有晉言故移此出雜阿含第十三卷異譯摩鄧女解形中六事經一卷第五出與摩鄧伽舍頭諫經等同本餓鬼報應經一卷第三出一名目連說地獄餓鬼因緣經與鬼問目連經等同本得道梯橙錫杖經一卷題云得道梯橙錫杖品第十二亦直云錫杖經僧護經一卷或云僧護因緣經護淨經一卷木槵子經一卷無上處經一卷盧志長者因緣經一卷五王經一卷沙彌十戒法并威儀一卷亦名沙彌威儀戒本沙彌尼離戒文一卷舍利弗問經一卷五百問事經一卷阿育王譬喻經一卷題云天尊說阿育王譬喻經古經呼佛以為天尊即佛說也撰集三藏及雜藏傳一卷亦云撰三藏經及雜藏經彌勒作佛時事經一卷祐錄無事字第二出與彌勒來時經等同本見寶唱錄道樹三昧經二卷第二出與私呵昧經同本見支敏度錄右三十八部四十五卷末後二部三卷闕本餘並見在前三十六部四十二卷是入藏見經莫知譯主諸失譯錄闕而未書似是遠代之經故編於晉末庶無遺漏焉通前舊失譯經二部三卷總四十部四十八卷並為東晉失源云秦符氏都長安亦云前秦起苻健諡為明帝皇始元年辛亥至苻登無諡太初九年甲午凡經五主四十四年沙門六人所譯經律論等總一十五部合一百九十七卷於中七部六十五卷見八部一百三十二卷闕本房云元始元年甲寅延初元年丁酉與諸家年曆不同校三年向後准公增一序其甲子房錄錯矣符秦沙門曇摩持三部三卷戒本壇文沙門鳩摩羅佛提一部三卷集沙門僧伽跋澄三部二十七卷論集沙門曇摩蜱一部五卷經沙門伽提婆二部四十六卷論沙門曇摩難提五部一百一十四卷經論集十誦比丘戒本一卷或云十誦大比丘戒初出見僧祐錄比丘尼大戒一卷亦云十誦比丘尼戒第二出見僧祐錄教授比丘尼二歲壇文一卷或無尼字僧純於龜茲國得梵本來佛念譯語惠常筆受見寶唱錄右三部三卷其本並闕沙門曇摩持或云侍秦言法慧亦云法海西域人善持律藏抄入契經以苻堅諡莊烈天王建元三年丁卯四年戊辰於長安譯十誦戒本等三部竺佛念傳語慧常筆受安公僧戒序云佛念寫其梵文道賢為譯惠常筆受其比丘尼戒僧祐錄云晉簡文帝時沙門僧純於西域拘夷國得梵本到關中令佛念曇摩持慧常共出謹案長房等錄皆以惠常為其譯主今主與曇摩持竺佛念共譯今以秦僧慧常元不遊於天竺常雖共出尼戒執本乃是曇摩佛念傳譯常為筆受與其僧戒何別此乃引標惠常推校本末事乃分明常為助翻曇摩為主故入曇摩之錄惠常不別存焉四阿含暮抄解二卷亦云四阿含暮抄經安公製序見僧祐錄右一部二卷其本見在沙門鳩摩羅佛提秦言童覺西域人以苻堅建元十八年壬午八月於鄴寺譯阿含暮抄一部冬十一月乃訖佛提執梵本佛念佛護譯為秦文沙門僧道僧叡曇究筆受尊婆須蜜菩薩所集論十卷或云婆須蜜經或十二卷或十四卷建元二十年三月五日出至七月十三日訖跋澄難提提婆三人執本佛念傳譯慧崇筆受安公製序見僧祐錄鞞婆沙論十四卷或無論字亦云鞞婆沙阿毘曇亦云廣說或十五卷或十九卷建元十九年四月出至八月末訖難提錄為梵文佛圖羅剎傳譯敏智筆受安公製序見僧祐錄僧伽羅剎所集經三卷或云僧伽羅剎集初出或五卷建元二十年出十一月二十日訖佛念傳譯慧崇筆受安公製序見僧祐錄於長安石羊寺出亦云佛護傳譯右三部二十七卷其本並在沙門僧伽跋澄或云跋橙秦言眾現罽賓國人毅然有淵懿之量歷尋名師修習精詣博覽眾典特善數經暗誦毘婆沙貫其妙旨毘婆沙即鞞婆沙是非大毘婆沙也常浪志遊方觀風弘化符堅建元之末來入關中先是大乘之興未廣禪數之學甚盛既至長安咸稱法匠焉堅祕書郎正字文業博學有才崇御大法嘗聞外國宗習毘婆沙而跋澄諷誦乃四事禮供請譯梵文澄以建元十七年辛巳至二十一年乙酉共名德法師釋道安等譯婆須蜜等二部涼州沙門竺佛念外國沙門佛圖羅剎傳語沙門敏智慧嵩祕書郎趙文業筆受安公法和對共校定跋澄戒德整峻虛靖離俗關中僧眾則而像之後不知所終佛圖羅剎不知何國人德業純粹該覽經典久遊中土善達秦言其宣譯梵文見稱當世祐等群錄並云鞞婆沙論僧伽提婆譯今准安公論序云僧伽跋澄譯今準論序為正祐等群錄復云跋澄譯譯雜阿毘曇毘婆沙論十四卷者即鞞婆沙論是摩訶般若波羅蜜鈔經五卷或無鈔字或七卷亦云般羅若一名須菩提品亦名長安第六出與道行小品明度等同本見僧叡二秦錄及僧祐錄右一部五卷其本見在沙門曇摩蜱秦言法受印度人器宇明敏志存弘喻以苻堅建元十八年壬午譯般若鈔經一部佛護傳譯佛護即佛圖羅剎也慧進筆受安公校定并製序共傳云與大品放光光讚同本者或恐尋之未審也阿毘曇八揵度論三十卷或無論字或二十卷或云迦旃延阿毘曇或云阿毘曇經八揵度初出與唐譯發智論同本建元十九年四月二十日出至十月二十三日訖見僧祐錄阿毘曇心十六卷初出或十三卷建元末年於洛陽出見僧叡二秦錄及僧祐錄右二部四十六卷前一部三十卷見在後一部十六卷闕本沙門僧伽提婆或云提和亦云僧祐禘婆盖是言音楚夏耳秦言眾天罽賓國人姓瞿曇氏以苻堅建元十九年癸未遊於長安沙門法和請令翻譯起十九年訖建元未出八揵度等論二部其鞞婆沙十四卷准安公序是跋澄譯今此除之涼州沙門竺佛念傳譯慧力僧茂筆受法和理其指歸安公製序後以晉孝武帝太元十六年遊於廬山及往建康更出經論具如晉錄所顯中阿含經五十九卷建元二十年出是第一譯竺佛念筆受見竺道祖晉世雜錄及僧祐錄增壹阿含經五十卷第一譯建元二十年甲申夏出至來春訖為四十一卷佛念傳譯曇嵩筆受見安公經序僧叡僧祐寶唱錄並載祐云三十三及二十四卷恐誤三法度論二卷初出或云三法度無論字與晉世僧伽提婆出者小異見長房錄僧伽羅剎集二卷佛去世後七百年僧伽羅剎造初出見寶唱錄阿育王息壞目因緣經一卷第三出姚秦建初六年辛卯於安定城為尚書令姚旻二月十八日出至二十五日訖佛念傳譯兼製序見秦錄此應入後秦從多附此右五部一百一十四卷前四部一百一十三卷闕後一部一卷見在沙門曇摩難提秦言法喜兜法勤國人髫年離俗聰慧夙成研諷經典以專精致業遍觀三藏闇誦中增一阿含博洽多聞靡不該練是以國內近共推服少而觀方遍涉諸國常謂弘法之體宜宣布求聞故遠冒流沙懷寶東逝以苻堅建元二十年至于長安難提學業既優道聲甚盛符堅深見禮接厚致供施先是中土群經未有四含堅侍臣武威太守趙政志深法藏乃與安公共請出經政於長安城內集義學僧寫出二含梵本亦始翻譯佛念傳語惠嵩筆受提以符堅建元二十年甲申至姚萇建初六年辛卯譯中阿含等經五部提後還西域不知所終
