body:
  text: 西京西明寺沙門圓照撰總集群經録上之四彌勒成佛經一卷初出一名彌勒當來下生經太安二年出見聶道真録及僧祐録一十七紙十二因緣經一卷第四出亦云貝多樹下思惟十二因緣見祐録溫室洗浴衆僧經一卷第二出亦直云溫室見真祐二録百佛名經一卷初出祐無經字見祐録光世音大勢至受決經一卷初出元康年出亦直云觀世音受記經見真祐二録勇伏定經二卷安公云更出首楞嚴元康元年四月九日出聶承遠筆受第六譯見真祐二録祐房二録更載首楞嚴二卷者誤也無思議光孩童菩薩經一卷亦云無思議孩童經亦云無思議光經舊録直云孩童經初出見祐録超日明三昧經二卷太始七年正月譯初出或三卷或直云超日明經見真祐二録照明三昧經一卷初出見祐録惟明十二偈經一卷或無經字第三出與吳代支謙出者大同見房録法沒盡經一卷或云空寂菩薩所問經第二出與支謙出者同本或云法滅盡經見祐録諸神呪經三卷見僧祐録文殊師利菩薩經一卷見房録小郁伽經一卷與大郁伽經不同僧祐録或作迦字諸方佛名功德經一卷祐無功德字見祐房二録十方佛名經一卷祐無經字見祐房二録慈仁問八十種好經一卷或直云八十種好經見道安録及房録三十二相因緣經一卷或云菩薩三十二相經見道安及房録嚴淨定經一卷一名序世經見僧祐録寶施女經一卷一名須摩提法律三昧經見祐真二録金益長者子經一卷見祐録離垢蓋經一卷見祐録惠明經一卷見祐録衆祐經一卷見祐録三轉日明經一卷祐録云月明見祐録十等藏經一卷見祐録決道俗經一卷見祐録殖衆德本經一卷見祐録小法滅盡經一卷見祐録猛施經一卷舊録云猛施道地經見祐録目連上淨居天經一卷一本無天字房云出佛本行集經見祐録菩薩齊法經一卷或無經字或無法字一名菩薩王齊經一名持齊經一名賢首菩薩齊法經初出見祐房二録別載菩薩齊經誤也舍利弗悔過經一卷第二出亦直云悔過經見祐録佛悔過經一卷見祐録大六向拜經一卷舊録無大字太安元年譯或云尸迦羅越六向拜出長阿含第十一異譯見支敏度僧祐寶唱三録六十二見經一卷亦云梵網六十二見經見道祖祐三録出長阿含第十四異譯樓炭經六卷或五卷或八卷初出是長阿含第四分記世經異譯見真祐録安公云出方等部者不然也普法義經一卷亦云普義經第二出與漢世高出者大同小異見真祐二録舍利弗目連遊諸國經一卷或云舍利弗目揵連遊諸四衢經出增一阿含第四十一異譯見祐録奈女耆域經一卷或云奈女經太安年譯第二出見真祐録七女本經一卷第二出與吳代支謙譯者大同見房録五蓋疑結失行經一卷永寧二年四月十二日出第一譯安公云不似護公出見真祐録佛為菩薩五夢經一卷太安二年五月譯第二出一名佛五夢經一名太子五夢經一名仙人五夢經見舊録及真祐録摩目揵連本經一卷一名有呵字無揵字見祐録五福施經一卷見祐録觀行不移四事經一卷見祐録四婦喻經一卷見祐録廬夷亘經一卷見祐録廅羅王經一卷見祐録檀若經一卷見祐録龍施經一卷今疑是龍施菩薩本起經見祐録給孤獨明德經一卷舊録云給孤獨氏經見祐録龍王兄弟陀達誡王經一卷見祐録勸化王經一卷見祐録雁王經一卷見祐録雁王五百雁俱經一卷見祐録解無常經一卷見祐録城喻經一卷見祐録降龍經一卷見祐録邪法經一卷見祐録犯罪經一卷見祐録苦應經一卷見祐録三品修行經一卷亦云三品悔過經安公云近代人合大修行經見祐房二録別存三品悔過經誤也夫那羅經一卷見祐録賈客經一卷見房録沙門果證經一卷見祐録今疑與寂志果經同本貧女為國王夫人經一卷見房録誡王經一卷見祐録誡具經一卷見祐録誡羅云經一卷見祐録比丘尼戒一卷祐録云比丘尼戒經出十誦律與曇摩持所出稍異初出見祐録迦葉結集傳經一卷或無傳字舊録云迦葉結經或云結集戒經祐云迦葉集結經第二出見真祐録耆闍崛山解一卷見祐録雜譬喻三百五十首經二十五卷祐云譬喻三百首經見祐録房云見別録右一百七十五部三百五十四卷法觀經上九十部二百八卷見在新道行經下八十四部一百四十六卷闕本沙門竺曇摩羅察晉言法護其先月氏國人本姓支氏世居燉煌郡年八歲出家事外國沙門竺高座為師遂稱竺姓秦晉以前沙門多隨師稱姓後因彌天道安遂總稱釋氏誦經日萬言過目則能而天性純懿操行精苦篤志好學萬里尋師是以博覽六經遊心七籍雖世務毀譽未嘗介抱是時晉武之世寺廟圖像雖崇京邑而方等深經蘊在䓗外護乃慨然發憤志弘大道遂隨師至西域歷遊諸國外國異言三十六種書亦如之護皆遍學貫綜詁訓音義字體無不備曉遂大齎梵經還歸東夏自燉煌至長安後到洛陽及往江左㳂路傳譯寫為晉文起武帝太始二年景戌至愍帝建興元年癸酉出光讚般若等經一百七十五部清信士聶承遠及子道真竺法首陳士倫孫伯虎虞世雅等共承護旨執筆詳挍而護孜孜所務唯以弘通為業終身寫譯勞不告倦經法所以廣流東夏者護之力也末隱居深山山有清㵎恆取澡漱後有採薪者穢其水側俄頃而燥護乃徘徊歎曰人之無德遂使清泉輟流水若永竭真無以自給正當移去耳言訖而泉流滿㵎其幽誠所感皆此類也故支遁為之像贊云護公澄寂道德淵美微吟窮谷枯泉漱水邈矣護公天挺弘懿濯足流沙拔領玄致後立寺於長安青門外精勤行道於是德化遐布聲蓋四遠僧徒數千咸共宗事及晉惠西幸長安關中蕭條百姓流移護與門徒避地東下至澠池遘疾而卒春秋七十有八護於懷愍之代仍更出經傳云惠帝西幸長安護公避亂東下出至澠池卒者或未然也護世居燉煌而化道周洽時人咸謂燉煌菩薩也衆録或云月氏菩薩亦云天竺菩薩者斯皆重其德稱美其號也然法護者此土翻名曇摩羅剎西方梵稱而梁僧祐録及隋法經録內立為二人云各別出經小非詳審也今詳檢群録護所出經多小不定長房録中其數彌衆今細尋檢名是別生等經有非護公所出不可足為正譯之數今為實録故總刪之如後所述也師子月佛本生經或無本字房等諸録云護公譯詳文乃非今為失譯編於秦録法社經世注為疑曾見其本是人所造今編疑録寶女問惠經梵王變身經上二經出大集四自在神通經出自在王經金剛藏菩薩行經出漸備經光世音經出正法華經寶日光明菩薩經亦云寶日光明菩薩問蓮花國相貌經出悲花經普首童真經或作薄字出普超經隨藍本經馬王經彌勒為女身經摩調王經隨藍等四經並出六度集菩薩悔過法經或無經字出龍樹十住論人從所來經亦云人所從來出人本欲生經貧窮經何苦經貧窮等二經竝出中阿含七寶經出增一阿含經醫王經悉鞞梨天子詣佛說偈經四種人經醫王等三經並出雜阿含間居經總持經或云佛心總持腹使經蜜具經雜讚經間居等五經並出生經女人欲熾荒迷經多聞經寤意經已上三經出出曜經寶女下二十七經並是別生抄經從大部出今刪之衆經目録一卷護公自撰非梵本翻敘目録中列此不復存也十二遊經一卷初出右一部一卷本闕沙門疆梁婁至晉言真喜西域人志情放曠弘化在懷以武帝太康二年辛丑於廣州譯十二遊經一部見始興録及寶唱録道神足無極變化經四卷第二出一名合道神足經或二卷或三卷與竺法護所出佛升忉利天為母說法經同本異譯見竺道祖録阿育王傳七卷或加大字亦云大阿育王經或五卷初出與梁譯育王經同本光熙年譯見竺道祖録文殊師利現寶藏經二卷初出亦云現寶藏經或三卷與寶篋經等同本大安年譯見竺道祖録阿闍貰王經二卷大康年譯見竺道祖録第三出與普超經等同本阿難目佉羅經一卷第三出與微密時經等同本異譯見竺道祖録右五部十六卷前二部十一卷見在後三部五卷闕本沙門安法欽安息國人學瞻衆經幽鑒無滯以武帝太康二年辛丑訖惠帝光熙元年景寅於洛陽譯道神足等經五部光般若波羅蜜經三十卷第二出與光讚大品等同本或二十卷亦云放光摩訶般若經亦云摩訶般若放光經元年出見經後記右一部三十卷其本見在沙門無羅叉經後記云無叉羅于闐國人以惠帝元康元年辛亥五月十五日於陳留倉恆經記作洹水南寺譯放光經一部至十二月二十四日訖河南居士竺叔蘭口傳祝太玄周玄明筆受其經梵本元是頴川沙門朱士行嘗於洛陽講道行經至於深義往往不通每歎此經大乘之要而譯理不盡誓志捐身發心尋取遂以曹魏甘露五年庚辰發迹雍州西度流沙至于闐寫得正品梵文九十章六十萬餘言以晉太康三年壬寅遣弟子弗如檀晉言法鏡等十人送還洛陽未發之間于闐小乘學衆遂以白王云漢地沙門欲以婆羅門書惑亂正典王為地主若不禁之將斷大法聾盲漢地王之咎也王即不聽齎經士行憤慨乃求燒經為證王欲試驗乃積薪殿庭以火燔之士行臨階而誓白若大法應流漢地者經當不燒若其無應命也如何言已投經不損一字皮牒如故更覺光鮮大衆駭服稱其神感遂送到洛陽住三年復至許昌二年後至陳留水南寺衆請無羅叉等譯出而竺道祖僧祐王宗寶唱李廓法上靈祐等諸録並云朱士行出者此蓋據其元尋之人推功歸之耳今據經後記支敏度録諸雜目等乃是無羅叉竺叔蘭等共譯其朱士行停在于闐年八十而卒依西方闍維法薪盡火滅而尸骸猶全衆咸驚異乃呪曰若真得道法當毀壞應聲碎散遂𣫍骨起塔焉既在于闐終亡其經定非其譯也異毗摩羅詰經三卷祐云異維詰經或作思字或二卷元康六年譯第三出與佛調支譯等所出本文異見道祖僧祐二録首楞嚴經二卷元康元年出第七譯與支讖白延法護等所出本同文異見真祐録右二部五卷其本並闕優婆塞竺叔蘭今準僧祐録中朱士行傳竺叔蘭傳放光經後記支敏度合首楞嚴記皆云叔蘭是白衣居士長房內典等録云是沙門者誤也本天竺人祖父婁陀篤志好學清簡有節操時國王無道百姓思亂有賊臣將兵得罪懼誅以其國豪呼與共及婁陀怒曰君出於微賤而任居要職不能以德報恩而反為逆謀乎我寧守忠而死不反而生也反者懼謀泄即殺之而作亂婁陀子達摩尸羅晉言法首先在他國其婦兄二人並為沙門聞父被害國內反亂即與二沙門奔晉居于河南生叔蘭叔蘭幼而聰辨從二舅咨受經法一聞而悟善梵晉語及書亦兼諸文史然性頗輕躁遊獵無度嘗單騎逐鹿值虎墮馬折其右臂久之差後馳騁不已母數呵諫終不能改為之蔬食乃止性嗜酒飲至五六㪷方暢嘗大醉臥於路傍仍入河南郡門喚呼吏録送河南獄時河南尹樂廣與賓客共酣已醉謂蘭曰君僑客何以學人飲酒叔蘭曰杜康釀酒天下共飲何有僑舊廣又曰飲酒可爾何以狂亂乎答曰民雖狂而不亂猶府君雖醉而不狂廣大呼時坐客曰外國人那得面白叔蘭曰河南人面黑尚不疑僕面白復何怪耶於是賓主歎其機辨遂釋之頃之無疾暴亡三日還蘇自說入一朱門金銀為堂見一人自云是其祖父謂叔蘭曰吾修善纍年今受此報汝罪人何得來耶時守門人以杖驅之入竹林中見其獵伴為鷹犬所啄齧流血號叫求救於叔蘭走避數十步值牛頭人欲叉之叔蘭曰我纍世佛弟子常供二沙門何罪見治牛答此雖受福不關獵罪俄而見其兩舅來語牛頭曰我等二人恆受其供惡少善多可得相免遂隨道人歸既而還蘇於是改節修慈專志經法以晉惠帝元康元年與無羅叉出放光經後於洛陽自出異毗摩詰等經二部既學兼梵晉故譯義精允後遭艱難三月便欲遷葬有鄰人告曰今歲月不便可待來年叔蘭曰夫生者必有一死死者不復再生人神異塗理之然也若使亡母棲靈有地則烏鳥之心畢矣若待來年恐逃走無地何暇奉塋乎遂即葬畢明年石勒果作亂寇賊縱橫因避地奔荊州後無疾苦忽告知識曰吾將死矣數日便卒識者以為知命菩薩逝經一卷第三出亦云誓童子經或直名逝經與長者子制經等同本見房録菩薩修行經一卷第三出亦云威施長者問觀身經亦云長者修行經見房録佛般泥洹經二卷出長阿含是初分遊行經異譯亦直云泥洹經見房録大愛道般泥洹經一卷出增一阿含第五十卷異譯亦云涅槃見房録賢者五福經一卷見長房録已上見在已下闕嚴淨佛土經二卷第二出亦云淨土經與文殊佛土嚴淨經等同本見房録郁伽羅越問菩薩經一卷第五出與漢安玄所出法鏡經等同本見房録等集三昧經一卷第二出見房録無量破魔陀羅尼經一卷第四出與微密持經等同本異譯見房録大方等如來藏經一卷第二出見房録惟建菩薩經一卷見高僧傳及僧祐録檀持陀羅尼經一卷見房録如來興顯經一卷見房録善權經一卷見房録海龍王經一卷見房録持心梵志經一卷見房録右一十六部一十八卷賢者五福上五部六卷見在嚴淨佛土下十一部十二卷闕本沙門白遠字法祖本姓萬氏河內人父威達以儒雅知名州府辟命皆不行祖少發道心啓父出家詞理切至父不能奪遂改服從道祖才思俊徹敏朗絶倫誦經日八九千言研味方等妙達幽微世俗墳索多所該貫乃於長安造築精舍以講習為業白黑宗稟幾且千人晉惠帝之末太宰河間王顒鎮關中虛心敬重待以師友之敬每至間辰靜夜輒談講道德于時西府初建俊乂甚盛能言之士咸伏其遠祖既博涉多間善通梵晉之語於惠帝代譯菩薩逝經等一十六部後忽謂弟子及諸道人云我數日宿對當至便辭別索書分布經像及資財訖時張輔為秦州刺史祖與俱往明晨詣輔共語忽忤輔意遂為所害時人以為知宿命矣後少時有人姓李名通死而更蘇云見祖法師在閻羅王處為王講首楞嚴經云講竟應往忉利天又見祭酒王浮及道士基公次被杻械求祖懺悔昔祖平素之日與浮每爭邪正浮屢屈既瞋不自忍乃作老子化胡經以誣謗佛法殃有所歸故死方思悔耳又長房等録更有七經亦云祖出今以並是別生故刪去之謂佛問四童子經調伏王子道心經已上二經並出大集五百王子作淨土願經出悲華經三幼童經或作幼童出普超經二童子見佛說偈供養經出雜阿含五百幼童經亦云童子首達經亦云惟先首道上二經並出生經諸德福田經一卷初出或云諸福田經或直云福田經法立與法炬共出見僧祐録樓炭經六卷第二出或云大樓炭經出長阿含與第四分記世經同本異出與法護所出五卷者少異或五卷或八卷見僧祐録大方等如來藏經一卷舊録云佛藏方等經初出見祐録右四部一十二卷前三部十一卷見在後一部一卷闕本沙門釋法立不知何許人也智道弘拔悟物為先於惠帝代共法炬等於洛陽譯諸福田等經四部優填王經一卷初出與寶積優陀延王會同本見房録前世三轉經一卷初出與銀色女經同本見房録阿闍世王受決經一卷初出與採蓮違王經同本見房録灌洗佛形像經一卷初出亦云四月八日灌經亦直云灌經與摩訶剎頭經同本見房録恆水經一卷亦云恆河喻經出中阿含第九卷異譯見房録頂生王故事經一卷亦直云頂生王經出中阿含第十一異譯見房録求欲經一卷出中阿含第二十二異譯見房録苦陰因事經一卷出中阿含第二十五異譯見房録瞻婆比丘經一卷或作瞻婆出中阿含第二十九異譯見房録伏淫經一卷出中阿含第三十卷異譯見房録數經一卷出中阿含第三十五卷異譯見房録波斯匿王太后崩塵土坌身經一卷出增一阿含第十八卷異譯見房録又有波斯匿王喪母經即此塵坌身經是無繁重載頻毗娑羅王詣佛供養經一卷亦云頻婆出增一阿含第二十六異譯見房録鴦崛髻經一卷與竺法護指髻經大同小異出增一阿含第三十一異譯見房録難提釋經一卷出雜阿含第三十卷異譯見房録相應相可經一卷出單卷雜阿含經異譯見房録慢法經一卷第三出與阿難分別經等同本見房録法海經一卷第二出與海八德經同本見房録阿闍世王問五逆經一卷第二出見房録羅云忍辱經一卷或直云忍辱經見房録佛為年少比丘說正事經一卷見房録沙曷比丘功德經一卷房云見舊録群牛譬經一卷見房録比丘避女惡名欲自殺經一卷見房録已上見存已下闕福田經一卷一名諸德福田經第二出與法立譯者少異見竺道祖晉録諸經菩薩名經一卷見房録正意經一卷見房録中注云第二出未詳何者為初譯本明帝釋施經一卷見房録樓炭經八卷第三出是長阿含第四分記世經異譯與法立所出者大同先共法立出以意未悉故廣見敏度寶唱二録淨飯王般泥洹經一卷初出見房録貧窮老公經一卷初出見法上録危脆經一卷見房録大蛇譬喻經一卷亦直云大蛇經房云見舊録羅漢迦留陀夷經一卷或無羅漢字見房録爪甲擎土譬經一卷亦云爪甲取土經房云見舊録衰利經一卷見房録衆生未然三男經一卷見房録欲求說法經一卷見房録羅旬喻經一卷今疑是別生經中羅彌壽經異名見房録遺教法律經三卷一云遺教法律三昧經一云遺教三昧經或二卷見始興録右四十部五十卷比丘避女上二十四部二十四卷見在福田經下一十六部二十六卷闕本沙門釋法炬亦未詳氏族器量高峙遊化在懷於惠帝代初與法立同共出經法立歿後炬遂自譯優填王等經四十部又長房等録更有諸經並云炬出今以皆是別生之經録家誤上今並刪之如後所述時非時經亦直云時經準經後記非法炬譯具如後述魔女聞佛說法得男身經出大集經大悲比丘本願經出悲華經往古造行經舉鉢經上二經並出普超三昧經以金貢太山贖罪經調達教人為惡經上二經並出六度集佛降鴦崛魔人民歡喜經鴦崛魔歸化經或云婦死應誤上二經並出鴦崛魔羅經韋提希子月夜問夫人經或作天人出長阿含福行經惡道經一名惡意經或作惡意應誤也録中惡道惡意二名雙載者非也息恚經柔軟經受持經名稱經浮彌經福行下七經並出中阿含飛鳥喻經積木燒然經一名大枯樹經波斯匿王詣佛有五威儀經增一阿含經飛鳥喻等四經並出增一阿含普施經差摩比丘愈重病經佛為比丘說燒頭喻經優陀夷坐樹下寂靜調伏經佛為比丘說大力經四大色身生厭離經異信異欲經佛為比丘說三法經葉喻多少經佛為比丘說極深險難處經佛為比丘說莫思惟世間經或云莫思惟世間思惟經衆生身穢經眼色相繫經比丘於色厭離經捨諸世務經嬰兒喻經轉輪聖王七寶現世間經向邪違法經田夫喻經信人者生五根過患經少多制戒經無始本際經羅漢遇瓶沙王經尊者瞿坻迦獨一思惟經人民疾疫受三歸經恆水流澍經或作流樹灰河經一名塵灰河譬喻經録中二名別載誤也波斯匿王祖母命終經鑄金喻經木杵喻經金師精舍尊者病經群羊喻經處中行道經波斯匿王女命過詣佛經比丘問佛多優婆塞命終經普施下二十五經並出雜阿含比丘分衛經和難經邪業自活經比丘各言志經和難釋經比丘疾病經無懼經毒草喻經毒喻經馬喻經比丘分衛下十經並出生經譬喻六人經出賣意經阿闍世王問瞋恨從何生經摩訶比丘經調達喻經阿闍世等三經小乘抄經栴檀塗塔經出百豕經無常經比丘求證人經阿梵和利比丘無常經比丘問佛何故捨世學道經佛看病比丘不受長者請經坐禪比丘命過生天經放逸經深淺學比丘經拘提比丘經波利比丘謗梵行經北方世利經流離王攻釋子經信能渡河經有衆生三世作惡經聰明比丘經說法難值經調達問佛顏色經無常下一十七經並出出曜經曉食經出修行道地經須河喻經出雜譬喻魔女下八十九經並從大經抄出別生録載此中除之超日明三昧經二卷第二出或直云超日明經或三卷此經護公先出梵天而辭義煩重承遠譯詳整文偈刪改勝前見高僧傳及僧祐録越難經一卷一名難長者經一名難經初出見房録右二部三卷其本並在清信士聶承遠明解有才篤志務法護公出經多參正文句兼執筆承旨後於慧帝代自譯超日明等經二部又長房等録云承遠更譯迦葉詰阿難經此乃雜譬喻抄非是別翻又漢世佛調世高及此承遠三録俱載誤之甚也無垢施菩薩分別應辨經一卷第二出與法護離垢施經等同本亦云分別應報今編入寶積當第三十三會録有云竺法護出者誤也見房録諸菩薩求佛本業經一卷或無諸字見華嚴淨行品異譯文殊師利般涅槃經一卷見房録異出菩薩本起經一卷或無起字見房録三曼陀颰陀羅菩薩經一卷見房録菩薩受齊經一卷第二出見房録大方廣菩薩十地經一卷第二出與法護譯者大同小異見房録菩薩十法住經一卷是華嚴十住品異譯第三出見房録十住經十二卷是華嚴十地品異譯第二出見房録菩薩緣身五十事經一卷第二出與五十緣身經大同小異見房録觀世音授記經一卷第二出見房録諸佛要集經二卷第二出見房録寂音菩薩願經一卷見房録菩薩求五眼法經一卷祐無經字或云五眼文見房録菩薩道行六法經一卷見房録菩薩初地經一卷見房録菩薩十道地經一卷有云是前譯菩薩十地見房録文殊師利與離意女論議極似維摩詰經一卷見房録今按藏中諸佛要集經下卷有離意女論議事疑抄彼經也菩薩雜行法一卷見房録菩薩所行四法一卷見房録菩薩宿命經一卷見房録文殊師利淨律經一卷第二出與法護小異見房録菩薩戒獨受壇文一卷見房録菩薩懺悔法一卷云異出本見房録右二十四部三十六卷菩薩受齊上六部六卷見在大方廣下一十八部三十卷闕本清信士聶道真即承遠息父子清悟皆以度語為業從武帝大康初至懷帝永嘉末其間詢稟咨承法護筆受之外及護歿後真遂自譯無垢施應辨等經二十四部誠師護公真當其稱頗善文句辭義分炳又長房等録更有二十九經亦云道真所出今以並是別生抄經故刪之不存也菩薩奉施詣塔作願念經師子步雷音菩薩問發心經菩薩三法經菩薩奉施等三經並出文殊佛土嚴淨經菩薩布施懺悔法出決定毗尼經自在王菩薩如來警誡經或云菩薩誡身自在經菩薩導示行經菩薩發心時經無言菩薩流通法經無言菩薩經菩薩出要行無礙法門經光味菩薩造七寶梯經自在王菩薩等七經並出太集菩薩如意神通經菩薩戒自在經上二經出自在王經寂音菩薩問五濁經或云寂意轉輪聖王發心求淨土經上二經出悲華大雲密藏菩薩問大海三昧經出大雲經溥首童真經出普超經儒童菩薩經或無菩薩字出六度集經波斯匿王欲伐央崛魔羅經出央崛魔羅經大光明菩薩百四十八願經菩薩六法行經菩薩本願行品經菩薩苦行經菩薩呵睡眠經菩薩呵家過經大光明等六經祐録云抄今並為大乘抄經菩薩戒要義經出地持經菩薩五法行經初發意菩薩行易行法上二經並出十住論轉輪聖王七寶具足經出雜阿含衆經録目一卷道真自撰非梵本翻傳敘録中列此不復存右長房等録云優婆塞衛士度於惠帝代出摩訶般若波羅蜜道行經二卷云從舊道行中刪改略出僧祐録云衆經並云道行經二卷衛士度略出也既取舊經刪略即非梵本別翻今載別生録中此不復存也逝童子經一卷第四出亦名長者制經亦直云制經亦名菩薩逝經亦直云逝經五本大同別譯為異名殊耳見寶唱録善生子經一卷初出與祇多密竺難提等所出同本出中阿含第三十三異譯見支敏度竺道祖寶唱等三録文殊師利現寶藏經二卷第三出與竺法護所出現寶藏經等同本見祖唱二録十善十惡經一卷初出見竺道祖晉録及寶唱録右四部五卷逝童子等二部二卷見在文殊現寶藏等二部三卷闕本沙門支法度未詳何許人於惠帝代永寧元年辛酉譯逝童子經等四部又僧祐長房等録於惠帝時沙門支敏度合兩支支讖支謙兩竺竺法護竺叔蘭四本房録更加一白為五本今準祐録及合經記但四本合成無白延也首楞嚴為八卷祐注云或為五卷合一支支謙兩竺竺法護竺叔蘭三本維摩為五卷既非梵本別翻復闕其本故此録中刪而不載時非時經一卷或直云時經見經後記右一部一卷其本見在沙門若羅嚴外國人也譯時非時經一部經後記云外國法師若羅嚴手執胡本口自宣譯涼州道人釪鎮或作釪鎮城中寫記房等皆云法炬譯者謬也既莫知於帝代且附西晉録中方等陀羅尼經一卷寶嚴經一卷五福德經一卷右三部三卷其本並闕長房等録西晉失譯總八部一十五卷云吳別二録並注元康年中出不顯譯人詳録未見指的所以別件猶殊失譯今以餘之五部一十二卷撿尋群録兼閲經文皆有所憑即非失譯具述由委列之如左度世品經六卷阿耨達龍王經二卷是弘道廣顯三昧經異名已上二經竺法護譯如來祕密藏經二卷一名大方廣如來性起微密藏經亦直云如來性起經是舊華嚴經如來性起品後漢失譯已有此復重載誤之甚也今附別生録中也明相續解脫地波羅蜜經一卷宋求那跋陀羅譯弟子學有三輩經一卷三品弟子經異名吳支謙譯已後新附此録太子和休經一卷第二出與太子刷護經等同本薩曇分陀利經一卷舊録云薩藝芬陀利經亦直云分陀利經見法華經寶塔天授二品各小分異譯放鉢經一卷是普超經舉鉢品異譯出第一卷安公云出方等部菩薩睒經一卷或云孝子睒經亦直云睒經第二出六度集第二卷異譯長壽王經一卷法常住經一卷鹹水喻經一卷兜調經一卷出中阿含第十四卷異譯舍衛國王夢見十事經一卷或直云十夢經舊經云舍衛國王十夢經或云波斯匿王十夢經出增一阿含第五十一卷異譯安公云出阿毗曇玉耶女經一卷或云玉琊經初出與阿遬達經等同本孝子經一卷一名孝子報恩經頞多和多耆經一卷普達王經一卷佛滅度後棺殮葬送經一卷一名比丘師經亦云師比丘經鬼子母經一卷梵摩難國王經一卷迦旃延說法沒盡偈經一卷題云佛使比丘迦旃延說法沒盡偈一百二十章亦直云迦旃延佛治身經一卷或無佛字舊録云佛治身經餘録並同治意經一卷舊録云佛治意經餘録並同上見存已下闕彌勒當來下生經一卷初出與彌勒來時經等同本失利越經一卷第二出與月光童子經等同本異了本生死經一卷與稻竿經等同本內藏大方等經一卷今疑是佛藏大方等經小阿闍世經一卷小須賴經一卷因佉經一卷安公云出方等部今疑是阿難目佉經彌勒經一卷安公云出長阿含墮藍經一卷安公云出中阿含七事經一卷安公云出中阿含賴吒謣羅經一卷安公云出中阿含歡豫經一卷法經録云歡豫云出阿含第十二十二死經一卷今疑是十二品生死經七婦經一卷阿難邠四時施經一卷舊録云阿難邠祁四時布施經七車經一卷今疑是中阿含七車譬喻經海有八事經一卷難等各等經一卷舊録云阿難迦葉各說第一經惟留經一卷舊録云惟留王經理家難經一卷迦留多王經一卷梵士闍梨孫經一卷古録云梵志闍遜經波達王經一卷悲心悒悒經一卷趣度世道經一卷長者威勢經一卷癡注經一卷調達經一卷和達經一卷鉢吐沙經一卷分八舍利經一卷或作分身應行律一卷悉曇慕二卷吉法驗一卷口傳劫起盡一卷打揵抵法一卷右五十五部五十六卷治意經上一十九部一十九卷見在彌勒當來下三十六部三十七卷闕本梁僧祐録云安公録中失譯經唯祐録載房等並闕祐載安公失譯總一百四十二經今以餘八十七部撿尋諸録多題譯主或是別生抄經及人撰傳記即有所憑故刪不載安既不標時代今且附於晉末通前舊失譯經三部三卷總五十八部五十九卷並為西晉失源云
