body:
  text: 西京西明寺三藏沙門圓照撰總集群經録上之十八敘列古今諸家目録之一古經録一卷右尋諸舊録多稱為古録似是秦始皇時釋利防等所齎經録舊經録一卷右似是前漢劉向校書天閣往往見有佛經即謂古藏經録謂孔壁所藏或秦王焚書人中所藏者漢時佛經目録一卷右似是明帝時迦葉摩騰創譯四十二章經因即撰録朱士行漢録一卷右曹魏時頴川沙門朱士行於洛陽講道行經因著其録後往西域求經於彼而卒衆經録一卷右西晉武帝代長安青門外大寺西域沙門竺法護翻譯衆經因出其録衆經録一卷右西晉懷帝代永嘉中清信士聶道真稟受護公之筆匠也後自翻經因出其録趙録一卷右似是二趙時諸録遙注未知姓氏綜理衆經目録一卷右苻秦代沙門釋道安所撰自前諸録但列經名至於品類時代蓋闕而不紀後人披覽莫測根由安乃總集名題表其時代詮品新舊定其製作衆經有據自此而明在後群録資而增廣是知高懷獨悟足以垂範後昆所撰之文見僧祐録二秦録一卷右後秦姚興弘始年長安沙門釋僧睿所撰睿即安之弟子神用通朗思力標舉參譯什門多有撰緝衆經録四卷魏世録吳世録晉世録河西録右東晉廬山東林寺遠公弟子釋道流創撰未就而卒同學竺道祖續而成之經論都録一卷別録一卷右東晉成帝豫章山沙門支敏度撰其人總校古今群經故撰都録敏度又撰別録一部衆經目録二卷右簫齊武帝時沙門釋王宗撰見梁三藏記釋彌充録一卷南齊揚都人或云弘充未詳孰是釋道慧宋齊録一卷南齊釋道憑録一卷北齊釋正度録一卷王車騎録一卷始興録一卷未詳撰者亦云南録廬山録一卷岑號録一卷菩提留支録一卷元魏洛京永寧寺天竺沙門也華林佛殿衆經目録四卷梁天監十四年敕沙門僧紹撰隋沙門釋靈裕譯經録一卷此房録中無隋字衆經都録八卷似是總合諸家未詳作者已前諸録二十五家長房內典二録云上件諸録撿傳記有之未見其本故列名而已衆經別録二卷未詳作者言似宋時總分十例具如後列大乘經録一卷三百七十部七百七十九卷三乘通教録第二五十一部九十七卷三乘中大乘録第三一十七部二十八卷右上三録總四百三十八部九百一十四卷小乘經録第四四百三十六部六百一十卷第五篇目本闕此闕本録不顯部應散在諸録中故耳大小乘不判録第六一百七十四部一百八十四卷疑經録第七一十七部二十卷律録第八一十二部一百九十五卷數録第九六部一百二十一卷論録第十六部一百五十二卷右下七卷録總六百五十一部一千六百八十二卷上下兩合有十篇都一千八十九部二千五百九十六卷其下卷七録部數勘同卷數少四百未詳所以元魏衆經目録永熙年敕舍人李廓撰一卷大乘經目録一二百一十四部大乘論目録二二十九部大乘經子注目録三一十二部大乘譯經論目録四一十三部大乘經律目録五六十九部小乘論目録六二部有目未得經目録七一十六部非真經目録八六十二部非真論目録九四部全非經愚人妄作録十一十一部都十件經律論真偽四百二十七部二千五十三卷梁代衆經目録衆經目録卷第一天監十七年敕沙門寶唱撰有譯人多卷一大乘二百六十二部六百七十四卷無譯人多卷二六十九部四百六十七卷有譯人一卷三五部一十九卷無譯人一卷四九十部九十卷衆經目録卷第二九十八部九十八卷有譯人多卷一一十七部一百二十卷無譯人多卷二五部一十七卷有譯人一卷三五十部五十卷無譯人一卷四二百一十三部二百一十三卷衆經目録卷第三三百十二部一千六百八十一卷先異譯經一四十五部多卷二百七十九卷三十八部三十八卷禪經二九部多卷三十八卷三十一部三十一卷戒律三六十八部二百七十五卷疑經四六十二部六十七卷注經五四十部二百四十六卷數論六三十一部三百六十七卷義記七三十八部三百四十卷衆經目録卷第四一百二十九部九百八十五卷後部數勘欠五不同隨事別名一一十三部四百一十三卷隨事共名二三十五部四百七十卷譬喻三一十五部三十六卷佛名四一十四部一十九卷神呪五四十七部四十七卷總四卷都二十件凡一千四百三十三部三千七百四十一卷高齊衆經目録武平年沙門統法上撰梵名達摩鬱多羅一卷成新造録一二百九十一部八百七十四卷修多羅録二一百七十九部三百三十卷毗尼録三一十九部二百五十六卷阿毗曇録四五十部四百二十一卷別録第五三十七部七十四卷衆經抄録六一百二十七部一百三十七卷集録第七三十三部一百四十七卷人作録八五十一部一百六卷都八件經律論真偽七百八十七部二千三百三十四卷此都數與前數勘欠十一卷不同未詳所以從衆經別録下四家目録長房內典二録具列篇題今尋本未獲但具存其目唐衆經目録五卷貞觀初普光寺沙門玄琬撰出內典録右內典録中引用云唐舊録未見其本似取隋五卷衆經録編新經入餘者大同衆經目録五卷於隋録內加奘譯餘皆無異大唐大敬寺沙門靜秦撰右從古録已下三十一家諸録之中雖皆備述欲尋其本難可備焉且列名題知其有據撰録者曰又如長房録中引一乘寺藏録周録之中引真寂寺録義善寺録法寺録上之五録但引其名不言卷數又有陳朝大乘寺藏録四卷並不知何人製作似是當寺藏經略記由委既局寺名為録未可通行故敘録次闕而不載梁出三藏記集一十五卷其序略云祐以庸淺豫憑法門翹仰玄風誓弘大化每至昏曉諷持秋夏講説未嘗不心馳菴園影躍靈鷲於是牽課羸志沿波討源綴其所聞名曰出三藏記集一撰緣記二詮名録三總經序四述列傳緣記撰則原始之本克昭名録詮則年代之目不墜經序總則勝集之時足徵列傳述則伊人之風可見並鑽析內經研鏡外籍云云出三藏記集卷第一第一卷撰緣記第二至第五詮名録第六至十二總經序第十三至第十五述列傳集三藏緣記第一出大智度論十誦律五百羅漢出三藏記第二菩薩處胎經出八藏記第三胡漢譯經文字音義同異記第四應云梵漢前後出經異記第五出三藏記集卷第二新集撰出經律論録第一新集條解異出經録第二新集表序四部律録第三出三藏記集卷第三新集安公古異經録第一九十二部九十二卷新集安公失譯經録第二一百四十二部二百四十七卷新集安公涼土異經録第三五十九部七十九卷新集安公關中異經録第四二十四部三十四卷新集律分為五部記録第五出毗婆沙新集律分為十八部記録第六新集律來漢地四部記録第七出三藏記集卷第四新集續撰失譯雜經録第一一千三百六部一千五百七十卷出三藏記集卷第五新集抄經録第一四十六部三百五十二卷新集安公疑經録第二二十六部三十卷新集疑經偽撰雜録第三三十部二十六卷新集安公注經及新經志録第四四十八部二百五十九卷小乘迷學竺法度造異儀記第五長安睿法師喻疑第六出三藏記集卷第六四十一章經序等十首出三藏記集卷第七道行經等序二十首出三藏記集卷第八般若鈔經序等一十九首出三藏記集卷第九華嚴經記等二十四首出三藏記集卷第十道地經序等二十一首出三藏記集卷第十一中論序等一十六首出三藏記集卷第十二雜記敘録十首出三藏記集卷第十三安世高傳等十三出三藏記集卷第十四鳩摩羅什傳等十出三藏記集卷第十五白法祖傳等十撰録者曰祐録所撰條例可觀若細尋求非無乖失只如第一卷前出經異記中云舊經怛薩阿竭阿羅訶三耶三佛新經阿耨多羅三藐三菩提者一誤若新舊相對應云舊經怛薩阿竭阿羅訶三耶三佛新經多陀阿伽度阿羅訶三藐三佛陀舊經阿耨多羅三耶三菩新經阿耨多羅三藐三菩提二義全殊不可交互又如曇摩羅剎與竺法護乃是一人曇摩云法羅剎言護分為二人二誤異出經論録中但名目相似即云重譯而不細料簡大小混雜三誤以舊灌頂藥師為宋朝惠簡抄撰編疑偽録四誤又集序分之中與前譯人時有差互不細相比對五誤比諸衆作乖謬全鮮此亦璠璵之一玷也隋衆經目録七卷一卷總録開皇十四年敕翻經所法經等二十大德撰大乘修多羅藏録一六分合七百八十四部一千七百一十八卷衆經一譯分合一百三十三部四百二十一卷衆經異譯分合一百九十五部五百三十二卷衆經失譯分合一百三十四部二百七十五卷衆經別生分合二百二十一部二百六十四卷衆經疑惑分合二十一部三十卷衆經偽妄分合八十部一百九十六卷小乘修多羅藏録二六分合八百四十二部算得四十五部一千三百一卷算得三百四卷衆經一譯分合七十二部二百九十二卷衆經異譯分合一百部三百七十卷衆經失譯分合二百五十部二百七十二卷衆經別生分合三百四十一部三百四十六卷衆經疑惑分合二十九部三十一卷衆經偽妄分合五十三部九十三卷大乘毗尼藏録三六分合五十部八十二卷衆律一譯分合十二部三十二卷衆律異譯分合七部七卷衆律失譯分合一十二部一十四卷衆律別生分合一十六部一十六卷衆律疑惑分合一部二卷衆律偽妄分合二部一十一卷小乘毗尼藏録四六分合六十三部三百八十一卷衆律一譯分合一十五部一百九十八卷衆律異譯分合八部一百二十六卷衆律失譯分合二十九部四十五卷衆律別生分合三部三卷衆律疑惑分合六部六卷衆律偽妄分合二部三卷大乘阿毗曇藏五六分合六十八部二百八十一卷衆論一譯分合四十二部二百六卷衆論異譯分合八部五十二卷衆論失譯分合一部二卷衆論別生分合一十五部一十九卷衆論疑惑分合一部一卷衆論偽妄分合一部一卷小乘阿毗曇藏六六分合一百一十六部四百八十二卷衆論一譯分合一十四部二百七十六卷衆論異譯分合八部六十六卷衆論失譯分合五部二十二卷衆論別生分合八十六部一百七卷衆論疑惑分合一部一卷衆論偽妄分合二部一十卷佛滅度後抄集録七二分合一百四十四部六百二十七卷西域賢聖抄集分合四十八部一百一十九卷此方諸德抄集分合九十六部五百八卷佛滅度後傳記録八二分合三十三部三十卷西域賢聖傳記分合一十三部一百五十五卷此方諸德傳記分合五十五部一百五十五卷佛滅度後著述録九二分合一百一十九部一百三十四卷西域聖賢著述分合一十五部一十九卷此方諸德著述分合一百四部一百一十五卷右九録合二千二百五十七部五千三百一十卷算得二千二百五十四部五千一百九十一卷細勘別録部卷復與總録不同分為六卷總録第七合為十卷撰録者曰余撿尋此餘非無差錯即如曇摩羅剎晉言法護總是一人録中分二云出須真天子經二卷編為重譯不識梵晉之言一誤也如律二十二明了論總是一經録中分為二部律二十二卷編在律中明了論一卷在於論録一經之題分二録上二誤其律二十二乃是明了論半題今云二十二卷誤之甚也真諦譯十二卷者二本不殊在其二部而言重譯三誤也以仁王經起信論等編在疑四誤也不能備陳略述如此隋開皇三寶録一十五卷內題云歷代三寶紀開皇十七年興善寺翻經學士成都費長房撰歷代三寶紀第一帝年上周秦從周莊王代十年甲午至秦始皇帝子子嬰甲午年凡二十六主四百八十一載歷代三寶紀第二帝年次前漢新室後漢從前漢高帝元年乙未至後漢獻帝建安二十四年己亥凡二十六君四百一十五載歷代三寶紀第三帝年下魏晉宋齊梁周録從魏文帝黃初元年庚子至隋開皇十七年丁巳凡四十主三百七十八載歷代三寶紀第四譯經後漢右從明帝永平十年丁卯至獻帝末年歷一十一主一百五十二年華戎道俗十有二人并古失譯合出經律三百三十四部四百一十六卷歷代三寶紀第五譯經魏吳右魏吳兩代道俗十人所出經律羯磨并舊失譯合三百一十二部四百八十二卷歷代三寶紀第六譯經西晉右西晉代華戎道俗十有三人并前失譯諸經戒等合四百五十一部七百一十七卷歷代三寶紀第七譯經東晉右東晉代華戎道俗二十七人而所出經并舊失譯合二百六十三部五百八十五卷歷代三寶紀第八譯經姚秦符秦右二秦之代華戎釋種一十六人合出經論傳等一百六十四部九百四卷歷代三寶紀第九譯經西秦北涼元魏高齊陳代右五代緇素共二十七人所出三藏記録等并及失譯合二百三部八百五十五卷歷代三寶紀第十譯經宋右宋代華戎道俗二十三人出經律論及傳録等凡二百一十部四百九十卷歷代三寶紀第十一譯經齊梁周右三代緇素共五十一人出經律論及傳録等一百六十二部一千三百三十六卷歷代三寶紀第十二譯經大隋右隋代華戎緇素十有九人所翻新文及新舊本論傳法式合七十五部四百六十二卷歷代三寶紀第十三大乘録入藏目五百五十一部一千五百八十六卷修多羅有譯一二百三十四部八百八十五卷修多羅失譯二二百三十五部四百二卷毗尼有譯三一十九部四十卷毗尼失譯四一十二部一十四卷阿毗曇有譯五四十九部二百三十八卷阿毗曇失譯六二部七卷歷代三寶紀第十四小乘録入藏目五百二十五部一千七百三十九卷録云七百一十二卷者誤修多羅有譯一一百八部五百二十七卷修多羅失譯二三百一十六部四百八十二卷毗尼有譯三三十九部二百八十五卷毗尼失譯四三十一部六十七卷阿毗曇有譯五三十一部三百五十一卷阿毗曇失譯六一十部二十七卷開皇三寶録總目一卷內典録云房録所出經律論傳總二千一百四十六部六千二百三十五卷非入藏數算得七十四部三十七卷與內典不同右兼總目共成一十五卷其第十三十四大小乘入藏一千七十六部三千三百二十五卷房録本數三千二百九十二卷者計數錯也內典録云房所撰者入藏之中凡互相謬得在繁富未可覆通非無憑準未可偏削撰録者曰余撿長房入藏録中事實雜謬其闕本疑偽皆編入藏竊為不可又如大乘録中賢劫經賢劫三昧經此是一經兩名今存二部一誤須菩提品及長天子經須真天子問四事經亦一經兩名重載二部三誤象步經即無所希望經異名各存四誤菩提無所行經即文殊問菩提經異名存其二本五誤以僧佉外道入大乘中六誤小乘録中達摩多羅禪經與不淨觀禪德總是一經其不淨觀約法為名達摩多羅就人立稱二部俱存七誤十誦律六十一卷十誦律五十九卷二本不殊其六十一卷者卑摩羅叉加毗尼序置之於後餘並無異今云重譯二本俱存八誤律二十二在於律中明了論在於論録一題分二九誤其律二十二乃是明了論之半題今存律二十二卷誤中重誤也衆事分阿毗曇論代録之中即言宋朝求那跋陀羅共菩提耶舍譯入藏之內則言失源前後差違十誤餘者存録不能繁敘隋衆經目録五卷仁壽二年敕請興善寺大德與翻經沙門及學士等撰都合二千一百九部五千五十九卷單本原來一本更無別翻合三百七十部一千七百八十六卷右第一卷重翻本是一經或有二翻者乃至六重翻者合二百七十七部五百八十三卷賢聖集傳賢聖所撰翻譯有原合四十一部一百六十四卷右第二卷已前二卷三分合六百八十八部二千五百三十三卷入藏見録別生於本部內抄出別行合八百一十部一千二百八十八卷右第三卷疑偽名雖似正義涉人造合二百九部四百九十一卷右第四卷闕本舊録有目而無經本合四百二部七百四十七卷請訪右第五卷其序略云別生疑偽不須抄寫已外三分入藏所收至如法寶集之流淨住子之類還同略抄例入別生餘有僧傳等詞參文史體非淳正事雖可尋義無在録內典録云即今京輦通寫盛行直列經名仍銓傳譯所略過半未足尋之撰録者曰余撿尋此録非無差謬只如弘道廣顯三昧經與阿耨達龍王經此是一經兩名俱云竺法護譯存其兩本一誤又如普曜經八卷云西晉竺法護譯闕本録中復云普曜經八卷亦云竺法護譯見闕俱載二誤又入藏中普曜經八卷即云單本闕本録中即云重譯闕本前後差舛三誤真諦所譯攝大乘論十二卷者與十五卷者卷雖增減文則不殊今二本俱存四誤彌沙塞羯磨闕本録中前後重載五誤以隨願往生經遺教論等編為疑偽六誤餘在録中不能備記大唐內典録十卷麟德元年甲子西明寺沙門釋道宣撰歷代衆經傳譯所從録第一謂代別出經及人述作無非通法並入經收故隨經出後漢朝傳譯道俗十二人所出經律等三百三十四部四百一十六卷失譯經一百二部一百四十八卷後漢朝傳譯僧六人所出經律等一十三部二十五卷南吳孫氏傳譯道俗四人所出經傳等一百四十八部一百九十五卷失譯經一百一十部二百九十二卷西晉朝傳譯道俗一十三人所出經戒等四百四十六部七百一十三卷失譯經八部十五卷東晉朝傳譯道俗二十七人所出經傳等二百六十四部五百七十四卷失譯經五十部五十四卷前秦苻氏傳譯僧八人所出經傳等四十部二百三十九卷西秦乞伏氏傳譯僧一人所出經等一十五部二十二卷失譯經八部一十二卷後秦姚氏傳譯僧八人所出經傳等一百二十四部六百七十六卷北涼沮渠氏傳譯道俗九人所出經傳三十四部二百七十卷失譯經五部一十七卷宋朝傳譯道俗二十四人所出經傳二百一十七部五百三卷前齊朝傳譯道俗二十人所出經傳五十二部三百九十六卷梁朝傳譯道俗二十一人所出經律傳等八十九部九百三卷後魏元氏傳譯道俗一十四人所出經論傳八十八部二百九十八卷後齊高氏傳譯道俗二人所出經八部五十二卷後周宇文氏傳譯道俗一十一人所出經論天文等三十二部一百五卷陳朝傳譯道俗三人所出經論傳疏等五十四部二百五十一卷隋朝傳譯道俗二十五人所出經論等一百六部六百三十三卷皇朝傳譯道俗等十有二人所出經論等都合一十八代所出衆經總有二千四百八十七部八千四百七十六卷其第一卷初都數與第十卷中都數多少不同又與諸本對勘數亦少多差互未詳何者為正已上一録分為五卷從第一至第五歷代翻本單重人代存亡録第二謂前後異出人代不同又遭離亂道俗波迸今總計會故單重緣故敘莫知致傳失譯大乘經單重譯本并譯有無録合三百八部一百五十二卷一千五百二十二紙大乘律單重譯本并譯有無録合二十二部三十四卷四百六十二紙大乘論單重譯本并譯有無録合七百二部五百卷九千二百二十紙小乘經單重譯本并譯有無録合二百四部五百四十四卷七千六百七十四紙小乘律本譯有無録合三十五部二百七十四卷五千八百一十二紙小乘論單重譯本并譯有無録合三十三部六百七十六卷一萬二千一百七十七紙賢聖集録通大小乘合四十七部一百八十四卷二千七百六十紙右一録分為第六第七二卷歷代衆經分大小乘入藏録第三衆經律論傳合百一部三千三百六十一卷五萬六千一百七十紙三百二十六帙大乘經一譯一百四部六百八十五卷一萬一千四十三紙六十六帙大乘經重翻二百二部四百九十七卷七千二百九十紙四十九帙小乘經一譯一百八部一百一十四卷九百七十七紙六帙小乘律三十五部二百七十四卷五千八百一十三紙三十八帙大乘論七十四部五百二卷五十二帙九千百三十紙大乘論三十三部六百七十六卷一千一百七十七紙六十八帙賢聖集傳四十九部一百八十四卷一千八百八紙一十八帙右一録為第八卷撰録者曰尋此録數與次前録部卷有同者不同者同録出大乘律此合入經中又單重交雜歷代衆經舉要轉讀録第四謂轉讀尋玩務在要博繁本重義非曰被時故隨部撮與簡取通道自餘重本存而表暇大乘經正本二百五十四部七百九十五卷一萬三千七十九紙大乘律本二十部三十二卷四百三十紙大乘論本六十三部四百四十五卷八千一百一十五紙都合大乘經律論合三百三十七部千二百六十七卷二萬一千六百二十五紙小乘經合一百一十八部四百三十三卷六千七百一十三紙小乘律合三十五部一百七十四卷五千七百一十八紙小乘論合二十九部五百六十五卷九千九百九十七紙都合小乘經律論合一百八十二部一千二百五十二卷二萬二千四百二十八紙右一録為第九卷歷代衆經有目闕本録第五謂統撿群經校本則無隨方別出未能通明今別題目訪之歷代道俗述作注解録第六謂注述聖言用通未悟前已離顯未足申明今別題録歷代諸經支流陳化録第七謂別生諸經曲順時俗未通廣本且接初心一四句偈未可輕削故也歷代所出疑偽經論録第八謂正法緣遠凡愚未達隨俗下化有𫦾真宗若不標顯玉石斯濫歷代衆經録目始終序第九謂經録代出須識其源歷代衆經應感興敬録第十謂經翻東夏應感徵祥而有蒙祐增信心故使傳持惟遠右六録合為第十卷欲具委之恐繁故略內典録中宣律師云余少沐法流五十餘載宗匠成教軌範賢明每值經誥德能無不目閲親謁至於經部大録欣悟良多無論真偽思聞其異云云故魏晉之後騰譯鬱蒸制録討論居然非一或以數列或用名求或憑時代或寄參譯各紀一隅務存所見斯並當時稽古識量修明而綴撰筆削不至詳密者非為才不足而智不周也云上集群目取訊僧傳等文勘閲詳定便參祐房等録祐録徵據文義可觀然大小儡同三藏糅雜抄集參正傳記亂經拷撿始終莫能通決房録後出該瞻前聞然三寶共部偽真淆亂自餘諸録胡可勝言今余所撰望革前弊撰録者曰宣公所撰類例明審實有可觀作者之風見於茲矣然少有差雜未能盡善述作之事誠謂難哉今略序數科以詳厥誤非欲指陳臧否實惟甄異是非如人代存亡録中新小品等六經並云大品之同本者不然義理雖通據會全異而言同本一誤菩薩淨行經與寶髻菩薩經俱云竺法護譯此是一經兩名存其二本二誤弘道廣顯三昧經與阿耨達龍王經亦是一經兩名二本俱存三誤須彌藏經二卷此是高齊耶舍所翻前後重上四誤攝大乘論真諦譯者有十二卷本有十五卷成者二本俱存五誤般若鈔經大乘録中及集傳內二處俱載六誤又如分乘入藏録中深密解脫經前後重上前與菩薩處胎經同帙後與解深密經同帙七誤以舊十輪經為單本新十輪經為重譯八誤以起世經為單本樓炭經為重譯九誤此類非一不能備舉如舉要轉讀録中信力入印法門經雖是華嚴支類大部中無同於度世漸備等經攝歸大部不為轉讀之數一不然也諸部般若唯舉大品一經放光等九部云重沓罕尋舉前以統大義斯盡玉華後譯大般若者明佛一化有十六會得在供養難用常行今謂不然豈可以凡愚淺智而堰截法海乎人性不同所樂各異豈以自情好略令他同己見耶般若大經轉讀極衆佛記弘闡在東北方而言難用常行竊為未可又小品大品據會全殊一廢一興二不然也如須彌藏經等雖是大集別分大部中無攝而不行理為未當又須彌藏經前則攝歸大集後則別舉流行前後差殊三不然也如樓炭經等攝入長含起世一經別令轉讀起世之與樓炭經梵本何殊一廢一興四不然也如安般守意與大安般無殊此乃何緣二俱轉讀五不然也如十八部論與部異執梵本不殊此復何緣俱令轉讀六不然也又云録外有外道金七十論破外道涅槃論破外道四宗論未暇若闕者如金七十論外道所撰非是佛法除之可然涅槃四宗同彼刪削將為未可此是內論破於外宗一例刪除七不然也又如人代存亡録及舉要轉讀録大乘録中三藏備見入藏録中大乘無律豈可前後俱有中間獨無自為矛盾八不然也如上所列非無乖舛而云革弊或所未然差錯極多卒難陳委明達之輩幸自詳焉續大唐內典録一卷開元庚午歲西崇福寺沙門智升撰歷代衆經傳譯所從録從麟德元年甲子至開元十八年庚午前録未載今故録之大唐古今譯經圖紀四卷大慈恩寺翻經沙門靖邁撰大慈恩寺翻經堂內壁畫古今翻譯圖變靖邁因撰題之于壁但略費長房録翻經之者紀之餘撰集者不録逮至皇朝總成四卷房所錯者此亦同然更欲廣陳恐繁故止續古今譯經圖紀一卷開元庚午歲西崇福寺沙門智升撰從奘法師後至輪波迦羅前紀未載今故續之大周刊定衆經目録十五卷天后天册萬歲元年乙未敕東都佛授記寺沙門明佺等撰定大小乘經律論及賢聖集傳合三千六百一十六部八千六百四十一卷其見定入藏流行部卷不在此數大乘單譯經目卷第一三百八十三部五百二十五卷大乘重譯經目之一卷第二一千七十八部一千三百九十四卷大乘重譯經目之二卷第三一百六十八部三百三十八卷大乘重譯經目之三卷第四一百八十部四百二十一卷大乘重譯經目之四卷第五一百六十八部三百六十五卷大乘律大乘論目卷第六一百六十二部七百一十六卷小乘單譯經目卷第七二百二十八部三百一十卷小乘單譯經目之一卷第八三百七十一部八百四十二卷小乘重譯經目之二卷第九二百七十九部三百八十一卷小乘律論賢聖集傳目卷第十一百九十四部一千三百十一卷大小乘失譯經目卷第十一三百七十七部五百八卷大小乘闕本經目卷第十二四百七十八部六百七十七卷見定入藏流行目上卷第十三見定入藏流行目下卷第十四合大小乘三藏及賢聖集傳等八百七十四部四千二百五十三卷上卷入藏大乘經律論五百六十三部二千五百三十二卷下卷小乘經律論及集傳二百九十九部一千六百二十卷大乘經四百六十二部一千九百六十三卷一百九十六帙大乘律二十三部四十九卷五帙大乘論八十八部五百二十卷五十一帙已上為入藏録上卷小乘經二百七部四百四十三卷四十四帙小乘律三十五部二百六十卷二十八帙小乘論三十六部七百四十卷七十三帙賢聖集傳二十一部四十一卷四帙已上為入藏録下卷細算都部卷數與卷中數並差互不同未定本偽經目録一卷二百二十八部四百一十九卷右兼偽經録總一十五卷撰録者曰當刊定此録法匠如林德重名高未能親覽但指揮末學令緝撰成之中間乖失幾將太半此乃委不得人過在於使能也且如第十二卷闕本經數總四百七十八部六百七十七卷前十一卷中以含有訖今通計此總成五千六百一十六部八千六百四十一卷者此不然也妄增部卷推實即無諸餘交雜難可備記刪繁録中已述多少更欲細委恐繁故止
