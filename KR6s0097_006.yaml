body:
  text: 西京西明寺沙門圓照撰總集群經録上之六秦姚氏都常安亦云後秦起姚萇諡為照武皇帝白雀元年甲申至姚泓兼諡永和三年丁巳凡經三主三十四年沙門五人所出經律論等總九十四部合六百二十四卷於中六十六部五百二十八卷見在二十八部九十六卷闕本準大智度論後記云弘始三年歲在辛丑王圭云歲在辛丑房及甄鸞差其二載今依道圭為正次第排之姚秦沙門竺佛念一十二部七十四卷經律集沙門鳩摩羅什七十四部三百八十四卷經律論集沙門弗若多羅一部五十八卷律沙門佛陀耶舍四部八十四卷經律沙門曇摩耶舍三部二十四卷經律十住斷結經十卷初云最勝問菩薩十住除垢斷結經一名十千日光三昧定亦云十地斷結或十一卷或十四卷第二出見二秦録高僧傳僧祐録菩薩瓔珞經十二卷一名現在報第二出或十二卷或十四卷或十六卷符秦建元十二年七月出見二秦録高僧傳祐録菩薩處胎經五卷初云菩薩從兜術天降神母胎説廣菩薩亦直云胎經或四卷或八卷見二秦録高僧傳祐録中陰經三卷見秦録高僧傳僧祐録菩薩瓔珞本業經二卷或直云瓔珞本業經初出見長房録鼻奈耶律十卷一名試因緣經亦云鼻奈耶經亦云戒果因緣經沙門曇景筆受佛念傳譯見安公經序符秦建元十四年壬午正月十二日出出曜經二十卷亦云出曜論或十九卷符秦建元十年出見二秦録高僧傳僧祐寶唱等録已上見在已下闕持人菩薩經三卷第二出與法護持人羅什持世同本見長房録大方等無相經五卷亦名大雲經或四卷與曇無讖方等大雲同本初出見長房録菩薩普處經三卷見長房録十誦比丘尼戒所出本末一卷第三出僧純於物夷國得梵本佛念為譯文煩後竺伏刪改正之并製序見寶唱録王子法益壞目因緣經一卷或云阿育王息壞目因緣經第三出見僧祐録右一十二部七十四卷出曜上七部六十一卷見在持人下五部十三卷闕本沙門竺佛念涼州人弱年出家志業清堅外和內朗有通敏之鑒諷習衆經粗涉外典其蒼雅詁訓尤所明練少好遊方備觀風俗家世西河洞曉方語華戎音義莫不兼釋故義學之譽雖闕洽聞之聲甚著符氏建元年中有曇摩持鳩摩羅佛提僧伽跋澄提婆難提等來入長安安公趙政等請出衆經當時名德莫能傳譯衆咸推念以為明匠自安高支謙之後莫踰於念在符姚二代為譯人之宗故關中僧衆咸共喜焉念於符姚二代自譯十住斷結等經一十二部長房録中別存十地斷結經十一卷者非也住之與地二義無別今存十住十地刪之後遘疾卒于常安遠近白黑莫不歎惜摩訶般若波羅蜜經四十卷亦名大品般若經祐云新大品經第三出與放光等同本或三十卷或二十四或二十七弘始元年癸卯四月十三日出至六年四月二十二日訖睿序見二秦及僧祐録小品般若波羅蜜經十卷題云摩訶般若波羅蜜無小品字祐云新小品經與道行明度等同本第七譯或七卷或八卷弘始十年二月六日出至四月三日訖睿序見二秦録及僧祐金剛般若波羅蜜經一卷亦云金剛般若經佛在舍衛國者初出與元魏留支等出者同本見二秦録及僧祐録仁王護國般若波羅蜜經二卷亦云仁王般若經或云一卷第二出與晉世法護梁朝真諦譯者同本異出房云見別録摩訶般若波羅蜜大明呪經一卷亦云摩訶大明呪經初出與唐譯般若心經等同本見經題上菩薩藏經三卷一名富樓那問經亦名大悲心經今編入寶積當第十七會名富樓那會弘始七年出或二卷第二譯與法護出同本見二秦録及祐録善臂菩薩經二卷今編入寶積當第二十六會見法上録須摩提菩薩經一卷第二出與寶積妙慧等同本見長房録自在王菩薩經二卷或無菩薩字初出與奮迅王經同本弘始九年於尚書令姚顯等出僧睿筆受并製序見二秦録及僧祐莊嚴菩提心經一卷第四出與法護菩薩十地經等同本房云見別録十住經四卷或五卷是華嚴十地品異譯什與佛陀耶舍共出見二秦録及僧祐録妙法蓮華經八卷僧祐録云新法華經初出為七卷二十七品後人益天授品二十八品弘始八年夏於大寺出僧睿筆受并製序第五譯見二秦録及僧祐録維摩詰所説經二卷一名不可思議解脫或直云維摩詰經僧祐録云新維摩詰弘始八年於大寺出僧肇筆受并製序第六譯見二秦録及僧祐録大樹緊那羅王所問經四卷亦名説不可思議品或直云大樹緊那羅經第二出與支讖純真陀羅經同本見長房録集一切福德三昧經三卷與竺法護等集衆德經等同本異出第二譯見真寂寺録思益梵天所問經四卷或直云思益經僧祐云思益義經弘始四年十二月一日於逍遙園出第二譯與舊譯持心留支勝思並同本僧睿製序見二秦録及僧祐録持世經四卷一名法印經或三卷第二出與法護持人經等同本見二秦録及僧祐録諸法無行經二卷或一卷與隋崛多諸法本無經等同本初出見二秦録及僧祐録阿彌陀經一卷亦名無量壽經弘始四年二月八日譯初出與唐譯讚淨土經等同本見二秦録及僧祐録彌勒成佛經一卷第二出與法護彌勒成佛經同本弘始元年出見秦録及僧祐録彌勒下生經一卷一名彌勒受決經初云大智舍利弗第四出與彌勒來時經同本亦云彌勒成佛經亦云下生成佛或云當下成佛見二秦録及僧祐録文殊師利問菩提經一卷亦直云菩提經一名伽耶山頂經一名菩提無行經初出與伽耶山頂經象頭精舍經等同本見僧祐録譯經圖中別載菩提經一卷者誤也孔雀王呪經一卷第四出亦名大金色孔雀王經在逍遙園出并結界場法悉備具房云見別録首楞嚴三昧經三卷或二卷亦直云首楞嚴經僧祐云新首楞嚴經第九出與方等首楞嚴勇伏定經等同本見僧祐録不思議光菩薩所問經一卷亦名不思議光菩薩所説經亦云無思議光孩童菩薩經第二出與竺法護無思議孩童經同本見長房録華手經十三卷或為華首一名攝諸善根經亦名攝福德經或十一卷或十二卷弘始八年譯見二秦録及僧祐録佛垂般涅槃略説教誡經一卷亦云佛臨般一名遺教經見僧祐録千佛因緣經一卷見法上録梵網經二卷一名選擇諸法經或三卷或二弘始七年六月十二日出見二秦録及僧祐録十戒僧肇筆受見經前序佛藏經四卷一名選擇諸法經或三卷或二卷弘始七年六月十三日出見二秦録及僧祐録清淨毗尼方廣經一卷與文殊淨律等同本第三出見法上録大智度論一百卷或云大智度經論亦云摩訶般若釋論或七十卷或一百一十卷弘始四年夏於逍遙園出七年十二月二十七日訖睿製序見二秦及僧祐録中論四卷亦云中觀論或八卷弘始十一年於大寺出僧睿製序見二秦録及僧祐録兼前智度論並龍樹菩薩造十二門論一卷龍樹菩薩造弘始十一年於大寺出僧睿製序見僧祐録及寶唱録百論二卷提婆菩薩造弘始六年出僧肇製序見二秦録及僧祐録十住毗婆沙論十四卷或無論字龍樹菩薩造或十二卷或十五卷見長房録大莊嚴論十五卷或無論字馬鳴菩薩造或十卷見長房録發菩提心論二卷或云發菩提心經亦云經論見李廓録放牛經一卷亦云牧牛經出增一阿含第四十六卷異譯房云見別録海八德經一卷第三出與法海經等同本見法上録禪祕要經三卷或云禪祕要法無經字或四卷與支謙等出者同本第二出房云見別録燈指因緣經一卷見李廓録十誦比丘戒本一卷亦云十誦波羅提木叉戒第三出與曇摩持等出者同本見僧祐録成實論二十卷或二十四或二十七或十六或十四弘始十三年九月八日尚書令妙顯請出至十四年九月十五日訖曇晷筆受佛後九百年訶梨跋摩造見僧祐録坐禪三昧經三卷一名菩薩禪法經初出或直云禪經或云禪法要或云阿蘭若習禪法三名同是一本弘始四年正月十五日出至九年閏月五日重校正僧睿序見二秦僧祐寶唱三録菩薩呵色欲法一卷或云菩薩呵色欲經或直云菩薩呵色欲初出見僧祐録禪法要解二卷或云禪要經初出見僧祐録思惟略要法一卷或云思惟要略法經或直云思經第二出見長房録雜譬喻經一卷弘始七年十月出道略集馬鳴菩薩傳一卷見長房録龍樹菩薩傳一卷見長房録提婆菩薩傳一卷見長房録法界體性無分別經二卷與寶積法界體性會同本初出見法上録後此下闕大善權經二卷與寶積大乘方便會等同本第四出見李廓録大方等大集經三十卷或加新字或二十四卷與支讖無讖所出者同本見二秦録及李廓録大方等頂王經一卷與法護等出者同本第二出見長房録阿闍世經二卷與支讖等出者同本第五譯房云見別録睒本起經一卷亦直云睒經出六度集經異譯第二出見李廓録請觀世音經一卷初出與竺難提出者同本見李廓録寶網經一卷第二出與法護出者同本見李廓録稱揚諸佛功德經三卷一名集華經初出弘始七年譯見二秦録及僧祐録觀普賢菩薩經一卷第二出見李廓録未曾有因緣經二卷初出見法上録賢劫經七卷第二出弘始四年三月五日出與法護譯者同本曇恭筆受見三秦録及僧祐録一名賢劫三昧經一名賢劫定意經凡三名祐録云新賢劫經善信摩訶神呪經二卷見李廓録持地經一卷見長房録觀佛三昧經一卷見長房録菩薩戒本一卷初出見長房録今疑此菩薩戒本即梵網一卷也文殊悔過經一卷第二出見長房録舍利弗悔過經一卷第三出見法上録十住論十卷龍樹菩薩造弘始年譯未訖第十卷末似六度集見二秦録及僧祐録今疑此十住論即十住婆沙是撿諸罪福經十卷房云見別録十二因緣觀經一卷見長房別録婆藪盤豆傳一卷初出見翻經圖右七十四部三百八十四卷提婆菩薩傳上五十二部三百二卷見在法界體性經下二十二部八十二卷闕本沙門鳩摩羅什秦言童壽一名鳩摩羅耆婆外國製者多以父母為本什父鳩摩炎母字耆婆故兼取為名天竺人也家世國相什祖父達多倜儻不群名重於國父鳩摩炎聰明有懿節將嗣相位乃辭避出家東度蔥嶺龜茲王聞其棄榮捨俗甚敬慕之自出郊迎請為國師王有妹年始二十才悟明敏過目必能一聞則誦且體有赤黶法生智子諸國娉之並不肯行及見炎心欲當之王聞大喜逼以妻焉遂生於什什之在胎其母慧解倍常往雀梨大寺聽經忽自通天竺語難問之辭必窮問致衆咸歎異有羅漢摩瞿沙曰此必懷智子為説舍利弗在胎之證既而生什岐嶷若神什生之後還忘前語頃之其母出家修道學得初果什年七歲亦復出家從師受經日誦千偈偈有三十二字凡三萬二千言誦此毗曇既過師授其義即自通解無幽不暢時龜茲國人以其母王女利養甚多乃携什避年九歲進到罽賓遇名德法師槃頭達多即罽賓王之後弟也淵粹有大量三藏九部莫不縷貫亦日誦千偈名播諸國什既至仍師事之遂誦雜藏中長二阿含凡四百萬言達多每與什論議深推服之聲徹於王王即請入集外道論師共相攻難言氣始交外道輕其幼稚言頗不順什乘其隙而挫之外道折服愧惋無言王益敬異日給鵝臘一雙粳麵各三斗酥六舛此外國之上供也所住寺僧乃差大僧五人沙彌十人營視灑掃有若弟子其見尊崇如此至年十二其母携還龜茲至月氏北山有一羅漢見而異之謂其母言常當守護此沙彌若至三十五不破戒者當大興佛法度無數人與優波毱多無異若戒不全無能為也正可才明俊詣法師而已什進到沙勒國頂戴佛鉢心自念言鉢形甚大何其輕耶即重不可勝失聲下之母問其故答曰我心有分別故鉢有輕重耳什於沙勒國誦阿毗曇六足諸門增一阿含及還龜茲名蓋諸國時龜茲僧衆萬餘人疑非凡夫咸推而敬之莫敢居上由是不預燒香之次遂博覽四韋陀五明諸論外道經書陰陽星算莫不究曉妙達吉凶言若符契為性率達不厲小撿修行者頗非之什自得於心未嘗介意從卑摩羅叉學十誦律又從須利耶蘇摩咨稟大乘乃歎曰昔學小乘譬人不識金以鍮石為妙矣於是廣求義要誦中百二論及十二門等有頃什母辭往天竺謂龜茲王白純曰汝國尋衰吾其去矣行天竺進登三果什母臨去謂什曰方等深教應大闡真丹傳之東土唯爾之力但於自身無利其可如何什曰大士之道利彼亡軀若必使大化流傳洗悟曚俗雖復身當爐鑊苦而無恨於是留住龜茲止王新寺得大品經始就讀魔來蔽文唯見空牒什知魔所為誓心逾固魔去字顯仍習誦之後於雀梨大寺讀大乘經忽聞空中語曰汝是智人何以讀此什曰汝是小魔宜時速去我心如地不可轉也停住三年廣誦大乘經論洞其祕奧龜茲王為造金師子座以大秦錦褥鋪之令什坐而説法後往罽賓為其師槃頭達多具説一乘妙義師感悟心服即禮什為師言我是和上小乘師和上是我大乘師矣西域諸國服什神俊咸共嵩仰每至講説諸王長跪座側令什踐而登焉其見重如此什道震西域聲被東國苻氏建元十三年歲次丁丑正月太史奏有星見外國分野當有大德智人入輔中國堅素聞什名乃悟曰朕聞西域有鳩摩羅什將非此耶十九年堅遣驍騎將軍呂光等率兵七萬西伐龜茲及焉耆諸國臨發謂光曰聞彼有鳩摩羅什深解法相善間陰陽為彼學之宗朕其思之若剋龜茲即馳驛送什光軍未至什謂其王白純曰國運衰矣當有勍敵日下人從東方來宜恭承之勿抗其鋒純不從而戰光遂破龜茲殺純獲什光性疏慢未測什智量見其年尚少乃凡人戲之什被逼既至遂虧其節或令騎牛及乘惡馬欲使墮落什常懷忍辱曾無異色光慚愧而止光還中路置軍於山下將士已休什曰不可在此必見狼狽宜徙軍隴上光不納至夜果雨洪潦暴起水深數丈死者數千光甚加敬異什謂光曰此凶亡之地不宜淹留推數揆運應速言歸中路必有福地可居光從之至涼州聞符堅已死遂割據涼土制命一隅焉什停涼積年數言未然後皆如説呂光父子既不弘道故蘊其經法無所宣化符堅已亡竟不相見姚萇聞其高名虛心要請諸呂以什智計多解恐為姚謀不許東入萇卒子興諡為文祖皇帝襲位復遣敦請弘始三年歲次辛丑三月有樹連理生于廟庭逍遙一園蔥變為以為美瑞謂智人應入其年十二月二十日什至常安興待以國師之禮甚見優寵悟言相對則淹留終日研微造盡則窮年忘倦自大法東被始於漢明歷涉魏晉經論漸多而支竺所出多滯文格義興少崇三寶鋭志講集什既至止仍請入西明閣及逍遙園譯出衆經什率多暗誦無不究達轉解秦言音譯流利既覽舊經義多乖謬皆由先譯失旨不與梵本相應興使沙門僧肇僧䂮僧邈僧睿等八百餘人咨受什旨更令出大品什持梵本興執舊經以相讎校其新文異舊者義皆圓通衆皆愜服莫不欣讚焉興以佛道沖邃其行惟善信出苦之梁津仰世之洪則故託意九經遊心十二乃著通三世論以勗示因果王公已下並欽贊厥風興宗室常山公顯安成侯嵩並篤信緣業屢請什於常安大寺講説新經什以弘始四年壬寅至十四年壬子譯大品小品金剛等經七十四部三百八十餘卷並暢顯神源發揮幽致于時四方義學沙門不遠萬里名德秀拔者才暢二公乃至道恆僧標慧睿僧敦僧弼僧肇等三千餘僧稟訪精研務窮幽旨廬山慧遠道業沖粹乃遣使循問龍光道士慧解洞微亦入關咨稟盛業久大至今仰則焉初沙門慧睿才識高明常隨什傳寫什每為睿論西方辭體商略同異云天竺國俗甚重文藻其宮商體韻以入絃為善凡覲國王必有讚德見佛之儀以歌歎為尊經中偈頌皆其式也但改梵為秦失其藻蔚雖得大意殊隔文體有似嚼飯與人非徒失味乃令人歐噦也什當作頌贈沙門法和云心山育德薰流芳萬由延哀鸞鳴孤桐清響徹九天凡為十偈辭喻皆爾什雅好大乘志存敷演嘗歎曰吾若著筆作大乘阿毗曇非迦旃延子比也今在秦地深識者寡折翮於此將何所論乃悽然而止唯為姚興著實相論二卷出言成章無所刪改辭喻婉約莫非淵奧什為人神情映徹傲岸出群應機領會鮮有其匹且篤性仁厚泛愛為心虛己善誘終日無倦時有沙門僧睿興甚喜焉什所譯經睿並參正昔竺法護出正法華受決品云天見人人見天什譯經至此乃言曰此語與梵本義同但在言過質睿應聲曰將非人天交接兩得相見乎什大喜曰實然而睿與什共相開發皆此類也嘗聽秦僧道融講法華什乃歎曰佛法之興融其人也俄而師子國有婆羅門聰辨多學西土俗書罕不披誦而彼國外道之宗聞什在關大行佛法乃即慨然謂其徒曰寧可偏使釋氏之風獨傳震旦而今吾等正化之典不洽東國因遂乘駝負書遠涉來入常安姚興見其口眼便僻頗亦惑之而婆羅門乃啓興曰至道無方各尊其事今故遠來請與秦僧捔其辨力隨有優者即傳其化興即許焉于時關中四方僧衆相視缺然莫敢當者什謂融曰此之外道聰明殊人捔言必勝豈可得使無上大道在於吾徒為彼而屈良可悲矣若使外道肆情得志則是我等法輪摧軸豈可然乎如吾所覩在君一人道融自顧才力不減而彼西域外道經書未盡披讀乃密令人寫婆羅門所讀經目一披即誦其後剋日將就論義姚興自出公卿皆會關中僧衆四遠必集爾時道融與婆羅門擬相酬抗鋒辨飛玄彼所不逮時婆羅門雖自覺知辭理已屈然意猶以廣讀為夸道融乃列其所書并更通論秦地經史名目卷部三倍多之什仍乘勢因嘲之曰君可不聞大秦廣學那忽輕爾遠來婆羅門心生愧伏頂禮融足旬日之中無何而去像運再顯鳩摩羅什道融力焉又杯渡比丘在彭城聞什在常安乃歎曰吾與此子戲別今三百餘年杳然未期遲有遇於來生耳什臨終力疾與衆僧告別曰因法相遇殊未盡伊心方復異世惻愴何言自以暗昧謬充傳譯若所傳無謬焚身之後舌不燋爛以弘始十五年四月十三日薨于大寺春秋七十即於逍遙園依外國法焚尸薪滅形化唯舌不變信弘法之有徵矣什公卒時諸記不定高僧傳云弘始十一年八月二十日卒于常安或云七十或云八十傳取十一為正此不然也準成實論後記云大秦弘始十三年歲次豕韋九月八日尚書令姚顯請出論至來年九月十五日訖準此十四年末什仍未卒又準僧肇上秦主姚興涅槃無名論表云肇在什公門下十有餘載若什四年出經十一年卒始經八載未滿十年云何乃言十有餘載今準什誄癸丑之年四月十三日薨其癸丑歲即弘始十五年也然什出經部卷衆説多小不同長房録中其數彌廣今細參驗多是別生或有一本數名或是錯上具件如左今悉刪之十誦律六十一卷僧祐録云是什譯出今以有五十八卷是什度語非什正翻後之三卷卑摩羅叉續出置之於後已修餘録此不存之放光般若波羅蜜經二十卷第二出見別録今以放光梵本與大品同譯大品時興舊經什出新本若言放光什譯舊經何者是耶故知大品為新放光為舊重載二本誤之甚也般若經論集二十卷房云見吳録今與此集乃是廬山遠法師以大智論文句繁積初學難尋乃刪煩剪亂今質文有體撰為二十卷亦云大智論要略亦云釋論要抄此乃遠公撮略前論非什別翻也禪法要三卷下法云先譯弘始九年重挍睿製序既云先譯重挍不合存其二名準僧睿經序即坐禪三昧經是阿蘭若習禪法經二卷房云見別録或無經字與坐禪同本異出今謂不然此即坐禪三昧之別名也尋其文句首末文同是初出本非挍正者樂瓔珞莊嚴經一卷房云見李廓録今準經後記乃是曇摩耶舍所譯非什翻也今移附彼録寶相論一卷高僧傳云二卷什為姚興譯出非梵本傳故闕之也往古性和佛國願行法典經或作生和出文殊佛土嚴淨經佛磬咳徹十方經佛齊化出菩薩經魔業經過去無邊光淨佛土經虛空藏菩薩問持經得幾功德經亦云得幾福經過魔法界經太白魔王堅信經佛弟子化魔子偈誦經開化魔經魔王變身經佛磬咳下十經遂出大集觀世音經出法華經陀羅尼法門六種動經彌勒菩薩本願待時成佛經佛變時會身經東方善華世界佛座震動經陀羅尼等四經並出悲華經雀王經佛昔為鹿王經菩薩身為鴿王經雀王等三經並出六度集無量樂佛土經亦云國土出央崛經佛問阿須倫大海有減經出中阿含佛迹見千輻輪相經出雜阿含佛心總持經水牛王經兔王經佛心等三經並出生經獼猴與婢共獻致變經王后為𧏙蜋經獼猴等二經並出雜譬喻比丘應供法行經祐録入疑經今亦在疑録已上都有三十五部一百三十六卷十誦律五十八卷弘始六年十月十七日於中寺譯見二秦録右一部五十八卷本在沙門弗若多羅秦言功德華罽賓國人少出家以戒節見稱備通三藏而專精十誦律部為外國師宗時人咸謂已階聖果以弘始中振錫入關秦主興待以上賓之禮羅什亦挹其戒範厚相崇敬先是經法雖傳律藏未闡聞多羅既善斯部咸共思慕以弘始六年甲辰十月十七日集義學沙門六百餘人於常安寺迎請多羅誦出十誦梵本羅什譯為秦文三分獲二多羅遘疾奄然棄世衆以大業未卒而匠人殂往悲恨之深有踰常痛次有西域沙門曇摩流支秦云法樂棄家入道偏以律藏馳名以弘始七年秋達自關中廬山釋慧遠聞支既善毗尼希得究竟律部乃遣書通好曰佛教之興先行上國自分流以來四百餘年至於沙門得戒所闕尤多頃西域道士弗若多羅是罽賓人其諷十誦梵本有羅什法師通才博見為之傳譯十誦之中文始過半多羅早喪中途而寢不得究竟大業慨恨良深傳聞仁者齎此經自隨其欣所遇冥運之來豈人事而已耶想弘道為物感時而動叩之有人必情無所吝若為律學之徒畢此經本開示梵行洗其耳目使始涉之流不失無上之津梁懷勝業者日月彌朗此則惠深德厚人神同感矣幸願垂懷不乖往意流支既得遠書及姚興請乃與什共譯十誦都畢研詳考覆條制審定而什猶恨文煩未善既而什化不獲刪治流支住常安大寺慧觀欲請往揚都支曰彼土有人有法足以利世吾當更行無律教處於是遊化餘方莫知所之虛空藏菩薩經一卷初出或無菩薩字與虛空字經同本是大集別分三藏後還國於罽賓得此經附商人送到涼州見道慧宋齊録及僧祐長阿含經二十二卷弘始十四年出至十年訖涼州沙門竺佛念傳譯秦國沙門道含筆受僧肇製序見僧睿二秦及僧祐録高僧傳等四分律六十卷亦云曇無德律本譯四十五卷或云四十卷或云四十四卷今亦有七十卷者弘始十年於中寺出慧辨譯肇製序見晉世雜録及祐録高僧傳等四分僧戒本一卷或無僧字亦云無德戒本見晉世雜録及僧祐録右四部八十四卷其本並在沙門佛陀耶舍秦言覺名或云覺稱耶舍是名稱義高僧傳中翻為覺明義稍乖也罽賓國人婆羅門種世事外道有一沙門從其家乞其父瞋怒令人歐之父遂手腳攣躄不能行止乃問於筮師筮師對曰坐犯賢人鬼神使然也即請此沙門竭誠悔過數日便瘳因令耶舍出家為其弟子時年十三嘗隨師遠行於曠野逢虎師欲走避耶舍曰此虎已飽必不侵人俄而虎去前行果見餘肉師密異之至年十五誦經日得五六萬言所住寺常於外分衛廢於誦習有一羅漢重其聰敏恆乞食供之十九誦大小乘經數百萬言然性簡傲頗以知見自處謂少堪己師故不為諸僧所重但美儀止善談笑見者忘其深恨年及受戒莫為臨壇所以向立之歲猶為沙彌乃從其舅學五明諸論世間法術多所通習二十有七方受具戒恆以讀誦為務手不釋牒每端坐思義不覺虛中而過其專精如此後至沙勒國時太子達摩弗多秦言法子見其容貌端雅問所從來耶舍酬對清辨太子悅之仍請宮內供養待遇隆厚羅什後至從其受學甚相尊敬什隨母東歸耶舍留止頃之王薨太子即位時符堅遣呂光攻龜茲龜茲急求救於沙勒王自率兵救之使耶舍留輔太子委以後任救軍未至而龜茲已敗王歸具説羅什為光所執乃歎曰我與羅什相遇雖久未盡懷抱其忽羈虜相見何期停十餘年王薨因至龜茲法化甚盛時什在姑臧遣信要之裹糧欲去國人請留復停歲餘後語弟子云吾欲尋羅什可密裝夜發勿使人知弟子曰恐明旦追至不免復還耳耶舍乃取清水一鉢以藥投中呪數十言與弟子洗足即便夜發比至旦行數百里問弟子曰何所覺耶答曰唯聞疾風之響眼中淚出耳耶舍又與呪水洗足住息明旦國人追之已差數百里不及行達姑臧而什已入常安什聞其至姑臧勸興迎之興未納頃之命什譯出經藏什曰夫弘宣法教宜令文義圓通貧道雖誦其文未善其理唯佛陀耶舍深達經致今在姑臧願下詔徵之一言三詳然後著筆使微言不墜取信千載也興從之即遣使招迎厚加贈遺悉不受重信敦喻方至常安興自出候問別立新省於逍遙園四事供養並不受至時分衛一食而已于時羅什出十住經一月餘日疑難猶預尚未操筆耶舍先至共相徵決辭理方定道俗三千餘人皆歎其賞要舍為人髮赤善解毗婆沙故時人號曰赤髭毗婆沙既為羅什之師亦稱大毗婆沙四輩供養衣鉢臥具滿三間屋不以關心興為貨之於城南造寺耶舍先誦曇無德律司隸校尉姚爽或云姚奭請令出之興疑其遺謬乃試耶舍令誦羌籍藥方各四十餘紙三日乃執文覆之不誤一字衆服其強記即以弘始十年戊申譯四分律并長阿含等經十五年癸丑方訖涼州沙門竺佛念譯為秦言道含筆受譯畢解坐興嚫耶舍布絹萬匹悉皆不受佛念道含布絹各千匹名德沙門五百人皆重嚫施耶舍後還罽賓不知所終四分序云壬辰之年有晉國沙門支法領西越流沙遠期天竺路經于闐會遇曇無德部體大乘三藏沙門佛陀耶舍才體傳聞明練經律三藏方等皆諷誦通利即於其國廣集諸經於精舍還以歲在戊申始達秦國秦主姚欣然即以其年請出律藏時集持律沙門三百餘人於長安中寺出即以領弟子慧辨為譯其壬辰年即秦建初七年也戊申歲即弘始十年也又有説云耶舍與佛念等勘法領所將梵本然後翻出衆説少殊未詳孰正又準僧肇長阿含序及高僧傳並云四分弘始十二年出者此或據部終時説也差摩經一卷東晉隆安年達廣州在白沙寺為清信女張普明譯此應入晉録隨入附秦見高僧傳及長房録樂瓔珞莊嚴方便品經一卷一名轉女身菩薩問答經第三出與法護順權方便經等同本李廓録云羅什譯準經記云耶舍出故移編此舍利弗阿毗曇論二十二卷或無論字或二十卷或三十卷共曇摩崛多於石羊寺出釋道標製序見僧祐寶唱二録及高僧傳右三部三十四卷初一部一卷闕本後二部二十三卷見在沙門曇摩耶舍秦言法稱高僧傳翻為法明義乖也罽賓國人少而好學年十四為弗若多羅所知長而氣幹高爽雅有神慧該覽經律明悟出群陶思八禪遊心七覺時人方之浮頭婆馱孤行山澤不避虎兕獨處思念動移宵日嘗於樹下每自剋責年將三十尚未得果何其懈哉於是纍日不寢不食專精苦到以悔先罪乃夢見博叉天王語之曰沙門當觀方弘化曠濟為懷何守小節獨善而已道假衆緣復須時熟非分強求死而無證覺自思惟欲遊方授道既而踰歷諸國冒涉艱危以晉隆安中初達廣州住白沙寺耶舍善誦毗婆沙律人咸號為大毗婆沙時有清信女張普明咨受佛法耶舍為説佛生緣起并為譯出差摩經一卷至義熙中來入常安時姚興僭號甚崇佛法耶舍既至深加禮異會有天竺沙門曇摩崛多秦言法藏來入關中同氣相求宛然若舊因共出舍利弗阿毗曇以秦弘始九年丁未書出梵文停至十六年甲寅經師漸間秦語令自宣譯至十七年乙卯方訖凡二十二卷秦太子泓親管理味沙門道標為之作序又出樂瓔珞經一卷耶舍後南遊江陵止于辛寺大弘禪法其有味靖之賓披榛而至者三百餘人凡士庶造者雖先無信心見皆敬悅自説有一師一弟子修業並得羅漢傳失其名又嘗於外門閉戶坐禪忽有五沙門來入其室又時見沙門飛來樹端者往往非一常交接神明而俯同矇俗雖道迹未彰時人咸謂已階聖果至宋元嘉中辭還西域而不知所終秦乞伏氏都菀川亦云西秦從乞伏國仁諡宣列王建義元年乙酉至乞伏慕末無諡永弘四年辛未凡經四主四十七年沙門一人所譯經及三秦代新舊失譯經律論等總五十六部一百一十卷於中三十二部七十九卷見在二十四部三十一卷闕本乞伏秦沙門釋聖堅一十五部二十四卷經三秦代新舊失譯經四十一部八十六卷七部七卷舊集三十四部七十九卷新附羅摩伽經三卷見華嚴入法界品少分異譯見內典録太子須大拏經一卷出六度集第二卷異譯於江陵辛寺出庾爽筆受或云須達拏見始興録及寶唱録應入晉出隨附秦睒子經一卷一名孝子睒經一名菩薩睒經一名佛説睒經一名睒本經一名孝子隱經凡六名第四出六度集第二卷異譯見始興及法上録摩訶剎頭經一卷亦名灌佛形像亦直云灌佛經第二出與灌洗佛形像同本見始興録無崖際持法門經一卷一名無際經初出與尊勝菩薩所問經等同本見始興録及法上録演道俗業經一卷第二出與支謙譯者同本見法上録除恐災患經一卷第二出與帛延譯者同本見始興寶唱法上三録賢首經一卷一名賢首夫人經見始興録阿難分別經一卷亦名阿難問事佛吉凶經第三出見始興録及法上録婦人遇辜經一卷一名婦遇對經見始興法上二録上見在已下闕方等主虛空藏經八卷亦名虛空藏所問經一名勸發菩薩莊嚴菩提經或五卷是大集虛空藏品異譯見晉世雜録及法上録云與羅摩伽經同本非也菩薩所生地經一卷一名摩竭所問經第二出見趙録未知前後趙隨人附西秦見始興録孛經一卷第三出見法上録僮迦葉解難經一卷亦云童迦葉經與鳩摩迦葉經同本祐云出長阿含庾爽筆受見始興王宗寶唱支敏度等四録七女本經一卷亦名女本心明經亦名七女經第三出見支敏度都録右一十五部二十四卷婦人遇辜上十部一十二卷見在方等王下五部一十二卷闕本沙門釋聖堅或云法堅亦謂堅公未詳孰是故備列之器量弘普利物為心以乞伏秦太初年間於河南國為乾歸諡武元王譯羅摩伽等經一十五部尋其聖堅遊化隨處出經既適無停所弗知附見何代世録為正今依法上總注入乞伏秦世録云沙彌羅經一卷第二出五母子經同本薩惒薩王經一卷阿多三昧經一卷或作阿陀陀賢王經一卷颰陀悔過經一卷方等決經一卷比丘二事經一卷祐録云三事上七部僧祐録云安公關中異經右七部七卷初沙彌羅經有本餘者並闕長房録云並是沙門僧祐三藏集録釋道安所記關中異經本今還附入三秦世録總為失譯時代處云房録復有胡本經四卷腳下注云似是長安中出後漢失譯録中已有此中復載既是重上刪之不存也已下新附此録天王太子辟羅經一卷或無天王字亦云太子辟羅經菩薩本行經一卷大珍寶積惟日經一卷墮迦羅問菩薩經一卷阿難為蠱道呪經一卷舊録云阿難為蠱道所呪經含疑是藏中摩鄧女經王舍城靈鷲山經一卷舊録云王舍城靈鷲山要直經思道經一卷佛在竹園經一卷法為人經一卷道意經一卷阿夷比丘經一卷八德經一卷今疑是海八德經善德經一卷摩訶揵陀惟衛羅盡信比丘等度經一卷舊録云盡信比丘經右一十四部一十四卷初太子譬羅經本有録者並闕僧祐録云安公關中異經長房等録並闕不載祐載安公關中異經總二十四卷於中七卷如房録中列今更出一十四經通有二十一部餘之三部長房等録皆標譯主故此闕之大寶積經一卷今編入寶積第四十三會改名普明菩薩會第二出與摩訶寶嚴佛遺日摩尼寶三經同本異譯度諸佛境界智光嚴經一卷初出與佛華嚴入如來德智不思議境界經等同本舊云與如來莊嚴智慧光明入一切佛境界經等同本者全乖也大悲分陀利經八卷亦云大乘悲分陀利經第二出與曇無讖悲華經等同本大金色孔雀王呪經一卷第五出佛説大金色孔雀王呪經一卷第六出二經同本大方廣如來祕密藏經二卷大周録云與大方等如來藏經同本者非也金剛三昧本性清淨不壞不滅經一卷亦名金剛清淨經長房等録云吳支謙譯後漢失譯中復載並非也今尋文句似秦時譯故移編此師子目佛本生經一卷長房等録云西晉竺法護譯今尋文句非是護公所出似秦代譯故移編此十吉祥經一卷一切智光明仙人慈心因緣不食由經一卷淨業障經一卷別譯雜阿含經二十卷出家功德經一卷非是賢愚抄出者毗尼母經八卷亦云毗尼母論薩婆多毗尼毗婆沙九卷三彌底部論三卷或無部字或云四卷辟支佛因緣論二卷十八部論一卷初出與部異執論等同本房等並云真諦譯者非也佛入涅槃密迹金剛力出哀戀經一卷無明羅剎集一卷亦云無明羅剎經或二卷右二十部六十五卷並是見入藏經似是秦時譯出數本經中並有秦言之字諸失譯録並未曾載今附此秦録庶免遺漏焉通前舊失譯經七部七卷及新附安公關中異經等總四十一部合八十六卷並為三秦失譯云前涼張氏都姑臧新上餘録無年依𮗞鸞録多從晉年號從張軌諡為武王永寧元年新譯至天錫秦封驃騎大將軍涼州牧咸安六年景子凡經八主七十六年外國優婆塞一人譯經四部合六卷於中一部一卷見在三部五卷闕本前涼優婆塞支施崙四部六卷經須賴經一卷第三出與曹魏白延吳支謙宋功德賢所出須賴同本見經後記咸安三年出如幻三昧經三卷第四出與安法護如幻三昧及寶積善住意會等同本見首楞嚴經後記咸安三年出上金光首經一卷第二出與晉法護大淨法門經隋耶舍大莊嚴法門經同本咸安三年出見首楞嚴經後記首楞嚴經一卷第八出與漢支謙吳支謙魏白延晉法護等所出首楞嚴同本咸安三年見經後記右四部六卷須賴經一部一卷見在如幻等三部五卷闕本優婆塞支施崙月支人也博綜衆經特善方等意在開化傳於未聞奉經來遊達於涼土張公見而重之請令翻譯以咸安三年癸酉從晉年號也於涼州內正廳堂後湛露軒下出須賴等經四部龜茲王世子帛延傳語常侍西海趙瀟會水令馬亦內待來恭政三人筆受沙門釋慧常釋進行同在會證涼州自屬辭不加文飾也出須賴經後記及首楞嚴經後記前涼之代應更出經後進遇之幸續編附北涼沮渠氏初都張掖後徙姑臧自蒙遜諡武宣王永安元年辛丑至茂虔魏封河西王承和七年己卯凡經二主三十九年緇素九人所出經律論等并新舊集失譯諸經總八十二部合三百一十卷於中二十五部二百九卷見五十七部一百二卷闕本沙門釋道龔二部一十二卷經沙門釋法衆一部四卷經沙門僧伽陀一部二卷經沙門曇無讖一十九部一百三十一卷經律集安陽候沮渠京聲一部二卷集沙門浮陀跋摩一部六十卷論沙門釋智猛一部二十卷經沙門釋道泰二部四卷論沙門釋法盛一部一卷經新舊諸失譯經五十三部七十五卷五部一十八卷舊集四十八部五十七卷新附寶梁經二卷今編入寶積第四十四會見竺道祖河西録及僧祐録悲華經十卷第一出與法護間居經及大悲分陀利曇無讖悲華經同本房云見祐録似是先譯龔更刪改今疑即無讖出者是右二部一十二卷前寶梁經一部二卷見在後悲華經一部十卷闕本沙門釋道龔虛心廣運弘利為道以北涼河西王蒙遜僭號永安年間於張掖為蒙遜譯寶梁等經二部大方等陀羅尼經四卷或無大字一名方等檀特陀羅尼經或直云檀特陀羅尼經見竺道祖晉世雜録及僧祐録右一部四卷其本見在沙門釋法衆高昌郡人亦以永安年中於張掖為河西王蒙遜譯大方等陀羅尼經一部寶唱録云在高昌郡譯未詳孰是慧上菩薩問大善權經二卷一名大善經一名慧上菩薩一名大乘方便經凡四名名本並同第五出與漢佛調晉法護所出大善權經及寶積大乘方便等同本右一部二卷本闕沙門僧伽陀涼言饒善西域人意存兼濟化誘居懷亦以永安年中於張掖為蒙遜譯大善權經一部見始興録及法上大般涅槃經四十卷或三十六卷第五譯玄始三年出至十年十月二十三日訖梵本具足有三萬五千偈今所譯者止萬餘偈三分始一耳道朗製序見竺道祖涼録及僧祐録大方等大集經三十卷或直云大集經第三出與漢世支讖姚秦羅什出者同本或二十九或三十一或三十二或四十卷良由初出即寫分卷不同見竺道祖涼録及僧祐録大方廣三戒經三卷初出與寶積三律儀會同本見法上録悲華經十卷第四出與大悲分陀利經等同本見竺道祖河西録及僧祐録祐云別録或云龔上出今疑道龔與讖同是一經二處先載恐未然也金光明經四卷初出一十八品見竺道祖河西録及僧祐録與新譯金光明最勝王經等同本今入八卷合經中此四卷者在刪繁録大方等大雲經六卷一名大方等無相大雲經一名大雲無想經一名大雲密藏經或云方等大雲經或四卷或五卷於內苑寺譯第二出見僧睿李廓僧祐三録腹中女聽經一卷一名不莊挍女經第三出與無垢賢女經轉女身經等同本見長房録菩薩地持經十卷或無經字亦云論亦名菩薩戒經又名菩薩地經或八卷出瑜伽本地分中菩薩地見竺道祖河西録及僧祐録優婆塞戒經七卷或無經字是在家菩薩或五卷或六卷或十卷玄始三年景寅四月二十三日出至七月二十三日訖沙門道養筆受見經後記及僧祐録菩薩戒本一卷出地持戒品中第二出與大唐奘法師所出戒本等同本別録云燉煌出見僧祐録文陀竭王經一卷出中阿含第十一卷異譯見長房録佛所行讚經傳五卷或云經無傳字或云傳無經字馬鳴菩薩造亦名作本行經見長房録勝鬘經一卷亦云勝鬘師子吼一乘大方便經初出見長房録與宋功德賢所出勝鬘經及寶積勝鬘夫人會同本羅摩伽經一卷第四出與曹魏安法賢等所出同本但廣略異是華嚴經入法界品少分見長房録楞伽經四卷初出與宋功德賢元魏菩提留支實叉難陀等所出同本見長房録須真天子經一卷第二出與西晉法護出者同本房云見吳録又云羅什出似再譯海龍王經四卷或加新字第二出與竺法護出者同本玄始七年出見竺道祖河西録及僧祐録功德寶光菩薩經一卷見長房録菩薩戒壇文一卷亦云優婆塞戒壇文祐云菩薩戒優婆塞戒壇文見僧祐寶唱二録右一十九部一百三十一卷佛所行讚上一十三部一百一十八卷見在勝鬘經下七部一十二卷闕本沙門曇無讖或云曇摩讖亦云曇謨讖蓋取梵音不同故也涼云法豐中印度人婆羅門種讖六歲父亡母以傭織養讖見沙門達摩耶舍此言法稱道俗宗敬豐於利養其母羡之故以讖為弟子十歲與同學數人誦呪聰敏出群誦經日得萬餘言初學小乘兼覽五明諸論講説精辨莫能酬抗後遇白頭禪師共讖論議習業既異交諍十旬讖雖攻難鋒起而禪師終不肯屈讖服其精理乃謂禪師曰頗有經與可得見不禪師即授以樹皮涅槃經本讖尋讀驚悟方自慚恨以為坎井之識久迷大方於是集衆悔過遂專業大乘至年二十所誦大小乘經二百餘萬言讖從兄善能調象騎殺王所乘白耳大象王怒誅之令曰敢有視者及三族親屬莫敢往讖哭而葬之王怒欲誅讖讖曰王以法故殺之我以親而葬之並不違大義何為見怒傍人為之寒心其神色自若王奇其志氣遂留供養明解呪術所向皆驗西域號為大神呪師後隨王入山王渴乏須水不能得讖乃密呪石出水因讚曰大王惠澤所感遂使枯石生泉鄰國聞者皆歎王德于時雨澤甚調百姓稱詠王悅其道術深加優寵頃之王意稍歇待之漸薄讖怒曰我當以罌水詣池呪龍入罌令天下大旱王必請呪然後放龍降雨則見待何如持罌造龍有密告之者王怒捕讖讖懼誅乃齎大涅槃經本前分一夾菩薩戒經地持經也菩薩戒本奔龜茲龜茲國多小乘學不信涅槃遂至姑臧止於傳舍慮失經本枕之而寢有人牽之在地讖驚謂是盜者如此三夕聞空中語曰此是如來解脫之藏何以枕之讖乃慚悟別置高處夜有盜之者舉不能勝乃數過舉之遂不能動明旦讖持經去不以為重盜者見之謂是聖人悉來拜謝河西王沮渠蒙遜聞讖名呼與相見接待甚厚蒙遜素奉大法志在弘通請令出其經本讖以未參土言又無傳譯恐言舛於理不許即翻於是學語三年方譯初分十卷是時沙門慧嵩道朗獨步河西值其宣出法藏深相推重轉易梵文嵩公筆受道俗數百人疑難縱橫讖臨機釋滯未嘗留礙嵩朗等更請廣出餘經謂大集大雲悲華地持等兼涅槃經總十九部讖以涅槃經本品數未足還國尋求值其母亡遂留歲餘後於于闐更得經本復還姑臧續譯成四帙焉讖以玄始三年甲寅創首翻譯至十五年景寅都訖房云玄始十年訖者此乃涅槃竟時非餘經也準優婆塞戒經後記云景寅出此即十五年中猶出經也讖至義和三年癸酉三月方卒中間六載應更出經録中不言故未詳也讖嘗造遜云有鬼入聚落必多災疫遜不信欲躬見為驗讖即以術加遜遜見而駭怖讖曰宜潔誠齋戒神呪驅之乃讀呪三日謂遜曰鬼北去矣既而北境之外疫死萬數遜益敬憚禮遇彌崇會魏大武皇帝聞其道術遣使迎請且告遜曰若不遣讖便即加兵遜自揆國弱難以拒命兼慮讖多術或為魏謀已進退惶惑乃密計除之初讖譯出涅槃卷數已定而外國沙門曇無發云此經品未盡讖嘗慨然誓必重尋蒙遜因其行志乃偽資發遣厚贈寶貨未發數日乃流涕告日讖業對將至衆聖不能救矣以本有心誓義不容停行四十里遜密遣刺客害之時年四十九衆咸慟惜焉既而遜左右常白日見鬼神以劍擊遜至四月寢疾而終遜以義和三年三月害讖即於其年四月遇疾而終信哉報應不虛如影之隨形也房云讖在茂虔承和四年卒者非也其義和三年即魏延和二年歲在癸酉也初讖在姑臧有張掖沙門道進從讖受菩薩戒讖云且悔過乃竭誠七日七夜至第八日晨詣讖求受讖忽大怒進更思惟但是我業障未銷耳乃勠力三年且禪且懺即於定中見釋迦文佛與諸大士授己戒法其夕同止十餘人皆感夢如進所見進欲詣讖説之未至十步讖驚起唱言善哉善哉已感戒矣吾當為汝作證次第於佛像前為説戒相時沙門道朗振譽關西當進感戒之夕朗亦通夢乃自卑戒臘求為法弟於是從進受者千有餘人傳授此法迄至于今皆讖之遺則有別記云菩薩地持經應是伊波勒菩薩傳來此土後果是讖傳譯疑讖或非凡也菩薩戒經八卷祐房等録並云讖譯今以是地持之別名故不雙載也虛空藏經五卷祐房等録云亦讖譯今以即是大集虛空藏品折出別行今載別生録中此不復存也優婆塞戒本一卷寶唱録云讖譯復云出優婆塞戒經今載別生録中不別存也善信女經二卷無為道經二卷居士請僧福田經一卷決定罪福經一卷上之四經長房等録皆云讖復云世注為疑今並依舊附疑此中不載禪法要解二卷第二出與羅什出同本見長房録右一部二卷本闕安陽侯沮渠京聲即河西王蒙遜從弟為人強志疏通敏朗少有智鑒涉獵書記善於談論幼稟五戒鋭意內典所讀衆經即能諷誦常以為務學多聞大士之盛業也少時嘗度流沙到于闐國於瞿摩帝大寺遇天竺法師佛陀斯那涼言覺將安陽從之咨問道義斯那本學大乘天才秀出誦半億偈明了禪法故西方諸國號為人中師子安陽從受禪法諸祕要術口誦梵本東歸於涼以茂虔承和年中譯禪法要解一部阿毗曇毗婆沙論六十卷或加八揵度字初譯與唐譯大毗婆沙論同本或分成八十四卷一百九卷佛滅後六百餘年五百應真造見僧祐寶唱二録右一部六十卷其本見在沙門浮陀跋摩或云佛陀跋摩涼言覺鎧西域人也幼而履操明直聰悟出群習學三藏偏善毗婆沙常誦持此論以為心要承和年中達于姑臧先有沙門道泰志用強果少遊𦵇右遍歷諸國得毗婆沙梵本有萬偈至姑臧側席虛襟企待明匠聞跋摩遊心此論請為翻譯時蒙遜已薨子茂虔襲位以虔承和五年丁丑四月中旬於涼州內間豫宮寺請跋摩譯焉泰即筆受沙門慧嵩道朗與義學僧三百餘人考正文義至七年己卯七月方訖凡一百卷沙門道挻為之製序有頃魏太武帝西伐姑臧涼土崩亂經書什物皆被焚蕩遂失四十卷今唯有六十存焉跋摩避亂西返莫知所終序云乙丑歲出即蒙遜玄始十四年也丁卯歲訖即玄始十六年也與録不同未詳何以般泥洹經二十卷見道慧宋齊録及僧祐録第六譯與無讖大般涅槃經等同本右一部二十卷本闕沙門釋智猛京兆新豐人稟性端明勵行清白少襲法服修業專至諷誦之聲以夜續晝每見外道人説釋迦遺迹及聞方等衆經布在西域常慨然有感馳心遐外以為萬里咫尺千載可追也遂以姚秦弘始六年甲辰之歲招結同志有十五人發迹長安渡河跨谷三十六所至涼州城既而西出陽關入于流沙二千餘里地無水草路絶行人冬則嚴癘夏則瘴炎人死聚骨以標行路駱駝負糧理極辛阻遂歷鄯鄯龜茲于闐諸國備觀風俗從于闐西南行二千里始登蔥嶺同侶九人退還猛與餘伴進行千七百餘里至波淪國同旅竺道嵩又復無常將欲闍毗忽失尸所在猛悲歎驚異於是自力而前與餘四人三度雪山氷崖浩然百千餘仞飛絙為橋乘虛而過窺不見底仰不見天寒氣慘酷影戰魂栗復南行千里至罽賓國再渡辛頭河雪山壁立轉甚於前下多瘴氣惡鬼斷路行者多死猛誠心冥徹履險能濟既至罽賓城恆有五百羅漢住此國中而常往反阿耨達池有大德羅漢見猛至止歡喜讚歎猛咨問方土為説四天子事具在猛傳猛先於奇沙國見佛文石唾壺又於此國見佛鉢光色紫紺四際畫然猛香華供養頂戴發願鉢若有應能輕能重既而轉重力遂不堪及下按時復不覺重其道心所應如此復西南行三百里至迦維羅衛國見佛牙及肉髻骨佛影佛迹炳然具存又覩泥洹堅固之林降魔菩提之樹猛喜心內充設供一日兼以寶蓋大衣覆降魔像其所遊踐究觀靈變天梯龍池之事不可勝數後至華氏城是阿育王舊都有大智婆羅門名羅閲宗舉族弘法王所欽重造純銀塔高三丈沙門法顯先於其家已得六卷泥洹及見猛至問云秦地有大乘學不答曰悉大乘學羅閲驚歎曰希有希有將非菩薩往化耶猛就其家得泥洹梵本一部又尋得摩訶僧祇律梵本一部及餘經梵本誓願流通於是便反以甲子歲發天竺同行四僧於路無常唯猛與雲謨俱還涼州以茂虔承和年中譯出泥洹成二十卷猛以宋元嘉末卒升歷尋遊方沙門記列道路時或不同佛鉢頂骨處亦乖爽將知遊往天竺非止一路頂鉢靈遷時屆異土故傳迹見聞難以例也大丈夫論二卷提婆羅菩薩造見翻經圖入大乘論二卷堅意菩薩造見唐舊録亦見內典録及翻經圖右二部四卷其本見在沙門釋道泰才敏自天沖氣疏朗博聞奇趣遠參異言往以漢土方等既備幽宗粗暢其所未練唯三藏九部故杖策冒險爰至蔥西綜覽梵文義承高旨并獲婆沙梵本十萬餘偈及諸經論東歸於涼遂遇浮陀跋摩共翻毗婆沙論泰後自譯大丈夫論二部又長房內典二録云於其涼代復有沙門曇覺於高昌國譯賢愚經一部即當宋元嘉二十二年也今譯不然元嘉十六年己卯涼國已絶如何二十二年乙酉仍有譯經故知二録誤也今靖邁經圖編在元魏之代魏宋雖並宋都建業魏治恆安以地而論合屬魏録菩薩投身餓虎起塔因緣經一卷僧祐録云以身施餓虎經見經後記右一部一卷其本見在沙門釋法盛高昌人也亦於涼代譯投身餓虎經一卷故前高僧曇無讖傳末云于時有高昌沙門法盛亦經往外國有傳四卷其投身餓虎經後記云爾時國王聞佛説已即於是處起立大塔名為菩薩投身餓虎塔今見在塔東面山下有僧房講堂精舍常有五十衆僧四事供養法盛爾時見國中有人癩病及癲狂聾盲手腳躄跛及種種疾病悉來就此塔燒香然燈香泥塗地修治掃灑并叩頭懺悔百病皆愈前來差者便去後來輒爾常有百餘人不問貴賤皆爾終無絶時今詳僧傳之文及閲經記之説法盛遊於西域此事不虛復云親覩靈龕故應非謬若非盛之自譯何得著彼經終既能自往西方豈有不傳經教考核終始事乃分明今為盛翻編載斯録不退轉輪經四卷一名不退轉經第二出與竺法護阿惟越致遮經等同本金剛三昧經二卷或一卷大忍辱經十卷金輪王經一卷賢劫五百佛名經一卷右五部一十八卷前二部六卷見在後三部一十二卷闕本長房等録並云是沙門僧祐新集釋道安涼土異經今還附入涼世目録為失譯源庶知時代顯譯有無卷部多少出之處所已下新附此録優婆夷淨行法門經二卷或無經字亦直云淨行經長者法志妻經一卷大愛道比丘尼經二卷亦云大愛道受戒經舊録云大愛道經三慧經一卷菩薩等行經一卷此已下闕四無畏經一卷權變經一卷舊録云文殊師利權變三昧經或直云權變三昧經十漚惒經一卷七言禪利經一卷舊録云漚惒七言禪利經菩薩十漚惒經一卷今疑與前十漚惒同瓶沙王經一卷有無經一卷五百偈經一卷須耶越國貧人經一卷舊録云須耶越國貧人賃剔頭經浮木經一卷杯喻經一卷妖怪經一卷阿般計泥洹經一卷一本作陶射計泥洹經四非常經一卷五失蓋經一卷要真經一卷本無經一卷勸德經一卷十五德經一卷父母因緣經一卷今疑與父子因緣經同慧行經一卷未生王經一卷今疑是未生怨經內外無為經一卷道淨經一卷七事本末經一卷舊録云七事本行經百寶三昧經一卷三乘經一卷耆域術經一卷舊録云耆域四術經五蓋雜疑經一卷今疑是五蓋疑經失行經太子智止經一卷道德章經一卷苦相經一卷須佛得度經一卷由經一卷分然洹國迦羅越經一卷五陰事經一卷義決法事經一卷十思惟經一卷分別六情經一卷三失蓋經一卷佛寶三昧經一卷法志女經一卷右四十七部四十九卷準初四部六卷有本餘者並闕僧祐録云安公涼土異經長房等録闕而不載今還附入涼録以為失譯祐載安公涼土異經總五十九部於中五部房録已載今更出四十七部通前五十二部餘有七部一十四卷謹按長房等録皆有所憑即非失譯是故此録刪之不存今具條佚列之如左須菩提品經七卷般若鈔經異名持秦曇摩譯文殊師利示現寶藏經二卷西晉竺法護譯七知經一卷或作七智吳支謙譯難龍王經一卷或云難龍經龍王兄弟經異名吳支謙譯阿陀三時經一卷即阿多三昧經異名安公闕中異經已載大五濁經一卷舊録云大五濁世群録云偽今亦編之首至問十四章經一卷舊録云首至問佛十四意經或云首至問十四事經亦云後漢支曜譯今為抄經載別生録大方廣十輪經八卷初出與唐譯地藏十輪經同本是大集第十三分似涼代譯群録不載今附此涼末庶免遺編耳通新及舊總五十三部合七十五卷並為北涼失源云
