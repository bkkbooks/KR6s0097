body:
  text: 西京西明寺沙門圓照撰別録中有譯無本録之二小乘經重譯闕本一百一十五部二百六十五卷中阿鋡經五十九卷符秦天竺三藏曇摩難提譯第一譯右一經前後兩譯一本在藏一本闕增一阿鋡經五十卷序云四十一卷或云二十四卷祐云三十三卷符秦天竺三藏曇摩難提譯第一譯鳩摩迦葉經一卷一名童子迦葉解難經僧祐録云失譯經法經録云出中阿含第十六卷異譯僮迦葉解難經一卷亦名童迦葉經祐云出長阿含乞伏秦沙門聖堅譯房云與羅什迦葉同本什無迦葉經右二經同本異譯出長阿含第七卷與蔽宿經同本其本並闕大六向拜經一卷一名尸迦羅越六向拜經亦直云六向拜經西晉三藏竺法護譯右兼長阿含第十一中善生經前後三譯二存一闕佛開解梵志阿颰經一卷右兼長阿含第十三中阿摩晝經前後三譯二存一闕六十二見經一卷亦云梵網六十二見經西晉三藏竺法護譯右兼長阿含第十四中梵動經前後三譯二存一闕樓炭經六卷或五卷或八卷西晉三藏竺法護譯第一譯樓炭經八卷西晉沙門釋法炬譯第三譯右兼長阿含第四分中記世經前後六譯四存二闕道意發行經二卷房録云出長阿含或一卷後漢安息三藏安世高譯大十二門經二卷或一卷安公注解房録云出長阿含後漢安息三藏安世高譯小十二門經一卷房録云出阿含安公注解後漢安息三藏安世高譯七法經一卷舊録云阿毗曇七法行經或直云七法行經房云出長阿含後漢安息三藏安世高譯多增道章經一卷舊録無道字異出十報法房云出長含後漢安息三藏安世高譯義決律經一卷彌勒經一卷安云出長阿含僧祐録云安公失譯經附西晉録鳩摩迦葉經下一十四部二十八卷並是長阿含部分闕本四諦經一卷後漢西域三藏康孟詳譯右兼中阿含第七卷中分別聖諦經前後四譯二存二闕魔王入目揵蘭腹經一卷亦云弊魔試目連經舊録僧祐録云安公古典經今附漢録右兼中阿含第三十卷中降魔經前後五譯三存二闕賴吒和羅經一卷後漢西域三藏支曜譯右兼中阿含第三十一中賴吒惒羅經前後四譯二存二闕威革長者六向拜經一卷或作威華東晉西域三藏祇多蜜譯第二譯威革長者六向拜經一卷東晉天竺居士竺難提譯第三譯善生子經一卷亦云異出六向拜經宋沙門釋慧簡譯第四譯右兼中阿含第三十三中善戒經前後六譯二存四闕墮藍經一卷安公云出中阿含祐録云安公失譯經附西晉録七事經一卷安公云出中阿含祐録云安公失譯附西晉録賴吒謣羅經一卷安公云出中阿含祐録云安公失譯經附西晉録右一經疑與第三十一中賴吒惒羅經同本歡豫經一卷法經録云勸豫出中阿含第十三祐録云安公失譯經附西晉録佛有五百比丘經一卷安公云出中阿含祐録云安公古典經今附漢録凡人有三事愚癡不足經一卷安公云出中阿含祐録云安公古典經今附漢録佛試諸比丘言我以天眼視天下人生死好醜尊者卑者經一卷安公云出中阿含祐録云安公古典經今附漢録普法義經一卷亦云普義經西晉三藏竺法護譯第二譯三譯一闕四諦經下一十四部一十四卷並是中阿含部分闕本波斯匿王喪母經一卷或云波斯匿王經祐波耶匿王經宋居士沮渠京聲譯右兼增一本經前後四譯二存二闕出第十八卷頻婆娑羅王問佛供養經一卷元魏優禪尼國王子月婆首那譯右兼增一本經前後四譯二存二闕出第二十六卷指鬘經一卷或作指髻經東晉西域三藏祇多蜜譯右兼增一本經前後五譯三存二闕出第三十一卷舍利弗目連遊諸國經一卷亦云遊諸四衢西晉三藏竺法護譯右兼增一本經前後四譯二存二闕出第四十一卷佛母般泥洹經一卷一名大愛道般泥洹經宋居士沮渠京聲譯右兼增一本經前後五譯三存二闕出第五十卷雜四十四篇經二卷安公云出增一阿含或云一卷後漢安息三藏安世高譯右或云雜經四十四篇既不顯別名未詳出何卷中百六十品經一卷舊録云增一阿含百六十章經後漢安息三藏安世高譯波斯匿王喪母經下七部八卷並是增一阿含部分闕本異處七處三觀經一卷或無異處字雜阿含宋天竺三藏求那跋陀羅譯佛涅槃後諸比丘經一卷出雜阿含宋沙門釋慧簡譯自見自知為能盡結經一卷僧祐録云安公古典經今附漢録有四求經一卷僧祐録云安公古典經今附漢録佛本行經一卷僧祐録云安公古典經今附漢録河中大聚沫經一卷或云聚沫譬經或云水沫所漂經僧祐録云安公古典經今附漢録便賢者坑經一卷僧祐録云安公古典經今附漢録所非汝所經一卷僧祐録云安公古典經今附漢録兩比丘得割經一卷僧祐録云安公古典經今附漢録道德舍利日經一卷僧祐録云安公古典經今附漢録舍利日在王舍國經一卷僧祐録云安公古典經今附漢録獨居思惟自念止經一卷僧祐録云安公古典經今附漢録問所明種經一卷僧祐録云安公古典經今附漢録欲從本相有經一卷或云欲從本經僧祐録云安公古典經今附漢録獨坐思惟意中生念經一卷僧祐録云安公古典經今附漢録佛説如是有諸比丘經一卷僧祐録云安公古典經今附漢録比丘所求色經一卷僧祐録云安公古典經今附漢録道有比丘經一卷僧祐録云安公古典經今附漢録色為非常念經一卷僧祐録云安公古典經今附漢録安公本録從自見自知下有二十二經云是阿含一卷於中五經已備餘録不復重載安云是阿含一卷者四種阿含之中而不的指何部今且附此雜阿含之録色比丘念本起經一卷僧祐録云安公古典經今附漢録善惡意經一卷僧祐録云安公古典經今附漢録比丘一法相經一卷僧祐録云安公古典經今附漢録有二力本經一卷僧祐録云安公古典經今附漢録有三力本經一卷僧祐録云安公古典經今附漢録有四力經一卷僧祐録云安公古典經今附漢録人有五力經一卷僧祐録云安公古典經今附漢録不聞者類相聚經一卷舊録云相聚經僧祐録云安公古典經今附漢録天上釋為故世在人中經一卷或作無上釋僧祐録云安公古典經今附漢録爪頭土經一卷僧祐録云安公古典經今附漢録身為無有反復經一卷僧祐録云安公古典經今附漢録師子畜生王經一卷僧祐録云安公古典經今附漢録阿須倫子波羅門經一卷僧祐録云安公古典經今附漢録波羅門子名不侵經一卷僧祐録云安公古典經今附漢録生聞波羅門經一卷舊録云生聞梵志經僧祐録云安公古典經今附漢録有𨻗竭經一卷僧祐録云安公古典經今附漢録暑杜乘波羅門經一卷僧祐録云安公古典經今附漢録佛在拘薩國經一卷僧祐録云安公古典經今附漢録佛在優墮國經一卷或作優隨僧祐録云安公古典經今附漢録是時自梵守經一卷僧祐録云安公古典經今附漢録有三方便經一卷舊録云三方便經法經録云出七處三觀僧祐録云安公古典經今附漢録波羅門不信重經一卷僧祐録云安公古典經今附漢録佛告舍日經一卷僧祐録云安公古典經今附漢録四意止經一卷舊録云四意止本行經法經録云出中阿含僧祐録云安公古典經今附漢録説人自説人骨不知腐經一卷僧祐録云安公古典經今附漢録色比丘念本起經下二十五經安公云並出雜阿含雜阿含三十章經一卷法經録云出雜阿含異本僧祐録云安公古典經今附漢録異處三觀經下四十五部四十五卷是雜阿含部分闕本舍頭諫經一卷亦云舍頭諫太子明二十八宿經亦云太子明星二十八宿亦云虎耳經後漢安息三藏安世高譯第二譯右前後五譯四存一闕藏中摩鄧女經是世高譯今有舍頭諫經其摩鄧女與舍頭諫既是同本不合雙出今二本俱載未詳所以或可此經即是藏中舍頭諫經法護譯者録家錯上雜藏經一卷宋天竺三藏求那跋陀羅譯第四譯右前後四譯三存一闕弟子慢為耆域述經一卷亦云弟子為耆域述慢或羽弟子戲誕經宋居士沮渠京聲譯第四譯右與阿難問事佛經等同本前後四譯三存一闕小本起經二卷近加小字或云修行本起或云宿行本起後漢西域三藏支曜譯第一譯太子本起瑞應經二卷亦云應本起後漢外國三藏康孟詳譯過去因果經四卷東晉天竺三藏佛陀跋陀羅譯第五譯右前後六譯三存三闕法海藏經一卷或云法海經後漢天竺三藏竺法蘭譯第一譯右前後三譯二存一闕四十二章經一卷房録云與摩騰譯者少異吳月支優婆塞支謙譯第一譯右前後兩譯一存一闕奈女耆域經一卷或云奈女經西晉三藏竺法護譯第二譯右前後兩譯一存一闕罪業報應經一卷東晉西域沙門竺曇無蘭譯第二譯右前後兩譯一存一闕目連降龍王經一卷或無王字或云降龍或云降龍王經宋天竺三藏求那跋陀羅譯第二譯右前後兩譯一存一闕長者音悅經一卷宋居士沮渠京聲譯第二譯右前後兩譯一存一闕禪祕要經四卷或無經字吳月支優婆塞支謙譯第一譯禪祕要經五卷一名禪法要或三卷或無經字宋罽賓三藏曇摩蜜多譯第三譯右前後三譯一存二闕今有禪要經五卷文極交錯不可流行如刪繁録中具述七女本經一卷西晉三藏竺法護譯第二譯七女本經一卷亦名女本心明經亦名七女經乞伏秦沙門釋聖堅譯第三譯右前後三譯一存二闕八師經一卷東晉西域沙門竺曇無蘭譯第二譯右前後兩譯一存一闕日難經一卷一名越難經宋天竺三藏求那跋陀羅譯第三譯右前後三譯一存二闕所欲致患經一卷東晉西域三藏祇多蜜譯第一譯右前後兩譯一存一闕阿闍世王問五逆經一卷一名阿闍世王經後漢月支三藏支婁迦讖譯第一譯右前後兩譯一存一闕五苦章句經一卷宋居士沮渠京聲譯第二譯右前後兩譯一存一闕堅意經一卷或云堅心經吳月支優婆塞支謙譯第二譯右前後兩譯一存一闕淨飯王般泥洹經一卷西晉沙門釋法炬譯第一譯右前後兩譯一存一闕勸進學道經一卷一本無勸字吳月支優婆塞支謙譯第一譯勸進學道經一卷亦名勸進經宋沙門釋勇公譯第三譯右前後三譯一存二闕貧窮老公經一卷西晉沙門釋法炬譯出法上録第一譯右前後兩譯一存一闕分惒檀王經一卷宋居士沮渠京聲譯第二譯右與三摩竭經同本前後兩譯一存一闕蓱沙王五願經一卷一名弗沙迦王經東晉西域沙門竺曇無蘭譯第二譯右前後三譯一存二闕蓱沙王五願經一卷亦名弗沙王經東晉沙門釋嵩公譯第三譯琉璃王經一卷後漢安息三藏安世高譯第一譯右前後兩譯一存一闕生經五卷宋涼州沙門釋智嚴譯第一譯右前後兩譯一存一闕義足經二卷東晉西域沙門竺曇無蘭譯第二譯右前後兩譯一存一闕五蓋疑結失行經一卷西晉三藏竺法護譯第一譯五蓋疑結失行經一卷東晉西域三藏祇多蜜譯第二譯右二經同本異譯二本俱闕太子夢經一卷後漢安息三藏安世高譯第一譯佛為菩薩五夢經一卷一名五夢經一名太子五夢經一名仙人五夢經西晉三藏竺法護譯第二譯右二經同本異譯二本俱闕十善十惡經一卷西晉沙門支法度譯第一譯十善十惡經一卷安公云出阿毗曇東晉西域沙門竺曇無蘭譯第二譯右二經同本異譯二本俱闕禪經一卷後漢月支三藏支婁迦讖譯第二譯禪經一卷後漢安息三藏安世高譯第三譯右二經同本異譯二本俱闕恆水經一卷寶唱録云恆水識經亦云恆水不説戒經後漢安息三藏安世高譯出法上録第一譯恆水戒經一卷或云恆水經吳月支優婆塞支謙譯第二譯右二經同本異譯其本並闕