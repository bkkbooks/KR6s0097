闕俱舍論本十六卷陳天竺三藏真諦譯右據俱舍本論即前偈是今後言論本一十六卷未詳所以阿毗曇心十六卷或十三卷符秦罽賓三藏僧伽提婆譯第一譯雜阿毗曇十三卷東晉沙門法顯共覺賢譯第一譯雜阿毗曇心十三卷根本十卷續成十三或十四卷宋外國沙門伊葉婆羅等譯第三譯右長房録云文帝代外國沙門伊葉羅譯至擇品緣礙未竟遂輟後求那跋摩續譯都訖成十三卷見高僧傳房録之中伊葉波羅及求那跋摩各存其本唐內典録及翻經圖同此今以求那跋摩但續前闕更不再翻前後各存理為不當今合為一本其第四譯見流行者長房録云宋文帝代天竺沙門僧伽跋摩元嘉十年屆自建業善律藏明雜心道場惠觀以跋摩妙解雜心諷誦通利先三藏等雖復譯出未及繕寫更請重翻寶雲傳語觀自筆受一同及訖故知見行之者是其後本前後四譯一存三闕三法度論二卷或云三法無論字符秦天竺三藏曇摩提譯第一譯右前後兩譯一存一闕犢子道人問論一卷元魏婆羅門瞿曇般若流支譯單本須跋陀羅因緣論二卷周宇文氏天竺三藏耶舍多等譯單本六足阿毗曇一卷僧祐録中失譯論今附宋録聖賢集傳闕本四十七部一百八十四卷修行道地經七卷或云順道行經或六卷後漢安息三藏安世高譯第一譯右前後三譯二存一闕僧伽羅剎集二卷符秦天竺三藏曇摩難提譯第二譯右前後兩譯一存一闕付法藏經六卷宋涼州沙門釋寶雲譯第一譯付法藏傳四卷元魏昭玄統釋曇曜譯第二譯右前後三譯一存二闕阿蘭若習禪經二卷宋天竺三藏求那跋陀羅譯第二譯右與坐禪三昧經同本前後兩譯一存一闕菩薩訶欲經一卷宋天竺三藏求那跋陀羅譯第二譯右前後兩譯一存一闕那先經一卷宋天竺三藏求那跋陀羅譯第二譯右前後兩譯一存一闕五門禪要用法經一卷後漢安息三藏安世高譯第一譯右前後兩譯一存一闕修行方便經二卷亦云修行方便禪經吳月支優婆塞支謙譯單本右此修行方便經詳其名目與達摩多羅禪經合是同本而彼禪經亦名修行方便經是東晉代覺賢所譯佛大先造先罽賓人也覺賢之師賢與支謙相去一百四十年佛大先彼時未出配為同本或將未當故為單譯禪法要解二卷北涼安陽侯沮渠京聲譯第二譯右前後兩譯一存一闕思惟要略經一卷或直云思惟經後漢安息三藏安世高譯第一譯右前後兩譯一存一闕十二遊經一卷西晉西域沙門強梁婁至譯十二遊經一卷宋天竺三藏求那跋陀羅譯第三譯右前後三譯二存一闕阿育王太子壞目因緣經一卷或無經字後漢月支三藏支婁迦讖譯第一譯王子法益壞目因緣經一卷或云阿育王怒壞目因緣經姚秦涼州沙門竺佛念譯第三譯右前後三譯一存二闕姚秦建初六年辛卯佛念共難提出壞目因緣經二人共出合是一本二處俱存或恐誤也法句經二卷或云法句集吳月支優婆塞支謙譯第二譯右前後兩譯一存一闕法句經四卷後漢安息三藏安世高譯第一譯右與法句喻經同本前後兩譯一存一闕迦葉結集傳經一卷或無傳字亦云迦葉結經亦云結集戒經西晉三藏竺法護譯第一譯迦葉結集戒經一卷晉沙門釋嵩公譯第二譯右前後三譯一存二闕婆藪盤豆傳一卷後秦三藏鳩摩羅什譯出翻經圖第一譯右前後兩譯一存一闕請賓頭盧法一卷後漢安息三藏安世高譯第一譯出內典録右前後兩譯一存一闕阿毗曇九十八結經一卷後漢安息三藏安世高譯單本耆闍崛山解一卷西晉三藏竺法護譯單本佛遊天竺記一卷東晉沙門釋法顯譯出僧祐録單本經律分異記一卷或云戒律宋罽賓三藏求那跋摩譯單本請聖僧浴文一卷宋天竺三藏僧伽跋摩譯單本第一義五相略集一卷宋天竺三藏求那跋陀羅譯單本雜譬喻三百五十首經祐云譬三百首經西晉三藏竺法護譯單本翻外國語七卷一名俱舍論因緣事一名雜事陳天竺三藏真諦譯單本修禪定法一卷東天竺三藏真諦譯單本庾伽三磨斯經一卷譯言修行略一名達磨多羅禪或云達摩多羅菩薩撰禪經要集後漢失譯梵音偈本一卷舊云胡音後漢失譯讚七佛偈一卷後漢失譯但惒尼百句一卷後漢失譯五言詠頌本起一卷一百四十二首後漢失譯道行品諸經梵音解一卷舊云胡音後漢失譯法句譬喻經一卷祐録云凡七十事或無喻字後漢失譯雜譬喻經八十卷魏吳失譯道地經中要語章一卷或云小道地經僧祐録云安公古典經今附漢録數練意章一卷舊録云數練經僧祐録云安公古典經今附漢録安公云上二經出生經祐按今生經無此章名悉曇慕二卷僧祐録云安公失譯經附西晉録吉法驗一卷僧祐録云安公失譯經附西晉録口傳劫起盡一卷僧祐録云安公失譯經附西晉録打揵抵法一卷僧祐録云安公失譯經附西晉録雜譬喻經六卷或云諸雜譬喻僧祐録中失譯今附宋録譬喻經一卷祐云異出更有一本今且存一僧祐録中失譯經今附宋録雜譬喻經一卷凡十一事僧祐録中失譯經今附宋録都計小乘經律論及聖賢集傳闕本者總七百五部一千一百五十七卷舊六百九十八部今加七部合計七百五部舊一千六百六卷今加五十卷合一千六百五十六卷
