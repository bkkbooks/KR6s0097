body:
  text: 西京西明寺沙門圓照撰總集群經録上之十五玄宗肅宗代宗三朝所譯經金剛頂瑜伽真實大教王經三卷經內題云金剛頂一切如來真實攝大乘現證大教王經金剛頂瑜伽般若理趣經一卷經題云大樂金剛不空真實三摩地耶經般若波羅蜜多理趣品觀自在菩薩授記經一卷經題云佛說大方廣曼殊室利經觀自在菩薩授記品第三十一瑜伽念珠經一卷經內題云金剛頂瑜伽念珠經於千萬廣頌中略出奇特佛頂經一卷經內題云一字奇特佛頂經現威德品觀自在菩薩最勝明王心經一卷經內題云金剛恐怖集會方廣軌儀觀自在菩薩三世最勝心明王經序品第一金剛頂瑜伽文殊師利菩薩經一卷經內題云法一品亦名五字呪法阿唎多羅阿嚕力經一卷經內題云阿唎多羅陀羅尼阿嚕力品第十四普賢行願讚一卷地藏菩薩問法身讚一卷經內題云百千頌大集經地藏菩薩問法身讚出生無邊門經一卷經內題云出生無邊門陀羅尼經大吉祥天女經一卷經內題云佛說大吉祥天女十二契一百八十名號無垢大乘經底哩三昧耶經一卷經內題云底哩三昧耶不動使者念誦品十一面觀自在菩薩經三卷經內題云十一面觀自在菩薩心密言儀軌吉祥天女十二名號經一卷金剛頂瑜伽十八會指歸一卷經內略無十八會字金剛頂瑜伽三十七尊分別聖位法門一卷并序經中云修證法門序菩提場所說一字頂輪王經五卷寶篋經一卷經內題云一切如來心祕密全身舍利寶篋陀羅尼經金剛壽命陀羅尼經一卷經內題云一切如來金剛壽命陀羅尼經大孔雀明王經三卷經內題云佛母大孔雀明王經初有啓請法在上卷經前大雲請雨經二卷經內題云大雲輪請雨經雨寶陀羅尼經一卷經內題中加佛說兩字蘘麌利童女經一卷經內題中加佛說字稻𦼮喻經一卷經內題云慈氏菩薩所說大乘緣生稻𦼮喻經大寶廣博樓閣經三卷經內題云大寶廣博樓閣善住祕密陀羅尼經菩提場莊嚴經一卷經內題云菩提場莊嚴陀羅尼經除一切疾病陀羅尼經一卷能淨一切眼陀羅尼經一卷經內題云能淨一切眼疾病陀羅尼經施焰口餓鬼陀羅尼經一卷經內題云佛謂救焰口餓鬼陀羅尼經三十五佛名經一卷經內題云佛說三十五佛名禮懺文出烏波離所問經八大菩薩曼荼羅經一卷葉衣觀自在菩薩陀羅尼經一卷經內題中略無陀羅尼字訶利帝母經一卷經內題云訶利帝母真言法毗沙門天王經一卷觀自在菩薩說普賢陀羅尼經一卷文殊問字母品一卷金剛頂蓮華部心念誦法一卷金剛頂瑜伽千手千眼觀自在念誦法一卷經內題中菩薩修行儀軌無量壽如來念誦儀軌一卷經內題中云修觀行供養儀軌阿閦如來念誦法一卷經內題中云念誦供養法佛頂尊勝念誦法一卷經內題云佛頂尊勝陀羅尼念誦儀軌金剛頂勝初瑜伽普賢菩薩念誦法一卷金剛王菩薩念誦法一卷經內題中云祕密念誦儀軌普賢金剛薩埵念誦法一卷經內題中云瑜伽念誦儀軌金剛頂瑜伽五祕密修行儀軌一卷經內題中云金剛菩薩五字祕密修行念誦儀軌金剛壽命念誦法一卷經內題云陀羅尼念誦法一字頂輪王瑜伽經一卷經內題云瑜伽醫迦訖沙羅烏瑟尼沙斫訖羅真言安怛羅儀則一字頂瑜伽經一字佛頂輪王念誦儀軌一卷經內題中無佛字仁王般若念誦法一卷如意輪念誦法一卷經內題云觀自在如意輪菩薩念誦法大虛空藏菩薩念誦法一卷瑜伽蓮華部念誦法一卷聖觀自在菩薩心真言觀行儀軌一卷經內題云瑜伽觀行軌儀觀自在多羅瑜伽念誦法一卷經內題云金剛多羅菩薩念誦法甘露軍吒利瑜伽念誦法一卷經內題云甘露軍吒利菩薩供養念誦成就儀軌華嚴入法界四十二字觀門一卷經內題云大方廣佛華嚴經文殊讚法身禮一卷經內題云大聖文殊師利讚法身禮并序受菩提心戒儀一卷經內題云最上乘教受戒懺悔文普賢菩薩阿闍梨處金剛頂瑜伽三十七尊禮一卷經內題云金剛頂經金剛界大道場毗盧遮那如來自受用身自內證智眷屬法身異名佛最上乘三摩地禮懺文般若理趣釋一卷經題云大樂金剛不空真實三昧耶經般若波羅蜜多理趣釋大曼荼羅十七尊釋一卷經內題云般若波羅蜜多理趣經大安樂不空三昧耶真實金剛菩薩等一十七尊大曼荼羅義述金剛頂瑜伽護摩儀一卷經內題云儀軌都部陀羅尼目一卷經內題云陀羅尼門諸部要目大乘緣生論一卷經中云聖者鬱楞伽造七俱胝佛母陀羅尼經一卷經內題云七俱胝佛母所說准提陀羅尼經大虛空藏菩薩所問經一卷仁王經二卷經內題云仁王護國般若波羅蜜多經御製序密嚴經三卷經內題云大乘密嚴經御製序仁王念誦儀軌一卷經內題云仁王護國般若波羅蜜多經陀羅尼念誦儀軌翻經大德大興善寺沙門惠靈述序大聖文殊師利菩薩佛剎功德莊嚴經三卷成就妙法蓮華經王瑜伽觀智儀軌一卷金剛頂勝初瑜伽經中略出大樂金剛薩埵念誦儀一卷大樂金剛薩埵修行成就儀軌一卷出吉祥勝初教王瑜伽經大藥叉女歡喜母并愛子成就法一卷亦名訶哩底母法普遍光明大隨求陀羅尼經二卷經內題云普遍光明清淨熾盛如意寶印心無能勝大明王隨求陀羅尼經金剛頂超勝三界經說文殊五字真言勝相一卷五字陀羅尼頌一卷并梵字聖閻曼德迦威王立成大神驗念誦法一卷文殊師利菩薩根本大教王金翅鳥王品一卷不空羂索毗盧遮那佛大灌頂光真言一卷出不空羂索經二十八聖迦抳忿怒金剛童子菩薩成就儀軌經三卷大威怒烏芻澀摩儀軌一卷佛說摩利支天經一卷金剛頂經一字頂輪王瑜伽一切時處念誦成佛儀軌一卷佛為優填王說王法政論經一卷大方廣如來藏經一卷佛說一髻尊陀羅尼經一卷速疾立驗摩醯首羅天說迦婁羅阿尾奢法一卷大日經略攝念誦隨行法一卷亦名五支略念誦要行法大毗盧遮那成佛神變加持經略示七支念誦隨行法一卷木槵經一卷金剛頂經瑜伽文殊師利菩薩儀軌供養法一卷亦名文殊五字念誦法若兼梵字十四紙曼殊室唎童子菩薩五字瑜伽法一卷并梵字金剛頂降三世大儀軌一卷經內題云金剛頂降三世大儀軌法王教中說觀自在菩薩心真言一切如來蓮華大曼荼羅品文殊師利菩薩及諸仙所說吉凶時日善惡宿曜經二卷下卷有序金剛頂經觀自在王如來修行法一卷金剛頂瑜伽中發阿耨多羅三藐三菩提心論一卷亦名瑜伽總持教門說菩提心觀行修瑜伽金剛頂經釋字母品一卷修習般若波羅蜜菩薩觀行念誦儀軌一卷仁王般若陀羅尼釋一卷觀自在大悲成就瑜伽蓮華部念誦法門一卷亦名成就大悲觀自在佛說大孔雀明王畫像壇場儀軌一卷金剛手光明灌頂經最勝立印聖無動尊大威怒王念誦儀軌法品一卷末利支提婆華鬘經一卷大聖天歡喜雙身毗那夜迦法一卷觀自在菩薩如意輪瑜伽一卷金輪王佛頂略念誦法一卷金剛瑜伽降三世成就極深密門一卷金剛頂瑜伽他化自在天理趣會普賢修行念誦儀軌一卷此一卷先進經數中元缺者右一百一十部一百四十三卷其本見在大唐特進試鴻臚卿加開府儀同三司封肅國公贈司空諡大辨正大廣智不空三藏和上者南天竺執師子國人也法諱智藏號不空金剛不聞氏族故不書之計當大唐神龍元年乙巳之歲而誕跡焉天假聰明幼而慕道遠離父母落髮壞衣至開元六年歲在戊午年甫十四於闍婆國見弘教三藏金剛智而師事之隨侍南溟乘航架險驚波鼓浪如影隨形開元八年方至東洛十二年甲子年方弱冠於廣福寺依一切有部石戒壇所而受近圓自此聽習律儀唐梵經論隨師譯語稍得精通隨駕兩京應詔翻譯不離左右請益摳衣函丈問端斯須不捨至十九年辛未天恩下降弘教三藏及弟子等放還本鄉出自西京至于東洛大師遘疾遂致薨焉即其年八月十五日也卜擇吉日安葬龍門飲血茹茶銜哀啜泣如犢失母斯其喻焉制命有限難以久停拜辭墳塋即赴前所年始三十遭此險艱漸屆廣州附舶前進遇好風便更不停留未逾一年到師子國王聞唐使禮接殊常便令安置於佛牙寺因茲重學祕密總持三密護身五部契印曼荼羅法三十七尊瑜伽護摩備皆精練經餘三歲寢食無安時彼國王稽首來請憑獻方物往至大唐所謂七寶燈樹花緤藥草沈檀龍腦等并自所獲金剛頂瑜伽經及大小乘論梵夾與一小使彌陀天寶五年歲在庚戌還至𨵗下恩旨遂令居淨影寺四事祇給出自天心宰輔近臣往來接武奉詔翻譯開灌頂壇士庶星馳呈疑問道九載己丑復有恩旨放令却歸發自京都路次染疾不能前進寄止韶州日夜精勤卷不釋手扶疾翻譯為國為家至癸巳天寶十二載河西節度使御史大夫西平郡王哥舒翰奏不空三藏行次染患養疾韶州令河西邊陲請福疆場上依所請敕下韶州追赴長安止保壽寺制使勞問錫賚重重四事祇供悉皆天賜憩息踰月令赴河西至武威城住開元寺節度使迎候是物皆供請譯佛經兼開灌頂演瑜伽教置荼羅使幕官寮咸皆咨受五部三密靈往實歸時西平王為國請譯金剛頂一切如來真實攝大乘現證大教王經三卷行軍司馬禮部郎中李希言筆受又譯菩提場所說一字頂輪王經五卷及一字頂輪王瑜伽經一卷并一字頂輪王念誦儀軌一卷並節度判官監察侍御史田良丘筆受又承餘隙兼譯小經至十三載甲午十月使牒安西追僧利言河西翻譯時四鎮伊西庭節度使安西副大都護攝御史大夫知節度事上柱國封常清給家乘馬兩匹日馳六驛十一月二十二日發安西域路次烏耆摩賀延磧轉次行過交河伊吾進昌酒泉屆武威郡即十四載二月十日也使司安置於龍興寺及報德寺同崇譯經其年七月禍起范陽時西平王奉敕追入加官拜相部領潼關十月上竊陷河洛明年元日有制皇太子監國洎乎五月敕下河西追三藏入朝住興善寺令開灌頂轉禍禳災未遑止寧潼關失守六月旬有二日胡馬入關玄宗巡狩南幸成都肅宗撫軍建號靈武旋歸整教回駕鳳翔三藏雖陷賊中竊申報國潛使來往具獻丹誠肅宗崇佛度僧孝理天下才踰周載咸洛底寧宗社復安萬姓歡慶復還宮寢緇素又安即至德二載丁酉十月二十三日也三藏明日陳表賀焉大興善寺三藏沙門智藏言竊聞惟天為大非元聖無以順天行誅惟王法天非興王無以代天育物伏惟陛下功超玄極道冠混元纘堯寶圖復禹不績自頃元凶已殄殘蘖猶迷陛下義待倒戈恩先善伐暫勞貔虎永滅貔狼自京輦肅清樓臺望幸陛下俯從人欲仰叶天心山川不移園苑如舊今鑾輿既降聖政惟新方將昭報昊穹濟斯仁壽道上皇汾陽之駕類上帝圓丘之壇演沙劫而轉法輪朗千界而懸佛日智藏久霑王化重覩漢儀生成已多報效何冀不勝𠒎藻之至謹詣銀臺之門奉表陳賀以聞輕黷宸嚴伏深戰越沙門智藏誠惶誠恐謹言肅宗文明武德大聖大宣孝皇帝批曰狡猾之流久為殘暴天壓其禍卒以敗亡顧城闕而依然臨士庶而咸若感慰之至深在朕懷所賀知上還西京士庶咸賀復收東洛緇素歡康二十七日就銀臺門又陳賀表乃為言曰大興善寺三藏沙門智藏言伏承官軍獻捷收復東京逆黨氷銷王師獨剋生靈慶快抃躍失圖智藏聞逆德者亡已孽難逭乘於竹葉允是格言自狂胡亂華向經三載神怨人憤惡稔貫盈陛下旰食宵衣單醪等膳遂使股肱畢力熊虎爭先廟略無遺神功不再以斯破竹會彼倒戈一戎而三捷纍臻旬日而兩都咸復斯實睿謀廣運英略殊常聖力匡持特高列辟方將勤崇東岱昭報上玄智藏行保昌明佇觀盛禮不任抃躍之至謹詣右銀臺門奉表陳賀以聞輕黷宸嚴伏深戰越沙門智藏誠歡誠喜謹言皇帝批曰所賀知是時也兩都既復宮室依然萬姓昭蘇上皇在蜀奉迎鑾駕至自成都至德二載十二月一日也肅宗以尊崇三藏不斥其名自今以來但稱其號明辰奉表陳賀以聞詞曰沙門不空言不空聞道惟帝先帝道洽則神功不宰孝為德本至德茂而克受元符伏惟陛下膺天纘堯從人復禹不易物而二儀貞觀未浹辰而兩都底寧功格昊穹德超列辟東揖群后西迎上皇垂帝服而更導鑾輿清天步而仍延法駕天父天子先天後天去閶闔而復歸九重正乾綱而載安萬姓斯實上皇垂訓推功高象帝之前陛下乘時至德冠興王之首足以暉華史冊高視唐虞不空生應昌期偶茲榮觀不任慶悅之至謹詣銀臺門奉表陳賀以聞輕觸宸嚴伏增戰越沙門不空誠歡誠喜謹言皇帝批曰掃清氛祲底定寰區聖上旋歸以安宮闕晨昏展敬喜慶殊深所賀知是月八日冊尊號光天文武大聖孝感皇帝太上皇誥賜也至德三年戊戌正月三日不空三藏本院設齊恩賜名香又加存慰修表奉謝恩以陳情誓為國家翻譯經論瑜伽密教息難除災詞曰沙門不空言中使吳遊巖至奉宣聖旨以不空本院今日設齊特賜名香兼天使鴻私曲被欣躍難名不空誠歡誠喜不空託蔭法流恩弘密教孤遊萬里遍學五天凝想十方覲華藏之諸佛精專五部窮奈苑之真言每布字觀心投身請獲乘弘誓之力得值輪王出興潔誠十年果會明聖前載幽關未啓陛下養德春宮早奉德音曲垂省問兼賚香藥密遣加持及陛下北巡不空雖不獲陪侍弟子僧含光等歸從西土又得親遇鑾輿崎嶇戎旅之間獲聞定冊之議不空雖身陷胡境常心奉闕庭頻承密詔進奉咸達陛下睿謀獨運法力冥加群凶散亡宸象歸正不空微質又忝朝恩十月清宮以建辟魔之會正朝薦號仍臨灌頂之壇塗飾上宮薰修別殿既許翻譯仍與度僧渥澤已深報效何日謹當三時浴像半月護摩庶三十七尊保明王之國土一十六護增聖帝之威神壽如南山永永無極不勝感戴欣荷之至謹奉表陳謝以聞沙門不空誠歡誠喜謹言光天文武大聖孝感皇帝批曰師現身西方開法中國在昔弘誓朕心悉知經行恆沙致大福力自須跋涉常念因緣而令比丘問道申願今蓮華至淨貝葉重宣微妙伏陀不思議也崇無量礙是錫末香奉持精修當不退轉所謝知其年二月五日改至德三載為乾元元年歲仍戊戌至三月十二日三藏表請搜訪梵夾修補翻傳尋下制曰中京慈恩薦福等寺及東京聖善長壽等寺并諸州縣寺舍村坊有舊大遍覺義淨善無畏流志寶勝等三藏所將梵夾右大興善寺三藏沙門不空奏前件梵夾等承前三藏多有未翻年月已深縚索多斷湮沈零落實可哀傷若不修補恐違聖教近奉恩命許令翻譯事資探討證會微言望許所在檢閲收訪其中有破壞缺漏隨事補葺有堪弘闡助國揚化者續譯奏聞福資聖躬最為殊勝天恩允許請宣付所司敕旨依奏明制依許所在搜求先於南天所得梵夾約計部帙千卷有餘六月十一日具狀上聞尋頒制曰陀羅尼教金剛頂瑜伽經等八十部大小乘經論二十部計一千二百卷右大興善寺三藏沙門不空奏不空聞纘帝堯者紹帝位受佛囑者傳佛教省茲格言曾不改易流興萬代散葉分枝不空杖錫挈瓶行邁天竺尋歷山谷跋涉群方凡遇聖蹤投誠禮敬輒聞經教罄竭哀祈搜求精微窮博深密丹誠鄙陋願言弘宣遂得前件經論自到中京竟未翻譯既闕書寫又乖受持特望龍慈許令翻譯庶得法筵重敷更雪住持之路佛日再舉彌增演暢之功天恩允許宣付所司敕旨依奏又至其年九月三日進上功德具以上狀聞詞曰虎魄寶生如來像一軀梵書大隨求陀羅尼一本右昔者河清啓運摳電吉祥方屬重陽之辰遂誕千年之聖以陛下允膺寶祚像有寶生之名以陛下興念隨通明有隨求之號像能光明洞徹如陛下光宅四維明能威伏魔怨如陛下威降萬國謹案金剛頂經一切如來成等正覺皆受寶生灌頂乃至陛下玄功格天正法理國事與時並若合符契伏願少修敬念緘而帶之則必持明照回廣至化於東戶本尊敷佑延聖壽於南山無任歡慶之深謹隨狀進輕黷扆旒伏增戰越謹進乾元光天文武大聖孝感皇帝批曰諸佛儀形優曇希現如來密藏神呪難思師大啓空宗能持祕印以茲正法弘護朕躬信受奉行深為利益也洎乾元三年閏四月十四日宮苑都巡使禦侮校尉右內率府卒員外置同正員賜紫金魚袋內飛龍使驅使臣史元琮進狀請大興善寺修灌頂道場右臣竊觀度災禦難之法不過祕密大乘大乘之門灌頂為最今屬閏夏之月百花皆榮伏望令三藏不空於前件寺為國修一灌頂道場有息災增益之教有降伏歡喜之能奉此功力以滅群凶上資聖壽無彊承此兆人清泰臣素無才行忝奉驅使謹獻愚誠倍增戰汗如天恩允臣所奏請降墨敕依閏月十九日改為上元元年歲仍庚子至八月二十五日開府儀同三司判行軍李輔國宣奉敕不空三藏并僧弟子三人宜於智炬寺修功德二年辛丑九月二十一日大赦天下除乾元光天等尊號但稱皇帝又除上元之號但稱二年以十一月朔為歲之初但稱元年又除正二三四等名以月建為號元年壬寅建子月建丑月建寅月建卯月建辰月建巳月五日太上皇遺誥訖崩至十五日楚州獻璧是日改為寶應元年歲仍壬寅四月五月等並依常數肅宗制皇太子監國恩宥一切囚徒也其月十八日肅宗皇帝遺詔訖又崩至二十日代宗即皇帝位至五月十六日大赦天下至十月十三日大興善寺三藏沙門不空狀進雕白檀摩利支像一軀此云威光梵書大佛頂陀羅尼一本右不空幸因聖運早奉休明遂逢降誕之晨更遇金輪之日伏惟陛下壽延寶祚尊像有威光之名以陛下百王為首真言有佛頂之號謹案大佛頂一切如來成等正覺皆受此真言乃至金輪帝位莫不遵而行之伏惟陛下承天踐祚聖政惟新正法理國與靈合契伏願少修敬念緘而帶之則廣至化於東方延聖壽於南山無任歡慶之至謹隨狀進輕黷宸嚴伏惟戰越謹言皇帝批曰檀摩瑞像貝葉真文南天既遙中國難遇上人慈慜緘護而來不祕桑門傳諸象𨵗得未曾有良以慰懷寶應二年七月十日冊尊號寶應元聖文武皇帝歲在癸卯七月十一日改為廣德元年歲仍癸卯十一月十四日大興善寺三藏沙門不空請為國置灌頂道場右不空聞毗盧遮那包容萬界密印真契吞納衆經准其教宜有頓有漸漸謂聲聞小乘登壇學處頓謂菩薩大士灌頂法門是詣極之夷途為入佛之正位頂謂頭頂表大行之尊高灌謂灌持明諸佛之護念超升出離何莫由斯是以剋己服勤不捨晝夜誓志讚仰豈敢怠遑冀每載夏中及三長齊月依經建立嚴淨花以開覺使有識而歸真庶邊境肅清聖躬萬壽不勝懇念之至謹詣右銀臺門奉狀陳請以聞如天恩允許請降墨敕依洎廣德二年歲在甲辰正月二十三日三藏沙門不空奏大興善寺與定國寺僧懷感等四十九人充大德有闕續填伏乞矜放諸雜差科天恩允許請宣付所司敕旨依奏又至十月十三日奉為皇帝降誕度無名僧惠通等一七人至十九日敕旨依奏廣德三年歲在乙巳正月一日改為永泰元年歲仍乙巳再譯仁王護國般若波羅蜜多經二卷右一部二卷大興善寺三藏沙門不空所奏此當第四譯也此經自晉至唐凡有四譯一晉武帝太始三年月支三藏法護譯為一卷名仁王般若經二後姚秦興弘始三年三藏法師鳩摩羅什秦言童壽於長安草堂寺逍遙園西明閣譯為二卷名仁王護國般若波羅蜜經方言尚隔三梁元帝承聖三年西天竺優禪尼國三藏波羅末陀梁云真諦於洪府寶田寺譯為一卷名仁王般若經隱而不行三藏和上詳覽晉經校於梵本文義脫略華夷語乖録表上聞再請翻譯此即第四譯也制曰仁王經望依梵甲再譯梵文右興善寺三藏沙門不空奏伏以如來妙旨惠洽生靈仁王寶義崇護國家前代所譯理未融通潤色微言事歸明聖伏惟寶應元聖文武皇帝陛下睿文啓運濬哲乘時弘闡真言宣揚像教皇風遠振佛日再明每為黎元俾開講誦其仁王經望依梵甲再譯舊文貝葉之言永無漏略金口所說更益詳明仍請僧懷感飛錫子鄰建宗歸性義嵩道液良賁潛真應真慧靈法崇超悟惠靜圓寂道林等於內道場所翻譯福資聖代澤及含靈寇盜永清寰區允穆傳之曠劫救護實深中書門下牒祠部牒奉敕宜依牒至准敕故牒永泰元年四月二日牒中書侍郎同平章事杜鴻漸中書侍郎同平章事元載黃門侍郎同平章事王縉撿校侍中李使撿校右僕射平章事使撿校左僕射平章事使中書令郭子儀使尚書祠部仁王經望依梵甲再譯舊文興善寺沙門三藏不空牒奉中書門下敕牒如牒至准敕故牒永泰元年四月四日令史張濟牒主事楊獻郎中崔漪時也永泰元年四月二日恩旨頒下令譯斯經爰集京城義學大德應制翻譯一十七人三藏大興善寺沙門三藏不空譯梵本大聖千福法花寺沙門法崇證梵本義翻經大德青龍寺主沙門良賁筆受兼潤文大安國寺沙門子鄰潤文大安國寺兼西明寺上座沙門懷感證義荷恩寺沙門建宗大聖千福法花寺沙門飛錫大薦福寺沙門義嵩大興善寺上座沙門潛真資聖寺沙門道液大興唐寺沙門超悟保壽寺沙門應真西明寺都維那沙門歸性大興善寺主沙門慧靈西明寺沙門慧靜等並證義保壽寺沙門圓寂梵音大興唐寺沙門道林讚唄崇福寺沙門義秀校勘寺主沙門弘照撿校典內侍省內閽上柱國臣馬奉獻判官儒林郎行內侍省掖庭局官教博士員外置同正員臣楊利全副使特進右驍衛大將軍上柱國東陽郡開國公臣駱奉仙駕使開府儀同三司兼左監門衛大將軍仍兼知處置神策軍兵馬事知內侍省事內飛龍廄弓箭等使上柱國馮翊郡開國公臣魚朝恩兼統其事翰林學士常袞柳枕等同崇翻譯粵惟聖唐肅宗文明武德大聖大宣孝皇帝重昌堯化革弊救焚至憂黎元澡心齊戒請南天竺執師子國灌頂三藏法諱智藏號曰不空翻傳衆經以安社茲願未滿仙駕歸天洎代宗睿文孝武皇帝重明舜日再造乾坤禮樂惟新四聰明達恭嗣先訓恩纍請焉敕於大明宮南桃園翻譯起自月朔終乎月望於承明殿灌頂道場御執舊經對讀新本詔曰惟新舊經理甚符順所譯新本文義稍圓斯則金言冥契於聖心佛口再生於鳳詔翻傳先後其在茲歟三藏言善兩方教傳三密龍宮演奧邃旨聞天佛日再冲真風永扇諸大德等學該三藏識達五明性相圓通內外精博恭膺詔命傳譯真乘聖慈曲臨推謝理絶更今對校大乘密嚴舊譯長行梵本結偈今依梵夾譯出伽陀繕寫莊嚴謹同進奉聖恩製序各列經初披閲內官未宣中外時京城大德乘如等翹想甘露如渴思漿録表上言乃陳表曰永泰元年八月八日大安國寺上座臨壇大德沙門乘如等上表沙門乘如等言乘如聞日月行於六合求照者昆蟲甘露垂於九霄希潤者草木允所謂覆載不間亭育無私則蚊蚋可逸於長風蛙𮕚可游於滄海者也伏惟寶應元聖文武皇帝陛下慶承塵劫信植河沙威懾魔界聲流佛剎以寶位之重崇寶偈之微以金輪之尊騰金口之教百王千帝曷可同年而語哉乘如等幸逢昌運叨寓玄門常思諷誦以答皇澤伏承頃有恩旨請不空三藏義學沙門等再譯仁王般若波羅蜜多經教理兼著性相周圓緘在龍宮未頒鹿苑僧等昧死敢以請聞伏願天慈示之法寶兼欲依經請百法師置百高座同宣句味共殄祓氛愚誠則然裁惟聖旨無任慊款翹渴之至謹詣右銀臺門奉表陳請以聞輕冒天威伏深戰越謹言寶應元聖文武皇帝批曰仁王真經理精義遠化流賢劫福利蒼生師等咸願敷陳助寧國土所謂開講者依時有恩旨取二十三日於資聖西明兩寺共置百座請百法師講仁王經及百大德轉密嚴經等香花飲食鼓樂絃歌並出有司小得闕乏時屬秋雨霖霪不休所司奏聞請更延日永泰元年八月二十二日左監門衛將軍知內侍省劉清潭宣奉進止兩寺百座先令二十三日迎經為霖雨宜改至二十六日迎經開講其諸司供料著人計會准改日造改期甫至天雨未晴恩旨又延九月一日是日也兩街大德嚴潔幡花幢蓋寶車太常音樂梨園仗內及兩教坊詣銀臺門百戲繁奏時觀軍容使兼處置神策軍兵馬事開府儀同三司兼左監門衛大將軍知內侍省事內飛龍廄弓箭等使上柱國馮翊郡開國公魚朝恩與六軍使陳天龍衆八部鬼神護送新經出於大內其經適出彩雲浮空郁郁紛紛照彰現瑞洎乎己午兩寺開經萬姓歡心祥雲方隱緇素瞻仰獲慶非常三藏不空上表陳謝永泰元年九月二日大興善寺三藏沙門不空上表謝御製經序慶雲詞曰沙門不空言不空道乏前修學虧曩哲猥承綸詔翻譯真經若履春氷猶臨泉谷伏惟陛下撥開慧日布蔭慈雲睿思風飛龍章玉潤躬為序述照煥大千流法雨於九天樹勝幢於百座威儀容衛宛釋迦之下鷲峯士庶駢闐猶波斯之詣王舍慶雲呈瑞喜氣浮空是表太階之平自叶無疆之祐不勝荷戴之至謹奉表陳賀以聞沙門不空誠歡誠喜謹言寶應元聖文武皇帝批曰和上遠自蓮宮親緘貝葉敷演玄教利濟蒼生翻譯既成天人合會朗三秋之霽景開五色之祥雲闡揚真乘符契妙理須因指喻早結師資覩此感通彌深頂敬
