body:
  text: 西京西明寺沙門圓照撰總集群經録上之九梁蕭氏都建業亦云前梁自武帝天監元年壬午至敬帝大平二年丁丑凡經四主五十六年緇素九人所出經律論及諸傳記等并新集失譯諸經總四十七部二百一十七卷於中四十一部二百七卷見在六部十卷闕本梁沙門釋僧祐三部三十九卷諸録集沙門曼陀羅仙三部一十一卷經沙門僧伽婆羅一十部三十二卷經論傳沙門釋寶唱二部五十四卷經集尼傳沙門釋明徽一部一卷尼戒王子月婆首那一部一卷經沙門波羅末陀一十一部二十四卷經論沙門釋慧晈一部一十四卷僧傳無名氏一部一十六卷佛名經集新集失譯諸經一十四部二十五卷經論集釋迦譜十卷於齊代撰別有五卷本與此廣略異房云四卷恐誤見僧祐録及長房內典等録合入齊録隨人附梁出三藏記集十五卷祐録自云十卷見有十五見有十卷長房內典二録並云十四見僧祐長房內典等録亦齊時撰弘明集十四卷祐等三録並云十卷今見十四卷僧祐長房內典等録右三部三十九卷其本並在沙門釋僧祐揚都建初寺僧也本姓俞氏其先彭城下頗人父世居建業祐年數歲入建初寺禮拜因踊躍樂道不肯還家父母憐其志且許入道師事僧範道人年十四家人密為訪婚祐知而避至定林投法達法師達亦戒德精嚴為法門梁棟祐師奉竭誠及年滿具戒執操堅明初受業於沙門法頴頴既一時名匠為律學所宗祐乃竭思鑽求無昏曉遂大精律部有勵先哲武帝衍深相禮遇凡僧事碩疑皆敕審決年衰腳疾敕聽乘輿入內為六宮受戒其見重如此及齊竟陵文宣王子良梁臨川王宏南平王偉儀同陳郡袁昴永康定公貴嬪丁氏等並崇其戒範盡師資之敬凡白黑門徒萬有餘衆祐洞明律藏兼善文藻搜集記録撰為部帙庶尋覽之者功省而博達實法門之綱要釋氏之元宗也自蕭齊末爰及梁代撰釋迦譜等三部自外法苑集世界記師資傳等以非入藏故闕不論並如三藏記等具顯文殊師利所説摩訶般若波羅蜜經二卷或一卷亦直云文殊般若波羅蜜經初出與僧伽婆羅出者同大般若第七會曼殊室利分同本編入寶積當第四十六會見李廓録及續高僧傳法界體性無分別經二卷第二出今編入寶積當第八會見李廓寶唱二録及續高僧傳寶雲經七卷初出與陳代須菩提大乘寶雲經及唐達摩流支寶雨經等目本異譯見陳録及續高僧傳右三部一十一卷其本並在沙門曼陀羅仙梁言弱聲亦云弘弱扶南國人神解超悟幽明畢觀無憚夷險志在開化大齎梵經遠來貢獻以武帝天監二年癸未屆于楊都敕僧伽婆羅令共翻譯遂出文殊般若等經三部雖事傳譯未善梁言故所出經文句隱質文殊師利所説般若波羅蜜經一卷第二出與前曼陀羅出者及大般若曼殊室利分同本房云少勝前曼陀羅所出二卷者大乘十法經一卷初出與元魏覺定所出十法經同本普通年譯度一切諸佛境界智嚴經一卷第二出與元魏曇摩流支入佛境界經同本八吉祥經一卷若人聞此八佛名號不為一切諸鬼神衆難所侵第四出與八吉祥呪及八陽神呪經等同本孔雀王呪經二卷亦云孔雀王陀羅尼經第十譯與唐義淨大孔雀呪王經等同本舍利弗陀羅尼經一卷此呪有神力若能持者雪山有八夜叉王常來擁護所欲隨心第一譯與支謙所出無量門微密持經等同本文殊師利問經二卷亦直云文殊問經天監十七年於占雲館譯袁曇允筆受光宅寺沙門法雲詳定菩薩藏經一卷解脫道論十二卷亦云十三卷天監十四年於占雲館譯阿育王經十卷或加大字第二出與晉安欽育王傳同本異譯天監十一年六月二日於楊都壽光殿譯見寶唱録右一十部三十二卷其本並在並見長房録續高僧傳中都有部數名不備列沙門僧伽婆羅梁言衆鎧亦云僧養扶南國人也幼而頴悟早附法律雖經論具探而偏習對法聲聞漸布垂譽海南具足已後廣精律藏勇意觀方樂宗開化聞齊國弘法隨舶至都住正觀寺為天竺沙門求那跋陀弟子復從跋陀研精方等未盈炎燠博涉多通乃解數國書語值齊曆亡墜道教凌夷婆羅乃靜潔身心外絶交故擁室栖間養素資業大梁御宇搜訪術能以天監五年被敕徵召於揚都壽光殿華林園正觀寺占雲館扶南館等五處傳譯即以天監五年景戌至普通元年庚子譯文殊般若經等十部其梵本並是曼羅獻者長房録復云婆羅更出育王傳五卷者非也前育王經即是其傳不合重載初翻經日於壽光殿武帝躬臨法座筆受其文然後乃付譯人盡其經本敕沙門寶唱慧超僧智法雲及袁曇允等相對疏出華質有敘不墜譯宗天子禮接甚厚引為家僧所司資給道俗改觀婆羅不畜私財以其嚫施成立寺宇大尉臨川王宏接遇隆重普通五年因疾卒于正觀寺春秋六十有五經律異相五十卷天監十五年奉敕撰録云并目録五十五卷今闕目但五十卷其目纂篇題應無別事見寶唱録及長房録比丘尼傳四卷晉宋齊梁四代尼行新編入録右二部五十四卷其本並在沙門釋寶唱楊都莊嚴寺僧也俗姓峯氏吳郡人僧祐律師之高足也博識洽文罕有其匹武帝甚相崇敬天監年中頻敕撰集皆愜帝旨十五年景申又敕撰集經律異相一部唱又撰尼傳四卷房録之中復有名僧傳等七部非此入藏故闕不論餘並備在續高僧傳五分比丘尼戒本一卷亦云彌沙塞律云沙彌尼戒本見寶唱録右一部一卷其本見在沙門釋明徽楊都建初寺僧也戒行精苦習彌沙塞部徽以宋時覺壽譯彌沙塞律但出比丘戒本而無尼戒遂以武帝普通三年壬寅於大律內抄出尼戒一卷即今見行者是撰録者曰檢此戒中衆學之後無七滅諍律本雖略準義合安豈可尼僧有諍不彌其律正文與僧同有故彼律第四十云衆學法中唯除污草及水七滅諍法隨順法並同比丘彼師不安理不通也大乘頂王經一卷亦云維摩兒經第三出西晉法護云等王乃隨多善惡童子經等同本見長房録及續高僧傳右一部一卷其本見在王子月婆首那中印度優禪尼國王之子此優禪尼國或云在南天竺亦云在西天竺未能定矣或可此國據在中天之維博西近南故傳説差誤不定一方生而俊朗體悟幽微專學佛經尤工義理洞曉音韻兼善方言先於東魏興和年中譯經三部梁大同中從魏之梁武帝留住敕遣總知外國使命因譯頂王經一部金光明經七卷或六卷二十二品承聖元年於正觀寺及楊雄宅出涼世無讖出四卷者有十八品真諦更出四品足前成二十二分為七卷今在刪繁録無上依經二卷梁紹泰三年丁丑九月八日於平國縣南康內史劉文陀請令譯見經後記房云陳代出者非也諸家曆並無紹泰三年如別録中涅槃經本有今無偈論一卷房云太清四年撿會諸年曆太清不至四年已下並同決定藏論三卷中有梁言字是梁代譯尋其文句是真諦出也大乘起信論一卷初出與唐實叉難陀出者同本承聖二年癸酉九月十日於衡州始與建興寺出月婆首那等傳語沙門智證等執筆并製序見論序如實論一卷初題云如實論及質難品房云太清四年出仁王般若經一卷承聖三年於豫章寶田寺譯第三出與西晉法護等出者同本彌勒下生經一卷承聖三年於豫章寶田寺譯第五出與羅什出者同本十七地論五卷與唐譯瑜伽師地論同本翻得五卷遇難遂輟見續高僧傳太清四年於富春令陸元哲宅為沙門寶瓊等二十名德譯中論一卷房云太清四年出三世分別論一卷房云太清四年出已上并見長房內典等録右一十一部二十四卷如實論上六部一十五卷見在仁王經下五部九卷闕本沙門波羅末陀梁言真諦或云拘羅那他此曰親依並梵文名字也本西印度優禪尼國人婆羅門種姓頗羅墮景行澄明器宇清肅風神爽拔悠然自遠群藏廣部罔不厝懷藝術異能偏素諳練雖遵融佛理而以通道知名遠涉艱開無憚夷險歷遊諸國遂止中天梁武大同中敕直省張汜等送扶南獻使返國仍遣聘中天竺摩伽陀國請名德三藏并求大乘諸論雜華經等真諦遠聞行化儀軌聖賢搜選名匠惠益氓品彼國乃屈真諦并齎經論恭膺帝旨既素蓄在心渙然聞命以大同十二年八月十五日達于南海沿歷險闊仍滯兩春以太清二年閏八月始屆都邑武皇面申禮敬安置於寶雲殿竭誠供養帝欲傳翻經教不羡秦時更出新文有逾齊日屬道銷梁季寇羯憑凌法為時崩不果宣述乃步入東土又往富春令陸元哲創奉問律將事傳譯招延英秀沙門寶瓊等二十餘人翻十七地論適得五卷而國難未靜側附通傳至大寶年為侯景請還在臺供養于斯時也兵飢相接法幾頽焉會元帝啓祚承聖清夷乃止于金陵正觀寺與願禪師等二十餘人翻金光明經三年二月還返豫章又往新吳始興後隨蕭大保度嶺至于南康並隨方翻譯栖遑靡託諦於梁代所出經論總十一部梁末入陳復出經論如後所述長房內典等録有十八部論一卷亦云諦譯今尋文句非是諦翻既與部執本同不合再出今此刪之如別録中述復有金光明疏等六部二十六卷並是真諦所撰亦並刪之長房內典等録復云天監十五年竺道賢獻優婁頻螺經一卷直云獻上不辨委曲且編疑録此刪不載高僧傳十四卷序録一卷傳十三卷共成十四卷天監十八年撰見長房內典二録右一部一十四卷其本見在沙門釋慧晈未詳氏族會稽上虞人學通內外博訓經律住嘉祥寺春夏弘法秋冬著述撰涅槃梵網義疏又以唱公所撰名僧頗多浮冗因遂開例成廣著高僧傳一部始于漢明帝永平十年終至梁天監十八年凡四百五十三載二百五十七人又傍出附見者二百三十九人都合四百九十六人開其德業大為十列其序略云前之作者或嫌以繁廣刪減其事而抗迹之奇多所遺削謂出家之士處國賓王應傲然自遠高蹈獨絶尋辭榮棄愛本以勵俗為賢若此而不論竟何所紀又云前代所撰多曰名僧竊謂名之與高如有優劣至若實行潛光則高而不名寡德適時則名而不高名而不高本非所紀高而不名則備之今録故省彼名音代以高字謹詳覽此傳義例甄著文詞婉約實可以傳之不朽永為龜鏡矣大佛名經十六卷內題但云佛名經或三十二卷或十四卷右一經時俗號為馬頭羅剎佛名傳出梁代未詳撰者名姓開元録云似是近代所集乃取留支所譯十二卷者錯綜而成於中取諸經名目後取辟支佛名及菩薩名諸經阿羅漢名以為三寶次第總有三十二件禮三寶後皆有懺悔懺悔之下仍引馬頭羅剎偽經置之於後乃以凡俗鄙語雜於聖言本經雖真以有偽雜作此校量編於偽妄亂真録中不得入藏由斯可否已數百年聖上文思聰明遠承付囑崇闡釋教導揚真乘親驗其文許編入藏貞元十五年十月二十三日乃頒制曰大佛名經一部十六卷左右監門衛將軍知內侍省事馬承倩奏前件經未入藏目録敕旨宜令所司附入目録又舊録云尋其所集之者全是庸愚只如第四卷中南無法顯傳經在法寶中列此是行記元非是經置法寶中謬誤之甚古來語曰雖間三藏對事猶迷以傳為經斯其事也以編集傳經請除之又舊録云如第九卷云南無富樓那唐言具滿南無彌多羅唐言慈尼者子大唐大遍覺三藏玄奘譯云滿慈子經中分二今請合稱又云南無阿難羅睺羅此乃二人經中合一今請分二亦何過焉諸如此流伏請改正下順人望上副天心編入貞元新定釋教目録傳出梁朝附於梁代新集失譯諸經摩利支天經一卷或云小摩利支天經是陀羅尼集經第十卷初摩利支經少分異譯六字神呪王經一卷第二出與六呪王經同本虛空藏菩薩問佛經一卷亦云虛空藏菩薩問七佛陀羅尼呪經亦云七佛神呪經初出與隋譯如來方便善巧呪經同本三劫三千佛名經三卷過去莊嚴劫千佛名經卷上現在賢劫千佛名經卷中未來星宿劫千佛名經卷下見長房入藏録彼為三本經今合為一部牟梨曼陀羅呪經一卷或無經字阿吒婆拘鬼神大將上佛陀羅尼經一卷亦直云阿吒婆拘呪經阿彌陀鼓音聲王陀羅尼經一卷大普賢陀羅尼經一卷大七寶陀羅尼經一卷六字大陀羅尼經一卷長者女菴提遮師子吼了義經一卷菩薩五法懺悔文一卷亦名菩薩五法懺悔經陀羅尼雜集一卷大乘五陰論一卷婆藪盤豆菩薩造見陳朝大乘寺藏録初出與唐譯大乘五蘊論同本右一十四部二十五卷除五陰論餘並入藏見長房等失譯録中闕而不載尋其文句非是遠代故編梁末以為梁代失源云魏元氏初都恆安南遷洛陽後遷鄴亦云後魏始從道武帝皇始元年景申即東晉太元二十一年也終梁魏孝靖帝武定八年庚午凡一十三帝一百五十五年五帝都恆安至孝文帝大和十八年南遷七帝都洛陽二主都鄴緇素一十二人所譯經論傳等總八十三部二百七十四卷於中七十三部二百五十五卷見在一十部一十九卷闕沙門釋慧覺一部一十三卷集經沙門釋曇曜三部七卷經傳沙門吉迦夜五部一十九卷經論傳集沙門曇摩流支三部八卷經沙門釋法場一部一卷經沙門勒那摩提三部九卷論沙門菩提留支三十部一百一卷經論沙門佛陀扇多一十部一十一卷經論婆羅門瞿曇般若流支一十八部九十二卷戒論王子月婆首那三部七卷經沙門毗目智仙五部五卷論沙門達磨菩提一部一卷論賢愚經十三卷或十五卷或十六卷或十七卷亦云賢愚因緣經見道慧宋齊録及僧祐録右一部一十三卷其本見在沙門釋慧覺一云曇覺祐云曇覺涼州人牆仞連霄風神爽悟戒地清拔慧鑒通微於于闐國得經梵本以太武皇帝太平真君六年乙酉從于闐還到高昌國共沙門威德譯賢愚經一部見靖邁經圖按梁沙門僧祐賢愚經記云河西沙門釋曇威德等凡有八僧結志遊方遠尋經典於于闐大寺遇般遮于瑟者漢言五年一切大衆集也三藏諸學各弘法寶説經講律依業而教德等八僧隨緣分聽於是競習胡音折以漢義精思通譯各書所問還至高昌乃集為一部既而踰越流沙齎到涼州于時沙門釋慧明河西宗匠道業淵博總持方等以為此經所記源在譬喻譬喻所明兼載善惡相翻即賢愚之分也前代傳經已多譬喻故因事改名號曰賢愚焉大吉義神呪經二卷或四卷見法上録淨度三昧經一卷第四出見竺道祖録及續高僧傳付法藏傳四卷第二出見菩提留支録及續高僧傳右三部七卷吉義呪經一部二卷見在淨土經等二部五卷闕本沙門釋曇曜未詳何許人也少出家攝行堅貞風鑒間約以魏和平年中任北臺照玄統綏緝僧衆妙得其心住恆安石窟通樂寺即魏帝之所造也去恆安西北三十里武周山北面石崖就而鐫之建立佛寺名曰靈巖龕之大者舉高二十餘丈可受三千許人面別鐫像窮諸巧麗龕別異狀駭動人神櫛比相連三十餘里東頭僧寺恆供千人碑碣見在未卒陳委先是太武皇帝太平真君十年司徒崔皓邪佞諛詞令帝崇重道士寇謙之拜為天師珍敬老氏殘害釋種焚毀寺塔至庚寅年大武感致癘疾方始開悟兼有白足禪師來相啓發生愧悔心即誅崔皓埋之都市以口為廁令衆穢之至壬辰年大武云崩孫文成立即起塔寺搜訪經典毀法七載三寶還興曜慨前陵廢欣今重後以和平三年壬寅故於北臺石窟集諸德僧對天竺沙門譯吉義等經三部流通後賢意在無絶大方廣菩薩十地經一卷第五出與羅什莊嚴菩提心經等同本見始興録及道慧宋齊録稱揚諸佛功德經三卷亦名集諸佛華經一直名集華經一名現在名經或四卷第三出羅什等出者同本見道惠宋齊録方便心論一卷或二卷凡四品第二出與東晉覺出者同本見道慧宋齊録及僧祐録付法藏因緣傳六卷或無因緣字亦云藏經或四卷或二卷見道慧宋齊録第三出與宋智嚴魏曇曜出者同本亦見僧祐録雜寶藏經八卷録云十三卷未詳今只有八卷或即分此為十三也見道慧宋齊録及僧祐録右五部一十九卷沙門吉迦夜魏云何事西域人也遊化在慮導物為心以孝文帝延興二年壬子與照玄統沙門曇曜譯大方廣十地等經五部劉孝標筆受信力入印法門經五卷正始元年出華嚴眷屬經如來莊嚴智慧光明入一切佛境界經二卷亦名如來入一切佛境界景明二年於白馬寺出第一譯與梁僧伽婆羅度一切諸佛境界智嚴經同本金色鹿王經一卷初出與瞿曇流支譯同本正始四年出法上録云菩提留支後更重勘右三部八卷前二部七卷見在後一部一卷闕本沙門曇摩流支魏云法希亦曰法樂南印度人棄家入道偏以律藏傳名弘道為務感物而動宣武帝世遊化洛陽以景明二年辛巳至正始四年丁亥為宣武帝譯信力等經三部沙門道寶筆受見長房録等辨意長者子經一卷或云辨意長者子所問經一名長者辨意經見法上録右一部一卷其本見在沙門釋法場未詳何許人也亦以宣武帝時於洛陽譯辨意經一部撰經者曰謹按高僧等傳並云晉時道安出家數載方啓師求經師創付辨意經一卷可五千言一覽便誦又安公失譯復載其名準此東晉之時辨意已行於世如何至魏宣武始云法場出也妙法蓮華經論一卷婆藪盤豆菩薩造亦云法華經論傳侍中崔光僧朗等筆受見長房録初出與菩提留支譯者大同小異題云妙法蓮華經優婆提舍究竟一乘寶性論四卷亦云寶性分別七乘僧上論或二卷或五卷於趙欣宅出見寶唱録第二出譯與菩提留支出者同本寶積經論四卷第二出與菩提留支大乘寶積經論同本見寶唱録右三部九卷前二部五卷見在後一部四卷闕本沙門勒那摩提或云婆提魏言寶意中印度人學識優贍理事兼通三藏教文凡誦一億偈偈三十二字尤明禪觀意在遊化以宣武帝正始五年戊子初屆洛邑遂譯法華論等三部沙門僧朗覺意侍中崔光等筆受當翻經日於洛陽內殿菩提留支傳本勒那扇多參助其後三德乃徇流言各傳師習不相詢訪帝以弘法之盛略敘曲煩敕三處各翻訖乃參校其間隱沒互有不同致有文旨時兼異綴後人合之共成通部見寶唱等録所以法華寶積寶性等論各有兩本耳初寶意沙門神理標異領牒魏詞遍盡隅隩帝每令講華嚴經披釋開悟精義每發一日正處高座忽有持笏執名者形如大官云奉天帝命來請法師講華嚴經意曰今以法席尚未停止待訖經文當從來命雖然法事所資獨不能建都講香火維那梵唄咸亦須之可請令定使者即如所請見講諸僧既而法事將了又見前使云奉天帝命故來下迎意乃含笑熙怡告衆辭訣奄然卒於法座都講等四僧亦同時俱逝凡所聞見歎未曾有毗耶娑問經二卷長房等録並云寶意於洛陽譯今按經序乃云興和四年瞿曇流支於鄴都譯今移在瞿曇録中十地經論十二卷注云初譯有未善魏言多器世間為盞子世間後因入殿齊見諸宿德從弟子索器乃總授鉢幞因悟器器是總名遂改為器世間此十地論長房等録勒那摩提二處俱載今按崔光論序乃云菩提流支勒那摩提在洛陽殿內二人同譯佛陀扇多傳語帝親筆受二録名在理將未可今合為一本在留支録中龍樹菩薩和香方一卷凡五十法今以非三藏教故未録之上之三部今並刪也金剛般若波羅蜜經一卷永平二年於胡國譯是第二出僧朗筆受與秦世羅什及般若第九會能斷金剛分等同本見法上録彌勒菩薩所問經一卷第二出與大乘方等要慧經同本於趙欣宅譯覺意筆受今編入寶積第四十一會改名彌勒菩薩問八法會勝思惟梵天所問經六卷神龜元年於洛陽譯是第三出與護持心羅什思益正同本異出見法上録及續高僧傳深密解脫經五卷全本初譯延昌三年於洛陽出僧辨筆受與唐譯解深密經及相續解脫解節經等並同本見法上録及續高僧傳入楞伽經十卷延昌二年譯是第二出與宋功德賢四卷楞伽及唐譯大乘入楞伽經同普明寺僧朗道湛筆受見續高僧傳大薩遮尼乾子所説經十卷或云受記無所説字或八卷一名菩薩境界奮迅法門經正光元年於洛陽為司州牧汝南王出第二譯與神通變化經同無字寶篋經一卷初出僧朗筆受與唐譯大乘離文字經等同本伽耶山頂經一卷亦云伽耶頂經第二出與羅什文殊問菩提經等同本謗佛經一卷第二出西晉法護決定總持經同本大方等修多羅王經一卷初出覺之轉有經同本佛語經一卷初出與同世崛多出者同本僧朗筆受佛名經十二卷或云十三卷或分為二十卷正光年於胡相國第譯見續高僧傳護諸童子陀羅尼經一卷亦云護諸童子請求男女陀羅尼經法集經六卷或七卷或八卷延昌四年於洛陽出差摩婆帝受記經一卷正光六年於洛陽出不增不減經一卷正光六年於洛陽出七紙云二卷者誤十地經論十二卷或十五卷天親菩薩造釋十地經永平元年四月於太極紫亭譯帝親筆受後付沙門僧辨等記盡論文至夏首畢見崔光序彌勒菩薩所問經論五卷或六卷或七卷十卷釋彌勒所問即寶積第四十一會是洛陽趙欣宅出大乘寶積經論四卷第一譯與寶出者同本異譯單卷寶積經即第四十會普明菩薩會金剛般若波羅蜜經論三卷天親菩薩造永平二年於胡相國宅出僧朗筆受第一譯與唐義淨所出能斷金剛論同本文殊師利菩薩問菩提經論二卷一名伽耶山頂論婆藪盤豆菩薩造天平二年在鄴城殷同寺出僧辨道堪筆受法華經論二卷題云妙法蓮華經優波提舍或一卷曇林筆受并製序第二出前寶意出者同本初有歸敬頌者是見續高僧傳勝思惟梵天所問經論四卷或三卷普泰元年洛陽元桃楊宅出僧辨僧朗筆受録云十卷應誤見續高僧傳無量壽經論一卷題云無量壽優婆提舍願生偈婆藪盤豆菩薩造永安二年於洛陽永寧寺出僧辨筆受十二因緣論一卷淨意菩薩造百字論一卷提婆菩薩造破外道小乘四宗論一卷提婆菩薩造破外道小乘涅槃論一卷提婆菩薩造寶性論四卷或五卷初出與寶意出者同本已上並見在長房録及內典録右三十部一百一卷前二十九部見在後寶性論一部闕本沙門菩提留支魏言道希北印度人也遍通三藏妙入總持志在弘法廣流視聽遂挾道霄征遠蒞蔥左以魏永平之歲至止東華宣武下敕殷勤敬勞後處之永寧大寺供待甚豐七百梵僧並皆周給敕以留支為譯經之元匠也其寺本孝明帝熙平元年靈太后胡氏所立在宮前閶闔門南御道之東中有九層浮圖架水為之舉高九十餘丈上有金剎復高十丈出地千尺去臺百里已遙見之初營基日掘至黃泉獲金像三十二軀太后以為嘉瑞奉信法之徵也是以飾制瓌奇窮世華美剎表置金寶瓶容二十五斛承露金盤一十一重鐵鎖角張槃及鎖上皆有金鐸如一石甕九級諸角皆懸大鐸上下凡有一百三十枚其塔四面九間六窗三戶皆朱漆扉扇垂諸金鈴層有五千四百枚復施金鐸鋪首佛事精妙彈土木之工繡柱金鋪驚駭心目高風永夜鈴鐸和鳴鏘鏘之音聞十餘里北有正殿形擬太極中諸像設金玉珠繡作工巧綺冠絶當世僧房周接千有餘間臺觀星羅參差間出雕飾朱紫繢以丹青栝柏楨松異草叢集院臺周匝皆施椽瓦正南三門樓開三道三重去地二百餘尺狀若天門赫奕華麗夾門列四力士四師子飾以金玉莊嚴煥爛東西兩門例皆如此所可異者唯樓兩重北門通道俠路而置其四門外樹以青槐亘以淥水京師行旅多庇其下路斷飛塵不由淹雲之潤清風送涼豈藉合歡之發乃詔中書舍人常景製寺碑文故云須彌寶殿兜率淨宮莫尚於斯是也外國所獻經像皆在此寺寺既初成明帝及太后共登浮圖視宮中如掌內下臨雲雨上天清朗以見宮中事故禁人不聽登之時有西域沙門菩提達摩者波斯國人也越自西域來遊洛京見金盤炫日光照雲表寶鐸含風響出天外歌詠讚嘆疑是神工自云年一百五十歲歷涉諸國靡不周遍如此寺精廬閻浮所無也訖佛境界亦無有比口唱南無合掌連日孝昌二年大風發屋拔樹剎上寶瓶隨風而墮入地丈餘復命工人更安新者至永熙三年二月為天所震帝登凌雲臺望火遣南陽王寶炬録尚書孫稚將羽林一千人來救于斯時也雷雨晦冥霰雪交注第八級中平旦火起有二道人不忍焚燼投火而死其焰相續經餘三月入地剎柱乃至周年猶有煙氣其年五月有人從東萊郡至云見浮圖在於海中光明儼然周覩非一俄而雲霧亂起失其所在至七月平陽王為侍中斛斯椿所脅西奔長安至十月而洛京遷于漳鄴先時留支奉敕創翻十地經論厥初命章宣武皇帝親自筆受然後方付沙門僧辨等訖盡論文佛法隆盛英俊蔚然相從傳授孜孜如也三藏留支從洛陽宣武帝永平元年戊子至鄴都孝靖帝天平二年乙卯將三十年相繼翻譯出金剛般若等經十地等論共三十部帝又敕清信士李廓撰衆經録廓學通玄素條貫經論雅有標擬故其録云三藏法師留支房內經論梵本可有萬夾所翻新文筆受本滿一間屋然其慧解與勒那相亞而神悟聰敏洞善方言兼工呪術則無抗行矣嘗坐井口澡灌內空弟子未來無人汲水留支乃操柳枝聊撝井中密加誦呪才始數遍泉水上涌平及井欄即以鉢酌用之盥洗旁僧具見莫測其神咸共嘉歎大聖人也留支曰勿妄褒賞斯乃術法外國共行此方不習謂為聖耳懼惑世罔遂祕不宣奮迅王問經二卷不必定入印經一卷一切法高王經一卷第一義法勝經一卷一順中論二卷已上五部七卷長房等録並云菩提留支所譯今按經初本譯序記並云瞿曇流支非菩提也今移在瞿曇録中寶髻菩薩四法經論一卷三具足經論一卷轉法輪經論一卷已上三部三卷房等亦云菩提留支所譯按序記乃是毗目智仙故此三部亦移録衆經論目録一卷此是留支所撰非是梵本別翻今目録中敘此不復存也菩薩境界奮迅法門經十卷寶唱録云菩提留支譯今以即是薩遮尼乾子經異名故不存別十法經一卷元象二年於鄴都出第二譯與梁伽婆羅出者同本今編入寶積當第九會名大乘十法會無畏德菩薩經一卷亦云無畏德女經元象二年於鄴都譯第五出阿術達經等同本編入寶積當第三十二會曇林筆受如來師子吼經一卷正光六年於洛陽出第一譯與唐日照方廣師子吼經同本銀色女經一卷元象二年於鄴都譯第二出與西晉法炬前世三轉經同本正恭敬經一卷一名威德陀羅尼中説經或名正恭敬經元象二年鄴都出第一譯與闍那崛多善恭敬經同本轉有經一卷元象二年於鄴都譯第二出與菩提留支方等修多羅同本阿難陀目佉尼訶離陀鄰尼經一卷第八譯與支謙無量門微密持經同本金剛上味陀羅尼經一卷正光六年於洛陽出第一譯與隋崛多金剛場經同本攝大乘論二卷普泰元年於洛陽出與陳真諦唐玄奘所譯攝論同本阿僧佉作無字寶篋經一卷元象二年於鄴都出第二譯與留支等出者同上十部並見隋費長房録及唐內典録等右一十部一十一卷前九部十卷見在後一部一卷闕沙門佛陀扇多魏言覺定北印度人神悟聰敏內外博通特善方言尤工藝術以孝明帝正光六年乙巳至孝靖帝元象二年己未於洛陽白馬寺及鄴都金華寺譯十法等經十部沙門曇林等筆受得無垢女經一卷或無得字一名論義辨才法門興和三年於鄴都出第三譯與寶積無垢施會及法護離垢施經同本見長房録聖善住意天子所問經三卷興和二年於鄴城金華寺出曇林筆受第五譯或四卷與寶積善住意會及法護如幻三昧經等同本見長房録毗耶娑問經二卷初出與寶積廣博仙人會同本興和四年七月十七日於尚書令儀同高公第譯三十日畢沙門曇林筆受見經前敘記奮迅王問經二卷第二出與羅什自在王經同本興和四年七月三十日於尚書令儀同高公第內啓夾創譯沙門曇林筆受見經前序記不必定入定印經一卷初出與唐義淨入定不定印經同本興和四年九月十九日於尚書令儀同高公第譯沙門曇林筆受見經前序記一切法高王經一卷一名一切法義王經第三出與諸法勇王經等同本興和四年六月二十三日在竇太尉定昌寺譯沙門曇林筆受見經前序記第一義法勝經一卷初出與大威燈光仙人經同本興和四年九月一日於尚書令儀同高公第譯沙門曇林筆受見經前序記金色鹿王經一卷興和四年於金華寺沙門曇林筆受第二出與曇摩留支出者同本見長房録八部佛名經一卷亦云佛經興和四年於金華寺出沙門曇林筆受見長房録順中論二卷無著菩薩造武定元年八月十日尚書令儀同高公第譯沙門曇林筆受唯識論一卷一名破色心或云唯識無境界論在金華寺出天親菩薩造第一譯與陳真諦唯識論及唐譯二十唯識論並同本見長房録一輸盧迦論一卷龍樹菩薩造在金華寺出見長房録云伊迦輸盧迦論正法念處經七十卷興和元年於鄴城大丞相高澄第譯曇林僧昉等筆受見長房録無垢優婆夷問經一卷興和四年出見長房録解脫戒本一卷出迦葉毗部武定元年在鄴都侍中尚書令高澄請出見經前序僧昉筆受并製序亦見長房録菩薩四法經一卷金華寺出曇林李希義等筆受見長房録寶意猶兒經一卷於金華寺為高仲密出見長房録犢子道人問論一卷於金華寺為高仲密出李希義筆受見長録右一十八部九十二卷解脫戒上一十五部八十九卷見在菩薩四法下三部三卷闕本婆羅門瞿曇般若流支魏云智希中印度波羅㮈城淨志之種少學佛法妙間經旨神理標異領悟方言以孝明帝熙平元年遊寓洛陽後京師遷鄴亦與時從以孝靖帝元象元年戊午至武定元年癸亥於鄴城內在金華昌定二寺及尚書令儀同高公第內譯得無垢女等經一十八部沙門僧昉曇林居士李希義等筆受回諍論一卷業成就論一卷已上二論長房等録皆云瞿曇流支譯今按經初本譯序記乃云毗目仙今依經記為正又續高僧傳云當魏時有沙門菩提流支與般若流支前後出經而衆録傳寫率多輕略各去上字但云流支而不知是何流支迄今群録譯目相攝難得詳定升今搜校實録件注如前餘所未見侯諸後進耳摩訶迦葉經二卷亦云大迦葉經或無大字興和三年於驃騎大將軍左僕射內侍中司徒公孫騰第譯見經前序今編入寶積當第二十三會僧伽吒經四卷元象元年於司徒公孫騰第譯見續高僧傳頻婆娑羅王問佛供養經一卷興和三年出增一阿含第二十六異譯見長房録右三部七卷前二部六卷見在後一部一卷闕本王子月婆首那魏言高空中印度優禪尼國王子以孝靖帝元象元年戊午訖興和三年辛酉於鄴都司徒公孫騰之第譯迦葉等經三部沙門僧昉筆受首那從魏之梁及於陳代更譯諸經如別所述寶髻菩薩四法經論一卷題云寶髻經四法優婆提舍天親菩薩造興和三年九月一日在金華寺為御史中丞高仲密譯沙門曇林筆受見經前序記三具足經論一卷題云三具足經優婆提舍天親菩薩造興和三年九月十三日在金華寺為驃騎大將軍高仲密譯沙門曇林筆受見經前序記轉法輪經論一卷題云轉法輪經優婆提舍天親菩薩造興和三年八月十一日在金華寺為開府儀同三司渤海高仲密譯沙門曇林筆受見經前序記業成就論一卷天親菩薩造初出與唐譯大乘成業論同本興和二年七月二十五日為高仲密於金華寺譯沙門曇林筆受見經前序記回諍論一卷龍樹菩薩造興和三年三月二十日於金華寺為驃騎大將軍開府儀同三司御史中尉渤海高仲密譯沙門曇林筆受見經前序右五部五卷其本見在沙門毗目智仙北印度烏萇國人剎利王種釋迦之苗裔曩者流離王壞迦毗羅城誅殘釋種當斯時也有四釋子忿其見逼不思犯戒出外拒軍流離遂退歸還本國城中不受告曰吾為法種誓不行師汝退彼軍非吾族也既被放斥遠投諸國本是聖胤競宗樹之四釋支離皆王一國今烏萇梵衍王等並其後也嗣胤相承于今不絶智仙法師即斯王種妙間三藏最善毗曇與瞿曇流支同遊魏境而瞿曇流支尊事為師以孝靖帝興和三年辛酉於鄴城內在金華寺共瞿曇流支譯寶髻論等五部沙門曇林筆受驃騎大將軍開府儀同三司御史中尉渤海高仲密為檀越啓請供養並見經前序記而智仙法師遊方弘化踰越沙險志在利生既啓梵文應多部卷但余見淺狹尋覽未周所覩五部經件述如右後進儻遇幸希續補使法門無謬豈不善歟自魏及唐傳録非一智仙法師未蒙編載弘法之名莫著高行之迹靡彰傷哉悲哉深可嘆矣涅槃論一卷或云大般涅槃經婆藪盤豆菩薩造略釋大經見內典録初出右一部一卷其本見在沙門達磨菩提此云法覺內典録云達磨菩提譯涅槃論不顯帝代而編魏末今同彼附於此中復有涅槃論三卷亦題達摩菩提譯尋文乃釋前論或疑是人造齊高氏都建業亦云北齊從文宣帝天保元年庚午至高恆無諡承光元年丁酉凡經六主二十八年緇素二人所出經論八部五十二卷沙門那連提黎耶舍七部五十一卷經論居士萬天懿一部一卷經菩薩見實三昧經十六卷或十四卷大統四年於天平寺出今編入寶積當第六十會大集月藏經十卷題云大集經月藏分第十二或十二卷或十五卷或直云月藏經大統二月於天平寺出大集須彌藏經五卷內題云大乘大集經須彌藏分第十五或題云須彌藏經天保元年於天平寺出大悲經五卷天保九年於天平寺出大周録云涅槃支流月燈三昧經一卷或十卷天保八年於天平寺出施燈功德經一卷亦名然燈經天保九年於天平寺出法勝阿毗曇心論經六卷大德優波扇多造或七卷或無法勝字或加別譯字或云法勝字或加別譯阿毗曇論清河二年北天寺出並見長房録右七部五十一卷其本並在沙門那連提黎耶舍齊言尊稱北印度烏場國人正音應云塢茶茶音持耶反奘法師云烏仗那唐翻之苑謂昔輪王之苑囿其王與佛同氏亦姓釋迦剎帝利種齊云土田主也由劫初之時先為分地主因即號焉今所謂國王者是也舍年十七發意出家尋值名師備聞正教二十有一得受具足戒聞諸宿老歎佛景迹或言某國有鉢某國有衣頂骨牙齒神變非一遂即起心願得瞻奉以戒初受須知律相既滿五夏發足遊方所以天梯石臺之迹龍廟寶塔之方廣周諸國並親頂禮僅無遺逸曾寄竹園寺一住十年通履僧坊多值明德有一尊者深識人機見語舍云若能靜修應獲聖果恐汝遊涉終無所成爾日雖聞情無領悟晚來欲想悔將何及耶舍北背雪山南窮師子歷覽聖迹仍旋舊壤乃覩烏場國主真大士焉自所經見罕儔其類試略述之安民以理民愛若親後夜五更先禮三寶香華伎樂竭誠供養日出升殿方覽萬機次到辰時香水浴像宮中常設日百僧齋王及夫人手自行食齋後消食習諸武藝日景將昳寫十行經與諸僧共談法義復與群臣量議治政暝入佛堂自奉燈燭禮拜讀誦各有恆條了其常業乃還退靜三十餘年斯功不替王有百子誠孝居懷釋種餘風胤流此國但以寺接山阜野火所焚各相差遣四遠投告六人為伴行化雪山之北至于峻頂見有人鬼二路人道荒險鬼道利通行客心迷錯尋鬼道漸入其境便遭殺害昔有聖王於其路首作毗沙門天王石像手指人路同伴一僧錯入鬼道耶舍覺已口誦觀音神呪百步追及已被鬼害自以呪力得免斯厄因復前行又逢山賊專念前呪便蒙靈衛賊來相突對目不見循路東指到苪苪國值突厥亂西路不通反鄉意絶乃隨流轉北至泥海之旁南距突厥七十餘里彼既不安遠投齊境天保七年屆於鄴都文宣帝洋極見殊禮偏異恆倫耶舍時年四十骨梗雄雅物議彈之緣是文宣禮遇隆重安置天平寺中請為翻經三藏殿內梵本千有餘夾敕送於寺處以上房為建道場供窮珍妙別立廚庫以表尊崇舍從文宣帝天保八年丁丑至高緯無諡天統四年戊子於鄴城天平寺譯菩薩見實經等七部敕照玄大統沙門法上等二十餘人監掌翻譯照玄都瞿曇般若流支長子沙門達摩闍那齊言法智及居士萬懿傳語舍於齊時大興正法弘暢衆心文宣重法殊異躬偏恭敬其奉信推誠為如此也耶舍每於宣譯之暇時陳神呪冥救顯助立功多矣未幾授昭玄都俄轉為統所獲供祿不專自資好起慈惠樂興福業設供飯僧施諸貧乏獄囚繫畜咸將濟之市閙所多造義井親自漉水津給衆生又於汲郡西山建立三寺依泉旁谷制極山美又收養癘疾男女別坊四事供承務令周給又往突厥客館勸持六齋羊料放生受行素食又曾遇病百日不起天子皇后躬問起居耶舍歎曰我本外客德行未隆乘輿今降重法故爾內撫其心愧懼交集耶舍後至隋代更出諸經備在隋録具如後述尊勝菩薩所問一切諸法入無量門陀羅尼經一卷第三出與無涯持法門經等同本或直云尊勝菩薩所問經亦直云入無量門陀羅尼經右一部一卷其本見在居士萬天懿本姓拓跋北代雲中人也魏分十姓因為萬俟氏世居洛陽故復為河南人也後單稱萬氏少曾出家師婆羅門而聰慧有志力善梵書梵語兼工呪術由是應召得預翻傳之數懿以武成帝湛河清年中於鄴都自譯尊勝菩薩所問經一部見長房録
