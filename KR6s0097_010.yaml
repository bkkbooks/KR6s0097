body:
  text: 西京西明寺沙門圓照撰總集群經録上之十周宇文氏都長安從閔帝元年丁丑依右無號直稱元年至靖帝大定元年辛丑凡經五帝二十五年沙門四人所出經論一十四部二十九卷於中六部一十一卷見在八部一十八卷闕本周沙門攘那跋陀羅一部一卷論沙門闍那耶舍六部一十五卷經沙門耶舍崛多三部八卷經論沙門闍那崛多四部五卷經五明論合一卷一聲論二醫方論三工巧論四呪術論五符印論見長房録右一部一卷本闕沙門攘那跋陀羅周云智賢波頭摩國人雖善達三藏而偏精律部以明帝二年戊寅於長安舊城婆伽寺共闍那耶舍譯五明論一部耶舍崛多闍那崛多等傳沙門智仙筆受又長房録等云周武帝代天和四年己丑摩勒國沙門達摩流支周言法希為大冢宰蕩公宇文護譯波羅門天文二十卷今以非三藏教故不存之大乘同性經二卷亦名一切佛行入智毗盧遮那藏說經一名佛十地經或四卷天和五年譯上儀同城陽公蕭吉筆受初出與唐日照證契大乘經同本大雲請雨經一卷內題云大雲經請雨品第六十四房云品第一百非也天和五年譯沙門圓明筆受初出與大雲輪請雨及大方等大雲請雨二經並同本寶積經三卷天和六年譯沙門道𮗿筆受定意天子所問經五卷天和六年譯沙門圓明筆受出大集今疑與善住意經同本入如來智不思議經三卷見翻經圖第二出與度諸佛境界智光嚴經等同本建德元年譯佛頂呪經并功能一卷保定四年譯學士鮑永筆受五部見長房録右六部一十五卷請雨經上二部二卷見在寶積經下四部十二卷本闕沙門闍那耶舍周言藏稱亦曰勝名中印度摩伽陀國人專修宴坐妙窮定業共二弟子耶舍崛多闍那崛多以武帝保定四年甲申至建德元年壬辰為大冡宰晉蕩公宇文護於長安舊城四天王寺譯大乘同性經等六部柱國平高公侯伏壽為總監撿校金光明經更廣壽量大辨陀羅尼經五卷於歸聖寺譯智仙筆受此五卷金光明經非是全譯但於曇無讖四卷經中續壽量大辨二品今在刪繁録十一面觀世音神呪經一卷於四天王寺譯上儀同城陽公蕭吉筆受初出與唐譯十一面神呪心經等同本須跋陀羅因緣論二卷於四天王寺譯沙門圓明筆受並見長房録右三部八卷前二部六卷見在後一部二卷闕本沙門耶舍崛多周言稱藏優婆國人共小同學闍那崛多於武帝時為大冢宰宇文護於四天王寺及歸聖寺譯金光明經等三部靖邁圖中又有大雲請雨經一卷亦云稱藏所譯今以此經即是與前闍那耶舍共出之者不合別上二處俱存妙法蓮華經普門品重誦偈一卷在益州龍淵寺譯今編入八卷普門品種種雜呪經一卷或無經字呪總二十三首在益州龍淵寺譯佛語經一卷第二出與元魏菩提留支譯者同本在益州龍淵寺譯金色仙人問經一卷於長安舊城四天王寺譯蕭吉筆受並見長房録右四部五卷前二部二卷見在後二部三卷闕本沙門闍那崛多周言志德北印度揵達國人師徒周遊來達茲境以武帝時於四天王寺譯金色仙人問經後隨譙王宇文儉往益州於龍淵寺復譯普門偈等三部崛多入隋更廣翻譯備如後述陳氏都建業自武帝永定元年丁丑至煬帝禎明三年己酉凡經五主三十三年緇素三人所出經律論及集傳等總四十部一百三十三卷於中二十部八十九卷見在一十四部四十四卷闕本陳沙門拘羅那他三十八部一百一十八卷經律論集王子月婆首那一部七卷經沙門須菩提一部八卷經金剛般若波羅蜜經一卷第三譯與姚秦羅什元魏流支等出者同本解節經一卷是解深密經初五品異譯出第一卷此經非是全部真諦略出以證義耳遺教經論一卷釋遺教經十八空論一卷攝大乘論三卷無著菩薩造第二出與元魏佛陀扇多譯者同本天嘉四年於廣州制旨寺譯慧愷筆受攝大乘論釋十五卷天親菩薩釋亦云釋論或十二卷第一譯與隋笈多等出者同本天嘉四年於廣州制旨寺出慧愷筆受佛性論四卷天親菩薩造中邊分別論二卷婆藪盤豆造或三卷於臨川郡出第一譯辨中邊論同本顯識論一卷內題云顯識品從無相論出題云真諦新附此轉識論一卷即出前顯識論中題云真諦新附此唯識論一卷天親菩薩造初云修道不共他在臨川郡譯或上加大乘字第二出與元魏般若流支等出者同本寶行王正論一卷三無性論二卷出無相論或一卷無相思塵論一卷初出與唐譯觀所緣論同本見靖邁經圖及內典録解捲論一卷初出與唐義淨掌中論同本見靖邁經圖及內典録廣義法門經一卷第三出與漢安世高所出普法義經等同本題云是中阿含一品別譯天嘉四年十一月十日於廣州制旨寺譯佛阿毗曇經二卷亦云論録云九卷今只二軸未詳所以又內典録中更載佛毗曇一卷非也律二十二明了論一卷亦直云明了論出正量部波羅提木叉論中覺護法師造光大二年正月二十日於廣州譯沙門慧愷筆受阿毗達磨俱舍釋論二十二卷婆藪盤豆造第一譯與唐譯俱舍論同本天嘉四年正月二十五日制旨寺譯至閏十月十日訖至五年二月二日更至光大元年十二月二十五日畢隨相論一卷或云求那摩諦隨相論德慧法師造或二卷立世阿毗曇論十卷題云立世毗曇藏或無論字亦云天地記經永定三年出録云十五卷未詳四諦論四卷婆藪跋摩造部執異論一卷亦名部異執論第二出與十八部論及宗輪論同本婆藪盤豆法師傳一卷此曰天親第二金七十論三卷外道迦毗羅仙人造明二十五諦謂數論也或二卷長房等録別存僧佉論二卷者非也謂梵僧佉此翻為數金剛般若論一卷大般涅槃經論一卷或無般字第二出反質論一卷今疑即藏中如實論是故彼題云如實論反質難品墮負論一卷成就三乘論一卷正說道理論一卷意業論一卷大空論三卷於豫章栖隱寺出僧澀多律一卷陳言總攝俱舍論偈一卷初出唐譯俱舍頌同本天嘉四年於制旨寺出俱舍論本六卷據其論本即前偈是今復言本未詳所以翻外國語七卷一名俱舍論因緣事一名雜事修禪定法一卷除四部外餘三十四部見長房録右三十八部一百一十八卷金七十論二二十五部八十二卷見在金剛論下十三部二十六卷闕本沙門拘羅那他陳曰親依或云波羅末陀此云真諦並梵文之名字也本西印度優禪尼國人以梁武太清二年屆于建業頃屬梁季崩亂不果宣傳雖翻經論棲遑靡記逮陳武永定二年七月還返豫章又上臨川晉安諸郡真諦雖傳經論道鈌情離本意不申更觀機攘遂欲泛舶往楞伽修國道俗更請結誓留之不免物議遂停南越便與前梁舊齒重覆所翻其有文旨乖競者皆鎔冶成範始末備通至文帝天嘉四年楊都建元寺沙門僧准忍律師等並建標領欽聞新教故使遠浮江表親承芳問諦欣其來意乃為翻攝大乘等論首尾兩載覆疏宗旨而飄寓投委無心寧寄又泛小舶至梁安郡更裝大舶欲返西國學徒追逐相續留連太守王万奢述衆元情重申要請諦又且修人事權止海隅伺旅束裝未思安堵至三年九月發自梁安泛泊西引業風賦命飄還廣州十二月中上南海岸刺史歐陽穆公顧延住制旨寺請翻新文諦顧此業緣西還無指乃對沙門慧愷等翻廣義法門經及唯識論等後穆公薨沒世子紇重為檀越開傳經論時又許焉而神思幽通量非情測嘗居別所四絶水洲紇往造之嶺峻濤涌未敢凌犯諦乃鋪舒坐具在於水上跏坐其內如乘舟焉浮波達岸既登接對而坐具不濕依常敷置有時或以荷葉踏水乘之而渡如斯神異其例甚衆至光太二年六月諦厭世浮雜情弊形骸未若佩理資神早生勝壤遂入南海北山將捐身命時智愷正講俱舍聞告馳往道俗奔赴相繼山川刺史又遣使人伺衛防遏躬自稽顙致留三日方紆本情因爾迎還止于王國寺時宗愷諸僧欲延還建業會楊輦碩望恐奪時榮乃奏曰嶺表所譯衆部多明無塵惟識言乖治術有蔽國風不隸諸華可流荒服帝然之故南海新文有藏陳世以太建元年遘疾少時遺訣嚴正勗示因果書傳纍紙其文付弟子智休至正月十一日午時遷化時年七十有一明日於潮亭焚身起塔十三日僧宗法准等各齎經論還返匡山自諦來東夏雖廣出衆經而偏宗攝論故討尋教旨者通覽所譯則彼此相發綺繢鋪顯故隨處翻傳親流疏解諦從陳武永定二年戊寅至孝宣大建元年己丑更譯金剛般若經等三十八部微附華飾盛顯隋唐見曹毗別曆及隋費長房録唐內典録等餘有未譯梵本書並多羅樹葉凡有二百四十夾若依陳紙翻之則列二萬餘卷今見譯訖止是數夾之文並在廣州制旨王園兩寺是知法寶弘博定在中天識量玼瑣誠歸東夏何以明之見譯藏經四千餘卷生便棄擲習學全希用此量情情可知矣初諦傳度攝論宗愷歸心窮檢教源銓題義旨遊心既久懷敞相承諦又面對闡揚情理無狀一日氣屬嚴厲衣服單疏忍噤通霄門人側席愷等終夜靜立奉侍咨詢言久情喧有時服寐愷密以衣被覆足諦潛覺知便曳之于地其節儉知足如此愷如先奉侍逾久逾親以他日便喟然憤氣衝口者三愷問其故答曰君等欵誠正法實副參傳但恨弘法非時有阻來意耳愷聞之如噎良久聲淚俱發跪而啓曰大法絶塵遠通赤縣群生無感可遂埋耶諦以手指西北曰此方有大國非近非遠吾等沒後當盛弘之但不覩其興以為太息耳即驗往隔今統敷揚有宗傳者以為神用不同妄生異執惟識不識其識不無然無上依經二卷准經後記云梁代譯今編梁録又長房內典等録復有正論釋義等一十三部一百八卷今以並是經論義疏真諦所撰非梵本翻故刪不録又內典録中梁陳二代俱載起信論者非也勝天王般若波羅蜜經七卷初出與大般若第六會同本右一部七卷其本見在王子月婆首那陳言高空中印度優禪尼國王之子從魏之梁譯業無輟以梁太清二年六月有于闐沙門求那跋陀陳言德賢齎勝天王般若一部梵文凡十六品始洎建業首那忽見德賢有此經典敬戀冥懷如對真佛因從祈請畢命弘宣德賢嘉其雅操虛心授與那得保持以為希遇屬侯景作亂未暇翻傳負載東西諷持供養民之所欲天必從焉遂屬陳朝於建業首那負笈懷經自遠而至江州刺史儀同共法氍渴仰大乘護持正法以文帝倩天嘉六年歲次乙酉七月辛巳朔二十三日癸卯勸請首那於州廳事略開題序設無遮大會四衆雲集五千餘人匡山釋僧果及遠邇名德並學冠百家博通五部各有碩難紛綸靡不煥然氷釋到其月二十九日還興業伽藍揵捶既響僧徒咸萃首那躬執梵文譯為陳語楊州阿育王寺釋智昕暫遊彭匯伏膺至教耳聽筆疏一言敢失再三循環撰為七卷訖其年九月十八日文句乃盡江州僧正釋慧恭時通三學始末監掌具經序及長房等録那雖一身而備經涉歷元魏梁陳相繼宣譯後不測其終大乘寶雲經八卷第二出與梁世曼陀羅七卷寶雲及唐譯十卷寶雨並同本見一乘寺藏録右一部八卷本闕沙門須菩提陳言善現或云善吉亦云善業扶南國人解悟超群詞彩逸俗化物無倦遊方屆茲於楊都城內至敬寺為陳主譯大乘寶雲經一部隋楊氏都大興自文帝開皇元年辛丑至恭帝義寧二年戊寅相承三帝三十八年緇素十人所出經論及傳録等總九十九部三百四十五卷於中九十七部三百十一卷見在二部一十四卷闕本洋川郡守瞿曇法智一部一卷經沙門毗尼多流支二部二卷沙門那連提爾耶舍八部二十三卷經沙門闍那崛多三十九部一百九十二卷經沙門釋法經等二部一十二卷經録目沙門釋寶貴一部八卷合經沙門菩提登一部二卷經翻經學士費長房一部一十五卷三寶録沙門達摩笈多九部四十六卷經論沙門釋信行三十五部四十四卷集録如下二十八卷及三十卷中說業報差別經一卷開皇二年三月譯房云第二出與罪業報應經大同小異者全乖也見長房録及續高僧傳右一部一卷其本見在優婆塞達磨闍那隋云法智姓瞿曇氏即元魏般若流支長子本中印度婆羅痆斯國人婆羅門種流滯東川遂鄉華俗父子相承祖習傳譯高齊之季為昭玄都齊國既平佛法同毀智因僧職轉任俗官冊授洋川郡守隋受周禪梵牒即來敕召智還使掌翻譯智既妙善隋梵二言執本自翻無勞傳度以開皇二年壬寅譯業報差別經一部成都沙門釋智鉉筆受文詞詮序義體趙郡沙門釋彥琮製序長房等録並云於興善寺譯業報差別經今為不然此經二年季春譯出季夏有詔始遷大興云興善寺翻入非詳審也大乘方廣總持經一卷或無乘字開皇二年七月譯第二出與西晉法護濟諸方等學經同本見長房録象頭精舍經一卷開皇二年二月譯第三出與羅什文殊問菩提經等同本見長房録右二部二卷其本並在沙門毗尼多流支隋言滅喜北印度烏萇國人不遠五百由延振錫巡坊來觀盛化至止便召入令翻經以文帝開皇二年壬寅譯方廣總持等經二部給事李道寶般若流支次子曇皮二人傳語長安沙門釋法纂筆受為隋言并整比文義沙門彥琮並皆製序長房録亦云於興善寺出此亦不然過如前述大方等大集日藏經十卷或十二卷或十五卷題云大乘方等日藏分與大集密分同本當第四出開皇四年五月起翻五年二月訖沙門智鉉費長房筆受大雲輪請雨經二卷開皇五年正月出沙門慧獻筆受是大雲經第六十四品第二出與周世闍那耶舍大雲請雨經及隋崛多方等請雨經並同本大莊嚴法門經二卷一名文殊師利神通力經亦名勝金花明德女經開皇三年正月出第三譯與法護大淨法門經等同本沙門智鉉筆受德護長者經二卷一名尸利崛多長者經開皇三年六月出沙門僧琨筆受第四譯與法護月光童子經等同本百佛名經一卷開皇二年十二月出沙門慧獻筆受第二出力莊嚴三昧經一卷開皇五年十月出費長房筆受蓮華面經二卷開皇四年三月出沙門慧獻筆受堅固女經一卷開皇二年十二月出沙門慧獻筆受亦云牢固女上八部並見長房録右八部二十三卷其本並在沙門那連提黎耶舍隋言尊稱北印度烏萇國人先於齊國為昭玄統共昭玄都沙門法智譯經七部備在齊録建德之季周武克齊佛教與國一時平殄耶舍外假俗服內襲三衣避地東西不遑寧息五衆凋窘投厝無所儉餓溝壑者減食施之老病扶力者隨緣濟益雖事力匱薄拒諫行之而神志休強說導無倦屯負留難便歷四年有隋御㝢重興三寶開皇之始梵經遙應爰降璽書請來弘譯二年七月弟子道密等侍送入京住大興善寺其年季冬草創翻業敕昭玄統沙門曇延等三十餘人對翻主上禮問殷繁供奉隆渥年雖朽邁行轉精勤曾依舍利弗陀羅尼具依修業夢得境界自當作佛如此靈祥雜沓其例非一後移住廣濟煬帝名廣改弘濟今復避諱為崇濟焉為外國僧主存撫羇客妙得物心忽一旦告弟子吾年老力微不久去世及今明了誡爾門徒佛法難逢宜勤修學人身難獲慎勿空過言訖就枕奄爾而化時滿百歲即開皇九年八月二十九日初耶舍先逢善相者云年必至百亦合登仙中壽果終其言驗矣登仙冥理猶難測之然其形貌瓌奇頂如肉髮耳長而聳目正處中有異常倫特為殊相固是傳法之碩德也法主既傾哀驚道俗紹隆之事將漸墜焉凡於隋代譯經八部即大集日藏大雲輪大莊嚴法門等經是也並沙門僧琛明芬給事李道寶學士雲皮等僧俗四人更遞度語沙門智鉉道邃慧獻僧琨奉朝請庾質學士費長房等筆受昭玄統沙門曇延昭玄都大興善寺主靈藏等二十餘德監護始末至五年冬勘練俱了並沙門彥琮製序尋耶舍遊涉四十餘年國五十餘里十五萬瑞景靈迹勝寺高僧駛水深林山神海獸無非奉敬並預徵降事既廣周未遑陳敘沙門彥琮為之本傳具流於世護國菩薩經二卷見內典録今編入寶積當第十八會移識經二卷今編入寶積當第三十九會改名賢護長者會初出與唐譯顯識經同本開皇十一年十月日訖學士費長房筆受見長房録發覺淨心經二卷初出與寶積發勝志樂會同本開皇十五年九月出十月訖沙門僧琨等筆受見長房録虛空孕菩薩經二卷大集經第十六分第四出與虛空藏經及虛空藏神呪等同本開皇七年正月出三月訖沙門僧曇筆受彥琮製序見長房録大方等大集賢護經五卷或六卷題云大方等大集經賢護分亦云賢護菩薩第七譯與般舟三昧經等同本開皇十四年二月出十五年二月訖沙門明芬等筆受大集譬喻王經二卷或無大集字是大集別品開皇十五年五月出六月訖沙門道密等筆受兼前賢護經並見長房録佛華嚴入如來德智不思議境界經二卷第二出與度諸佛境界智光嚴經等同本見內典録四童子三昧經三卷或直名四童子經第二出與法護方等泥洹開皇十三年五月出七月訖沙門僧琨筆受見長房録妙法蓮華經添品七卷或八卷二十七品寶塔天授連之為一故二十七仁壽元年因普曜寺沙門上行所請崛多笈多二法師重勘梵本闕者添之具經前序善思童子經二卷第四出與大方等頂王經及大乘頂王經等同本開皇十一年七月出九月訖學士費長房筆受沙門彥琮製序見長房録金光明經銀主陀羅尼品囑纍品一卷曇無讖出四卷真諦七卷周世崛多五卷並無此二品檢梵本有後出之見長房録後十七年沙門寶貴取前後譯合成八卷故不別存大方等大雲請雨經一卷內題云大方等大雲請雨品第六十四第三出與大雲請雨及大雲輪請雨二經同本異譯見內典録諸法本無經三卷第三出與諸法無行經等同本開皇十五年六月出七月訖學士劉憑等筆受見長房録大威燈光仙人問疑經一卷第二出與第一義法勝經同本開皇六年正月出二月訖沙門道邃筆受沙門彥琮製序見長房録入法界體性經一卷或無體字第二出與寶積三昧文殊問法身經同本開皇十五年七月出八月訖沙門道密等筆受見長房録希有希有校量功德經一卷或云希有校量功德經初出與唐譯最無比經同本開皇六年六月出其月訖沙門僧曇筆受沙門彥琮製序善敬經一卷亦名善恭敬經一名善恭敬師經第二出與正恭敬經同本開皇六年七月出八月訖沙門僧曇等筆受彥琮製序見長房録文殊尸利行經一卷第二出與文殊巡行經同本開皇六年三月出四月訖沙門僧曇筆受沙門彥琮製序見長房録八佛名號經一卷第五出與八吉祥神呪八陽神呪經等同本開皇六年五月出六月訖沙門道邃等筆受彥琮製序見長房録不空羂索呪經一卷亦云不空羂索觀世音心呪經初出與唐譯不空羂索神呪心經等同本開皇七年四月出五月訖僧曇等筆受彥琮製序見長房録十二佛名神呪經一卷是云十二佛名神呪校量功德除障滅罪經初出與唐譯稱讚如來功德神呪經同本開皇七年五月出其月訖僧琨等筆受彥琮製序見長房録一向出生菩薩經一卷第十譯與無量門微密等持同本開皇五年十一月出十二月訖沙門僧曇等筆受沙門彥琮製序見長房録金剛陀羅尼經一卷第二出與金剛上味陀羅尼經同本開皇七年六月出八月訖沙門僧琨等筆受沙門彥琮製序見長房録如來方便巧呪經一卷第二出與虛空藏菩薩問佛經同本開皇七年正月出二月訖沙門僧曇筆受沙門彥琮製序見長房録東方最勝燈王如來經一卷題云東方最勝燈王如來遣二菩薩送呪奉釋迦如來助護持世間經第四出與持句神呪經同本見內典録大法炬陀羅尼經二十卷開皇十二年四月出十四年六月訖沙門道邃等筆受見長房録大威德陀羅尼經二十卷開皇十五年七月出十六年十二月訖沙門僧琨等筆受見長房録五千五百佛名經八卷開皇十三年八月出十四年九月訖沙門僧曇等筆受見長房録觀察諸法行經四卷開皇十五年四月二十四日出五月二十五日訖學士費長房等筆受見長房録無所有菩薩經四卷見內典録月上女經二卷開皇十一年四月出六月訖學士劉憑筆受沙門彥琮製序見長房録出生菩提心經開皇十五年十月出其月訖學士劉憑筆受見長房録商主天子所問經一卷或無所問字開皇十五年八月出九月訖學士費長房等筆受見長房録諸法最上王經一卷開皇三年五月出七月訖沙門明芬等筆受見長房録大乘三聚懺悔經一卷見內典録起世經一卷第五譯長阿含記世經異出見經題上云崛多笈多二法師共出新編入佛本行集經六十卷開皇七年七月出十一年二月訖沙門僧曇學士費長房劉憑等筆受沙門彥琮製序見長房録聖善住意天子所問經四卷第六出與如幻三昧經及寶積善住意會等同本開皇十五年四月出沙門道邃等筆受見長房録諸佛護念經十卷開皇十四年十月出十二月訖沙門僧曇等筆受見長房録右三十九部一百九十二卷本行集上三十七部一百七十八卷見在聖善住下二部一十四卷闕本沙門闍那崛多隋云志德北賢豆賢豆本音因陀羅婆陀耶此云至處謂天帝釋所護故也賢豆之音彼國之訛略耳身毒天竺此方之訛稱也而彼國人總言賢豆而約之以為五方也唐西域記云正音印度唐翻為日月有多名斯其一也言諸群生輪回不息無明長夜莫有司晨其猶白日既隱宵燭斯繼唯有星光之照豈如朗月之明苟緣斯致因而譬月良以其土聖賢繼軌導凡御物如月照臨由是義故謂之印度印度種姓族類群分而婆羅門特為清貴從其稱傳以成俗無云經界之別總謂婆羅門國焉揵陀囉國人也隋言香行國居富留沙富邏城隋云丈夫宮也剎帝利種姓金俱凡反步隋云頂也謂如孔雀之頂彼國以為貴姓父名跋闍邏娑囉隋云金剛堅也幼懷遠量長垂清範位居宰輔燮理有經崛多昆季五人身居最小宿殖德本早發道心適在髫年便求出離二親見其識量仍為贊成即入大林伽藍因蒙度脫其郁波弟耶隋云常近受持者今所謂和上此乃于闐之訛略也奘法師云中天近音烏波陀耶唐云親教亦云依學名嗜那耶舍隋云勝名專修宴座妙窮定業其阿遮利夜隋云傳授或云正行即所謂阿闍梨也亦近國之訛略耳奘法師云阿遮利耶唐云軌範亦云教授名闍若那跋達羅隋云智賢遍通三學偏明律藏崛多自出家後孝敬專誠教誨積年指歸通觀然以賢豆聖境靈跡尚存便隨本師具得瞻奉時年二十有七受戒三夏師徒結志遊方弘法初有十人同契出境路由迦臂施國淹留歲序國王敦請其師奉為法主益利頗周將事巡歷便踰大雪山西足固是天險之峻極也至厭怛國既初至止野曠民希所須食飲無人營造崛多遂捨具戒竭力供侍數經時艱冥靈所祐幸免災橫又經渴囉槃陀及于闐等國屢遭夏雨寒雪暫時停住既無弘演棲寓非久又達吐谷渾國漸至鄯州于時即西魏後元年也雖歷艱危心愈猛厲發蹤跋涉三載于茲同伴十人唯存四箇以周明武成之歲初屆長安止草堂寺師徒遊化已果來心更登淨壇再受具足精誠從道尤甚由來既處京華漸通隋語名聞稍遠時輩所欽被詔延入後園共論佛法殊禮別供充諸禁中思欲通法無由自展具情上啓即蒙別敕為造四天王寺聽在居住自茲已後翻新經及接先闕既非弘泰羇縻而已會譙王宇文儉鎮蜀復請同行於彼三年恆任益州僧主住龍淵寺建德隳運像教不弘五衆一期同斯俗服武帝下敕追入京輦重加爵祿逼從儒禮秉操鏗然守死無懼帝愍其貞亮哀而放歸路出甘州北由突厥遇值中面他鉢可汗殷重請留因往復曰周有成壞勞師去還此無廢興幸安意住資給供養尚使稱心遂爾併停十有餘載闍梨智賢還西滅度未久之間和上遷化隻影孤寄莫知所安賴以北狄君民頗弘福利因斯飄寓隨方利物有齊僧寶暹道邃智周僧威法寶僧曇智照僧律等十人以武平六年相結同行採經西域往返七載將事東歸凡獲梵本二百六十部回至突厥聞周滅齊併毀佛法退則不可進無所歸遷延彼間遂逢至德如渴值飲若暗遇明因與同居講道相玩所齎新經仍共尋閲請翻名題勘舊録目轉覺巧便有異前人律等內誠各私慶幸獲寶遇匠得不虛行同誓焚香共契宣布大隋受禪佛法即興暹等齎經先來應運開皇元年季冬屆止敕付所司訪人令譯二年仲春便就傳述季夏詔曰殷之五遷恐民盡死是則以吉凶之土制長短之命謀新去故如農望秋龍首之山川原秀麗卉木滋阜宜建都邑定鼎之基永固無窮之業在茲可城曰大興殿門曰大興縣曰大興園苑池沼其號並同寺曰大興善也於此寺中傳度法本于時崛多仍住北狄至開皇四年大興善寺沙門曇延等三十餘人以躬當翻譯音義乖越承崛多在北乃奏請還京帝乃別敕追延崛西歸已絶流滯十年深思明世重遇三寶忽蒙遠訪欣願交并即與使乎同來入國于時文帝巡幸洛陽於彼奉謁天子大悅賜問頻仍未還京闕尋敕敷譯新至梵本衆部彌多或經或書且內且外諸有翻傳必以崛多為主僉以崛多言識異方字曉殊俗故得宣辨自運不勞傳度理會義門句圓詞體文意粗定銓本便成受筆之徒不費其力試比先達抑亦繼之五年敕令崛多共婆羅門沙門若那竭多開府高恭息都督天奴和仁及婆羅門毗舍達等道俗六人令於內史內省翻梵古書及乾文等于時廣濟寺唯獨耶舍一人譯經別敕崛多使兼翻經兩頭來往到十二年翻書記了二百餘卷進畢爾時耶舍先已終亡仍敕崛多專主翻譯移法席就大興善寺更召婆羅門沙門達摩笈多并敕高天奴高和仁兄弟等同傳梵語又增置十大德沙門僧休法粲法經慧藏洪遵慧遠法纂僧暉明穆曇遷等監掌翻事銓定宗旨沙門明穆彥琮重對梵本再審覆勘整理文義崛多曾傳于填東南二千餘里有遮拘迦國彼王純信敬重大乘宮中自有摩訶般若大集華嚴三部大經並十萬偈王躬受持親執鎖鑰轉讀則開香華供養又道場內種種莊嚴誘諸小王令入禮拜此國東南二十餘里山甚巖險有深淨窟置大集華嚴方等寶積楞伽方廣舍利弗華聚二陀羅尼都薩羅藏摩訶般若八部般若大雲經等凡十二部咸十萬偈國法相傳防衛守護又有入滅定羅漢三人窟中禪寂每至月半諸僧就山為其淨髮此則人法住持有生之所憑賴崛多道性純厚神志剛正愛德無厭求法不懈博聞三藏遠究真宗遍學五明兼間世論經行得道場之功總持通神呪之理三衣一食終固其誠仁濟弘誘非關勸請勤誦佛經老而彌篤強識先古久而逾詣士庶欽重道俗崇敬隋滕王遵仰戒範奉以為師因事塵染流擯東越又在甌閩道聲載洽身心兩救為益極多至開皇二十年便從物故春秋七十有八唯添品法華序仁壽元年辛酉崛多笈多二法師於大興善寺重勘梵本闕者添譯既在仁壽之元年出添品即非開皇二十年卒也又內典録云仁壽之末崛多以緣他事流擯東越續高僧傳即云開皇二十年卒録傳俱宣所撰而自相矛楯何也崛多自西服來至東華循歷翻傳自開皇五年訖仁壽之末出護國等經總三十九部合一百九十二卷並詳撿陶治理教圓通文明義結具流於世見隋唐二録護國菩薩經佛華嚴入如來德智大方等大雲請雨經東方最勝燈王如來經無所有菩薩經大乘三聚懺悔經已上六部內典録云崛多所譯靖邁經圖云笈多出今依內典為正大集譬喻王經移識經法炬陀羅尼經已上三部經圖之中崛多笈多二録俱載者誤也今並載崛多之餘笈多録內除之衆經目録七卷開皇十四年五月十日敕興善寺翻經所撰至十月十四日別録六卷總録一卷別總成七見長房録衆經目録五卷仁壽二年敕請興善寺翻經沙門及學士等撰見續高僧傳右二部一十二卷其本並在沙門釋法經等並大興善寺翻經大德也開皇十四年甲寅撰一切經録法經等二十大德緝撰成之總標綱紀位為九録區別品類有四十二分合有二千二百五十七部五千三百一十卷揚化寺沙門明穆區域條分指蹤紘絡日嚴寺沙門彥琮覼縷綱維考校同異見長房録又至仁壽二年敕所司請興善寺大德與翻經沙門及學士等披撿法藏詳定經録隨類區辨總為五分單本第一重翻第二重別生第三賢聖集傳第四疑僞第五見闕都合二千一百九部五千五十八卷別生疑僞不須抄寫已外三分入藏見録並沙門彥琮綜理裁定見續高僧傳合金光明經八卷二十四品開皇十七年合當第四本見長房録沙門彥琮製序右一部八卷其本見在沙門釋寶貴大興善寺僧也開皇十七年丁巳合金光明經一部貴即周世智度論師道安之神足玩閲群典見昔晉世沙門支敏度合兩支兩竺一白五家首楞嚴為一部作八卷今准祐録及合經記四本合成無白延也合一支兩竺三家維摩為一部作五卷又沙門僧就合四家大集為六十卷諸此合經文義宛具斯既先哲遺蹤貴遂依承以為規矩遂合涼世法豐四卷十六品者周朝稱藏續譯壽量大辨二品分為五卷梁時真諦更出四品謂三身分別業障滅品陀羅尼最淨地品依空滿願通前十八成二十四分成七卷隋代志德復出銀主陀羅尼品及囑纍品前後所出共二十四分為八卷沙門彥琮重覆勘校品部究足始自于斯文號經王義稱深妙願言幽顯頂戴護持又長房云招提寺沙門僧就開皇六年合大集經成六十卷者今尋就所合經難為憑准中有差舛如後大乘録及刪繁録中具述故此録中存其別本合部之者刪之不存占察善惡業報經二卷亦出六根聚經名大乘實義經亦名地藏菩薩經亦直云占察經亦名地藏菩薩業報經右一部二卷其本見在沙門菩提登外國人也不知何代譯占察經一部長房録云此經撿録無目而經首題云菩提登在外國譯似近代出今諸藏內並寫流傳而廣州有一僧行塔懺法以皮作二枚帖子一書善字一書惡字令人擲之得善者好得惡者不好又行自撲法以為滅罪青州亦有一居士同行此法開皇十三年有人告廣州官司云是其妖官司推問其人引證云塔懺法依占察經自撲法依諸經中五體投地如太山崩廣州司馬郭誼來京向岐州具狀聞奏敕不信占察經道理令內史侍郎李元操共郭誼就寶昌寺問諸大德沙門法經等報云占察經目録無名及譯處塔懺法與衆經復異不可依行敕云諸如此者不須流行今謂不然豈得以己管窺而不許有博見之士耶法門八萬理乃多途自非金口所宣何得顯斯奧旨大唐天后天冊萬歲元年敕東都佛授記寺沙門明佺等刊定一切經録已編入正經訖後諸覽者幸無惑焉開皇三寶録十五卷開皇十七年十二月二十三日上內題云歷代三寶紀見內典録及續高僧傳右一部一十五卷見在翻經學士費長房成都人也房本出家周廢僧侶權從儒服及隋興復仍習白衣時預參傳筆受詞義以歷代群録多惟編經至於佛僧紀述蓋寡乃撰三寶履歷帝年始自周莊魯莊至於開皇末歲首列甲子傍列衆經翻譯時代附見綸綜號為開皇三寶録撰成陳奏下敕行之其序略云今之所撰略准三書以為指南顯茲三寶佛生年瑞依周夜明經度時祥承漢宵夢僧之元始城塹棟梁毗贊光輝崇於慧皎其外傍採隱居歷年國志典墳僧祐集記諸史傳等僅數十家摘彼翠翎成斯紀翮扇之千載風於百王共秉智炬之光照時昏暗同傳法流之潤洽世燋枯闡我皇猷道開厥始昔結集之首並指在某國某城今宣譯之功理須各宗時代故此録體率舉號稱為漢魏吳及大隋録也失譯疑僞依舊注之人以年為先經隨代而次有重列者猶約世分總其華戎黑白道俗合有一百九十七人都所出經律戒論傳二千一百四十六部六千二百三十五卷位而分之為十五軸一卷總目兩卷入藏三卷帝年九卷代録代録編鑒經翻譯之少多帝年張知佛在世之遐邇入藏別識教小大之淺深大方等善住意天子所問經四卷第二出與宋功德直菩薩念佛三昧經同本是大集別分見內典録緣生初勝分法本經二卷初出與唐譯分別緣起經同本亦直云緣生經見內典録大業十二年十月出十三年九月兼論並訖見經前序藥師如來本願經一卷第二出與灌頂第十二卷及唐譯藥師本願功德經等同本見內典録大業十一年十二月八日於翻經館訖沙門行矩製序金剛般若論三卷無著菩薩造見內典録菩提資糧論六卷聖者龍樹本比丘句在釋見內典録攝大乘論釋論十卷第二出與真諦譯者及唐譯世親攝論並同本世親菩薩釋見內典録緣生論一卷聖者鬱楞伽造與緣生經同本見內典録起世因本經十卷第六出與長阿含第四分記世經及樓炭經等同本亦直云起世經見內典録右九部四十六卷其本見在沙門達摩笈多隋云法密亦云法藏本南印度羅囉力賀反國人也內典録及翻經圖並云北天竺烏場國人者非也剎帝利種姓弊耶伽囉隋云虎氏有弟四人身居長子父母留戀不聽出家然以篤愛法門深願離俗年二十三往中印度界鞬拏究撥闍城隋云耳出於究牟地隋云黃花僧伽囉磨隋云衆園舊云於伽藍者訛略也笈多於此寺中方得落髮改名法密年二十五方受具戒其郁波弟耶名佛馱笈多隋云覺密阿遮利夜名舊拏達多隋云得施又一阿遮利夜名為普照通大小乘經論咸能誦說行賓茶夜法謂行乞食者舊為分衛訛略也入第耶那隋云念修舊為禪那及持訶那並訛僻也恆入此觀以為常業笈多受具足後仍住三年就師學問師之所得略窺戶牖後以普照師為吒迦國王所請從師至彼經停一載師還本國笈多更留四年住於提婆鼻阿囉隋云天遊也天謂國王遊謂僧處其所王立故名天遊舊以寺代之乃此土公院之名所謂司也延也又云招提者亦訛略也世世依字解招謂招引提謂提携並浪語也此乃西言耳正音云招聞提奢此云四方謂處所為四方衆僧之所依也於是歷諸大小乘國及以僧寺聞見倍多北路商人頗至於彼遠傳東域有大支那國焉舊名真丹振旦者並非正音無義可譯惟知是此神洲之總名也初雖傳述不甚明信未作來心但以志在遊方情無所繫遂往迦臂施國六人為伴仍留此國停住王寺笈多遂將四伴於國城中二年停止遍歷諸寺備觀所學遠遊之心尚未寧處其國乃是北路之會雪山北陰商旅咸湊其境於商客所又聞支那大國三寶興盛同侶一心屬意來此非惟觀其風化願在利物弘經便踰雪山西足薄佉羅國沙多叉拏國達摩悉鬢多國此諸國中並不久住足知風土諸寺儀式又至渴羅盤陀國留停一年未多開導又至沙勒國同伴一人復還本邑餘有三人停在王寺謂沙勒王之所造也經住兩載仍為彼僧講念破論有二千偈旨明三印多破外道又為講如實論亦二千偈約其文理乃是世間論義之法又至龜茲國亦停王寺又住二年仍為彼僧講釋前論其王篤好大乘多所開悟留引之心旦夕相造笈多係心東夏無志潛停密將一僧間行至焉耆國在阿蘭拏寺講通前論又經二年漸至高昌客遊諸寺其國僧侶多學漢言雖停二年無所宣譯又至伊吾便停一載值難避地西南路純砂磧水草俱乏同侶相須性命莫投乃以所齎經論權置道旁越山求水冀以存濟求既不遂勞弊轉增專誦觀世音呪夜雨忽降身心充悅尋還本途四顧茫然方道迷失踟蹰進退乃任前行遂達瓜州方知曲取北路之道也笈多遠慕大國跋涉積年初契同徒或有留歿獨顧單景屆斯勝地靜言思之悲喜交集尋蒙帝旨延入京城處之名寺供給豐渥即開皇十年冬十月也至止未淹華言略悉又奉別敕令就翻經移住興善執本對譯允正定繁所誦大小乘論並是深要至於宣解大弘微旨此方舊學頻遣積疑然而慈恕立身柔和成性心非道外行在言前戒地夷而靜智水幽而潔經洞字源論窮聲意加以威容詳正勤節高猛誦響繼晨宵法言通內外又性好端居簡絶情務寡薄嗜欲息杜希求無倦誨人有踰利己曾不忤顏於賤品輕心於微類遂使未覩者傾風暫謁者欽敬自居譯人之首惟存傳授所有覆疏務在綱領煬帝定鼎東都敬重隆厚至於佛法彌增崇樹乃下敕於洛水南濱上林園內置翻經館搜舉翹秀永鎮傳法登即下徵笈多并諸學士並預集焉四事供承復恆常度致使譯人不墜其緒成簡無替於時及隋綱云頽郊壘煙搆梵本新經一時斯斷笈多蘊其深解遂闕陳弘始於開皇中歲屆于京師即與崛多共參傳譯于時崛多拱權令望居最傳度梵隋時惟稱美至於深義莫不反啓斯人而容範滔然無涉世路所以傳譯聲望抑己揚人仁壽之末崛多以緣他事流擯東越笈多乘機專主傳譯從大業初年終大業末歲譯大方等善住意等經九部並文義澄潔華質顯暢沙門彥琮明則行矩等筆受至大唐武德三年終于洛汭沙門彥琮為之作傳初笈多翻金剛斷割般若波羅蜜經一卷及普樂經一十五卷未及練覆值僞鄭淪廢不暇重修今卷部在京多明八相等事今謂大唐日照三藏翻方廣大莊嚴經一十二卷與舊普曜經梵本是同於中亦明八相等事與此普樂經亦應梵本同也
