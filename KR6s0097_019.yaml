body:
  text: 西京西明寺三藏沙門圓照撰總集群經録上之十九敘列古今諸家目録之二大唐開元釋教録二十卷庚午歲西崇福寺沙門智升撰右此中所撰總分上下兩録具件如左總集群經録上從漢至唐所出經教區別人代具顯此中目録始終續於後列後漢傳譯緇素一十二人所出經并新舊集失譯諸經總二百九十二部合三百九十五卷九十七部一百三十一卷見在一百五十五部二百六十卷闕本曹魏傳譯沙門五人所出經戒羯磨總一十二部合一十八卷四部五卷見在八部一十三卷闕本右為第一卷吳代傳譯緇素五人所出經等并及失譯總一百八十九部合四百一十七卷六十一部九十二卷見在一百二十八部三百二十五卷闕本西晉傳譯緇素一十二人所出經戒等并新舊集失譯諸經總三百三十三部合五百九十一卷一百五十六部三百三十一卷見在一百七十七部三百六十九卷本闕右為第二卷東晉傳譯緇素一十六人所出經律論并新舊集失譯諸經總一百六十八部合四百六十八卷八十五部三百三十六卷見在八十三部三百三十二卷本闕符秦傳譯沙門六人所出經律論等總一十五部合一百九十七卷七部六十五卷見在八部一百三十二卷本闕右為第三卷姚秦傳譯沙門五人所出經律論等總九十四部合六百二十四卷六十六部五百二十八卷見在二十八部九十六卷闕本乞伏秦傳譯沙門一人所出經并三秦代新舊失譯經律論等總五十六部合一百一十卷三十二部七十九卷見在二十四部三十一卷闕本前涼傳譯外國優婆塞一人所出經總四部合六卷一部一卷見在三部五卷本闕北涼傳譯緇素九人所出經律論等并新舊集失譯諸經總八十二部合三百一十一卷二十五部二百九卷見在五十七部一百二卷本闕右為第四卷宋代傳譯緇素二十二人所出經律論等并新集失譯諸經總四百六十五部合七百一十七卷九十三部二百四十三卷見在三百七十二部四百七十四卷本闕右為第五卷蕭齊傳譯沙門七人所出經律總一十二部合三十三卷七部二十三卷見在五部五卷本闕梁代傳譯緇素八人所出經論及諸傳記并新集失譯經律集等總四十六部合二百一十七卷四十部一百九十一卷見在六部十卷本闕元魏傳譯緇素一十二人所出經論總八十三部合二百七十四卷七十三部二百五十五卷見在一十部一十九卷本闕高齊傳譯緇素二人所出經論總八部合五十二卷並在無闕右為第六卷周朝傳譯沙門四人所出經論等總一十四部合二十九卷六部一十一卷見在八部一十八卷本闕陳代傳譯緇素三人所出經律論及集傳等總四十部合一百三十三卷二十六部八十九卷見在一十四部四十四卷本闕隋朝傳譯緇素九人所出經論傳録等總九十九部合三百一卷六十二部二百八十七卷見在二部一十四卷本闕右為第七卷皇朝傳譯緇素已有三十七人所出經律論及傳録等總三百一部合二千一百七十卷二百八十一部二千一百四十三卷見在二十部二十七卷訪本未獲都計一十九代傳譯道俗等總一百七十六人所出大小乘經律論及賢聖集傳二千二百七十八部合七千四十六卷一千一百三十部五千四十八卷見在一千一百四十八部一千九百九十八卷本闕右為第八第九卷合從古録至開元釋教新録及續補舊闕總有四十一家具如前列右為第十卷別分乘藏録下上録所辦總顯出經而大小未分三藏混雜此録之內具件科條闕本等經續附於後就別録中曲分為七有譯有本録第一一千一百二十四部五千四十八卷復就此録更開為三菩薩三藏録第一六百八十六部二千七百四十五卷菩薩契經藏五百七十三部二千一百七十三卷大乘經單重合譯總四百三十二部一千八百八十卷般若經新舊譯二十一部七百三十六卷寶積經新舊譯八十二部一百六十九卷大集經新舊譯三十四部一百四十二卷花嚴經新舊譯二十六部一百八十七卷涅槃經新舊譯六部五十八卷五大部外諸重譯經二百七十三部五百八十八卷大乘經單譯總一百三十一部二百九十三卷菩薩調伏藏二十六部五十四卷菩薩對法藏九十七部五百一十八卷大乘釋經論二十一部一百五十五卷大乘集義論七十六部三百六十三卷右為第十一十二卷聲聞三藏録第二三百三十部一千七百六十二卷聲聞契經藏二百四十部六百一十八卷小乘經單重合譯總一百五十三部三百九十四卷根本四阿含經五部二百三卷長阿含中別譯經二十二卷中阿含中別譯經六十卷增一阿含中別譯經五十一卷雜阿含中別譯經五十卷別譯雜阿含經二十卷四含外諸重譯經一百四十八部一百九十一卷小乘經單譯總八十七部二百二十四卷聲聞調伏藏五十四部四百四十六卷正調伏藏四十一部三百五十八卷調伏藏眷屬一十三部八十八卷聲聞對法藏三十六部六百九十八卷有部根本身足論八部一百三十一卷有部及餘支派論二十八部五百六十七卷聖賢傳記録第三一百八部五百四十一卷梵本翻譯集傳六十八部一百七十三卷此方撰述集傳四十部三百六十八卷右為第十三卷有譯無本録第二一千一百四十八部一千九百八十卷大乘經闕本四百八部八百一卷大乘經重譯闕本總二百部四百八十四卷般若部中闕本一十部二十七卷寶積部中闕本三十部五十四卷大集部中闕本一十三部九十七卷花嚴部中闕本一十二部二十七卷涅槃部中闕本四部二十六卷諸重譯經闕本一百三十一部二百五十三卷大乘經單譯闕本總二百八部三百一十七卷大乘律闕本二十二部二十五卷大乘論闕本二十部四十八卷大乘釋經論闕本四部一十一卷大乘集義論闕本一十六部三十七卷右為第十四卷小乘經闕本六百五部八百一十五卷小乘重譯經闕本總一百二十五部二百六十五卷根本四阿含闕本二部一百九卷長阿含部分闕本一十四部二十八卷中阿含部分闕本一十四部一十四卷增一阿含部分闕本七部八卷雜阿含部分闕本四十五部四十五卷諸重譯經闕本四十三部六十二卷小乘經單譯闕本總四百八十部五百五十卷小乘律闕本三十七部四十二卷賢聖集傳闕本四十七部一百八十四卷右為第十五卷支派別行録第三六百八十二部八百一十二卷大乘別生經二百九部三百二十八卷般若部中別生一十部一百一十九卷寶積部中別生一十三部一十五卷大集部中別生五十一部五十八卷花嚴部中別生一十部一十一卷諸大乘經別生二百二十五部一百二十五卷大乘律別生七部七卷大乘論別生七部一十一卷小乘別生經二百八十三部二百八十三卷長阿含部分別生一十四部一十四卷中阿含部分別生二十四部二十四卷增一阿含部分別生二十六部二十六卷雜阿含部分別生一百三十六部一百三十六卷諸小乘經別生八十三部八十三卷小乘律別生小乘論無別生四十二部四十九卷賢聖集傳別生一百三十四部一百三十四卷右為第十六卷刪略繁重録第四一百四十七部四百八卷新撿出別生經六十七部一百八十五卷新撿出名異文同經二十部五十二卷新撿出重上録經八部三十卷補闕拾遺録第五三百六部一千一百一十一卷大乘經舊譯五十九部六十九卷大乘律舊譯二部二卷大乘論舊譯三部四卷小乘經舊譯五十九部六十八卷小乘律舊譯小乘舊論無遺五部五卷賢聖集傳舊譯三十六部五十七卷右已上一百六十部二百五卷並是舊譯今見有本大周入藏兼拾遺編入新譯大乘經六十一部三百三十六卷新譯大乘律一部一卷新譯大乘論一十二部一十九卷新譯小乘經八部八卷新譯小乘律小乘論無新譯一十一部一百五十九卷新譯賢聖集傳三部五卷右已上九十六部五百二十八卷並是大周刊定録後新譯所以前録未載今補闕編又小乘律戒羯磨六部一十卷然並撰述有據時代盛行補闕編入又此方所撰集傳四十部三百六十八卷然皆裨助正教故然補闕編入目録右為第十七卷疑惑再詳録第六一十四部一十九卷偽妄亂真録第七三百九十四部或九十四一千五十七卷或五十五卷未詳開元釋教録新編偽經三十九部或三十七五十六卷或五十四未詳苻秦釋道安録中偽經二十五部二十八卷梁釋僧祐録中偽經一十四部一十六卷簫齊釋道備偽撰經見長房録五部五卷簫齊僧法尼誦出經僧祐等録並編入偽二十一部三十五卷元魏孫敬夢授經見內典録一部一卷梁沙門妙光偽造經見僧祐録一部一卷隋開皇衆經録中偽經八十六部一百四十一卷隋仁壽衆經録中偽經一十一部四十一卷大唐內典録中偽經二十二部八十七卷大周刊定録中偽經八十部或二十未詳一百一卷隋沙門信行三階集偽録周録雖載收之不盡三十五部四十四卷諸雜抄經增減聖説五十四部五百一卷右為第十八卷大乘入藏録上大乘經律論總六百三十八部二千七百四十五卷二百五十八帙此直述注名及摽紙數餘如廣録大乘經五百六十三部二千一百七十三卷二百三帙大乘律二十六部五十四卷五帙大乘論九十七部五百一十八卷五十帙右為第十九卷小乘入藏録下小乘經律論總三百三十一部一千七百六十二卷一百六十五帙集傳録附此直述經名及摽紙數餘如廣録小乘經二百四十部六百一十八卷四十八帙小乘律五十四部四百四十六卷四十五帙小乘論三十六部六百九十八卷七十二帙賢聖集一百八部五百四十一卷五十七帙都計大小乘經律論及賢聖傳見入藏者總一千七十六部合五千四十八卷四百八十帙此入藏中大乘經部數與前廣録部數不同者以前大寶積經諸部合成故在本數為四十九部上録此中合為一部故欠四十八不同右為第二十卷庚辰歲西明寺翻經臨壇賜紫沙門圓照等奉敕撰貞元新定釋教目録三十卷右此中所撰準舊亦總分上下兩録具件如左總集群經録上此中分二一特奉制旨二總集群經後漢傳譯緇素一十二人所出經律并新舊集失譯諸經總二百九十二部合三百九十五卷九十七部一百三十一卷見在一百九十五部二百六十卷本闕曹魏傳譯沙門五人所出經戒羯磨總一十二部合一十八卷四部五卷見在八部一十三卷本闕吳代傳譯緇素五人所出經等并及失譯總一百八十九部合四百一十七卷六十一部九十二卷見在一百二十八部三百二十五卷本闕西晉傳譯緇素一十二人所出經戒等并新舊集失譯諸經總三百三十三部合五百九十一卷一百五十六部三百三十一卷見在一百七十七部二百六十九卷本闕右為第一第二第三第四卷東晉傳譯緇素一十六人所出經律論并新舊集失譯經一百六十八部合四百六十八卷八十五部三百三十六卷見在八十三部三百三十二卷本闕苻秦傳譯沙門六人所出經律論等總一十五部合一百九十七卷七部六十五卷見在八部一百三十二卷闕本右為第五卷姚秦傳譯沙門五人所出經律論等總九十四部合六百二十四卷六十六部五百二十八卷見在二十八部九十六卷本闕乞伏秦傳譯沙門一人所出經并三秦代新舊失譯經律論等總五十六部合一百一十卷三十二部七十九卷見在二十四部三十一卷本闕前涼傳譯外國優婆塞一人所出經總四部合六卷一部一卷見在三部五卷本闕北涼傳譯緇素九人所出經律論等并新舊集失譯諸經總八十二部合三百一十一卷一十五部二百九卷見在五十七部一百二卷本闕右為第六卷宋代傳譯緇素二十二人所出經律論等并集失譯諸經總四百六十五部合七百一十七卷九十三部二百四十三卷見在三百七十三部四百七十四卷本闕簫齊傳譯沙門七人所出經律總一十二部合三十三卷七部二十八卷見在五卷本闕右為第七第八卷梁代傳譯緇素九人所出經論及諸傳記并新集失譯經律集等總四十七部合二百一十七卷四十一部二百七卷見在六部十卷本闕元魏傳譯緇素一十二人所出經論總八十三部合二百七十四卷七十三部二百五十五卷見在一十部一十九卷本闕高齊傳譯緇素二人所出經論總八部合五十二卷並在無闕右為第九卷周朝傳譯沙門四人所出經論等總一十四部合二十九卷六部一十一卷見在八部一十八卷本闕陳代傳譯緇素三人所出經律論及集傳等總四十部合一百三十三卷二十六部八十九卷見在一十四部四十四卷本闕隋朝傳譯緇素十人所出經論傳集録等總九十九部合三百四十五卷九十七部三百三十一卷見在二部一十四卷本闕右為第十卷皇朝傳譯緇素已有四十六人所出經律論及傳録等總四百三十四部合二千四百六十三卷四百十部二千三百八十六卷見在二十七部七十七卷訪本未獲足都計一十九代傳譯道俗總一百八十七人所出大小乘經律論及賢聖集傳總二千四百四十七部合七千三百七十九卷一千二百五十七部五千三百七十八卷見在一千一百五十五部二千四十八卷本闕內五十遺編律文七部五十卷闕三十卷故此重摽五十卷右為第十一十二十三十四十五十六十七卷合從古録至貞元新定釋教目録及續補舊闕總有四十二家具如前列右為第十八十九卷別分乘藏録下上録所辨總顯出經而大小未分三藏混雜此録之內具件科條闕本等經續附於後此中分二初別分乘藏二賢傳記就別録曲分第七有譯有本録第一一千二百五十六部五千三百七十八卷復就此録更開為二一三藏差殊二聖賢傳記三藏復二一菩薩三藏二聲聞三藏菩薩三藏録第一八百七部二千九百七十八卷菩薩契經藏六百八十一部二千四百三卷大乘經單重合譯五百五十四部二千一百二卷般若經新舊譯三十一部七百五十七卷寶積經新舊譯八十三部一百七十二卷大集經新舊譯三十七部一百五十二卷華嚴經新舊譯四十部二百四十七卷涅槃經舊譯六部五十八卷五大部外諸重譯經三百一十八部六百四十五卷大乘經單譯總一百七十九部三百九十七卷菩薩調伏藏二十七部五十五卷菩薩對法藏九十九部五百二十卷大乘釋經論二十一部一百五十五卷大乘集義論七十八部三百六十五卷右為第二十卷二十一卷二十二卷聲聞三藏録第二三百三十八部一千八百一十二卷聲聞契經藏二百四十部六百一十八卷小乘經單重合譯總一百五十三部三百九十四卷根本四阿含經五部二百三卷長阿含中別譯經二十二卷中阿含中別譯經六十卷增一阿含中別譯經五十一卷雜阿含中別譯經五十卷別譯雜阿含經二十卷四阿含外諸重譯經一百四十八部一百九十一卷小乘經單譯總八十七部二百二十四卷聲聞調伏藏六十一部四百九十三卷正調伏藏四十八部四百五卷內欠三卷未獲本調伏藏眷屬一十三部八十八卷聲聞對法藏三十六部六百九十八卷有部根本身足論八部一百三十一卷有部及餘支派論二十八部五百六十七卷一聖賢傳記録第三一百一十二部五百九十一卷就此録中復分為二一梵本翻譯集傳六十八部一百七十三卷二此方撰述集傳四十四部四百一十八卷右為第二十三卷有譯無本録第二一千一百四十部一千九百八十卷大乘經闕本四百八部八百一卷大乘重譯闕本總二百部四百八十四卷般若部中闕本一十部二十七卷寶積部中闕本十三部五十四卷大集部中闕本一十三部九十七卷華嚴部中闕本一十二部二十七卷涅槃部中闕本四部二十六卷諸重譯經闕本一百三十一部二百五十三卷大乘經單譯闕本總二百八部三百一十七卷大乘律闕本二十二部二十五卷大乘論闕本二十部四十八卷大乘釋經論闕本四部一十一卷大乘集義論闕本一十六部三十七卷右為第二十四卷小乘經闕本六百五部八百一十五卷小乘經重譯闕本總二百二十五部二百六十五卷根本四阿含闕本二部一百九卷長阿含部分闕本一十四部二十八卷中阿含部分闕本一十四部一十四卷增一阿含部分闕本七部八卷雜阿含部分闕本四十五部四十五卷諸重譯經闕本四十三部六十二卷小乘經單譯闕本總四百八十部五百五十卷小乘律闕本四十四部九十二卷小乘論闕本九部六十五卷賢聖集傳闕本四十七部一百八十四卷右為第二十五卷支派別行録第三六百八十二部八百一十二卷大乘別生經二百九部三百二十八卷般若部中別生一十部一百一十九卷寶積部中別生一十三部一十五卷大集部中別生五十一部五十八卷華嚴部中別生一十部一十一卷諸大乘經別生一百二十五部一百二十五卷大乘律別生七部七卷大乘論別生七部一十一卷小乘別生經二百八十三部二百八十三卷長阿含部分別生一十四部一十四卷中阿含部分別生二十四部二十四卷增一阿含部分別生二十六部二十六卷雜阿含部分別生一百三十部一百三十六卷諸小乘經別生八十三部八十三卷小乘律別生小乘論無別生四十二部四十九卷賢聖集傳別生一百三十四部一百三十四卷右為第二十六卷刪略繁重録第四一百四十七部四百八卷新撿出別生經六十七部一百八十五卷新撿出名異文同經三十部五十二卷新撿出重上録經八