body:
  text: 西京西明寺沙門圓照撰別録中支流別行録第三六百八十三部八百十二卷支流經者謂大部之中抄出別行大般若第二會之類是也夫法門浩廣罕究津涯典籍紛綸靡窮邊際故有隨宜化誘應物施緣於大部之中隨時略用披尋者莫知所生玩習者將義不終今統集多端會歸當部仍刪夷舊録增減有無具載名題備詳差互庶使將來學者覽派知源或恐未周用希來哲大乘別生經二百九部三百十八卷大般若第二會經七十八卷時俗題云新譯大品放光般若新編上大般若第四會經一十八卷時俗題云新譯道行小品般若新編上最勝天王般若經八卷亦云新譯勝天王般若是大般若第十八會新編上曼殊般若經二卷亦云新譯文殊般若是大般若第七會新編上理趣般若經一卷是大般若第十會新編上第二會下五經並出大般若大智度無極經四卷非藏中者智度無極譬經三卷或云無極譬經或四卷或加大字總攝無盡義經二卷般若波羅蜜神呪經一卷右智度無極下四經隋衆經録云並出大品摩訶般若波羅蜜道行經二卷亦直云道行經新編上右一經長房等録並云西晉惠帝代優婆塞衛士度略出從舊道行中刪改亦是小品及放光等異別名耳撰録者曰既從大經略出即類別生編正經中恐將乖誤故附斯録大般若第二會經下十部一百一十九卷般若部中別生經密迹金剛力士經二卷出密迹力士會下文內典等録編入正經中者誤新編上菩薩見實三昧經二卷出菩薩見實會抄六界差別品中重文新編上具善根經一卷出富樓那會下卷即舊三卷菩薩藏經抄善肩品經一卷出善臂菩薩會即抄寶積經一卷出普明菩薩會即單卷寶積經抄密迹下五經並出大寶積經菩薩奉施詣塔作願經一卷或作詣塔抄上卷往古性和佛國願行法典經一卷或作生和祐録云抄上卷新編上師子步雷音菩薩問文殊師利發心經一卷抄上卷師子步雷音菩薩問文殊師利成佛時事經一卷抄下卷菩薩三法經一卷棄惡長者問菩薩法經一卷菩薩奉施下六經出文殊佛土嚴淨經三十五佛名經一卷出決定毗尼經菩薩布施懺悔法一卷亦出決定毗尼經密迹力士經下一十三部一十五卷寶積部中別佛入三昧以一毛放大光明經一卷抄第一卷菩薩瓔珞莊嚴經一卷僧祐録云菩薩莊嚴瓔珞經自在王菩薩問如來警戒經一卷或云菩薩戒身自在經抄第一卷新編上佛咳徹十方經一卷抄第二卷八光經一卷抄第二卷不與婆羅門等爭訟經一卷抄第三卷調伏衆生業經一卷抄第三卷大慈無減經一卷抄第三卷諸天問如來境界不可思議經一卷或作警字抄第四卷舍利弗問寶女經一卷出寶女品舍利弗歎寶女説不思議經一卷亦云歎寶女經出寶女品菩薩導示行經一卷出寶女品寶女問三十二相經一卷或云朗三十二相一云寶女問經一云問慧經一云三十二事經出寶女品寶施女經一卷出寶女品或寶女施寶女問慧經一卷抄別譯四卷寶女經亦云抄寶女品見水世界經一卷抄第八卷穿菩提心經一卷抄第九卷海慧品三紙新編上功德寶光菩薩問護持經一卷祐録云抄陳録云抄大集第九新編上菩薩初發心時經一卷抄第九卷或作持字佛齋化菩薩經一卷抄無言品無言菩薩流通法經一卷抄無言品無言菩薩經一卷抄無言品魔業經一卷抄第十一卷過去無邊光淨佛土經一卷抄第十一卷菩薩本願經一卷抄第十一卷出海慧品菩薩出要行無礙法門經一卷抄第十二卷虛空藏品虛空藏菩薩問持經得幾福經一卷抄第十六卷虛空藏品過魔法界經一卷抄第十六卷虛空藏品虛空藏所問經一卷亦云方等主虛空藏經或五卷或六卷是大集經虛空藏品一品新編上太白魔王堅信經一卷出寶幢分抄第十七卷佛弟子化魔子誦偈經一卷出第十二卷寶幢分魔女聞佛説法得男身經一卷出寶幢分開化魔經一卷出寶幢分魔王入苦宅經一卷出寶幢分抄第十九卷寶幢呪經一卷出寶幢分魔王變身經一卷出第二十二卷是寶幢分中授記一品四紙新編上光味仙人覩佛身經一卷出寶幢分光味菩薩造七寶梯經一卷出寶幢分梵王變身經一卷出寶幢分波斯匿王蒙佛神力到寶坊經一卷抄第二十三卷明星天子問慈經一卷抄第二十三卷調伏王子道心經一卷抄第二十六卷功德莊嚴王八萬四千歲請佛經一卷法心呪經一卷十八不共品經一卷云抄異譯寶女品申越長者悔過供佛經一卷亦云申越長者悔過經申越由起未詳何正偈經一卷僧祐録云抄大集經新編上已上四十八經並出大集菩薩如意神通經一卷出自在王經上卷舊云出大集非也四自在神通經一卷出自在王經上卷菩薩戒自在經一卷出自在王經上卷佛入三昧經下五十一部五十八卷大集部中別生經大方廣如來性起微密藏經二卷是舊花嚴經如來性起全一品新編上花嚴經十種生法經一卷佛名經一卷菩薩名經一卷淨行品經一卷抄花嚴經一卷菩薩十地經一卷已上七經並出舊花嚴經曇昧摩提菩薩説經一卷法經録云出菩薩十住行道品金剛藏問菩薩行經一卷出漸備一切智德經漸備經一卷出漸備一切智德經右方廣如來性起經下一十部一十一卷花嚴部中別生經名字功德品經一卷出大般涅槃經還國品經一卷出普曜經亦云抄中本起經上卷提婆達多品經一卷出妙法蓮華經第五卷藥王菩薩經一卷陳録云抄妙法蓮華經第七卷新編上觀世音經一卷是妙法蓮華經普門品出第八卷光世音經一卷出正法花經陀羅尼法門六種動經一卷抄第一卷或無種字彌勒菩薩本願待時成佛經一卷抄第一卷寶日光明菩薩問蓮花國相貌經一卷亦云寶光明菩薩經抄第一卷梵志向佛説夢經一卷抄第二卷寶海梵志請如來經一卷寂意菩薩問五濁經一卷抄第二卷或云寂音梵志勸轉輪王發菩提心經一卷抄第二卷轉輪聖王發心求淨土經一卷抄第二卷樹提摩納發菩提心誓願經一卷抄第五卷寶海梵志成就大悲經一卷抄第七卷佛變時會身經一卷抄第十卷當來選擇諸惡世界經一卷抄第十卷一音演正法經一卷抄第十卷或云顯正法五百王子作淨土願經一卷過去行檀波羅蜜經一卷觀世音求十方佛各為受記經一卷東方善華世界佛坐震動經一卷文殊師利受記經一卷大悲比丘本願經一卷過去香蓮花佛世界經一卷陀羅尼法門經下二十部二十卷並出悲花經寶雲經一卷出寶雲經抄譯行不退轉法輪經一卷出阿惟越致遮經一卷等御諸法經一卷出持心梵天經第一楞伽阿跋多羅經一卷僧祐録云楞伽阿跋多羅寶一切佛語斷肉章經一卷或云楞伽抄經右一經入楞伽經斷肉品勘文出四卷楞伽第四卷末人弘法經一卷善得婆羅門求舍利經一卷善得婆羅門問提婆達經一卷大雲密藏菩薩問大海三昧經一卷大雲密藏菩薩請雨經一卷四百三昧名經一卷人弘法經下六部六卷並出大方等大雲經三歸五戒帶佩護身呪經一卷三歸五戒神王名經一卷亦云三歸五戒三十六善神王名經陳朝大乘寺等藏録云抄灌頂經新編上龍王結願五龍神呪經一卷五龍呪經一卷大將軍神呪經一卷隨願往生經一卷亦云灌頂隨願往生十方淨土經亦云普廣菩薩經新編上藥師琉璃光經一卷亦云灌頂拔除過罪生死得度經新編上三歸五戒帶佩下七部七卷並出大灌頂經無吾我經一卷三幼童經一卷或作幻童非也往古造行經一卷舉鉢經一卷心本淨經一卷溥首童真經一卷或作普首無吾我經下六部六卷並出普超三昧經布施度無極經一卷出第一卷菩薩為魚王經一卷出第一卷乾夷王經一卷出第一卷仙歎經一卷出第一卷波耶王經一卷出第二卷一切施王所行檀波羅蜜經一卷亦云薩和檀王經出第二卷右此一切王經群録並云羅什所譯別生録中名薩和檀王經後漢失譯亦有此經云薩和檀者一切施也將彼經勘文同不異故編於此和默王經一卷出第三卷新編上維藍經一卷舊録云隨藍本經出第三卷戒度無極經一卷出第四卷象王經一卷舊録云出生經中誤也出第四卷太子法施經一卷或云法惠出第四卷太子慕魄經一卷或云沐魄出第四卷在藏中者是別譯本彌蘭經一卷或云四卷出第四卷普明王經一卷出第四卷忍度無極經一卷出第五卷羼提和經一卷出第五卷摩天羅王經一卷或云國王出第五卷槃達龍王經一卷出第五卷雀王經一卷出第五卷釋家畢罪經一卷出第五卷菩薩為鹿王經一卷亦云佛昔為鹿王經出第六卷新編上九色鹿經一卷出第六卷在藏中者是別譯本馬王經一卷安公云出六度集第六卷新編上菩薩作龜本事經一卷出第六卷菩薩身為鴿王經一卷出第六卷蜜蜂王經一卷出第六卷佛以三事笑經一卷出第六卷小兒聞法即解經一卷出第六卷殺身濟賈人經一卷出第六卷以金貢太山贖罪經一卷出第六卷調達教人為惡經一卷出第六卷殺龍濟一國經一卷出第六卷彌勒為女身經一卷出第六卷禪度無極經一卷出第六卷尸呵遍王經一卷出第八卷右舊録中有車匿本末經一卷亦云第八卷今撿其文即是尸呵遍王經更無有異尸呵遍王經約初緣立名車匿本末經據後文立稱既是一緣不可分二今存一名耳遮羅國王經一卷或無國字出第八卷菩薩以明離鬼妻經一卷出第八卷儒童經一卷出第八卷摩調王經一卷事同中阿含大天經出第八卷或無王字阿難念彌經一卷或云阿難念經出第八卷鏡面王經一卷與義足經中鏡面王經大同出第八卷新編上察微王經一卷出第八卷梵皇經一卷或云梵皇王經亦云梵摩經出第八卷明度無極經一卷陳録云抄六度經出第八卷新編上右施度無極經下四十四部四十四卷並出六度集經舊録中有忠心正行經一卷亦云出六度經文中撿無故除之耳其和默王經象王經菩薩為鹿王經馬王經鏡面王經此五經雖載群録古與此同並並新編上能滅諸罪千囀陀羅尼經一卷此是奘法師所譯呪五首中一首之呪既類別生故載斯録新編上寶鬘品抄經一卷出寶網經稱揚諸佛功德經一卷僧祐録云抄三卷稱揚諸佛功德經或與後三文無別新編上寶海如來等十方百七十佛名經一卷陳録云抄稱揚功德經亦云禮佛功德經新編上德內豐嚴王佛名經一卷祐録云抄今撿稱揚功德經上卷有此佛名即出彼經上卷也新編上過去五十三佛名經一卷亦云五十三佛名經出觀藥王藥上經定意三昧經一卷出十住斷結經第四賢劫千佛名經一卷出賢劫經僧祐録云東晉沙門竺曇無蘭抄出千佛名初序云賢劫經説二千一百諸度無極以拘樓孫佛為首此經有別譯本以拘那提佛為首者是觀佛相好經一卷出觀佛三昧海經央崛魔羅母因緣經一卷抄第一卷無量樂佛土經一卷或云國土抄第三卷有稱十方佛名得多福經一卷祐録云抄陳録云抄央崛經第三卷新編上佛降央崛魔羅人民歡喜經一卷抄第四卷帝釋施央崛魔羅法服經一卷央崛魔羅歸化經一卷或云婦死應誤央崛魔羅悔過法經一卷或無法字波斯匿王欲伐央崛魔羅經一卷祐録云抄右崛魔羅母下八部八卷並出央崛魔羅經七佛八菩薩所説神呪經一卷陳録云抄七佛經新編上三十七品經一卷安公云出律經新編上僧祐録云東晉沙門竺曇無蘭太元二十一年六月謝鎮西寺撰蘭序自記而不標所出大光明菩薩百四十八願經一卷祐録云抄新編上菩薩六法行經一卷祐録云抄菩薩本願行品經一卷祐録云抄新編上菩薩諸苦行經一卷祐録云抄或無諸字四