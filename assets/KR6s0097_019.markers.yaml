  - {type: variant, offset: 6366, length: 50, content: '又此方法琳別傳三卷。

      右開元錄。中禁斷。今再詳准勅編入貞元釋教錄。

      又此方續開元釋教錄一部三卷。准勅編入貞元釋教錄。', 聖: 又北方撰述三階集錄三十五部四十四卷右撿舊錄亦在北錄之中今准勅右衛巧德使新編入貞元新定釋教目錄准修撰人是隋朝亦附入隋末}
