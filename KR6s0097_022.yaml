body:
  text: 西京西明寺沙門圓照撰有譯有本録中菩薩三藏録之三大乘經重單合譯下觀自在菩薩隨心呪經一卷亦名多唎心經大唐總持寺沙門智通譯新編入録右此觀自在隨心呪前呪五首經及雜呪中觀世音初心呪并集經第五並先譯出故編於此金剛頂觀自在王如來修行法一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録種種雜呪經一卷或無經字周宇文代天竺三藏闍那崛多譯拾遺編入單重合譯雜呪總二十三首法華經內呪六首施塔滅罪陀羅尼禮拜滅罪命終諸佛來迎呪一供養三寶呪一觀世音懺悔呪一金剛呪蛇呪一坐禪安穩呪一呪腫呪一鬼病一千轉陀羅尼一觀世音隨心呪四首七俱胝佛神呪一隨一切如來意呪一與呪五首中者同本六字陀羅尼呪一歸依三寶呪一佛頂勝陀羅尼經一卷大唐朝散郎杜行顗奉制譯出大周録第一譯佛頂勝陀羅尼經一卷大唐中天竺三藏地婆訶羅譯拾遺編入第二譯佛頂尊勝陀羅尼經一卷大唐罽賓沙門佛陀波利譯出大周録第三譯最勝佛頂陀羅尼淨除業障經一卷大唐中天竺三藏地婆訶羅於東都再譯拾遺編入第四譯佛頂尊勝陀羅尼經一卷或加呪字右五經同本異譯佛頂尊勝念誦法一卷經內題云佛頂尊勝陀羅尼念誦儀軌大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録毗沙門天王經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録無量門微密持經一卷一名成道降魔得一切智經吳月支優婆塞支謙譯第一譯出生無量門持經一卷或云新微密持經東晉天竺三藏佛陀跋陀羅譯第五譯阿難陀目佉尼呵離陀經一卷或云出無量門持經宋天竺三藏求那跋陀羅譯拾遺編入第六譯無量門破魔陀羅尼經一卷或云破魔陀羅尼經宋西域沙門功德直共玄暢譯第七譯阿難陀目佉尼訶離陀鄰尼經一卷元魏天竺三藏佛陀扇多譯第八譯舍利弗陀羅尼經一卷梁扶南三藏僧伽婆羅譯第九譯一向出生菩薩經一卷隋天竺三藏闍那崛多等譯第九譯出生無邊門陀羅尼經一卷大唐至相寺沙門釋智嚴譯新編入録第十一譯右八經同本異譯長房等録中覺賢經數更有新微密持經一卷即是出生無量門經是功德賢經數復有出無量門持經一卷即是阿難陀目佉尼呵離陀經是既是重載故不別存新舊十一譯三譯闕本出生無邊門經一卷經內題云出生無邊門陀羅尼經大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録勝幢臂印陀羅尼經一卷大唐三藏玄奘譯出內典録第一譯妙臂印幢陀羅尼經一卷大唐天后代于闐三藏實叉難陀譯新編入録第二譯右二經同本異譯其勝幢臂印經舊録為單本今新勘為重譯上二十一經二十一卷同帙無崖際持法門經一卷一名無際經乞伏秦沙門釋聖堅譯第一譯尊勝菩薩所問一切諸法入無量門陀羅尼經一卷高齊居士天懿譯第三譯右二經同本異譯前後三譯一譯闕本金剛壽命陀羅尼經一卷經內題云一切如來金剛壽命陀羅尼經大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録金剛壽命念誦法一卷經內題云陀羅尼念誦法大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録金剛上味陀羅尼經一卷元魏天竺三藏佛陀扇多譯第一譯金剛場陀羅尼經一卷隋天竺三藏闍那崛多等譯第二譯右二經同本異譯菩提場莊嚴經一卷經內題云菩提場莊嚴陀羅尼經大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録菩提場所説一字頂輪王經五卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録上八經十二卷同帙奇特佛頂經三卷經內題云一字奇特佛頂經威德品大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録金剛頂經一字輪王瑜伽一時處念誦成佛儀軌一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録師子奮迅菩薩所問經一卷失譯今附東晉録華聚陀羅尼呪經一卷失譯今附東晉録華積陀羅尼神呪經一卷吳月支優婆塞支謙譯周録在單本中誤也右三經同本異譯莫辨先後六字呪王經一卷失譯今附東晉録第一譯六字神呪王經一卷失譯拾遺編入第二譯右二經同本異譯虛空藏菩薩問佛經一卷亦云虛空藏菩薩問七佛陀羅尼呪經失譯今附梁録拾遺編入第一譯如來方便善巧呪經一卷隋天竺三藏闍那崛多等譯第二譯右二經同本異譯其如來方便經舊録為單本新勘為重譯持句神呪經一卷亦名陀羅尼句吳月支優婆塞支謙譯拾遺編入第一譯陀鄰尼鉢經一卷亦云陀鄰鉢呪東晉西域沙門竺曇無蘭譯拾遺編入第二譯東方最勝燈王如來經一卷隋天竺三藏闍那崛多等譯出內典録第四譯右三經同本異譯前二本略後經稍廣前四譯二存一闕其最勝燈王經舊録為單本新勘為重譯善巧方便陀羅尼呪經一卷失譯今附東晉録金剛祕密善門陀羅尼經一卷失譯今附東晉録護命法門神呪經一卷大唐天后代天竺三藏菩提流支譯出大周録第三譯右三經同本異譯前之二經莫辨先後其護命法門經周録在單本中誤也無垢淨光大陀羅尼經一卷大唐天后代西域沙門彌陀山寺譯新編入録第二譯又于闐三藏實叉難陀初譯名離垢淨光陀羅尼經尋本未獲故闕之耳上十六經十八卷同一帙請觀世音菩薩消伏毒害陀羅尼經一卷亦直云請觀世音經東晉外國居士竺難提譯兩譯一闕蘘麌利童女經一卷經內題加佛説字大興善寺三藏沙門大廣智不空奉詔譯貞元新編入録除一切疾病陀羅尼經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録能淨一切眼陀羅尼經一卷經內題云能淨一切眼疾病陀羅尼經大興善寺三藏沙門大廣智不空奉詔譯貞元新入録雨寶陀羅尼經一卷經內題加佛説字大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録甘露軍吒利瑜伽念誦法一卷經內題云甘露軍吒利菩薩供養念誦成就儀軌大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録佛説一髻尊陀羅尼經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録聖閻曼德迦威怒王立成大神驗念誦法一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録速疾立驗摩醯首羅天説迦婁羅阿尾奢法一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録大聖天歡喜雙身毗那夜迦法一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録上十一經十一卷同一帙內藏百寶經一卷亦云內藏百品經後漢月支三藏支婁迦讖譯第一譯兩譯一闕溫室洗浴衆僧經一卷亦直云溫室經後漢安息三藏安世高譯拾遺編入第一譯前後兩譯一本闕須賴經一卷前涼月支優婆塞支施崙譯出經後記第三譯前後四譯三本闕私訶昧經一卷一名菩薩道樹經亦名道樹三昧經吳月支優婆塞支謙譯第一譯兩譯一闕菩薩生地經一卷一名差摩竭經吳月支優婆塞支謙譯周為單本誤第一譯前後兩譯一本闕四不可得經一卷西晉三藏竺法護譯第二譯兩譯一闕梵女首意經一卷一名首意女闕西晉三藏竺法護譯第一譯兩譯一闕成具光明定意經一卷或云成具光明三昧或直云成具光明經後漢西域三藏支曜譯第二譯兩譯一闕寶網經一卷亦云寶網童子經西晉三藏竺法護譯第一譯兩譯一闕菩薩行五十緣身經一卷西晉三藏竺法護譯第一譯兩譯一闕菩薩修行經一卷亦名威施長者問觀身行經西晉河內沙門白法祖譯第三譯三譯二闕諸德福田經一卷或云諸福田經或直云福田經西晉沙門法立法炬共譯第一譯兩譯一闕大方等如來藏經一卷東晉天竺三藏佛陀跋陀羅譯第三譯三譯二闕大方廣如來藏經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録佛語經一卷元魏天竺三藏菩提留支譯第一譯兩闕金色王經一卷元魏婆羅門瞿曇般若流支譯第二譯兩譯一闕演道俗業經一卷乞伏秦沙門釋聖堅譯第二譯兩譯一闕百佛名經一卷隋天竺三藏那連提耶舍譯第二譯兩譯一闕上一十八經十八卷同一帙稱揚諸佛功德經三卷一名集諸佛華或四卷元魏西域三藏吉迦夜共曇曜譯第三譯三譯二闕須真天子經三卷亦云問四事經或二卷西晉三藏竺法護譯第一譯兩譯一闕摩訶摩耶經一卷亦直云摩耶經或二卷簫齊沙門釋曇景譯第二譯兩譯一闕除恐災患經一卷乞伏秦沙門釋聖堅譯第二譯兩譯一闕孛經一卷或云孛經鈔吳月支優婆塞支謙譯拾遺編入第二譯前後三譯兩譯本闕觀世音菩薩受記經一卷一名觀世音受決經宋黃龍沙門釋曇無竭譯第三譯三譯二闕觀世音菩薩授記經一卷經內題云佛説大方廣曼殊室利經觀自在菩薩授記品第三十一大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録上七經十一卷同帙海龍王經四卷或三卷西晉三藏竺法護譯第一譯兩譯一闕首楞嚴三昧經三卷亦云首楞嚴經或二卷姚秦三藏鳩摩羅什譯第九譯九譯八闕觀普賢菩薩行法經一卷亦出深功德經中亦云普賢觀經宋罽賓三藏曇摩蜜多譯第三譯三譯二闕觀藥王藥上二菩薩經一卷宋西域三藏疆良耶舍譯第二譯兩譯一闕不思議菩薩所問經一卷亦云所説姚秦三藏鳩摩羅什譯第二譯兩譯一闕上五經十卷同帙十住斷結經十卷或云十地斷結經或十一卷或十四卷姚秦涼州沙門竺佛念譯第二譯一闕諸佛要集經二卷亦直云要集經西晉三藏竺法護譯第一譯兩譯一闕未曾有因緣經二卷亦直云未曾有經簫齊沙門釋曇景譯第二譯兩譯一闕上三經十四卷二帙菩薩瓔珞經十二卷或十四卷或十六卷姚秦涼州沙門竺佛念譯第二譯兩譯一闕超日明三昧經二卷或無三昧字西晉清信士聶承遠譯第二譯兩譯一闕上二經十四卷二帙賢劫經十三卷亦名颰陀三昧經或七卷或十卷一帙西晉三藏竺法護譯第一譯兩譯一闕從無垢淨光陀羅尼經下三十六經雖云重譯但一本存餘皆遺失尋求不獲大乘經單譯一百三十一部二百九十三卷二十四帙大法炬陀羅尼經二十卷二帙隋天竺三藏闍那崛多等譯大威德陀羅尼經二十卷二帙隋天竺三藏闍那崛多等譯佛名經十二卷或十三卷元魏天竺三藏菩提流支譯三劫三千佛名經三卷過去莊嚴劫千佛名經上卷現在賢劫千佛名經中卷未來星宿劫千佛名經下卷失譯拾遺編入今附梁録上二經十五卷二帙其三劫佛名出長房入藏録中合成一部其中賢劫佛名出賢劫經中合為重譯今以上下佛名是其單本以類相從編之於此五千五百佛名經八卷隋天竺三藏闍那崛多等譯不思議功德諸佛所護念經二卷云出衆經目録或四卷曹魏代失譯三藏名拾遺編入上二經十卷同帙其不思議功德經大周録云與不思議功德菩薩所問經等同本者誤也華手經十三卷一名攝諸善根經或十一十二一帙姚秦三藏鳩摩羅什譯大方等陀羅尼經四卷一名方等檀特陀羅尼經北涼沙門法衆於高昌郡譯出寶唱録僧伽吒經四卷元魏優禪尼國王子月婆首那譯力莊嚴三昧經三卷隋天竺三藏那連提耶舍譯大方廣圓覺修多羅了義經一卷大唐罽賓沙門佛陀多羅譯拾遺編入上四經十二卷同帙觀佛三昧海經十卷或八卷一帙或無海字東晉天竺三藏佛陀跋陀羅譯右此觀佛三昧經大周録云宋永初年求那跋陀羅譯出內典録者謹按內典録云是東晉覺賢所譯非宋代功德賢周録誤也又云與後秦羅什所譯單卷觀佛三昧經同本編為重譯今以什公譯者久闕其本卷數全殊不可懸配今依諸舊録編單本內大方便佛