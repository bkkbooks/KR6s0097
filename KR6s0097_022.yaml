身語故有託緣興過聚徒訶結菩薩大人都無此事佛直為説令使遵行既無犯制之由故闕訶結之事諸大乘經明學處者托之於此為菩薩調伏藏云菩薩地持經十卷或名地持論或八卷一帙北涼天竺三藏曇無懺於姑臧譯右一經初有歸敬頌出瑜伽論本地分中菩薩地昔高齊昭玄統沙門法上答高句麗沙門云地持是阿僧佉比丘從彌勒受得阿僧佉者即無著菩薩是也又按梁沙門僧祐地持記云菩薩地持經八卷有二十七品分為三段第一段十八品第二段四品第三段五品文不出有異名而今此本或題云菩薩地經今撿尋經末亦有多名文又云名為菩薩地名為菩薩藏摩得勒名摩訶衍攝名不壞顯示名無障礙清淨智根本祐云不出異名者不然又撿群録曇無懺所譯別存菩薩戒經或云菩薩地經者誤也菩薩善戒經九卷一名菩薩地或十卷宋罽賓三藏求那跋摩等譯右一經群録皆云與地持經同本異譯今詳文理非不差殊其善戒經前有序品後有奉行地持經並無其地持戒品中有受菩薩戒文及菩薩戒本善戒經即無自餘之外文意大同地持復出瑜伽諸録或編入論既有差殊未敢為定又按梁沙門僧祐菩薩善戒經記云此名善戒名菩薩地名菩薩毗尼摩夷名如來藏名一切善法根本名安樂國名諸波羅蜜聚凡有七名第一卷先出優波離問受戒法第二卷始方有題如是我聞次第列品乃有三十復有別本題為菩薩地經今按尋經本與祐記不同經初即有如是我聞而無優波離問受戒法但有九卷其優波離問受戒法即後單卷菩薩善戒經是若將此為初卷即與祐記符同然此地持經本離之已久乍合成十卷或恐生疑此善戒經亦同地持作其三段第一段名菩薩地有二十品第二段名如住有四品第三段名畢竟地有六品祐云次第列品者恐尋之未審淨業障經一卷失譯今附秦録單本上二經十卷同帙其淨業障經法上録云竺法護譯詳其文句與護公譯經意勢全異故為失譯優婆塞戒經七卷其在家菩薩戒或五或六或七北涼天竺三藏曇無懺於姑臧譯單本梵網經二卷姚秦三藏鳩摩羅什譯第二譯前本闕受十善戒經一卷後漢失譯拾遺編入單本受菩提心戒儀一卷經內題云最上乘教受戒懺悔文普賢瑜伽阿闍梨集大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録上四經十一卷同帙菩薩瓔珞本業經二卷或無菩薩字新編為律姚秦涼州沙門竺佛念譯第一譯三譯二闕佛藏經四卷一名選擇諸法經或二卷或三卷姚秦三藏鳩摩羅什譯單本菩薩戒本一卷出地持戒品中慈氏菩薩説北涼天竺三藏曇無讖於姑臧譯拾遺編入第二譯菩薩戒本一卷出瑜伽論本地分中菩薩地彌勒菩薩説三藏玄奘譯出內典録第三譯右二經同本異譯前後三譯一譯本闕菩薩戒羯磨文一卷出瑜伽論本地分中菩薩地彌勒菩薩説大唐三藏玄奘譯出內典録單本菩薩善戒經一卷優婆離問菩薩受戒法宋罽賓三藏求那跋摩譯出寶唱録單本上六經十卷同帙菩薩內戒經一卷宋罽賓三藏求那跋摩譯出法上録單本優婆塞五戒威儀經一卷宋罽賓三藏求那跋摩譯右此優婆塞五戒威儀經群録編在小乘律中者誤也初是菩薩戒本後是受菩薩戒文及捨懺法等既非小乘故移編此文殊師利淨律經一卷或直云淨律經西晉三藏竺法護譯第一譯清淨毗尼方廣經一卷姚秦三藏鳩摩羅什譯出法上録第三譯寂調音所問經一卷一名如來所説清淨調伏經宋沙門釋法海譯第四譯右三經同本異譯前後四譯一譯闕本大乘三聚懺悔經一卷隋天竺三藏闍那崛多等譯出內典録單本菩薩五法懺悔文一卷或云菩薩五法懺悔經失譯今附梁録單本菩薩藏經一卷梁扶南三藏僧伽婆羅譯單本三曼陀颰陀羅菩薩經一卷西晉清信士聶道真譯單本菩薩受齋經一卷西晉清信士聶道真譯第二譯三譯二闕文殊悔過經一卷一名文殊五體悔過經西晉三藏竺法護譯第一譯兩譯一闕舍利弗悔過經一卷亦直云悔過經後漢安息三藏安世高譯第一譯三譯二闕法律三昧經一卷亦直云法律經吳月支優婆塞支謙譯第二譯兩譯一闕十善業道經一卷大唐天后代于闐三藏實叉難陀譯新編入録上十四經十四卷同帙謹按舊録大乘律中有寶梁經迦葉經今為編入寶積會中故不重出其大方廣三戒經與寶積三律儀會同本決定毗尼經與寶積優波離會同本今並編入寶積部中故此不載菩薩對法藏九十九部五百二十卷五十帙菩薩阿毗達磨有其二類一者解釋契經二者詮法體相舊録所載和雜編之今所集者分為二例釋契經者列之於前詮法性者編之於後庶無糅雜覽者易知大乘釋經論二十二部一百五十五卷一十五帙大智度論一百卷或一百一十卷或七十卷姚秦三藏鳩摩羅什譯單本右龍樹菩薩造釋摩訶般若波羅蜜經什法師云若具足翻應有千卷秦人識弱故略之十分存一十地經論十二卷或十五卷一帙元魏天竺三藏菩提流支等譯單本右天親菩薩造釋十地經即華嚴十地品是論序云菩提留支勒那摩提在洛陽殿內三人同譯佛陀扇多傳語帝親筆受長房録中流之摩提二録俱載者不然今合為一本在留支録彌勒菩薩所問經論五卷或六卷或七卷或十卷元魏天竺菩提留支譯單本右釋彌勒所問經即寶積經第四十一會是大乘寶積經論四卷元魏天竺三藏菩提留支譯第一譯兩譯一闕右釋舊單卷大寶積經即寶積第四十三會是寶髻菩薩四法經論一卷天親菩薩造元魏天竺三藏毗目智仙等譯出序記單本右釋大集經寶髻品今入寶積在第四十七會論序記云魏興和三年歲次辛酉九月朔庚午之日烏萇國人剎利王種三藏法師毗目智仙中天竺國婆羅門人瞿曇流之護法大士驃騎大將軍開府儀同三司御史中尉勃海高仲蜜愛法之人沙門曇林道俗相假於鄴城內在金華寺譯四千九百九十七字諸録皆云菩提留支譯者誤也今依序記為正上三論十卷同帙佛地經論七卷親光等菩薩造釋佛地經大唐三藏玄奘譯出內典録單本金剛般若論二卷無著菩薩造隋天竺三藏達摩笈多譯出內典録單本能斷金剛般若波羅蜜多經論頌一卷無著菩薩造大唐三藏義淨譯新編入録上三論十卷同帙金剛般若波羅蜜經論三卷天親菩薩造元魏天竺三藏菩提留支譯第一譯能斷金剛般若波羅蜜多經論三卷無著菩薩頌世親菩薩釋大唐三藏義淨譯第二譯新編入録右二論及頌同本異譯金剛般若波羅蜜經破取著不壞假名論二卷功德施菩薩造亦云功德施論大唐中天竺三藏地婆訶羅譯出大周録單本上四論及頌造者雖異並釋金剛般若經又有金剛仙論十卷尋閲文理乃是元魏三藏菩提流支所撰釋天親論既非梵本翻傳所以此中不載文殊師利菩薩問菩提經論一卷一名伽耶山頂經論婆藪盤豆菩薩造元魏三藏菩提流支譯單本妙法蓮華經論一卷婆藪盤豆菩薩造元魏中天竺三藏勒那摩提共僧朗等譯第二譯上五論十卷同帙法華經論二卷初有歸命頌者或一卷元魏北天竺三藏菩提留支共曇林等譯拾遺編入第二譯右二論同本異譯其三藏義淨新譯法華論五卷尋本未獲勝思惟梵天所問經論四卷釋勝思惟經或三卷元魏天竺三藏菩提留支譯單本涅槃論一卷婆藪盤豆菩薩造略釋沙門達摩菩提譯不知年代內典中附元魏代第一譯後闕本涅槃經本有今無偈論一卷釋涅槃一頌梁天竺三藏真諦譯單本遺教經論一卷釋遺教經陳天竺三藏真諦譯拾遺編入單本無量壽經論一卷婆藪盤豆菩薩造元魏天竺三藏菩提留支譯單本三具足經論一卷天親菩薩造有釋論無經本元魏天竺三藏毗目智仙等譯出序記單本右論初云三藏法師毗目智仙婆羅門人瞿曇留支愛敬法人沙門曇林於鄴城內在金華寺魏興和三年歲次辛酉月建在戌朔次庚午十三日譯千百十言驃騎大將軍開府儀同三司御史中尉勃海高仲蜜啓請供養守護流通諸録皆云菩提留支譯者誤也今依序記為正轉法輪經論一卷天親菩薩造有釋論無經本元魏天竺三藏毗目智仙等譯出序記單本右論初記云魏驃騎大將軍開府儀同三司御史中尉勃海高仲密善求義方選真簡偽故請法師毗目智仙并其弟子瞿曇流支於鄴城內在金華寺興和三年歲次大梁建酉之月朔次庚子十一日譯三千九百四十二言沙門曇林對譯諸記録皆云菩提流支譯者誤也今依序記為正上八論十二卷同帙大乘集義論七十八部三百六十五卷三十五帙瑜伽師地論一百卷彌勒菩薩説十帙大唐三藏玄奘譯出內典録單重合譯右此瑜伽論梁代三藏真諦譯者名十七地論只得五卷緣礙遂輟北涼三藏曇無讖譯地持論但成十卷乃是本地分中菩薩地此瑜伽論當第三譯前之二本部帙不終大唐譯者方具備矣顯揚聖教論二十卷無著菩薩造二帙大唐三藏玄奘譯出內典録單本瑜伽師地論釋一卷最勝子等菩薩造大唐三藏玄奘譯出翻經圖單本顯揚聖教論頌一卷無著菩薩造大唐三藏玄奘譯出內典録單本王法正理論一卷彌勒菩薩造大唐三藏玄奘譯出內典録單本大乘阿毗達磨集論七卷無著菩薩造大唐三藏玄奘譯出內典録單本上四論十卷同帙大乘阿毗達磨雜集論十六卷安慧菩薩揉釋上集論大唐三藏玄奘譯出內典録單本中論四卷龍樹菩薩本梵志青白釋姚秦三藏鳩摩羅什譯單本上二論二十卷二帙般若燈論釋十五卷龍樹菩薩本分別明菩薩釋大唐天竺三藏波羅頗蜜多羅譯出內典録單本右與中論本同釋異十二門論一卷龍樹菩薩造姚秦三藏鳩摩羅什譯單本十八空論一卷陳天竺三藏真諦譯出翻經圖百論二卷提婆菩薩造婆藪開士釋姚秦三藏鳩摩羅什譯單本廣百論本一卷聖天菩薩造大唐三藏玄奘譯出內典録單本上五論二十卷二帙大乘廣百論釋論十卷聖天本護法釋大唐三藏玄奘譯出內典録單本十住毗婆沙論十四卷龍樹菩薩造或十二或十五姚秦三藏鳩摩羅什譯出內典録單本菩提資糧論六卷聖者龍樹本比丘自在釋隋天竺三藏達摩笈多譯出內典録單本上二論二十卷二帙大乘莊嚴論十三卷無著菩薩造或十五卷一帙大唐天竺三藏波羅頗蜜多羅譯出內典録單本大莊嚴論十五卷馬鳴菩薩造或十卷姚秦三藏鳩摩羅什譯單本順中論二卷無著菩薩造元魏婆羅門瞿曇般若流支譯出序記單本右順中論序記云魏尚書令儀同高公延國上賓瞿曇流支在第供養正通佛法對釋曇林出斯義論武定元年歲次癸亥八月十日揮辭景寅凡有一萬三千七百二十七字諸録皆云菩提留支譯者誤也依序記為正攝大乘論三卷無著菩薩造陳天竺三藏真諦譯第二譯上三論二十卷二帙攝大乘論二卷無著菩薩造元魏天竺三藏佛陀扇多譯第一譯攝大乘論本三卷無著菩薩造大唐三藏玄奘譯出內典録第三譯右三本論同本異譯攝大乘論釋十五卷世親菩薩造或十二卷陳天竺三藏真諦譯第一譯上三論二十卷二帙右按仁壽大周等録復有攝論一本一十二卷成部亦云真諦所譯勘與此同今者但存一本攝大乘論釋論十卷世親菩薩釋一帙陳天竺三藏達多笈多譯出內典録第三譯攝大乘論釋十卷世親菩薩造一帙大唐三藏玄奘譯出內典録第二譯右三釋論同本異譯攝大乘論釋十卷無著菩薩造一帙大唐三藏玄奘譯出內典録單本右與前三論同本異譯佛性論四卷天親菩薩造陳天竺三藏真諦譯單本決定藏論三卷梁天竺三藏真諦譯單本右此決定藏論大周録中乃云失譯而不指言何代翻出今詳此論大勢乃是真諦所翻論中子注乃曰梁言前代録家遺之不上今為真諦所譯編於梁代録中辦中邊論頌一卷彌勒菩薩造大唐三藏玄奘譯出內典録單本中邊分別論二卷婆藪盤豆造或三卷陳天竺三藏真諦譯第一譯上四論十卷同帙辦中邊論三卷世親菩薩造大唐三藏玄奘譯出內典録第二譯右二釋論同本異譯究竟一乘寶性論四卷或三卷或五卷元魏天竺三藏勒那摩提譯第二譯兩譯一闕右論序記云魏興和三年歲次大梁七月辛未朔二十五日驃騎大將軍開府儀同三司御史中尉勃海高仲密敬請三藏法師烏萇國人中天竺國婆羅門人瞿曇流支釋曇林等在鄴城內金華寺譯四千八百七十二字序三藏雖不斥名準例即是毗目智仙群録直云瞿曇流支譯者誤也今依序記為正大乘成業論一卷世親菩薩造大唐三藏玄奘譯出內典録第二譯右二論同本異譯因明正理門論本一卷大域龍菩薩造大唐三藏玄奘譯出內典録第一譯上五論十卷同帙因明正理門論一卷大域龍菩薩造大唐三藏義淨譯新編入録第二譯右二論同本異譯舊理門論周録為單本新勘為重譯因明入正理論一卷商羯羅主菩薩造大唐三藏玄奘譯出內典録單本顯識論一卷內題云顯識品從無相論出陳天竺三藏真諦譯出論題單本附陳代録轉識論一卷即出前顯識論天竺三藏真諦譯出論題單本附陳代録唯識論一卷一名破色心初云唯識無境界元魏婆羅門瞿曇般若流支譯第一譯大乘唯識論一卷初云修道不共他上二論並天親造陳天竺三藏真諦譯第二譯右三論同本異譯周録不言同本新勘為重譯唯識二十論一卷世親菩薩造大唐三藏玄奘譯出翻經圖第三譯成唯識寶生論五卷一名二十唯識順釋論護法菩薩造大唐三藏義淨譯新編入録單本唯識三十論一卷世親菩薩造大唐三藏玄奘譯出內典録單本拾遺編入上九論十三卷同帙成唯識論十卷護法等菩薩造一帙大唐三藏玄奘譯出內典録單本大丈夫論二卷提婆菩薩造北涼沙門釋道泰譯出翻經圖單本入大乘論二卷堅意菩薩造北涼沙門釋道泰譯出內典録大乘掌珍論二卷清辦菩薩造大唐三藏玄奘譯出內典録大乘五蘊論一卷世親菩薩造大唐三藏玄奘譯出內典録第二譯初譯本闕大乘廣五蘊論一卷安慧菩薩造與前論異本大唐中天竺三藏地婆訶羅譯出大周録單本寶行王正論一卷陳天竺三藏真諦譯單本大乘起信論一卷馬鳴菩薩造梁天竺三藏真諦譯第一譯上七論十卷同帙大乘起信論二卷馬鳴菩薩造大唐天后代于闐三藏實叉難陀譯新編入録第二譯右二論同本異譯舊起信論周録為單本新勘為重譯發菩提心論二卷或云發菩提心經姚秦三藏鳩摩羅什譯單本右此發菩提心論大周録中經論二録俱有其名今以菩薩所造編於論録但存一本或云天親菩薩所造亦云彌勒菩薩所説未詳孰是金剛頂瑜伽中發阿耨多羅三藐三菩提心論一卷瑜伽總持教門説菩提心觀行修持義大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録三無性論二卷出無相論或一卷陳天竺三藏真諦譯單本方便心論一卷凡四品或二卷元魏西域沙門吉迦夜共曇曜譯第二譯兩譯一闕如實論一卷題云如實論反質難品梁天竺三藏真諦譯單本無相思塵論一卷或直云思塵論陳天竺三藏真諦譯出翻經圖第一譯觀所緣論一卷陳那菩薩造大唐三藏玄奘譯出內典録第二譯右二論同本異譯周録不言同本新勘為重譯觀所緣論釋一卷護法菩薩造大唐三藏義淨譯新編入録單本上九論十二卷同帙回諍論一卷龍樹菩薩造出序記元魏天竺三藏毗目智仙等譯單本右論序記云魏興和三年歲次大梁建辰之月朔次癸酉辛卯之日烏萇國人剎利王種三藏法師毗目智仙共天竺國婆羅門人瞿曇流支在鄴城內金華寺譯凡有一萬一千九十八字沙門曇林之筆驃騎大將軍開府儀同三司御史中尉勃海高仲密啓請供養群録直云瞿曇流支譯者誤也今依序記為正緣生論一卷聖者鬱楞伽造隋天竺三藏達摩笈多譯出內典録單本大乘緣生論一卷經中云聖者鬱楞伽造大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録十二因緣論一卷淨意菩薩造元魏天竺三藏菩提留支譯單本一輸盧伽論一卷龍樹菩薩造元魏婆羅門瞿曇般若流支譯單本大乘百法明門論一卷世親菩薩造大唐三藏玄奘譯出內典録單本百字論一卷提婆菩薩造元魏天竺三藏菩提留支譯單本解捲論一卷陳天竺三藏真諦譯出翻經圖第一譯掌中論一卷陳那菩薩造大唐天后代三藏義淨譯新編入録第二譯右二論同本異譯其解捲論周録為單本新勘為重譯取因假設論一卷陳那菩薩造大唐天后代三藏義淨譯新編入録單本觀總相論頌一卷陳那菩薩造大唐三藏義淨譯新編入録單本止觀門論頌一卷世親菩薩造大唐三藏義淨譯新編入録單本手杖論一卷尊者釋迦稱造大唐三藏義淨譯新編入録單本六門教授習定論一卷無著菩薩本世親菩薩釋大唐天后代三藏義淨譯新編入録單本大乘法界無差別論一卷堅慧菩薩造大唐天后代于闐三藏提雲般若譯出大周録單本破外道小乘四宗論一卷提婆菩薩造元魏天竺三藏菩提流支譯單本破外道小乘涅槃論一卷提婆菩薩造元魏天竺三藏菩提留支譯單本上十七論十七卷同帙右都計大乘經律論見流行者總八百八部二千九百八十八卷二百七十六帙
