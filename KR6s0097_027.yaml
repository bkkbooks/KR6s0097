body:
  text: 西京西明寺沙門圓照撰別録中刪略繁重録第四一百四十七部四百八卷刪繁録者謂同本異名或廣中略出以為繁䞉今並刪除但以年歲久淹共傳訛替從盈卷帙有費功勞今者詳校異同甄明得失具為條目有可觀焉新撿出別生經六十七部一百八十五卷虛空藏所問經八卷亦云方等主虛空藏經或直云虛空藏經或五卷右一經是大集經中虛空藏菩薩品別抄流行大周録云乞伏秦代沙門聖堅譯者謬也彼聖堅譯者闕本虛空藏菩薩問持經得幾福經一卷右一經亦是大集虛空藏品中別文抄出諸録皆云姚秦三藏鳩摩羅什譯者謬也一切施王所行檀波羅蜜經一卷右一經出六度集經施度無極中諸録皆云姚秦三藏鳩摩羅什譯者謬也大方廣如來性起微密藏經二卷右一經即是舊華嚴經寶王如來性起品別出流行初品加證信序及取第一會初緣起置之於首長房等録云西晉失譯者謬也隨願往生經一卷亦名灌頂隨願往生十方淨土經亦名普廣菩薩經右一經是大灌頂經第一十卷普廣品或有經本在第十二長房等録皆云吳代優婆塞支謙譯或云西晉三藏竺法護譯者二俱謬也藥師琉璃光經一卷亦名灌頂拔除過罪生死得度經右一經是大灌頂經第十二卷或有經本在第十長房等録皆云宋代鹿野寺沙門慧簡譯者謬也大般若第二會經七十八卷時俗題云新譯大品放光般若大般若第四會經一十八卷時俗題云新譯道行小品般若右二經時俗共傳云是三藏義淨所譯別改題目抄寫流行檢尋淨公經目不曾譯此經及勘其文乃與大般若無異恐不知委故此述之最勝天王般若經八卷亦云新譯勝天王般若右一經即大般若第六會與舊勝天王般若同本異譯曼殊般若經二卷亦云新譯文殊般若右一經即大般若第七會曼殊室利分與舊文般若同本異譯理趣般若經一卷右一經即大般若第十會般若理趣分密迹金剛力士經二卷右一經內典録云失譯者非也今尋其本乃出五密迹力士經中從第四卷初第四紙五言偈後第五卷末文句全同增一阿含經一卷右一經出增一阿含經第二十一卷抄出三經初明四梵福次明四食後明四辨長房録云西晉沙門法炬譯者謬也行七行現報經一卷一紙右一經出增一阿含經第三十四卷十二因緣經一卷三紙右一經出增一阿含經第四十六卷周録編在大乘藏中云與貝多樹下思惟十二因緣同本異譯者謬也戒相應法經一卷右一經出雜阿含經第三十卷長房録云東晉西域沙門竺曇無蘭譯者謬也比丘問佛多優婆塞命終經一卷右一經亦出雜阿含經第三十卷長房録云西晉沙門法炬譯者謬也獨富長者經一卷右一經出雜阿含經第四十六卷長房録云後漢三藏安世高譯者謬也有衆生三世作惡經一卷右一經出出曜經第八卷長房録云西晉沙門法炬譯者謬也出家功德經一卷右一經出賢愚經出家功德品初長房録云吳代優婆塞支謙譯者謬也佛為年少婆羅門說知善經一卷出雜阿含經第四卷長房録云後漢三藏安世高譯者謬也佛為那拘羅長者說根熟經一卷出雜阿含經第五卷長房録云後漢三藏安世高譯者謬也佛為外道須深說離欲經一卷出雜阿含經第十四卷長房録云吳代優婆塞支謙譯者謬也阿育王施半阿摩勒果經一卷出雜阿含經第二十五卷禪思滿足經一卷出雜阿含經第二十九卷據長房録前後兩譯者並謬也右上五經周録之中編在闕本經內今撿得其本並出雜阿含中既是別生除之不録摩竭魚因緣經一卷出第九卷尊者塢陀夷引導諸人禮佛僧經一卷出第十一卷還本國度父王經一卷出第十七卷末第十八卷初水生太子經一卷出第十九卷施物法非法經一卷出第二十四卷教誡羅怙羅經一卷出第二十五卷五趣生死輪轉經一卷出第三十四卷善來苾芻因緣經一卷出第四十二卷七有事無事福業經一卷出第四十六卷摩竭魚因緣下九經並出根本說一切有部毗奈耶中火生長者受報經二卷出第二第三卷尊者善和好聲經一卷出第四卷五種水羅經一卷出第五卷勝鬘夫人本緣經一卷出第七卷光勝王信佛經一卷出第八卷誅釋種受報經二卷出第八第九卷大世主苾芻尼入涅槃經一卷出第十卷佛為難陀說出家入胎經二卷編入寶積第十四會出第十一十二卷敬法捨身經一卷出第十四卷初度二邪見童子得果經一卷出第十四卷清淨威儀經一卷或云洗淨威儀出第十六卷大目連受報經一卷出第十八卷初誕生現大瑞應經一卷出第二十卷度迦多演那經一卷出第二十卷㗨羅鉢龍王業報因緣經一卷出第二十一卷此㗨羅鉢龍王經與度迦多演那經明同異者但前經初文則䞉四紙緣起下文並同無別何繁重鈔分為二經安樂夫人因緣經一卷出第二十一卷增養因緣經三卷出第二十二二十三二十四卷妙光因緣經一卷出第二十五卷降伏外道現大神通經一卷出第二十六卷大藥善巧方便經二卷出第二十七二十八卷佛從天下贍部洲經一卷出第二十九卷度瘦瞿答彌經一卷出第三十卷訶利底母因緣經一卷出第三十一卷法與尼在家得果經一卷出第三十二卷樹生婆羅門憍慢經一卷出第三十四卷末第三十五卷初弟子事師經一卷出第三十五卷七種不退轉經一卷出第三十五卷佛為長者說放逸經一卷出第三十六卷地動因緣經一卷出第三十六卷四種黑白法印經一卷出第三十七卷佛將入涅槃度善賢經二卷出第三十七卷半佛般涅槃行雨大臣告王經一卷出第三十八卷八大國王分舍利經一卷出第三十九卷初此上二經文相錯涉其大臣告王經比於後往前文䞉兩紙餘其分舍利經比於前經後可䞉三紙餘並無異鈔為二經繁而未當火生長者下三十三經並出根本說一切有部毗奈耶雜事中又有給孤長者請畫寺因緣一卷出雜事第十七及毗奈耶頌第五卷從摩竭魚因緣經下四十二經四十九卷並是說一切有部律中緣起三藏義淨鈔出流行既類別生故並刪削於中施物法非法經弟子事師經比於廣文雖少增減既不異於本豈繁別為部卷類諸別生亦並刪也新撿出名異文同經二十部五十二卷菩薩境界奮迅法門經十卷元魏三藏菩提留支譯出寶唱録右一經即薩遮尼乾子經之異名周録別載復云闕本者誤也新道行經十卷或七卷西晉三藏竺法護譯出長房等録右一經撿諸藏本並與小品般若文句全同者其本錯也護公所譯新道行經時無其本承聞東都有護本求尋之未獲譯大方等大集經八卷右一經唐內典録及大周録俱載今撿其文即是合部大集經第六帙也初之二卷名十方菩薩品即是明度五十校計經後之六卷乃是無盡意經其明度五十校計經不知何故編入大集以有差殊今存別部之者此既重載今故刪除阿耨達龍王經二卷右一經與弘道廣顯三昧經文句全同但名別異今存一本合道神足經三卷右一經與道神足無極變化經文同名異哀泣經三卷或二卷六品右一經與方等般泥洹經文同名異其方等泥洹初品名為哀泣乃取此品名目以作經題比於方等泥洹後闕三品文不足矣寶田慧印三昧經一卷右一經與慧印三昧經文句全同名廣略異長房録云慧印三昧經亦名寶田慧印三昧經周入藏録二本俱載一單一重誤之甚也鹿子經一卷右一經與鹿母經文同名異據其文義合從母立長房録云鹿子經吳代優婆塞支謙譯者謬也小無量壽經一卷右一經與阿彌陀經文同名異其宋代三藏求那跋陀羅所譯小無量壽經時無其本胎藏經一卷右一經與無垢賢女經文同名異聞城十二因緣經一卷右一經與貝多樹下思惟十二因緣經文同名異此聞城經合有異本尋之未獲大安般經一卷或二卷內典録云二卷長房録云一卷右一經與大安般守意經文句全同名廣略異群録之中存其二本誤之甚也申日經一卷右一經與大乘藏中月光童子經文同名異父名申日子號月光約此不同立經名別長房録云申日經吳代優婆塞支謙譯者謬也輪轉五道罪福報應經一卷右一經與罪福報應經文句全同名廣略異栴陀越經一卷右一經與栴陀越國王經文句全同名廣略異周入藏中栴陀越經編在單本栴陀越國王經在於重譯二處俱載者誤之甚也真僞沙門經一卷長房録一名摩訶比丘經亦名迦葉禁戒經右一經即迦葉禁戒經之異名文句全同或云宋代鹿野寺沙門慧簡譯者謬也轉法輪經一卷右一經撿無其本諸經藏內皆以轉法輪論替之者誤也近於東都尋得正本編入藏記賓頭盧為王說法經一卷右一經與賓盧突羅闍為優陀延王說法經文句全同名廣略異阿蘭若習禪法經二卷右一經與坐禪三昧經文同名異禪祕要經五卷右一經云是宋代三藏曇摩蜜多譯云與姚秦三藏鳩摩羅什譯祕要法同本異出今撿尋上下文極錯非是本經初之一卷乃是治禪病祕要法文仍不盡至半而止第二卷已去即是羅什所譯禪祕要法從第一卷過半生起至第三卷末文亦不盡缺十紙餘均為四卷通前成五其曇摩蜜多譯者時闕其本新撿出重上録經八部三十卷菩薩地持經十卷或八卷亦名菩薩戒經又名菩薩地經右一經亦名菩薩地持論今此録中編之為律存其經名除其論録中云菩薩地持經闕本者誤也又周録中此一本經既有多名前後差互凡六處重上錯之甚也大乘經中一處上大乘律中二處上大乘論中一處上闕本録中二處上餘經重載其數非一恐繁紙墨故略述之無畏德女經一卷今編入寶積經第一義法勝經一卷彌勒菩薩所問本願經一卷右三經大周入藏録中單本重譯二處俱載者誤也今除單本編重譯中發菩提心經二卷亦名發菩提心論右一經周入藏録大乘經中及大乘論二處俱載者誤也今以菩薩所造除其經名存於論録諫王經一卷亦名大小諫王經右一經周入藏闕本二録俱載者誤也法句經二卷亦名法句集右一經周入藏録大乘譯及集傳內二處俱載者誤也尋文並同不可分二雖曾再譯一本闕無今經中除編於集內攝大乘釋論十二卷右一論隋開皇仁壽二年衆經録及唐內典大周録等皆存二本云與十五卷攝論同本異出俱是陳朝三藏真諦所譯者誤也今勘文句首末全同卷雖多少有殊不可分為二部但存十五卷本十二成者除之新撿出合入大部經五十二部一百四十一卷金光明經四卷一十八品北涼三藏曇無讖譯金光明經七卷二十二品或六卷陳三藏真諦全譯四合成七卷金光明經更廣壽量大辦陀羅尼經七卷續四卷本周宇文三藏耶舍崛多續壽量大辦二品右隋興善寺沙門寶貴取前三本及闍那崛多所譯銀主囑纍二品總二十四品合成八卷前之三本並合入中一無增減其八卷成者留之入藏上之三本既重故略密迹金剛力士經十卷西晉三藏竺法護譯在第三會或四卷或五卷或八卷菩薩夢經二卷西晉三藏竺法護譯在第四會新改名淨居天子會法界體性無分別經二卷梁三藏曼陀羅仙譯在第八會十法經一卷元魏三藏佛陀扇多譯在第九會加名大乘十法會大菩薩藏經二十卷大唐三藏玄奘譯在第十二會佛為難陀說出家入胎經一卷出說一切有部律大唐三藏義淨譯在第十四會文殊師利授記經三卷大唐三藏實叉難陀譯在第十五會菩薩見實三昧經十六會高齊三藏那連提耶舍譯在第十六會或十四卷或十卷菩薩藏經三卷一名富樓那問經姚秦鳩摩羅什譯在第十七會亦名大悲心經改名富樓那會或二卷護國菩薩經二卷隋三藏闍那崛多譯在第十八會郁伽長者所問經一卷曹魏三藏