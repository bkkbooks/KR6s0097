body:
  text: 西京西明寺沙門圓照撰總集群經錄上之十一大唐李氏都長安自高祖神堯皇帝武德元年歲次戊寅至皇帝貞元十六年庚辰之歲兼天后代凡經一百八十三載傳譯緇素已有四十六人所出經律論及傳錄等總四百三十五部二千四百七十六卷於中四百七部二千三百九十九卷見在二十七部七十七卷訪本未獲大唐沙門波羅頗迦羅蜜多羅三部三十八卷經論沙門釋法琳三部十三卷集論沙門釋玄奘七十六部一千三百四十七卷經律論記傳沙門釋道宣八部八十一卷譜錄傳集沙門釋玄應一部二十五卷經律音義沙門釋靖邁一部四卷圖紀沙門釋智通四部五卷經沙門伽梵達摩一部一卷經沙門阿池瞿多一部一十二卷經沙門釋玄惲一部二十卷經集沙門釋彥琮一部六卷集議沙門那提三部三卷經沙門若那跋陀羅一部三卷經沙門地婆訶羅一十八部三十四卷經論清信士杜行顗一部一卷經沙門釋復禮一部二卷論沙門釋慧立一部一十卷集傳沙門釋懷素四部八卷戒本羯磨沙門佛陀多羅一部一卷經沙門佛陀波利一部一卷經沙門提雲般若六部七卷經論沙門釋惠智一部一卷讚頌沙門釋明佺一部一十五卷目錄沙門實叉難陀一十九部一百七卷經婆羅門李無諂一部一卷經沙門彌陀山一部一卷經沙門釋玄嶷一部三卷集論沙門阿儞真那七部九卷經沙門釋義淨六十一部又七部二百三十九卷經律論傳律五十卷在闕本中述沙門菩提流志五十三部一百一十卷經論沙門釋愛同一部一卷羯磨沙門釋慧苑一部二卷經音義沙門般剌蜜帝一部一十卷經沙門釋智嚴四部六卷經集沙門輸波迦羅四部一十四卷經沙門跋日羅菩提四部七卷經又一部十卷經准貞元十五年十月二十二日勅編入沙門釋懷迪一部一十卷經沙門釋智昇五部二十五卷經錄懺儀等沙門無能勝三部四卷經沙門法月一部一卷經沙門大廣智不空一百一十一部一百四十三卷經律論內一卷失沙門般若六部七十卷經沙門勿提提犀魚一部一卷經沙門尸羅達摩二部十卷經沙門釋靈邃奏撰貞元釋教錄等沙門釋圓照等二部三十三卷經目錄寶星陀羅尼經十卷或八卷見內典錄貞觀三年二月於興善寺出四年四月四日訖沙門法琳製序佛於大集會中重說此經即大集寶幢分是非重譯也般若燈論釋十五卷龍樹菩薩本分別明菩薩釋見內典錄貞觀四年六月於勝光寺出至六年十月十七日畢沙門惠賾製序大乘莊嚴經論十三卷或十五卷無著菩薩造見內典錄貞觀四年夏於勝光寺與般若燈論同時出至七年春訖勅太子右庶子李百藥為序右三部三十八卷其本並在沙門波羅頗迦羅蜜多羅唐言作明知識略云明友或一云波頗唐言光智中印度人也本剎利王種姓剎帝利十歲出家隨師習學誦一洛叉大乘經可十萬偈受具已後便學律藏既通戒網心樂禪思又隨勝德修習定業因修不捨經十三年末後南遊摩伽陀國那蘭陀寺值戒賢論師盛弘十七地論因復聽採以此論中兼明小教又誦一洛叉偈小乘諸論波頗識度通敏器宇冲邃博通內外研精大小傳燈教授同侶所推承化門人般若因陀羅跋摩等學功樹勣深達義綱相繼領徒本國匡化為彼王臣之所欽重但以出家釋子不滯一方六月一移任緣靡定承北狄貪勇未識義方法藉人弘敢欲傳化乃與道俗十人展轉北行達西面可汗葉護衙所以法訓勗曾未浹旬特為戎主深所信伏日給二十人料旦夕祇奉同侶道俗咸被珍遇生福增敬日倍於前武德九年高平王出使入蕃因與相見承此風化將事東歸而葉護君臣留戀不許王即奏聞下勅徵入乃與高平同來謁帝以貞觀元年歲次丁亥十一月二十日達京勅住興善釋門英達莫不修造自古教傳詞旨有所未喻者皆委其宗緒檢其同異內計外執指掌釋然徵問相酬披解無滯乃上簡聞蒙引內見躬傳法理無爽對揚綵四十段并宮禁新納一領所將五僧加料供給重頻慰問勞接殊倫至三年三月上以諸有非樂物我皆空眷言真要無過釋典流通之極豈尚翻傳下詔所司搜𫾻碩德兼閑三教備舉十科者一十九人於大興善寺創開傳譯沙門玄謨僧伽等譯語及三藏同學崛多律師證譯沙門法琳惠明惠賾惠淨等執筆承旨慇懃詳覆審定名義具意成文沙門慧乘法常惠朗曇藏智解智首僧辯僧珍道岳靈佳文順等證義又勅上柱國尚書左僕射邦國公房玄齡散騎常侍太子詹事杜正倫禮部尚書趙郡王李孝恭等參助詮定右光祿大夫太府卿蘭陵男蕭璟總知監護百司供送四事豐華至四年四月譯寶星經訖後移勝光又譯般若燈大莊嚴經論至七年春勘閱既周繕寫云畢所司詳讀乃上聞奏下勅各寫十部散流海內仍賜頗物百段餘承譯僧有差束帛波頗意在傳法餘無挂懷而時輩不詢或生異議云頗僥倖時譽敢馳於後故聚名達廢講經論斯未是弘通者時有沙門靈佳卓犖拔群妙通機會對監護使具述事理云頗逮投東夏情乖名利欲使道流千載聲振上古昔苻姚兩代翻經學士乃有三千今大唐譯人不過二十意在明德同證信非徒說後代昭奉無疑於今耳識者僉議攸同後遂不行時為太子染患眾治無効下勅延頗入內一百餘日親問承對下帝旨疾既漸降辭出本寺賜綾帛等六十段并及時服十具頗誓傳法化不憚艱危遠度䓗河來歸震旦經途所亘四萬有餘躬齎梵文望並翻盡不言英彥有墜綸言本志頹然雅懷莫訴因而遘疾自知不救分散衣資造諸淨業端坐觀佛遺表施身下勅特聽尋爾而卒於勝光寺春秋六十有九東宮下令給二十人輿屍坐送至于山所闍維既了沙門玄謨收拾餘骸為之起塔於勝光寺在乘法師塔東即貞觀七年四月六日也有識同嗟法輪輟軫群生無導良可悲矣內典錄云于斯時也大集梵文將事廣博陶津後代而恨語由唐化弘匠不行致使梵寶無由分布故十載之譯三部獻功可悲深矣今考覈敘中譯時年月三年三月創譯七年春功畢續高僧傳云六年訖傳錄俱是宣修年月自矛楯也破邪論二卷或一卷見內典錄辯正論八卷見內典錄別傳三卷貞元新入目開元先禁斷右三部十三卷其本見在沙門釋法琳姓陳氏頴川人遠祖隨宦寓居襄陽少而出家遊獵儒釋博綜詞義金陵楚郢從道問津自文苑才林靡不尋造而意在綱梗不營浮綺野栖木食於青溪等山晝則承誨佛經夜則吟覽俗典故於內外詞旨經緯遺文精會所歸咸肆其抱而風韻閑雅韜德潛形氣揚采飛方陳神略隨季承亂入關觀化流離八水顧步三秦每以槐市仙宗互陳名寶昔在荊楚梗概其文而祕法奇章猶未探撿自非同其形服塵其本情方可體彼宗師靜茲紛結乃權捨法報長髮多年外統儒門內希聃術遂以義寧初歲假被巾褐從其居館琳素通莊老談吐清奇道侶服其精華膜拜而從遊處情契莫二共敘金蘭故彼所禁文詞並用諮琳取定致令李宗奉釋之典包舉具舒張偽葛妄之言詮題品錄武德初運還莅釋宗擁帙延光栖遑問道以帝壤同歸名教是則鼓言鄭衛易可箴規乃住京師濟法寺至武德四年有太史令傅奕先是黃巾深忌佛法上廢佛法事十有一條云釋經誕妄言妖事隱損國破家未聞益世請胡佛邪教退還天竺凡是沙門放歸桑梓則家國昌太李孔之教行焉武皇容其小辯朝輔未能抗也時謂遵其邪徑通廢宏衢莫不懼焉乃下詔問曰棄父母之鬚髮去君臣之章服利在何間之中益在何情之內損益二宜請動妙釋琳憤激傅詞側聽明勅承有斯問即陳對曰琳聞至道絕言豈九流能辯法身無像非十翼所詮但四趣茫茫漂淪欲海三界蠢蠢顛墜邪山諸子迷以自焚凡夫溺而不出大聖為之興世至人所以降靈遂開解脫之門示以安穩之路是以中天王種辭恩愛而出家東夏貴族厭榮華而入道誓出二種生死志求一妙涅槃弘善以報四恩立德以資三有此其利益也毀形以成其志故棄鬚髮美容變俗以會其道故去君臣華服雖形闕奉親而內懷其孝禮乖事主而心戢其恩澤被怨親以成大順祐沾幽顯豈拘小違上智之人依佛語故為益下凡之類虧聖教故為損懲惡則濫者自新進善則通人感化此其大略也傅氏所奏在司猶未施行奕乃多寫表狀遠近公然流布京室閭里咸傳禿丁之誚劇談酒席昌言胡鬼之謠佛日翳而不明僧尼阻而無勢于時達量道俗動毫成論者非一各疏佛理具引梵文委示業緣曲垂邪正但是奕之所廢豈有引廢證成雖曰破邪終歸邪破琳情弄玄機獨覺千載器局天授博悟生知覩作者之無功信乘權之有據乃著破邪論二卷用擬傅詞文有三十餘紙自琳之綴采貫絕群篇野無遁賢朝無遺士家藏一本咸誦在心並流略之菁華文章之冠冕茂譽於是乎騰廣昏情由之而開尚矣琳又以論卷初出意在弘通自非廣露其情則卓頴不虛其道乃上啟儲后諸王及公卿侯伯等並文理弘被庶績咸嘉其博詣焉故奕奏狀因之致寢遂得釋門重敞琳寔其功東宮庶子虞世南詳琳著論乃為之序而傅氏不愜其情重施密𧮂搆扇黃巾用為黨類道士李仲卿上十翼九迷論道士劉進喜上顯正論皆貶量佛聖塵點釋宗昏冐生靈衒曜朝野薰蕕既雜時所疑焉武德九年春下詔京置三寺唯立千僧餘並放還桑梓嚴勅既下莫敢致詞五眾哀號於槀衢四民顧嘆於城市于時道俗蒙然投骸無措賴由震方出帝氛𮃆廓清素襲啟聞薄究宗領登即大赦還返神居故佛日重朗於唐世又由琳矣琳頻逢黜陟誓結維持道挫世情良資寡學乃探索典籍隱括玄奧撰辯正論八卷頴川陳子良注之并製序良文學雄伯奉儒戴釋誘勸成則其從如雲貞觀初文帝捨終南山大和舊宮置龍田寺龍田寺是大和宮之于大院今在翠微之南宮正院為大和寺今并合入翠微寺焉琳性欣幽靜就而住之眾所推美舉知寺任從容山服詠歌林野三年勅波頗三藏翻寶星經及般若燈論召琳令執筆承旨兼詳覆名義至十三年冬有黃巾秦世英者挾方術以要榮遂程器於儲貳素嫉釋種陰陳琳論謗訕皇宗罪當誷上帝勃然下勅沙汰僧尼見有眾侶宜依遺教仍訪琳身據法推勘琳扼腕奮發不待追徵獨詣公庭輕生徇理乃縶以縲紲下詔問曰周之宗盟異姓為後尊祖重親寔由先古何為追逐其短首鼠兩端廣引形似之言備陳不遜之喻爬毀我祖禰謗黷我先人如此要君罪有不恕琳答曰文王大聖周公大賢追遠慎終昊天靡答孝悌之至通於神明雖有宗周義不爭長何者皇天無親竟由輔德古人黨理而不黨親不自我先不自我後雖親有罪必罰雖疎有功必賞賞罰理當故天下和平老子習人訓導宗德加於百姓恕己謙光仁風形于四海又云吾師名佛佛者覺一切人也乾竺古皇西昇逝矣討尋老教始末可追日授中經示誨子弟言吾師者善入泥洹綿綿常存吾今逝矣今劉李所述謗滅老氏之師世莫能知著茲辯正論有八卷略對道士六十餘條並陳史籍前言實非謗毀家國自後辯對六十餘條並據琳詞具狀聞奏勅云所著辯正論信毀交報篇曰有念觀音者臨刃不傷且赦七日令爾自念試及刑決能無傷不琳外纏桎梏內迫刑期水火交懷訴仰無路乃錄生來所聞經教及三聖尊名銘誦心府擬為顯應至于限滿忽神思彯勇橫逸胸懷歡慶相尋頓忘死畏立待對問須臾勅至云今赦期已滿當至臨刑有何所念有靈驗不琳援筆答曰自隋季擾攘四海沸騰疫毒流行干戈競起興師相伐各擅兵威臣佞君荒不為正治遏絕行路固執一隅自皇王弔伐載清陸海斯寔觀音之力咸資勢至之恩比德連蹤道齊上聖救橫死於帝庭免淫刑於都市琳於七日已來不念觀音惟念陛下勅治書侍御韋琮問琳有詔令念觀音何因不念乃云惟念陛下琳答伏承觀音聖鑒塵形六道上天下地皆為師範大唐光宅四海九夷奉職八表刑清君聖臣賢不為枉濫今陛下子育恒品如經即是觀音既其靈鑒相符所以惟念陛下且琳所著辯正論爰與書史倫同一句參差任從斧鉞陛下若順忠順正琳則不損一毛陛下若刑濫無辜琳有伏屍之痛具以事聞遂不加罪有勅迻于益部僧寺行至百牢關菩提寺因疾而卒時年六十九沙門惠序經理所苦情結斷金曉夕同衾慰撫承接及命將盡在序膝上序慟哭崩摧淚如駛雨乃召諸關旁道俗葬於山東之頂高樹白塔勒銘鋕之行路忘者知便下淚琳所著詩賦啟頌碑表章誄大乘教法并諸論記傳合三十餘卷並金石擊其風韻縟綿繢其文思流靡雅便騰焰彌穆又善應機說導即事騁詞言會宮商義符玄籍其秦世英竟以狂慝被誅公私怪其死晚劉李傳氏相從化往故其遺文往行可為萬代宗轄矣大般若波羅蜜多經六百卷見翻經圖佛於四處十六會說顯慶五年正月一日於玉華寺玉華殿譯至龍朔三年十月二十日畢沙門大乘光大乘欽嘉尚等筆受能斷金剛般若波羅蜜多經一卷見內典錄第四出與姚秦羅什等出者同本貞觀二十年十月一日於坊州宜君縣玉華宮弘法臺譯直中書杜行顗筆受般若波羅蜜多心經一卷見內典錄第二與摩訶般若大明呪經等同本貞觀二十二年五月二十四日於終南山翠微宮譯沙門智仁筆受大菩薩藏經二十卷見內典錄今編入寶積當第十二會貞觀十九年五月二日於西京弘福寺翻經院譯至九月二日畢沙門智證筆受道宣證文大乘大集地藏十輪經十卷見內典錄是大集第十三分與舊方廣十輪同本永徽二年正月二十三日於西京大慈恩寺翻經院譯至六月二十九日畢沙門大乘光等筆受顯無邊佛土功德經一卷見內典錄是華嚴經壽量品異譯永徽五年九月二十八日於大慈恩寺翻經院譯沙門大乘雲筆受說無垢稱經六卷見內典錄第七譯與羅什維摩經等同本永徽元年二月八日於大慈恩寺翻經院譯至八月一日畢沙門大乘光筆受解深密經五卷見內典錄第二譯與深密解脫解節相續解脫等並同本貞觀二十一年五月十八日於弘福寺譯至七月十三日畢沙門大乘光筆受分別緣起初勝法門經二卷見內典錄第二出與隋笈多緣生經同本永徽元年二月三日於大慈恩寺翻經院譯至八月畢沙門大乘詢筆受藥師琉璃光如來本願功德經一卷見內典錄第三出與隋笈多等出者同本永徽元年五月五日於大慈恩寺翻經院譯沙門惠立筆受稱讚淨土佛攝受經一卷見內典錄第三出與羅什彌陀經等同本永徽元年正月一日於大慈恩寺翻經院譯沙門大乘詢筆受甚希有經一卷見內典錄第三出與未曾有經等同本貞觀二十二年五月十八日於終南翠微宮譯沙門大乘欽筆受最無比經一卷見內典錄第二出隋譯希有挍量功德經同本貞觀二十三年七月十九日於大慈恩寺翻經院譯沙門大乘光筆受稱讚大乘功德經一卷見內典錄初出與決定業障經同本永徽五年六月五日於大慈恩寺翻經院譯沙門大乘光筆受如來示教勝軍王經一卷見內典錄第二出與諫王經同本貞觀二十年二月六日於大慈恩寺翻經院譯沙門大乘光筆受緣起聖道經一卷見內典錄第六出與貝多樹下經等同本貞觀二十三年正月一日於西京北闕內紫徽宮右弘法院譯沙門大乘光筆受不空羂索神呪心經一卷見內典錄第二出與隋崛多等出者同本顯慶四年四月十九日於大慈恩寺翻經院譯沙門大乘光筆受十一面神呪心經一卷見內典錄第二出與耶舍崛多等出者同本顯慶元年三月二十八日於大慈恩寺翻經院譯沙門玄則筆受呪五首經一卷見翻經圖麟德元年正月一日於玉華寺玉華殿譯沙門大乘光筆受勝幢臂印陀羅尼經一卷見內典錄初出與妙臂印幢陀羅尼同本永徽五年九月二十九日於大慈恩寺翻經院譯沙門大乘雲筆受諸佛心陀羅尼經一卷見內典錄永徽元年九月二十六日於大慈恩寺翻經院譯沙門大乘雲筆受拔濟苦難陀羅尼經一卷見內典錄永徽五年九月十日於大慈恩寺翻經院譯沙門大乘光筆受八名普密陀羅尼經一卷見內典錄永徽五年九月二十七日於大慈恩寺翻經院譯沙門大乘雲筆受持世陀羅尼經一卷見內典錄永徽五年十月十日於大慈恩寺翻經院譯沙門神察筆受六門陀羅尼經一卷見內典錄貞觀十九年七月十四日於弘福寺翻經院譯沙門辯機筆受佛地經一卷見內典錄貞觀十九年七月五日於弘福寺翻經院譯沙門辯機筆受受持七佛名號所生功德經一卷見內典錄永徽二年正月九日於大慈恩寺翻經院譯沙門大乘光筆受佛臨涅槃記法住經一卷見翻經圖永徽三年四月四日於大慈恩寺翻經院譯沙門大乘光筆受寂照神變三摩地經一卷見翻經圖龍朔二年十二月二十九日於玉華寺玉華殿譯沙門大乘光筆受菩薩戒本一卷見內典錄第三譯出瑜伽論本地分中菩薩地與曇無讖等出者同本貞觀二十三年七月二十一日於大慈恩寺翻經院譯大乘光筆受菩薩戒羯磨文一卷見內典錄出瑜伽論本地分中菩薩地貞觀二十三年七月十五日於大慈恩寺翻經院譯沙門大乘光筆受佛地經論七卷見內典錄親光等菩薩造貞觀二十三年十二月二日於大慈恩寺翻經院譯至十二月二十四日畢沙門大乘光筆受瑜伽師地論一百卷見內典錄彌勒菩薩說貞觀十二年五月十五日於弘福寺翻經院譯至二十年五月十五日畢沙門靈會明𤀹等筆受顯揚聖教論二十卷見內典錄無著菩薩造貞觀十九年十月十一日於弘福寺翻經院譯至二十年正月五日畢沙門智證等筆受瑜伽師地論釋一卷見翻經圖最勝子菩薩造永徽九年二月一日於大慈恩寺翻經院譯沙門大乘暉筆受顯揚聖教論頌一卷見內典錄無著菩薩造貞觀十九年十月十一日於弘福寺翻經院譯沙門辯機筆受王法正理論一卷見內典錄彌勒菩薩造貞觀二十三年七月十八日於大慈恩寺翻經院譯沙門大乘林筆受大乘阿毘達磨集論七卷見內典錄無著菩薩造永徽三年正月十六日於大慈恩寺翻經院譯至三月二十八日畢沙門大乘光大乘雲等筆受大乘阿毘達磨雜集論十六卷見內典錄安惠菩薩釋貞觀二十年正月十七日於弘福寺翻經院譯至閏三月二十九日畢沙門玄賾等筆受廣百論本一卷見內典錄聖天菩薩造永徽元年六月日於大慈恩寺翻經院譯沙門大乘謀筆受大乘廣百論釋論十卷見內典錄護法菩薩釋永徽元年六月二十七日於大慈恩寺翻經院譯至十二月二十三日畢沙門敬明等筆受攝大乘論本三卷見內典錄無著菩薩造第三出貞觀二十二年十二月二十六日於北闕紫微殿西弘法院譯至二十三年六月十七日慈恩寺畢大乘巍筆受攝大乘論世親釋十卷見內典錄第三出與陳真諦隋笈多出者同本貞觀二十二年十二月八日於北闕弘法院譯至三年六月十七日慈恩寺畢大乘巍筆受攝大乘論無性釋十卷見內典錄貞觀二十一年三月一日於弘福寺翻經院譯至二十二年六月十七日於大慈恩寺翻經院畢沙門大乘巍大乘林等筆受辯中邊論頌一卷見內典錄彌勒菩薩造龍朔元年五月一日於玉華寺嘉壽殿譯沙門大乘基筆受辯中邊論三卷見內典錄世親菩薩造第二出與中邊分別論同本龍朔元年五月十日於玉華寺嘉壽殿譯至二十日畢沙門大乘基筆受大乘成業論一卷見內典錄世親菩薩造第二出與業成就論同本永徽二年閏九月五日於大慈恩寺翻經院譯沙門大乘光筆受因明正理門論本一卷見內典錄大域龍樹菩薩造初出與義淨出者同本貞觀二十三年十二月二十五日於大慈恩寺翻經院譯沙門智仁筆受因明入正理論一卷見內典錄商羯羅主菩薩造貞觀二十一年八月六日於弘福寺翻經院譯沙門明𤀹筆受唯識二十論一卷見翻經圖世親菩薩造第三出與元魏智希陳真諦出者同本龍朔元年六月一日於玉華寺慶福殿譯沙門大乘光筆受唯識三十論一卷見內典錄世親菩薩造貞觀二十三年五月二十九日於弘福寺翻經院譯沙門大乘光筆受成唯識論十卷見內典錄護法等菩薩造顯慶四年閏十月於玉華寺雲光殿譯沙門大乘基筆受大乘掌珍論二卷見內典錄清辯菩薩造貞觀二年九月八日於大慈恩寺翻經院譯至十三日畢沙門大乘暉筆受大乘五蘊論一卷見內典錄世親菩薩造第二出與五陰論同本貞觀二十一年二月二十四日於弘福寺翻經院譯沙門大乘光筆受觀所緣緣論一卷見內典錄陳那菩薩造第二出與無相思塵論同本顯慶二年十二月二十九日於東都大內麗日殿譯沙門大乘光筆受大乘百法明門論一卷見內典錄世親菩薩造貞觀二十二年十一月十七日於北闕弘法院譯沙門玄志筆受緣起經一卷見翻經圖出增一阿含第四十六卷異譯龍朔元年七月九日於玉華寺八柱亭譯沙門神皎筆受本事經七卷見內典錄永徽元年九月十日於大慈恩寺翻經院譯至十一月八日畢沙門靖邁神昉等筆受天請問經一卷見內典錄貞觀二十二年三月二十日於弘福寺翻經院譯沙門辯機筆受阿毘達磨發智論二十卷見內典錄迦多衍尼子造第二出與舊八揵度論同本顯慶二年正月二十六日於京大內順賢閣譯至五年五月七日於玉華寺畢沙門玄則筆受阿毘達磨法蘊足論十二卷見內典錄大採菽氏造顯慶四年七月二十七日於大慈恩寺翻經院譯至九月十四日畢沙門大乘光等筆受阿毘達磨集異門足論二十卷見內典錄舍利子說顯慶五年十一月二十六日於玉華寺明月殿譯至龍朔元年十二月十九日畢沙門弘彥釋詮等筆受阿毘達磨識身足論十六卷見內典錄提婆設摩造貞觀二十三年正月十五日於北闕弘法院譯至八月八日於慈恩寺畢沙門大乘光等筆受阿毘達磨品類足論十八卷見內典錄筏蘇密多羅造第二出與眾事分阿毘曇同本顯慶五年九月一日於玉華寺雲光殿譯至十月二十三日畢大乘光等筆受阿毘達磨界身足論三卷見翻經圖筏蘇密多羅造龍朔三年六月四日於玉華寺八柱亭譯畢沙門大乘基筆受阿毘達磨大毘婆沙論二百卷見內典錄五百大阿羅漢等造顯慶元年七月二十七日於大慈恩寺翻經院譯至四年七月三日畢沙門嘉尚大乘光等筆受阿毘達磨俱舍論本頌一卷見內典錄世親造第二譯與真諦出者同本永徽二年於大慈恩寺翻經院譯沙門元瑜等筆受阿毘達磨俱舍論三十卷見內典錄世親造第二譯與真諦出者同本永徽二年五月十日於大慈恩寺翻經院譯至五年七月二十七日畢沙門元瑜筆受阿毘達磨順正理論八十卷見內典錄眾賢造永徽四年正月一日於大慈恩寺翻經院譯至五年七月十日畢沙門元瑜筆受阿毘達磨顯宗論四十卷見內典錄眾賢造永徽二年四月五日於大慈恩寺翻經院譯至二年十月二日畢沙門惠朗嘉尚等筆受入阿毘達磨論二卷見內典錄塞建陀羅造顯慶三年十月八日於大慈恩寺翻經院譯至十三日畢沙門釋詮嘉尚筆受五事毘婆沙論二卷見翻經圖法救造龍朔三年十二月三日於玉華殿譯至八日畢沙門釋詮等筆受異部宗輪論一卷見翻經圖世友造第三出與異論亦同本龍朔二年七月十四日於玉華寺慶福殿譯沙門大乘基筆受大阿羅漢難提蜜多羅所說法住記一卷見內典錄永徽五年閏五月十八日於大慈恩寺翻經院譯沙門大乘光筆受勝宗十句義論一卷見翻經圖惠月造貞觀二十二年五月十五日於弘福寺翻經院譯沙門靈携筆受大唐西域記十二卷見內典錄貞觀二十年奉勅於弘福寺翻經院撰沙門辯機承旨綴首秋七月絕筆右七十六部一千三百四十七卷其本並在沙門釋玄奘本名禕俗姓陳氏陳留人也漢太丘長仲弓之後曾祖欽後魏上黨太守祖康北齊國子博士食邑周南子孫因官又為緱氏人也父惠英潔有雅操早通經術形長八尺美眉明目拜江陵令解纓而返即大業年識者以為剋終隱淪之候故也有四男奘最小幼而珪璋特達聰悟不群年八歲父坐於机側口授孝經至曾子避席忽整襟而起問其故對曰曾子聞師命尚猶避席某今奉慈訓豈宜安坐父甚悅知其必成召宗人語之皆賀之曰此公之揚烏也其早惠如此自後備通經奧次兄長捷先出家住東都淨土寺以奘少罹窮酷携以將之日授精理旁兼巧論年十一誦維摩法華東都恒度便預其次自爾卓然梗正不偶朋流口誦目緣略無閑缺覩諸沙彌劇談掉戲奘謂之曰經不云乎夫出家者為無為法豈復恒為兒戲可謂徒喪百年時寺有景法師講涅槃經執卷伏膺遂忘寢食又學嚴法師攝大乘論一聞將盡再覽無遺時年十三也其後隋代失御天下沸騰昆季相携屆于京邑住莊嚴寺是時武德元年也國基草創兵甲尚興所以京城未有講肆然綿蜀之中法事甚盛遂與兄從之經子午谷入漢川遂逢空景二法師停月餘日從之受學仍相與進向成都諸德既萃大建法筵於是更聽基暹攝論毘曇道振迦旃延論敬惜寸陰勵精無怠二三年間究通諸部年滿二十即以武德五年於成都受具夏坐學律五篇七聚之宗一遍斯得奘自惟曰學貴經遠義重疎通鑽仰一方未成探賾遂從蜀至荊詢求先德漸至相州造惠休法師質問疑礙次到趙州謁道深法師學成實論又入長安止大覺寺就岳法師學俱舍論皆一遍而盡其旨經目而記於心雖宿學耆年不能出也至於鉤深致遠開微發伏眾所不至獨悟於幽奧者固非一義焉時長安有常辯二法師為上京法匠奘又諮稟然其所有深致亦一拾斯盡二德並深嗟賞乃謂奘曰汝可謂釋門千里之駒其再明慧日當在爾躬恨吾輩老朽恐不見也自是學徒改觀譽滿京邑僕射宋公蕭瑀敬其脫頴奏住莊嚴然非本志情栖物表乃又惟曰余周流吳蜀爰逮趙魏未及周秦預有講筵率皆登踐已布之言今雖蘊胸襟未吐之詞宗解籤無地若不輕生殉命誓往華胥何能具覿成言用通神解一覩明法了義真文要返東華傳揚聖化則先賢高勝豈決疑於彌勒後進鋒頴寧輟想於瑜伽耶遂厲然獨舉詣闕陳表有司不為通引頓迹京臯廣就諸蕃遍學書語行坐尋授數日便通側席面西思聞機候會貞觀三年時遭霜險下勅道俗隨豐四出幸因斯際徑往姑臧漸至燉煌路由天塞裹糧弔影前望悠悠但見平沙絕無人徑迴遑委命任業而前展轉因循達高昌境王麴文泰得信於佛殊禮供待請留弘法奘告誠慇至遂任西行厚相贈遺以充資什仍勅殿中侍御史歡齎綾帛伍佰匹果味兩車獻葉護可汗書二十四封通屈支等二十四國每一封書附大綾一匹為信給馬三十匹手力二十五人送至突厥葉護衙所以大雪山北六十餘國皆其部統故重遺達為奘開前路也可汗遂勅所部諸國令供給傳送展轉遂達迦濕彌羅國斯並高昌麴王葉護可汗之力也奘周遊五印遍師明匠至如五明四含之典三藏十二之筌七例八轉之音三聲六聲之句皆盡其微畢究其妙初那爛陀寺大德師子光等立中百論宗破瑜伽等義奘曰聖人作論終不相違但學者有向背耳因造會宗論三千頌融會瑜伽中百之旨先有南印度王灌頂師名般若毱多明正量部造破大乘論七百頌奘申大乘義破之名制惡見論千六百頌諸師咸曰斯論窮天下之勍寇也何敵當之又東印度拘摩羅王因奘通化初開信門請問諸佛何所功德奘讚如來三身利物因造三身論三百頌以贈之王曰未曾有也頂戴歸依斯之三論義府幽奧五印度境盛傳流布是知道風照著德行高明學蘊三冬聲馳萬里印度學人咸仰盛德既曰經笥亦稱法將小乘學徒號奘為木叉提婆唐言解脫天大乘法眾號摩訶耶那提婆唐言大乘天斯乃高其德而傳徽號敬其人而議嘉名又戒日大王五印臣伏彼聞奘名遣人要請奘初至止王即問云聞彼支那國有秦王破陣樂歌之曲秦王何人致此歌詠奘曰即今正國之天子也未登皇極之前封為秦王是大聖人揆亂反正恩霑六合故有斯詠王曰如此之人故天縱之為物主也王於奘所盡心師敬欲使芳音布於遐邇故於曲女城施大論場集五印度沙門婆羅門能言之士令奘立論竟十八日無敢問者王大嗟賞施金錢一萬銀錢三萬上㲲衣一百具悉皆不受五印度境戒日王等殷重請留用光玄化奘志存弘益傳於未聞礭擬東旋拒而不受王重請暫住觀七十五日大施場相事訖辭還王勅所部遞送出境并施象一頭金銀錢各數萬戒日拘摩羅等十八大國王流淚執別奘便辭而不受諸僧勸受象施皆曰斯勝相也佛滅度來王雖崇敬種種布施未聞以象用及釋門象為國寶今既見惠信之極矣即納象而返錢寶然其象也其形圓大高可丈三長二丈許上容八人并諸什物緣國北旋出印度境奘歷遊諸國觀禮聖迹及感靈應具如大唐西域記及續高僧傳兼奘法師傳等備顯奘於西域請得如來肉舍利一百五十粒金佛像一軀通光座高尺有六寸擬摩揭陀國前正覺山龍窟影像金佛像一軀通光座高三尺三寸擬婆羅痆斯國鹿野苑初轉法輪像刻檀佛像一軀通光座高尺有五寸擬橋賞彌國出愛王思慕如來刻檀寫真像刻檀佛像一軀通光座高二尺九寸擬劫比他國如來自天宮下降寶階像銀佛像一軀通光座高四尺擬摩揭陀國鷲峯山說法華等經像金佛像一軀通光座高三尺五寸擬那揭羅曷國伏毒龍所留影像刻檀佛像一軀通光座高尺有三寸擬吠舍釐國巡城行化像大乘經二百二十四部大乘論一百九十二部上座部經律論一十四部大眾部經律論一十五部三彌底部經律論一十五部彌沙塞部經律論二十二部迦葉臂耶部經律論一十七部法密部經律論四十二部說一切有部經律論六十七部因論三十六部聲論一十三部凡五百二十夾六百五十七部並載之巨象還返帝城初奘既度蔥嶺先遣侍人齎表陳露達國化也下勅流問令早相見行達于闐以象致死所齎經像交無運致又上表請尋下別勅令于闐王給其鞍乘既奉嚴勅駝馬相運至于沙州又蒙別勅計其行程酬雇價直並不受而還自爾乘傳二十許乘以貞觀十九年正月二十四日屆于京邦之西道俗相趨屯赴闐𨶮數十萬眾如值下生將欲入都人物諠擁取進不前遂停別館通夕禁衛候備遮斷停駐道旁從故城之西南至京師朱雀之都亭驛二十餘里列眾拜謁動不得旋于時駕幸洛陽奘乃留諸經像送弘福寺京邑僧眾競列幢帳助運莊嚴四部諠譁又倍初至當斯時也復感瑞雲現于日北團團如蓋紅白相映當于像上顯發輪光既非遶日同共嗟仰從午至晡像入弘福方始歇滅致使京都五日四民廢業七部歸承當此一期傾仰之高終古罕類也謁帝於洛陽宮見于儀鸞殿特蒙慰問面奉天顏談敘真俗無爽帝旨從卯至酉不覺時延迄于閉鼓上即事戎旃問罪遼左明旦將發下勅同行固辭疾苦不違其請先是中印度菩提寺僧三人送經初至下勅普請京城設齋仍於弘福寺譯大嚴等經不久之間奘信又至乃勅且停待到方譯既見洛宮深沃虛想即陳翻譯搜擢賢明上曰法師唐梵具瞻詞理通敏將恐徒揚仄陋終虧聖典奘曰昔二秦之譯門徒三千雖復翻傳猶恐後代無聞懷疑乖信若不搜舉同奉玄規豈以褊能妄參朝委頻又固請乃蒙降許
