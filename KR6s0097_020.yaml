説般若經後漢月支三藏支婁迦讖譯第一譯摩訶衍寶嚴經一卷一名大迦葉品晉代失譯舊在後漢録今且依舊第二譯右二經與寶積第四十三普明菩薩會同本異譯勝鬘師子吼一乘大方便方廣經一卷亦直云勝鬘經宋天竺三藏求那跋陀羅譯三譯一闕右一經與寶積第四十八勝鬘夫人會同本異譯毗耶娑問經二卷元魏婆羅門瞿曇般若流支譯出序記第一譯右一經與寶積第四十九廣博仙人會同本異譯其序記云魏興和四年歲次壬戌月建在申朔次乙丑婆羅門客瞿曇流支沙門曇林於尚書令儀同高公第譯建初辛巳甲午畢功凡有一萬四千四百五十七字諸録皆云勒那摩提或云菩提留支譯者二俱誤也今依序記為正此毗耶娑經舊録為小乘單本今勘為大乘重譯上八經十一卷同帙大集部但是大集流類皆編於此總二十四部一百四十二卷一十四帙大方等大集經三十卷或四十卷北涼天竺三藏曇無讖於姑臧譯三帙第三譯三譯三闕謹按梁沙門僧祐大集記云有十二段説共成一經第一瓔珞品第二陀羅尼自在王品第三寶女品第四不眴品第五海慧品第六無言品第七不可説品第八虛空藏品第九寶幢分品第十虛空目分品第十一寶鬘品第十二無盡意品今撿經本與祐記不同第一陀羅尼自在王菩薩品亦有經本分為瓔珞品者不然此是一段不合分二後大衰經即是此品第二寶女品第三不眴菩薩品第四海慧菩薩品第五虛空藏菩薩品第六無言菩薩品第七不可説菩薩品第八寶幢分第九虛空目分第十寶鬘菩薩品第十一日密分尋撿群録此大集經卷無定準或云二十九或云十或三十一或三十二或四十卷今時大集多分三十其日密分文不具足合少一卷其三十一卷者文應備具今尋求未獲然僧祐記中無日密分有無盡意品者不然今以無盡意經雖是大集別分非無讖譯又非次第不合入其虛空藏品祐在不可説後未詳所以今從陀羅尼自在王品至日密分總十一分其日藏經與日密分同本異譯亦是第十一分日密日藏初俱云説虛空目安那般那甘露門已次説此經又日密分既於虛空目後説準義不合隔寶髻品今經本中有此品隔未詳所以又日密日藏雖是同本是日密分文極最略後文復闕可收卷餘月藏經是第十二分或有經本題云大乘大集經月藏分第十二經初又云化諸龍衆説日藏經已次説此經十輪經是第十三分初云説月藏經已次説此經十輪後第十四分本在西方未流於此須彌藏經是第十五分經初題云大乘大集經須彌藏分第十五第十六分合是虛空孕經初云授功德天記別法已次説此經然須彌藏經因功德天如來方説故知此經合居其次其日藏經初在迦蘭陀竹林園説次升須彌頂後因龍請往佉羅帝耶山月藏等四經並在佉羅帝耶山説次第如是其念佛三昧賢護臂喻王無盡意經等雖是大集別分既不知次第難可編記然隋朝僧就合大集經乃將明度五十挍計經題為十方菩薩品編月藏後及無盡意經成五十八卷者非也既無憑準故不依彼其合大集經亦有六十卷成者三十一二兩卷重有寶髻品足成六十其寶髻品在日密前二十六七卷是此復重編未詳何意又日密日藏梵本不殊重編載誤之甚矣若欲合者前大集中除日密分有二十七卷以日藏分替處續次日密日藏梵本雖同日密分中文略闕少故日藏替之次月藏次地藏十輪唐譯十卷成者次須彌藏次虛空孕後之四經雖不知説次以意合之亦將無失虛空孕後次念佛以宋朝譯六卷者充其隋譯十卷者後闕二品次賢護次譬喻王末無盡意總成八十卷亦將契矣其無盡意經初首題云大集經中無盡意菩薩不可盡義品第三十二品即分也是第三十二分然僧祐記中在寶髻品後及僧祐所合大集編之於末者是非明矣又有善住意天子所問經詳其文義合是大集別分合編入大寶積中不可雙載故此闕也大方等大集日藏經十卷或十五卷第十一分一帙隋天竺三藏那連提耶舍譯與日密同第四譯右一經與前大集經末日密分同本異譯日蜜文略此中稍廣大集月藏經十卷或十五卷第十二分一帙高齊天竺三藏那連提耶舍譯單本地藏菩薩問法身讚一卷經內題云百千頌大集經地藏菩薩請法身讚大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録大乘大集地藏十輪經十卷第十二分大唐三藏玄奘譯分一帙出內典録第二譯上二經十一卷同帙大方廣十輪經八卷失譯今附北涼録第一譯右二經同本異譯其舊十輪經大周録云曇無讖譯出長房録檢長房入藏録中乃云失譯周録誤也大集須彌藏經二卷第十五分高齊天竺三藏那連提耶舍共法智譯單本上二經十卷同帙虛空藏菩薩經一卷或無菩薩字姚秦罽賓三藏佛陀耶舍歸罽賓譯寄來秦國第一譯虛空藏菩薩神呪經一卷宋罽賓三藏曇摩蜜多譯第一譯虛空孕菩薩經二卷合是第十八分隋天竺三藏闍那崛多等譯第四譯右三經同本異譯前後四譯一譯闕本觀虛空藏菩薩經一卷亦云虛空藏觀經或無觀字宋罽賓三藏曇摩蜜多譯單本新譯大虛空藏菩薩所問經八卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録大虛空藏菩薩念誦法一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録上六經十四卷同帙菩薩念佛三昧經六卷或無菩薩字宋天竺沙門功德直共玄暢譯第一譯大方等大集菩薩念佛三昧經十卷一帙隋天竺三藏達摩笈多譯出內典録第二譯右二經同本異譯其隋譯本比於前經後闕二品文不足矣般舟三昧經三卷或加大字或二卷後漢月支三藏支婁迦讖譯第一譯拔披菩薩經一卷或名拔波僧祐録云安公古異經是般舟經拘四品異譯第五譯今附漢録大方等大集賢護經五卷亦直云賢護經或六卷隋天竺三藏闍那崛多等譯第七譯右三經同本異譯前後七譯四譯本闕上五經二十五卷分三帙阿差末經七卷晉曰無盡意或四卷或五卷西晉三藏竺法護譯無盡意菩薩經六卷亦云阿差去經出大集經宋沙門智嚴共寶雲譯右一經同本異譯前後五譯三譯闕本上二經十三卷同帙大集譬喻王經二卷大集別品隋天竺三藏闍那崛多等譯拾遺編入大哀經八卷或云如來大哀經或六卷或七卷西晉三藏竺法護譯右一經是大集經初陀羅尼自在王菩薩品異譯出第一卷初至第五卷半上二經十卷同帙寶女所問經二卷亦云寶女問慧經或四卷西晉三藏竺法護譯右一經是大集經寶女品異譯出第五卷半後至第七卷無言童子經二卷或言無言菩薩或一卷西晉三藏竺法護譯右一經是大集經無言品異譯出第十七卷半至第十八過半自在王菩薩經二卷姚秦三藏鳩摩羅什於逍遙園譯第一譯奮迅王問經二卷元魏婆羅門瞿曇般若流支等譯出序記第二譯右二經同本異譯其奮迅王經序記云魏興和四年歲次壬戌月建在申朔次乙丑甲午之日啓夾創筆沙門曇林瞿曇流支於尚書令儀同高公第譯凡有一萬八千三百四十一字諸録皆云菩提支譯者誤也依序記為正又上二經內典録云抄大集經陀羅尼自在王菩薩品異譯者不然尋其文理懸絶不同但可不為大集別分耳或此之二經非大集分但以上代群録皆云異譯抄陀羅尼自在王品勘撿雖則不同且記於大集之末上四經九卷同帙寶星陀羅尼經十卷或八卷大唐天竺三藏波羅頗蜜多羅譯出內典録單本右一經內典録云是大集經別分撿尋前大集經中寶幢分佛於欲色二界中間大寶坊中重説此寶星陀羅尼經故寶幢分初云佛在欲色二界中間大坊中告大衆言我昔初得菩提已住王舍城迦蘭陀竹林爾時中有二智人一名優婆提舍二名拘律陀等次第至末文意並同此經可為重説不可為重譯也叉舊録中有寶髻菩薩所問經是寶髻品異譯今編入寶積第四十七會既入彼中此不重載又有虛空藏經八卷撿無異本即虛空藏品抄出別行又有虛空藏問持經得幾福經亦是虛空藏品別文抄出既是別出除之不録又內典録及大周録中更有大集經八卷尋其文句即是合部大集經第六帙也初之兩卷名十方菩薩品此乃是明度五十挍計經不知何故編入此中後之六卷乃是無盡意經既是繁重亦除不録
