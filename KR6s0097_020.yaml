body:
  text: 西京西明寺沙門圓照撰別分乘藏下就別録中更分為七有譯有本録第一一千二百六十一部五千三百九十一卷有譯無本録第二一千一百五十五部二千三十卷支派別行録第三六百八十二部八百一十二卷刪略繁重録第四一百四十七部八百一十二卷補闕拾遺録第五四百六十九部一千四百一十四卷疑惑再詳録第六一十四部一十九卷偽妄亂真録第七三百九十三部一千四十一卷有譯有本録第一之一此有本録中復有二録初別分乘藏二賢聖集傳乘藏有二菩薩三藏録第一一百八部二千九百八十八卷聲聞三藏録第二三百三十七部一千八百九卷二聖賢傳記録一百一十二部五百九十三卷有譯有本録中菩薩三藏第一之一菩薩藏者大乘所詮之教也統論教主則法身常在無滅無生所詮之理則方廣真如亡名離相總乃三藏差異別則一十二科始乎發心終於十地三明八解之説六波四攝之名如是科條名為此藏始自漢明丁卯之歲至我貞元庚辰之年見流行者總八百八部合二千九百八十八卷二百六十七帙大乘法藏總別條例具如後列菩薩契經藏六百八十二部二千四百卷二百二十二帙菩薩調伏藏三十七部五十五卷五帙菩薩對法藏九十九部五百二十卷五十帙大乘經重單合譯五百五十四部二千九十卷二百八十八帙尋諸舊録皆以單譯為先今此録中以重譯者居首所以然者重譯諸經文義備足名相揩定所以摽初也又舊譯中直名重譯今改名重單合譯者以大般若經九會單本七會重譯大寶積經二十會單本二十九會重譯直云重譯攝義不周餘經例然故名重單合譯也又古譯經首皆無譯人時代年月浸遠尋討莫知失譯之言實由於此今尋諸舊録參定是非時代譯人具摽經首失譯之者載之於録釋尊遺教終六萬之修齡矣般若部新舊譯本及支派經並編於此總二十一部七百三十六卷七十三帙般若經建初者謂諸佛之母也舊録之中編比無次今此録中大小乘經皆以部類編為次第小乘諸律據本末而為備次大乘諸論以釋有經者為先集解義者列之於後小乘諸論據部次第發智為初六足居此毗婆沙等支派編末聖賢集傳內外兩分大夏神州東西有異欲使科條各別覽者易知大般若波羅蜜多經六百卷六十帙大唐三藏玄奘於玉華宮寺譯出翻經圖右此經梵本都有二十萬頌總四處十六會唐言譯之成六百卷重單合譯具列如左第一會王舍城鷲峯山説右新譯單本梵文一十三萬二千六百頌唐譯成四百卷七十九品從第一卷至第四百第二重會王舍城鷲峯山説第四譯右新譯重本梵文二萬五千頌唐譯成七十八卷八十五品與舊大品放光光讚般若同本異譯從四百一卷至四百七十八比於舊經闕無常啼等品餘意大同第三重會王舍城鷲峯山説右新譯單本梵文一萬八千頌譯成五十九卷三十一品從四百七十九卷至五百三十七第四重會王舍城鷲峯山説第八譯右新譯重本梵文八千頌譯成一十卷二十九品與舊道行小品明度長安品等同本異譯從五百三十八卷至五百五十五比於舊經亦闕常啼等品餘意不殊第五重會王舍城鷲峯山説右新譯單本梵文四千頌譯成十卷二十四品從五百五十六卷至五百六十五第六重會王舍城鷲峯山説第二譯右新譯重本梵文二千五頌譯成八卷一十七品與舊勝天王般若同本異譯從五百六十六卷至五百七十三第七會室羅筏城給孤獨園説曼殊室利分第二譯右新譯重本梵文八百頌譯成二卷無品與舊兩譯文殊般若同本異譯當第五百七十四七十五卷第八重會室羅筏城給孤獨園説那伽室利分第三譯右新譯重本梵文四百頌譯成一卷無品與舊濡首菩薩分衛經等同本異譯當第五百七十六卷第九重會室羅筏城給孤獨園説能斷金剛分第四譯右新譯重本梵文三百頌譯成一卷無品與新舊四譯金剛般若同本異譯當第五百七十七卷第十會他化自在天王宮説般若理趣分第一譯右新譯重本梵文三百頌譯成一卷無品與後譯實相般若同本異譯當第五百七十八卷第十一重會室羅筏城給孤獨園説布施波羅蜜多分右新譯單本梵文二千頌譯成五卷無品從五百七十九卷至五百八十三第十二重會室羅筏城給孤獨園説淨戒波羅蜜多分右新譯單本梵文二千頌譯成五卷無品從五百八十四卷至五百八十八第十三重會室羅筏城給孤獨園説安忍波羅蜜多分右新譯單本梵文四百頌譯成一卷無品當第五百八十九卷第十四重會室羅筏城給孤獨園説精進波羅蜜多分右新譯單本梵文四百頌譯成一卷無品當第五百九十卷第十五重會王舍城鷲峯山説靜慮波羅蜜多分右新譯單本梵文八百頌譯成二卷無品當第五百九十一九十二卷第十六會王舍城竹林園中白鷺池側説般若波羅蜜多分右新譯單本梵文二千五百頌譯成八卷無品從五百九十三卷至第六百放光般若波羅蜜經三十卷或二十卷三帙西晉三藏曇無羅叉共竺叔蘭譯第一譯摩訶般若波羅蜜經四十卷亦名大品般若經或三十卷四帙姚秦三藏鳩摩羅什共僧睿等譯第三譯光讚般若波羅蜜經十五卷或十卷西晉三藏竺法護譯第一譯右三經與大般若第二會同本異譯其光讚般若比於新經三分將一至散花品後文並闕又按姚秦僧睿小品序云斯經正文凡有四種是佛異時適廣略之説也其多者云有十萬偈少者六百偈此之大品即是天竺之中品也準斯中品故知與大經第二會同梵文也龍樹菩薩造智度論釋大品經摩訶般若波羅蜜鈔經五卷一名須菩提品亦名長安品姚秦天竺沙門曇摩卑共竺佛念譯第六譯右一經長房內典二録云是外國經鈔者尋之未審也據其文理乃與小品道行經等同本異譯故初題云摩訶般若波羅蜜經道行品第一但文不足三分過二準道行後闕十品金剛頂瑜伽般若理趣經一卷經內題云大樂金剛不空真實三麼那經般若波羅蜜多理趣品大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録般若理趣經釋一卷經內題云大樂金剛不空真實三昧耶經般若波羅蜜多理趣釋大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録上四經二十二卷二帙道行般若波羅蜜經十卷亦名般若道行或八卷後漢月支三藏支婁迦讖譯第一譯小品般若波羅蜜經十卷或七卷或八卷一帙姚秦三藏鳩摩羅什譯第七譯大明度無極經四卷亦直云大明度經或六卷吳月支優婆塞支謙譯第二譯右四經與大般若第四會同本異譯其西晉三藏竺法護譯新道行經但有其名而無其本諸藏縱有即與小品文同但題目異故不重出前後八譯五存三闕勝天王般若波羅蜜經七卷陳優禪尼國王子月婆首那譯第一譯右一經與大般若第六會同本異譯上二經十一卷同帙文殊師利所説摩訶般若波羅蜜經二卷或一卷二十一紙梁扶南三藏曼陀羅仙譯第一譯右一經亦名文殊般若波羅蜜經初文無十重光後文有一行三昧文言文殊師利童真者是又編入寶積在第四十六會為與後經名同恐有差錯故復出之文殊師利所説般若波羅蜜經一卷梁扶南三藏僧伽婆羅譯拾遺編入第二譯二十紙右一經初文有十光文無一行三昧文言文殊師利法王子者是初歎菩薩德及列菩薩名此稍廣又此二經亦互有廣略右二經與大般若第七會曼殊室利分同本異譯濡首菩薩無上清淨分衛經二卷一名決了諸法如幻化三昧經宋沙門翔公南海郡譯第二譯右一經與大般若第八會那伽室利分同本異譯新舊相比舊經稍廣前後三譯二存一闕金剛般若波羅蜜經一卷舍衛國姚秦三藏鳩摩羅什譯第一譯金剛般若波羅蜜經一卷婆伽婆元魏天竺三藏菩提留支譯第二譯金剛般若波羅蜜經一卷祇樹林陳天竺三藏真諦譯第三譯能斷金剛般若波羅蜜多經一卷室羅筏城大唐三藏玄奘譯出內典録第四譯能斷金剛般若波羅蜜多經一卷名稱城大唐天后代三藏義淨譯新編入録第五譯右五經同本異譯其第四本能斷般若貞觀二十二年沙門玄奘從駕於玉華宮弘法臺譯後至顯慶五年於玉華寺翻大般若即當第九能斷金剛分今本編入更不重翻準諸經例合入大部者即同別生此録之中不合重載為與沙門義淨譯者名同恐有差錯故復出之三師造論同釋此經實相般若波羅蜜經一卷大唐天后代天竺三藏菩提流志譯出大周録第二譯右一經與大般若第十會般若理趣分同本異譯而西域梵文有廣略二本故實相理趣文意乃同況大小異上九經十一卷同帙仁王護國般若波羅蜜經二卷或一卷姚秦三藏鳩摩羅什譯第二譯三譯二闕新譯仁王經二卷內題仁王護國般若波羅蜜多經御製序大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録仁王般若陀羅尼釋一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録仁王般若念誦法經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録仁王念誦儀軌一卷經內題云仁王護國般若波羅蜜多經陀羅尼念誦儀軌大興善寺大廣智不空奉詔譯貞元新入目録摩訶般若波羅蜜大明呪經一卷姚秦三藏鳩摩羅什譯第一譯拾遺編入般若波羅蜜多心經一卷大唐三藏玄奘譯出內典録第二譯右二經同本異譯前後三譯二存一闕其般若心經舊録為單本新勘為重譯仁王般若等三經文義雖通大部全本大部中無是支流攝非從彼出普遍智藏般若波羅蜜多心經一卷東天竺國三藏沙門法月譯貞元新入目録新譯般若波羅蜜多心經一卷罽賓國三藏賜紫沙門般若奉詔譯貞元新入目録右二經同本異譯修習般若波羅蜜菩薩觀行念誦儀軌一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目録大曼茶羅十七尊釋一卷經內題云般若波羅蜜多理趣經大安樂不空三昧耶真實金剛菩薩等一十七尊大曼茶羅義述大興善寺三藏沙門大廣智不空奉詔譯上十一經十三卷同帙守護國界主陀羅尼經一部十卷一帙罽賓國三藏般若譯準敕編入貞元目録寶積部但諸會重本並次第編總八十二部此以諸部合成故存本數上録一百六十九卷一十七帙大寶積部一百二十卷十二帙大唐南天竺三藏菩提流志譯新編入録右此經新舊重單合譯共四十九會合故沓反成一部新舊共二十會單本新舊共二十九會重譯於中二十六會大唐三藏菩提流志新譯二十三會古譯及唐舊譯菩提流志勘梵本同編入會次具列如左第一三律儀會三卷大唐三藏菩提流志新譯第二譯右新譯重本與舊大方廣三戒經同本異譯從第一卷至第三卷第二無邊莊嚴會四卷大唐三藏菩提流志新譯右新譯單本從第四卷至第七卷第三密迹金剛力士會七卷西晉三藏竺法護譯勘同編入右舊譯單本從第八卷至第十四第四淨居天子會二卷西晉三藏竺法護譯出法上録勘同編入右舊譯單本名菩薩説夢經新改名淨居天子會當第十五及十六卷細詳文句與竺法護經稍不相類長房等録皆云失譯法上録中云竺法護出今者且依法上録録之第五無量壽如來會二卷大唐三藏菩提流志新譯右新譯重本與舊無量清淨平等覺阿彌陀無量壽經等同本異譯當第十八卷第六不動如來會二卷大唐三藏菩提流志新譯第二譯右新譯重本與舊阿閦佛國經等同本異譯當第十九卷及二十卷第七被甲莊嚴會五卷大唐三藏菩提流志新譯右新譯單本從第二十一卷至第二十五卷第八法界體性無分別會二卷梁三藏曼陀羅仙譯第二譯勘同編入右舊譯重本與姚秦童壽所譯法界體