body:
  text: 西京西明寺沙門圓照撰總集群經録上之二觀藥王藥上菩薩經一卷初出見長房録空淨天感應三昧經一卷舊録云空淨三昧經初出見長房録卒逢賊結衣帶呪經一卷見長房録呪賊經一卷一名辟除賊害見長房録祐失譯録中雙載二本同名呪賊此且存一十四意經一卷舊録云菩薩十四意經見僧祐録法律三昧經一卷初出見法上録道意發行經二卷或一卷見道安及僧祐録房云出長阿含大十二門經二卷或一卷出長阿含安公注解兼製序見僧祐及寶唱録小十二門經二卷出長阿含安公注解無製序見僧祐及寶唱録七法經一卷舊録云阿毗曇七法行經或直云七法行經見僧祐録房云出長阿含多增道章經一卷舊録無道字云異出十法見房録云出長阿含義決律經一卷或無經字亦云義決律法行經安公云出長阿含見僧祐録雜四十四篇經一卷或云雜經四十四篇既不顯名未知何經安公云出增一阿含見僧祐録百六十品經一卷舊録云出增一阿含百六十章經見僧祐録舍頭諫經一卷見舊録第二出云舍頭諫太子明二十八宿經亦云太子明星十六宿經亦云虎耳經琉璃王經一卷或作琉璃房云出增一阿含撿無見長京録太子夢經一卷初出見長房録禪經二卷第二出房云見別録恆水經一卷初出亦云恆水不説戒經見法上録寶唱録云恆水誡經悔過法經一卷見長房録五法經一卷見僧祐録五行經一卷見長房録小般泥洹經一卷房云見別録祐録云或名泥洹後諸比丘經或云泥洹後變化經或云泥洹後比丘世變經或云佛般泥洹後比丘世變經正齋經一卷見長房録分別罪福經一卷見長房録難提迦罪起經一卷見僧祐録禪定方便次第經一卷見長房録禪法經一卷見長房録當來變滅經一卷見長房録修行道地經七卷或六卷初出或云順道行經漢永康元年支敏度製序見寶唱録及別録五門禪要用法經一卷初出見長房録思惟要略經一卷或直云思惟經初出見僧祐録法句經四卷初出見長房録請賓頭法一卷初出見內典録阿毗曇九十八結經一卷見僧祐録右九十五部一百一十五卷阿毗曇五法上五十四部五十九卷見在無量壽經下四十一部五十六卷闕本沙門安清字世高安息國王正后之太子也幼懷淳孝敬養竭誠惻隱之仁爰及蠢類其動言立行若踐規矩焉加以志業聰明尅意好學外國典籍莫不該貫七曜五行之象風角雲物之占推步盈縮悉窮其變兼洞曉醫術妙善針脈覩色知病投藥必濟乃至鳥獸鳴呼聞聲知心嘗行見群燕忽謂伴曰燕云應有送食者頃之果有致焉衆咸奇之於是俊異之名被於西域遠近鄰國咸敬而偉之高雖在居家而奉戒清峻講集法施與時相續後父王薨將嗣國位乃深惟苦空厭離名器行服既畢遂讓國與叔出家修道博綜經藏尤精阿毗曇學諷持禪經略盡其妙既而遊方弘化遍歷諸國以漢桓之初始到東夏高才悟機敏一聞能達至止未久大通華言慨正法深微廣事宣譯高窮理盡性自識宿緣多有神迹世莫能量初高自稱先身已經為安息王子與其國中長者子俱共出家分衛之時值施主不稱每輒懟恨高屢加訶諫終不悛改如此二十餘年乃與同學辭訣云我當往廣州畢宿世之對卿明經精勤不在吾後而性多恚怒命過當受惡形我若得道必當相度既而遂適廣州值寇賊大亂行路逢一年少唾手拔刀曰真得汝矣高笑曰我宿命負卿故遠相償卿之忿怒故是前世時意也遂申頸受刃容無懼色賊遂殺之觀者填路莫不駭其奇異而此神識還為安息王太子即今時世高身是高遊化中國宣經事畢值靈帝之末關洛擾亂乃振錫江南云我當過廬山度昔同學行達䢼亭湖廟此廟舊有靈威商旅祈禱乃分風上下各無留滯嘗有乞神竹者未許輒取舫即覆沒竹還本處自是舟人敬憚莫不懾影高同旅三十餘船奉牲請福神乃降祝曰船有沙門可更呼上客咸驚愕請高入廟神告高曰吾昔外國與子俱出家學道好行布施而性多瞋怒今為䢼亭廟神周回千里並吾所治以布施故珍玩豐饒以瞋恚故墮此神報今見同學悲欣何言壽盡旦夕而醜形長大若於此捨命穢污江湖當度山西澤中此身滅後恐墮地獄吾有絹千匹并雜寶物可為立法營塔使生善處也高曰故來相度何不出形神曰形甚醜異衆人必懼高曰但出衆不怪也神從床後出頭乃是大蟒不知尾之長短至高膝邊高向之胡語數番讚唄數契蟒悲淚如雨須臾還隱高即取絹物辭別而去舟侶揚帆蟒復出身登山而望衆人舉手然後乃滅倏忽之頃便達豫章即以廟物造東寺高去後神即命過暮有一少年上船長跪高前受其呪願忽然不見高謂船人曰向之少年即䢼亭廟神得離惡形矣於是廟神歇滅無復靈驗後人於山西澤中見一死蟒頭尾數里今尋陽郡蛇村是也高後復到廣州尋其前世害己少年尚在高徑投其家説昔日償對之事并敘宿緣歡喜相向云吾猶有餘報今當復會稽畢對廣州客悟高非凡豁然意解追恨前愆厚相資供隨高從遊遂達會稽至便入市正值市中有亂相打者誤著高頭應時殞命廣州客頻驗二報遂精勤佛法具説事緣遠近聞知莫不悲歎明三世之有徵也高以桓帝建和二年戊子至靈帝建寧三年庚戌二十餘載譯大乘要慧等經九十五部並義理明析文字允正辨而不華質而不野凡在讀者皆斖斖然而不倦焉世高本既王種名高外國所以西方賓旅猶呼安侯至今為號焉天竺自稱書為天書語為天語音訓詭蹇與漢殊異先後傳譯多致謬濫唯高所出為群譯之首安公以為難及面稟不異見聖列代明德咸贊而思焉其釋道安録僧祐出三藏記慧皎高僧傳等並云高譯三十九部費長房録載一百七十六部今以房録所載多是別生從大部出未可以為翻譯正數今隨次刪之如後所述情離有罪經房云世注為疑今亦在疑偽録八光經舍利弗問寶女經舍利弗嘆寶女説不思議經亦直云歎寶女經申越長者悔過供佛經亦云由起長者悔過經申越由起未詳何正八光等經四經並出大集四百三昧經出大雲經摩訶衍精進度中罪報品出智度論大迦葉遇尼乾子經出長阿含阿難惑經出人本欲生經第一四門經第二門經第三四門經甘露正意亦云佛入甘露調意經第一四門等經出僧祐失譯録亦出寶唱録並是大十二門經一部後人分品寫出遂成四卷尊者薄拘羅經或直云薄拘羅經亦云薄拘羅答異學門經婆羅門行經長者兄弟詣佛經亦云長者梨師達多兄弟二人往佛所經薄拘羅等三經出中阿含五戰鬪人經世間強盜布施經梵天王詣婆羅門講堂經郁伽居士見佛聞法醒悟經亦云修伽陀居士佛為法德性誤經水喻經五戰鬪等五經並出增一阿含佛為婆羅門説四法經佛為事火婆羅門説悟道經佛為婆羅門説耕田經或無田字佛為憍慢婆羅門説偈經佛為頻頭婆羅門像頰經佛為阿支羅迦説自他作苦經目連見衆生身毛如箭經阿那律思惟目連神力經無畏離車白阿難經商人脫賊經世間言美色經純陀沙彌經或作沙門或為淳字商人子作佛事經婆羅門通達經論經外道出家經婆羅門服白經精勤四念處經婆羅門虛偽經佛為調馬聚落主説法經一切行不恆安住經婆羅門問世尊將來有幾佛經婆羅門問佛布施得福經豆遮婆羅門論議出家經化火與或作大興婆羅門出家經浮木譬喻經一名恆水流樹經或作流澍四吒婆羅門出家得道經過去彈琴人經婆羅門解知衆術經獨富長者經亦云獨付長者財物無付經亦云長者命終無子付囑經佛為年少婆羅門説知善不善經佛為那拘羅長者説根熟經或無羅根熟三字禪思滿足經説四法等三十二經並出雜阿含禪祕要經出治禪病祕要法前世諍女經子命過經迦旃延無常經審裸形子經一名佛覆裸形子經鱉喻經前世諍等五經並出生經鏡面王經出義足經三毒經數息事經上二小乘雜抄七老婆羅門請為弟子經孤母喪一子經斫毒樹復生經求離牢獄經良時難遇經昔有二人相愛敬經慈人不殺經摩耶祇女人謗佛生身入地獄經最勝長者愛呪願經亦直云受呪願經佛神力救長者子經佛度旃陀羅兒出家經承事勝也經調達生身入地獄經多倒見衆生經長者夜輸得非常觀經亦直云得非常觀經七老婆羅門等一十五經並出出曜經人受身入陰經人身四百四病經五陰成敗經地獄罪人衆苦經人病醫不能治經人受身五經並出修行道地經阿練若習禪法經出坐禪三昧經蓮華女經出法句譬喻經迦葉詰阿難經亦名迦葉責阿難雙度羅漢喻經金色女經迦葉詰阿難等二經出雜譬喻右八光經等八十五部八十五卷長房等録皆云安高所出今按隋開皇仁壽二年衆經録及新撿出別生抄經等此等並從諸經別生或非安高所出不合足為翻譯之數今為實録故總刪之道行經一卷光和二年十月八日出見經後記朱士行漢録僧祐録等安公云道行品者般若抄也外國明者所撰安公為序并注般舟三昧經二卷光和二年十月八日出見經後記高僧傳第二經同時啓夾故出曰同也舊録云大般舟三昧經或一卷第二出與大集賢護經等同本右二部三卷其本並闕沙門竺佛朔經後記云竺佛朔印度人識性明敏博綜多能以靈帝光和之初齎道行等經來適洛陽轉梵為漢譯人時滯雖有失旨然棄文存質深得經意月支沙門支讖傳語河南孟福字元士張蓮字少安筆受並見經後記法鏡經二卷安公云方等部初出與寶積郁伽長者會等同本或一卷沙門嚴佛調筆受康僧會注兼序見僧祐録阿含口解十二因緣經一卷亦云斷十二因緣亦直云阿含口解舊録云安侯口解凡有四名同是一本典中安高安云俱出口解者誤也右二部三卷其本並在優婆塞安玄安息人也志性貞白深間理致秉持法戒毫釐弗虧博誦群經多所通習漢靈帝時遊賈洛陽有功號騎都尉性虛靜溫恭常以法事為己務漸練漢言志宣經典常與沙門講論道義世所謂都尉者也玄以光和四年辛酉與沙門嚴佛調共出法鏡等經玄口譯梵文佛調筆受理得音正盡經微旨郢匠之美見述後代祐云法鏡佛調出者據其共譯以説又稱阿含口解世高譯者此乃姓同相濫也舊録既名安侯口解計亦合是世高出也成具光明定意經一卷或云成具光明三昧經或直云成具光明經第二出見朱士行支敏度僧祐等三録高僧傳大乘阿那律八念經一卷或直云八念名禪行斂意舊録云禪行撿意出中阿含經第十八卷異譯見舊録馬有三相經一卷亦云善馬有三相經出雜阿含經第三十三卷異譯房云見吳録馬有八態譬人經一卷亦直云馬有八態經一名馬有八弊惡態經出雜阿含經第三十三卷異譯房云見吳録小道地經一卷房云見吳録已前見存已後闕聞城十二因緣經一卷第二出與世高譯十二因緣經等同本房云見吳録大摩耶經一卷或無大字或二卷初出與摩訶摩耶經同本房云見吳録賴吒和羅經一卷出中阿含經第三十一卷異譯房云見吳録安云出方等部者或恐誤小本起經一卷或云修行本起或云修行本起近加小字耳初出與瑞應本起經等同本見舊録及高僧傳墮落優婆塞經一卷或云優婆塞經房云見吳録右一十部一十卷小道地上五部五卷見在聞城下五部五卷闕本沙門支曜西域人博達群典妙解幽微以靈帝中平二年乙丑於洛陽譯成具光明等經十部長房等録又有首至聞佛十四事經或無佛字余親見其本乃是經抄已編別生録內此刪不載問地獄事經一卷見朱士行漢録及高僧傳右一部一卷本闕沙門康臣或作巨字未詳孰正西域人心存遊化志在弘宣以靈帝中平四年丁卯於洛陽譯問地獄經言直理詣不加潤飾濡首菩薩無上清淨分衛經二卷一名決子諸法如幻化三昧經初出與大般若那伽室利分等同本或一卷見長房録慧上菩薩問大善權經二卷初出與寶積大乘方便會等同本或無菩薩字或一卷見長房録古維摩詰經二卷初出與唐譯無垢稱經等同本見古録及朱士行漢録思意經一卷亦云益意經初出見長房録菩薩內習六波羅蜜經一卷右五部八卷前四部七卷本闕後一部一卷見在沙門嚴佛調亦云浮調據僧祐録及高僧傳合是沙門長房等録云信士者非也臨淮郡人幼年頴悟敏而好學信如信慧自然遂出家修道通譯經典見重於時調以靈帝中平五年戊辰於洛陽譯濡首菩薩等經五部世稱安侯都尉佛調三人傳譯號為難繼安公稱佛調出經者省而不繁全本巧妙焉又長房等録更有迦葉詰阿難經亦云佛調所譯余親見其本乃是諸經之抄有數條事隨衆録云出雜譬喻安世高聶承遠録內並有此經録家誤也既是別生抄經不合為翻譯正數又有沙彌十慧經云佛調自撰并注序既非聖言又闕其本今並刪之舍利弗摩訶目揵連遊四衢經一卷出增一阿含第四十一卷異譯見別録興起行經二卷亦名嚴誡宿緣經題云出雜藏見吳録梵網經二卷初出或三卷見吳録四諦經一卷興平元年出第三譯出阿含第七卷異譯與世高出者小異見竺道祖漢録太子本起瑞應經二卷亦云瑞應本起第二出與過現因果經等同本房云見三藏記然祐三藏中孟詳出中本起非瑞應本起也報福經一卷或云福報見吳録右六部九卷興起行經上二部三卷見在梵網經下四部六卷闕本沙門康孟詳其先康居國人有慧學之譽以獻帝興平元年甲戌至建安四年己卯於洛陽譯遊四衢等經六部安公云孟詳所翻譯流便足騰玄趣也修行本起經二卷一名宿行本起第三出與瑞應本起經等同本見始興録右一部二卷其本見在沙門竺大力西域人性好遠遊無憚艱險以獻帝建安二年丁丑三月於洛陽譯修行本起經其經梵本亦是曇果與康孟詳於迦維羅衛國齎本康孟詳度語中本起經二卷或云太子中本起經見始興録經初題云出長阿含右一部二卷其本見在沙門曇果西域人學該內外解通真俗於迦維羅衛國齎經梵本屆于洛陽以獻帝建安十二年丁亥譯中本起經康孟詳度語內典録中以曇果與孟詳共出遂與孟詳太子本起瑞應合為一本者非也二經全異不可合之祐云中本起康孟詳出者據其共譯故耳大方便佛報恩經七卷摩訶衍寶嚴經一卷一名大迦葉品第二出與寶積普門菩薩會等同本中云晉言合編晉録今且依舊祐云摩訶乘寶嚴經後出阿彌陀佛偈經一卷或無經字出第二未曾有經一卷初出與唐譯甚希有經等同本作佛形像經一卷一名優填王作佛形像經一名作像因緣經與造立形像福報經並同本安宅神呪經一卷亦云安宅呪法祐云安宅呪受十善戒經一卷苦陰經一卷出中阿含經第二十五卷異譯魔嬈亂經一卷一名弊魔試目連經一名魔王入目揵蘭腹經出中阿含經第三十卷異譯沙彌尼戒經一卷或無經字優波離問佛經一卷或無優婆離律分別功德論四卷或云分別功德或三卷或五卷禪要呵欲經一卷題云禪要經呵欲品內身觀章句經一卷或無句字雜譬喻經二卷一名菩薩度人經六菩薩名一卷房入藏云菩薩名亦當誦持般舟三昧念佛章句經一卷是行品別翻第四出阿彌陀佛偈經一卷初出賢劫千佛名經一卷祐云唯有佛名與曇無蘭所出四諦經千佛名異出賢劫經中異譯梵本經四卷舊云胡本新改為梵以長安中出泥洹後千歲變經四卷一名千歲變經祐云泥洹後千歲中變記一卷諸經佛名二卷今疑是不思議功德經三千佛名經一卷稱揚百七十佛名經一卷亦直名百七十佛名今疑出稱揚功德經南方佛名經一卷舊云一名治城寺經者非也此乃題寺為記非是經之異名滅罪得福佛名經一卷觀世音所説行法經一卷是呪經薩陀波崙菩薩求深般若圖像經一卷受持佛名不墮惡道經一卷五龍呪毒經一卷取血氣神呪經一卷舊録云血呪呪賊呪法經一卷房云異出本祐直云呪賊七佛安宅神呪經一卷菩薩受戒經一卷祐録無經字房云異出本受菩薩戒次第十法一卷菩薩懺悔法一卷初發意菩薩常晝夜六時行五事一卷頂生王因緣經一卷舊録云頂生王經長者賢首經一卷梵志喪女經一卷獡狗齧王經一卷勤苦泥犁經一卷地獄經一卷十一因緣章經一卷舊録云十一因緣經或作十二沙門為十二頭陀經一卷僧名數事行一卷比丘諸禁律一卷摩訶僧祇律比丘要集一卷一名摩訶僧祇部比丘隨用要集法沙彌十戒經一卷舊録云沙彌戒賢者五誡經一卷優婆塞威儀經一卷庾伽三磨斯經一卷譯言修行略一名達磨多羅禪法或云達磨多羅菩薩撰禪經要集梵音偈本一卷舊云胡音讚七佛偈一卷怛惒尼百句一卷五言詠頌本起一卷一百四十二首道行品諸經梵音解一卷舊云胡音法句譬喻經一卷祐録云凡十七事喻字上五十九部並見僧祐失譯録右五十九部七十六卷準房録本數合有七十七卷其分別功德論録云五卷今四卷故七十六菩薩名上一十六部二十六卷見在般舟下四十三部五十卷闕本長房等録漢後失譯總有一百二十五部一百四十八卷今以餘六十六部七十一卷子細讐挍非是失源具述委曲列之如左佛遺日摩尼寶經漢支讖譯菩薩生地經惟日雜難經已上二經吳支謙譯金剛三昧本性清淨不壞不滅經或云金剛清淨經長房等録云吳代支謙譯後漢失譯録中復載今詳此經非是漢代失源復非支謙所出以是姚秦以來什公等譯今且為失源編於秦録舊雜譬喻經二卷吳代康僧會譯十方佛名經三十二相因緣經已上二經西晉竺法護譯菩薩修行經一名長者威施所問菩薩修行經或云長者修行經已曾三譯一存二闕備顯録中迦葉赴佛泥洹經一名佛般泥洹時迦葉赴佛經鐵城泥犁經一名阿含泥犁經寂志果經三十七品經抄諸經撰在別生録七佛所結麻油呪幻師陂陀神呪呪齲齒呪一名呪蟲齒一名直呪齒呪牙痛呪呪眼痛呪迦葉赴下十經東晉竺曇無蘭譯千佛因緣經海八德經已上二經法上録云姚秦羅什譯菩薩所生地經摩訶剎頭經已上二經乞伏秦聖堅譯寂調意合作音守意者錯也所問經一名如來所説清淨調伏經轉女身菩薩經一名樂瓔珞莊嚴方便經一名樂瓔珞莊嚴女經已上二經宋代法海譯沙彌威儀經或無經字宋求那跋摩譯四天王經宋智嚴譯監王五使者經一名五天使者譬喻經已上三經宋惠蘭譯八部佛名經元魏瞿曇流支譯觀無量壽佛經此經以曾兩譯一存一闕備闕録中般若波羅蜜神呪經出大品經功德莊嚴王八萬四千歲請佛經出大集經大方廣如來性起微蜜藏經二卷亦直云如來性起經是舊華嚴經如來性起品合道神足經四卷一名道神足無極變化經即道神足經之異名二本無別持齋經齋經別名過去香蓮華佛世界經出悲華經善德婆羅門求舍利經人弘法經已上二經出大雲經五十三佛名經出藥王藥上經彌勒為女身經一切施王所行檀波羅蜜經亦直云行檀波羅蜜經亦名薩和檀王經摩訶王小兒聞法即解經已上四經出六度集淨除業障經抄淨業障經十住毗婆沙經抄十住經七寶經出增一阿含經質多長者請比丘經外道誘質多長者經佛見牧牛者示導經長者命終無子付囑經獨富長者經異名質多等四經出雜阿含積骨經出七處三觀經誨子經出生經梵志觀無常得解脫經出義足經梵志避死經貧子得財發王經無害梵志執志經善唄比丘經梵志避死等四經出出曜經福子經居士初故為婦鼻中蟲經須河譬經教子經一名須達教子經亦名須達訓子經福子等四經出雜譬喻龍種尊國變化經觀世樓炭經云有三品清淨法行經已上三經先為偽録華嚴瓔珞經般若得經已上二經僧法尼誦出亦在偽録右佛遺日下六十六部七十一卷或翻譯有憑或別生疑偽今既尋知所據故非漢代失源同舊重編恐成繁雜今並刪也長房録云已上一百二十五部四十八卷並是僧祐律師出三藏記撰右舊二録及安録失源并新集所得失譯諸經卷部甚廣讎挍群目蕪穢者衆出入相交實難詮定未覩經卷空閲名題有入有源無入無譯詳其初始非不有由既涉遠年故附此末冀後博識脫覩本流希還收正以為有據瀅澄法海使靜波濤焉今尋長房此言未可依據委求同異如前所述已下新附此録拔陂菩薩經一卷或云拔波安録云颰披陀菩薩安公云出方等部是般舟經初四品異譯第五出栴檀樹經一卷阿鳩留經一卷菩薩道地經一卷安公云出方等部魔王入目揵蘭腹經一卷亦云弊魔試目揵連經舊録云魔王入目連腹中經出中阿含第三十卷即後十經之中也佛有五百比丘經一卷凡人有三事愚癡不足經一卷此凡人三事不足及後佛誡諸比丘乃至卑者二經共成藏中泥犁一卷乃取最初之語以立經名今此則標未詳其故佛誡諸比丘經一卷言我以天眼視天下人生死好醜尊者卑者經一卷安公云上三經出中阿含自見自知為能盡結經一卷有四求經一卷佛本行經一卷河中大聚沫經一卷或云水沫所漂經或云聚沫譬經衆經録云出雜阿含經今以安録先集雜阿含後譯是別譯本非從彼出便賢者坑經一卷坑字或作旃所非汝所經一卷兩比丘得割經一卷道德舍利日經一卷舍利日在王舍國經一卷獨居思惟自念上經一卷問所明種經一卷欲從本相有經一卷或云欲從本經獨坐思惟意中生念經一卷佛説如是有諸比丘經一卷比丘所求色經一卷道有比丘經一卷色為非常念經一卷從自知自見下本有二十二經安云阿含一卷於中五經已備餘録今但有十七載雜阿含分中色比丘念本起經一卷善惡意經一卷比丘一法相經一卷有二力本經一卷有三力經一卷有四力經一卷人有五力經一卷不聞者類相聚經一卷舊録云類相聚經與相應相可經本同天上釋為故世在人中經一卷或作無上誤也爪頭土經一卷身為無有反復經一卷師子畜生王經一卷阿須倫子波羅門經一卷波羅門子名不侵經一卷生聞波羅門經一卷舊録云生聞梵志經有𨻗竭經一卷暑杜乘波羅門經一卷佛在拘薩國經一卷佛在優墮國經一卷經作優隨是時自梵守經一卷有三方便經一卷舊録云三方便經法經録云出七處三觀波羅門不信重經一卷佛告舍日經一卷四意止經一卷舊録云四意止本行經法經録云出中阿含説人自説人骨不知腐經一卷色比丘念下二十五經安公云並出阿含今尋藏中單卷雜阿含內並有此經多是後人合之成卷雜阿含三十章經一卷法經録云出雜阿含異本五十五法誡經一卷或云五十五法行一切義要一卷説善惡道經一卷受欲聲經一卷一本云受欲一聲經摩訶遮曷從經一卷天王下作豬經一卷始造浴佛時經一卷佛併父弟調達經一卷五十五法下安公云五十經出阿毗曇今但有九一本人重譯中即魔王人目連腹經是優墮羅迦葉經一卷四諦本聞經一卷安公云上二經出長阿含一本云出阿毗曇讓德經一卷有賢者法經一卷摩訶厥彌難問經一卷或云大厥彌經大本藏經一卷説阿難持戒經一卷阿難問何因緣持戒見世間貧亦現道貧經一卷給孤獨四姓家問應受施經一卷曉所諍不解經者經一卷今疑立經字錯寄異道家難問住處經一卷寄異道家難問法本經一卷賢者手力經一卷八法行經一卷憂多羅經一卷或作夏字細栴檀調佛經一卷惡人經一卷難提和難經一卷或云難提和羅經四姓長者難經一卷舊録云四姓長者經折佛經一卷道地經中要語章一卷或云小道地經今疑支曜出者是數練意章一卷舊録云數經安公上二經出生經祐按今生經無此章名右八十二部八十二卷初拔陂等經見在餘者並闕並是僧祐録中集安公古典經既云古典明是遠代今者編於漢末以為失源安公本録古典總有九十二經今以餘之十經撿尋群録或摽譯主或是別生彼中既載故此除之通前舊失譯經五十九部七十六卷總一百四十一部一百五十八卷並為漢代失源云魏曹氏都洛陽自文帝黃初元年庚子至元帝咸熙二年乙酉凡經五帝四十六年沙門五人所出經戒羯磨總一十二部合一十二卷曹魏沙門曇柯迦羅一部一卷戒沙門康僧鎧三部四卷經羯磨沙門曇無諦一部一卷羯磨沙門白延五部七卷經沙門安賢二部五卷經僧祇戒本一卷初出見竺道祖魏世録右一部一卷本闕沙門曇柯迦羅魏云法時中印度人家世大富常修梵福迦羅幼而才悟質像過人讀書一覽皆文義通暢善學四韋陀論風雲星宿圖讖運變莫不該綜自言天下文理畢已生腹至年二十五入一僧坊看遇見法勝毗曇聊取覽之茫然不解殷勤重省更增惛漠乃歎曰吾積學多年浪志墳典遊刃經籍義不再思文無重覽今覩佛書頓出情外當理致鈎深別有精要於是齎牒入房請一比丘略為解釋遂深悟因果妙達三世始知佛教宏曠俗書所不能及乃棄捨世榮出家精苦誦大小乘經及諸部毗尼常貴遊化不樂專守以文帝黃初三年壬寅來至洛陽于時魏景雖有佛法而道風訛替亦有衆僧未稟歸戒止以剃落為殊俗耳設復齋懺事同祠祀迦羅既至大行佛法諸僧請出毗尼迦羅以律藏曲制文言繁廣佛教未昌必不承用遂以齊王芳嘉平二年庚午於洛陽白馬寺出僧祇戒心直備朝夕於是更集梵僧立羯磨受戒東夏戒律始自乎此迦羅後不知所終郁伽長者所問經一卷或二卷第三譯一名郁伽羅越問菩薩行經嘉平四年出見竺道祖魏録今編入寶積即第十九會是無量壽經二卷第四譯見竺道祖晉世雜録及寶唱録與世高出者小異四分雜羯磨一卷題云曇無德律部雜羯磨以結戒場為首新附右三部四卷其本並在沙門康僧鎧印度人也廣學群經義暢幽旨以嘉平四年壬申於洛陽白馬寺譯郁伽長者經等三部高僧傳中云譯四部不具顯名竺道祖魏晉録僧祐寶唱梁代録等及長房道宣靖邁三録並云二部餘二既不顯名校閲未見今更得一部餘欠一經撿亦未獲曇無德羯磨一卷題云羯磨一卷出曇無德律以結大界為首見竺道祖魏録右一部一卷其本見在沙門曇無諦亦云曇諦魏云法實安息國人善學律藏妙達幽微以高貴鄉公正元元年甲戌屆于洛陽於白馬寺譯曇無德羯磨一部無量清淨平等覺經二卷第五出與漢世支讖等所出及寶積無量壽會並本同異見竺道祖晉世雜録及僧祐録又須賴經一卷一名無又字祐録作叉初出見竺道祖及僧祐録菩薩修行經一卷一名長者威陀所問菩薩修行經一名長者修行經第二出見始興寶唱二録除災患經一卷初出與除恐災患經同本見僧祐録首楞嚴經二卷第五出漢世支讖等所出本同文異見竺道祖晉世雜録及僧祐録右五部七卷其本並闕沙門白延西域人也才名蓋世深解踰倫以高貴鄉公甘露三年戊寅遊化洛陽止白馬寺出無量清淨等經五部長房等録又有平等覺經一卷亦云白延所出今以此經即是清淨平等覺經但名有廣略故不復存也羅摩伽經三卷見竺道祖寶唱法上靈祐等四録見華嚴經入法界品小分初出大般涅槃經二卷第二出略大本前數品為此三卷見竺道祖魏録右二部五卷其本並闕沙門安法賢西域人藝業克深慧解尤峻振錫遊邦自遠而至譯羅摩伽等經二部群録並云魏世不辨何帝之年今依編于末又別録亦載諸侯譯經總於吳録後列
