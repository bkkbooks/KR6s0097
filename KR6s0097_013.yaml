body:
  text: 西京西明寺沙門圓照撰總集群經録上之十三大方廣佛華嚴經不思議佛境界分一卷或二卷十二紙永昌元年於魏國東寺譯見大周録初出與後實叉難陀譯不思議境界經同大方廣佛華嚴經修慈分一卷天授二年於大周東寺譯見大周録大乘造像功德經二卷或一卷天授二年於大周東寺譯見大周録智炬陀羅尼經一卷天授二年於大周東寺譯見大周録諸佛集會陀羅尼經一卷天授二年於大周東寺譯見大周録大乘法界無差別論一卷天授二年月十四日於大周東寺譯見大周録右六部七卷其本並在沙門提雲般若或云提雲陀若那唐云天智于闐國人學通大小智兼真俗呪術禪門悉皆諳曉以天后永昌元年來屆于此即以其年謁帝于洛敕於魏國東寺後改為大周東寺翻經以永昌元年己丑至天授二年辛卯總出經六部沙門威陀惠智等譯語沙門處一等筆受沙門復禮等綴文沙門德威慧儼法明弘景等證義讚觀世音菩薩頌一卷見大周録右一部一卷其本見在沙門釋慧智父中印度人也婆羅門種因使遊此而生於智少而精勤有出俗之志天皇時因長年婆羅門僧奉敕度為弟子本既梵人善間天竺書語又生唐國復練此土言音三藏地婆訶羅提雲若那寶思惟等所有翻譯皆召智為證義令度語智以天后長壽二年癸巳於東都佛授記寺自譯讚觀世音菩薩頌一部大周刊定衆經目録十五卷右一部十五卷其本見在沙門釋明佺東都佛授記寺僧也尤精律學兼間經論天后天册萬歲元年乙未敕刊定經目佺首末條録編此次序與翻經大德二十餘人同共參定雖云刊定繁穢尤多雖見流行實難憑準中有乖舛如別所述大方廣佛華嚴經八十卷第二出東晉覺賢譯者同本證聖元年三月十四日於東都大內大遍空寺譯天后親受筆削至聖曆二年十月八日於佛授記寺功畢文殊師利授記經三卷於清禪寺譯第三出與文殊佛土嚴淨經等同本今編入寶積當第十五會大方廣入如來智德不可思議經一卷於東都佛授記寺譯第四出與度諸佛境界智光嚴經等同本大方廣如來不思議境界經一卷第三出與提雲般若所出境界分同本大方廣普賢所説經一卷第四出與宋功德賢等出者同本久視元年五月五日於東都三陽宮內初出至長安四年正月五日繕寫畢大乘入楞伽經七卷觀世音菩薩祕密藏神呪經一卷初出與寶思惟等出者同本妙臂印幢陀羅尼經一卷第二出與勝幢印陀羅尼經同本百千印陀羅尼經一卷救面然餓鬼陀羅尼神呪經一卷右繞佛塔功德經一卷亦云繞塔功德經大乘四法經一卷與前日照三藏出名字雖同經體全異十善業道經一卷大乘起信論二卷第二出與真諦譯者同本摩訶般若隨心經一卷大方廣不生不滅經一卷大方廣如來難思議境界經一卷離垢淨光陀羅尼經一卷初出與彌陀出譯者同本菩薩出生四法經一卷右一十九部一百七卷起信論上一十四部一百二卷見在摩訶般若隨心經下五部五卷闕本沙門實叉難陀唐云喜學于闐國人智度弘曠利物為心善大小乘兼異學論天后明揚佛日敬重大乘以華嚴舊經處會未備遠聞于闐有斯梵本發使求訪並請譯人實叉與經同臻帝闕以天后證聖元年乙未於東都大內大遍空寺譯華嚴經天后親臨法座煥發序文自運仙毫首題名品南印度沙門菩提流志沙門義淨同宣梵本後付沙門復禮法藏等於佛授記寺譯至聖曆二年己亥功畢又至久視元年庚子於三陽宮內譯大乘入楞伽經及於西京清禪寺東都授記寺譯文殊授記等經前後總譯一十九部沙門波崙玄範等筆受沙門復禮等綴文沙門法寶弘景等證義太子中舍人賈膺福監護至長安四年實叉緣母年老請歸覲省表書再上方蒙允許敕御史霍嗣光送至于闐後和帝龍興重暉佛日敕再徵召方屆帝城以景龍二年達于茲土帝屈萬乘之尊親迎於開遠門外京城緇侶備諸幢幡逆路導引仍裝飾青象令乘入城敕於大薦福寺安置未遑翻譯遘疾彌留以景雲元年十月十二日右脅壘足終于大薦福寺春秋有五十九緇徒悲噎歎法梁之遽摧俗侶哀號恨群生之失導有詔聽依外國法葬以十一月十二日於開遠門外古然燈臺焚之薪盡火滅其舌猶存斯是弘法之嘉瑞也至十二月二十三日本國門人悲智敕使哥舒道元送其餘骸及斯靈舌還歸于闐起塔供養後人復於焚尸之所起七層塔焉不空羂索陀羅尼經一卷一名普門此有一十六品是梵本經抄沙門波崙製序第二出與寶思惟譯三卷者同本右一部一卷其本見在婆羅門李無諂北印度嵐波國人識量聰敏內外該通唐梵二言洞曉無滯三藏阿儞真那菩提流志等翻譯衆經並無諂度語於天后代聖曆三年庚子三月有新羅國僧明曉遠觀唐化將欲旋途於總持門先所留意遂殷勤固請譯此真言使彼邊維同聞祕教遂於佛授記寺翻經院為譯不空羂索陀羅尼經一部沙門波崙筆受至久視元年八月將所譯經更於罽賓重勘梵本方寫流布無垢淨光大陀羅尼經一卷第二出與實叉難陀離垢淨光陀羅尼同本右一部一卷其本見在沙門彌陀山唐言淑友覩貨邏國人也幼少出家遊諸印度遍學經論於楞伽俱舍最為精妙志弘像法無吝鄉邦杖錫而遊來臻皇闕於天皇代共實叉難陀譯大乘入楞伽經後於天后末年共沙門法藏等譯無垢淨光陀羅尼經一部譯畢進內辭帝歸邦天后厚遺任歸本國甄正論三卷右一部三卷其本見在沙門釋玄嶷俗姓杜名乂是黃冠為東都大弘道觀主遊心七籍妙善三玄黃宗之中此為綱領天后心崇大法弘闡釋宗又遂歸心請求剃落詔許度之住佛授記寺後為寺都兼預翻譯悉彼宗之虛誕知正教之可憑遂造甄正論一部指陳虛偽主客問答極為省要不空羂索陀羅尼自在王呪經三卷亦名不空羂索心呪王經長壽二年十月於東都佛授記寺譯沙門德感筆受初出與李無諂出一卷者同本浴像功德經一卷神龍元年正月二十三日於東都大福先寺譯婆羅門李無諂譯語初出與後義淨出者同本挍量數珠功德經一卷神龍元年正月二十三日於大福先寺譯李無諂譯語初出與義淨出者同本觀世音菩薩如意摩尼陀羅尼經一卷第二出與實叉難陀等出者同本文殊師利根本一字陀羅尼經一卷長安二年於天宮寺譯沙門惠智等證梵文婆羅門李無諂譯語直中書李無礙筆受初出與後義淨出者同本大陀羅尼末法中一字心呪經一卷神龍元年於大福先寺譯李無諂譯語隨求即得大自在陀羅尼神呪經一卷亦云所得見大周録長壽二年於東天官寺譯罽賓沙門尸利難陀設等證梵文李無諂譯語李無礙筆受右七部九卷其本見在沙門阿儞真那唐云寶思惟北印度迦濕蜜羅國人剎帝利種彼王之華胄幼而捨家禪誦為業進具之後專精律品復慧解超群學兼真俗乾文呪術尤功其妙加以化導為心無戀鄉國以天后長壽二年癸巳屆于洛都敕於天宮寺安置即以天后長壽二年癸巳至中宗神龍二年景午於授記天宮福先寺譯不空羂索陀羅尼經等七部後至睿宗太極元年壬子四月太子洗馬張齊賢等繕寫進內至延和元年六月敕令禮部尚書晉國公薛稷右常侍高平侯徐彥伯等詳定入目施行三藏自神龍二年已後更不譯經唯精勤禮誦修諸福業每於晨朝磨香為水塗浴佛像後方飲食從始至終此為恆業衣鉢之外隨得隨施後於龍門山請置一寺依外國法式製造呼為天竺己及門人同居此寺精誠所感其數實多壽百餘以開元九年終于寺矣金光明最勝王經十卷第五出與北涼曇無讖四卷金光明同本長安三年十月四日於西明寺譯畢沙門波崙惠表筆受能斷金剛般若波羅蜜多經一卷第五出與姚秦羅什元魏流支陳真諦出者同本長安三年十月四日於西明寺譯佛為難陀説出家入胎經二卷出根本説一切有部毗奈耶雜事第十一卷景龍四年於大薦福寺譯今編入寶積當第十四會改名入胎藏會入定不定印經一卷第二出與元魏瞿曇流支所出不必定入定入印經同本久視元年五月五日譯畢藥師琉璃光七佛本願功德經二卷第四出與陳笈多等出者同本但廣略有異神龍三年夏於大內佛光殿譯和帝親御法筵手自筆受彌勒下生成佛經一卷第六出與羅什彌勒下生經等同本大足元年九月二十二日於東都大福先寺譯佛為勝光天子説王法經一卷第三出與舊諫王經及唐譯勝軍王經同本神龍元年七月十五日於東都大福先寺譯沙門玄傘筆受浴像功德經一卷第二出與寶思惟出者同本景龍四年四月十五日於薦福寺翻經院譯數珠功德經一卷第二出與寶思惟出者同本景龍四年四月十五日於薦福寺翻經院譯觀自在菩薩如意心陀羅尼經一卷第三出與實叉難陀寶思惟等出者同本景龍四年於大薦福寺翻經院譯曼殊室利菩薩呪藏中一字呪王經一卷第四出與寶思惟出者同本長安三年十月四日於西明寺譯稱讚如來功德神呪經一卷第二出與隋譯十二佛名神呪經同本景雲二年閏六月二十三日於大薦福寺翻經院譯沙門玄傘智積等筆受大孔雀呪王經三卷第八出與梁僧伽婆羅等出者同本神龍元年於東都內道場譯佛頂尊勝陀羅尼經一卷第五出與杜顗日照波利等出者同本景龍四年於大薦福寺翻經院譯莊嚴王陀羅尼呪經一卷大足元年九月二十三日於東都大福先寺譯香王菩薩陀羅尼呪經一卷神龍元年於東都大福先寺譯一切功德莊嚴王經一卷神龍元年七月十五日於東都大福先寺譯沙門玄傘筆受拔除罪障呪王經一卷景龍四年於大薦福寺翻經院譯善夜經一卷大足元年九月二十三日於東都大福先寺譯大乘流轉諸有經一卷大足元年九月二十三日於東都大福先寺譯妙色王因經一卷大足元年九月二十三日於東都大福先寺譯佛為海龍王説法印經一卷景雲二年閏六月二十三日於薦福寺翻經院譯沙門玄傘智積等筆受能斷金剛般若波羅蜜多經論頌一卷無著菩薩造景雲二年於大薦福寺翻經院譯沙門玄傘智積等筆受能斷金剛般若波羅蜜多經釋三卷無著菩薩頌世親菩薩釋景雲二年薦福寺翻經院譯沙門玄傘智積筆受因明正理門論一卷大域龍樹菩薩造第二出與奘法師譯者同本景雲二年於大薦福寺翻經院譯沙門玄傘智積筆受成唯識寶生論五卷一名二十唯識論順釋論護法菩薩造景龍四年四月十五日於薦福寺翻經院譯沙門玄傘智積筆受觀所緣論釋一卷護法菩薩造景龍四年四月二十五日於大薦福寺翻經院譯沙門玄傘智積等筆受掌中論一卷陳那菩薩造第二出與解捲論同本長安二年十月四日於西明寺譯取因假設論一卷陳那菩薩造長安三年十月四日於西明寺譯沙門惠表筆受觀總相論頌一卷陳那菩薩造景雲二年於大薦福寺翻經院譯沙門智積等筆受止觀門論頌一卷世親菩薩造景雲二年於薦福寺翻經院譯沙門玄傘等筆受手杖論一卷尊者釋迦稱造景雲二年於大薦福寺翻經院譯沙門玄傘等筆受六門教授習定論一卷無著菩薩本世親菩薩釋長安三年十月四日於西明寺譯五蘊皆空經一卷出雜阿含經第二卷異譯景龍四年於大薦福寺翻經院譯沙門智積等筆受三轉法輪經一卷出雜阿含經第一十五異譯景龍四年於薦福寺翻經院譯沙門玄傘筆受無常經一卷亦名三啓經大足元年九月二十三日於東都大福先寺譯八無暇有暇經一卷大足元年九月二十三日於東都大福先寺譯長爪梵志請問經一卷久視元年十一月二十三日於東都大福先寺譯譬喻經一卷