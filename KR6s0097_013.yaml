手杖等論及法華集量百五十讚合一十二部二十卷沙門曷利末底烏帝提婆等讀梵本沙門玄傘智積等筆受沙門慧沼等證義太常卿衛國公薩崇胤監護合從天后久視元年庚子至睿宗景雲二年辛亥都譯五十六部二百三十卷又別撰大唐西域求法高僧傳南海寄歸內法傳別説罪要行法受用三水要法護法放生軌儀凡五部合九卷又出説一切有部跋窣堵即諸律中揵度跋渠之類是也梵音有楚夏耳約七八十卷但出直本未遑刪綴遽入泥洹其文遂寢淨又於一切有部律中抄諸緣起別部流行如摩竭魚因緣等四十二經四十九卷既是別生抄經不合為翻譯正數今載別生録中如刪繁録中具列名目淨雖遍翻三藏而偏功律部譯綴之暇曲授學徒凡所行事皆尚其急濾漉滌穢特異常倫學侶傳行遍於京洛美哉亦遺法之盛事也三藏道茂年衰示有微疾至景雲三年壬子正月十九日改為太極元年二月二十二日門人比丘崇勗摹三藏和上真和上時年七十八也睿宗大聖真皇帝製贊猗歟釋種降迹閻浮三明備證六度圓修離空離有無作無求至德孤秀嘉名罕儔其一載涉山川屢移寒暑迹遠塵纍情忘出處濟苦慈航除昏智炬梵典爰集門人攸敘其二高步寰中獨遊方外遍覩靈塔親觀法會足踐布金躬瞻獻蓋緬鑒澄什實為居最其三以斯上士弘茲妙業拯俗不疲破魔寧怯道揚震旦光敷像法勒美丹青傳芳永劫其四至五月十三日改太極元年為延和元年並大赦天下七月二十五日制傳位皇太子八月二日皇太子即位上尊號曰太上皇四日太上皇敕自稱曰朕處分事曰誥皇帝自稱曰豫處分事曰制敕五日改為先天元年歲仍王子二年癸丑三藏義淨臥疾不愈欲歸齊州正月六日誥內常侍輔令問宣奉誥問寂闍梨三藏義淨法師何日歸向已東報來三藏道茂年衰卒難勝致氣力漸劣逮手中旬七日夜初便命紙筆對諸弟子乃遺書曰吾聞乾為天也坤為地也百億日月翕闢照山河百億閻浮幽明成晝夜死生常道唯聖人之能踰衰變恆然豈凡夫之能越吾漸微弱汝等未安慮忽臨終遺書敘意吾稟氣山嶽養志經書錯綜古今搜求圖籍七歲念文舉之俊念之日不獨天生十二見甘羅之才念之日應同我輩英達君子雖未當仁博識丈夫應權而動少尋周孔以禮樂為常長習老莊將恬淡而為樂於國有益於人甚安不知過去之因不説未來之果研精失慮據賾求微枯木死灰之言何足鑿其心眼玉藻金縢之典詎可瑩其精神乍北乍南每作栖遑之客或隱或處頻尚虛白之心發願出家投身入道一歸緇侶再沐皇恩屬天子高居公卿政事盛揚佛日自漢魏而不同虔奉釋文與周隋而全別思之琳遠希欲連蹤想之騰澄無忘接影三藏教迹將漢地而未圓十二部經想中天而可取年始一十有七思遊五印之都歲臨三十有七願到雙林之境哀別南去遠達西征海路波濤關山險阻歷三十之外國將四百之真經願為衆生志存翻譯辭八相之靈塔歸九洛之神州天子親迎群公重法歡心伇思盡力忘疲五聖天波常遭覆蔭百年天命漸自衰微佛説涅槃流傳十二分教余見將死寧無一二之言遙想前途不知幾里又思生路不知何年吁吁嗟嗟至無至之處所到不到之境界取證可知生不生之形骸於心尚惑事既忩迫恐無暇言所譯之經虔敬無盡未翻之典愧恨彌深不得盡本心不得終本願不知天之故奪不知神之故為桑公俞附之醫昔年何有扁鵲葛洪之手今日何無石火流光光銷難續水花發彩彩不久停負氣吞聲銜悲茹泣情既恨恨乃述言焉弟子門人不可具載略而書矣望遣傳燈學戒學律之徒莫違微細學論學經之輩須識邪疑三學總成佛之上願一行偏善吾未喜焉具圓之人觸犯須慎近圓之者尊卑有方講律之流願無休恩傳經之士冀見奉行若為寺主綱維盡身盡命荷護僧徒慈仁慈忍尼衆禁戒分明大須堅固汝等如吾言行吾法吾若為石為土也即為汝之屋宅吾若為楸為柏也覆蔭汝之形容吾若為神為鬼也即益資汝之精氣吾若為花為藥也即加備汝之靈壽吾若為天為人也即以甘脆為汝之飲食吾若得道得果也即以威神令汝之安樂汝若違吾語失吾言吾若為石為土也汝死而不為丘墓若為楸為柏也汝死而不為棺槨若為神為鬼也為祟而不為荷護若為花為藥也為毒而不為氣力若為天為人也為惡而不為安穩若得道得果也怖汝心而為伴為侶慈之若此悲之如斯崇慶崇勗元廓玄秀玄睿慧神等聰明稟氣特達奇神須存鑿壁之功無使面牆有分剝皮為紙昔菩薩之大心重法傳經在汝等之用意吾自病已久鎮臥床枕既不瘳損無復聊生惠奭悟道以下返道小者扶侍辛苦慚愧唯深文藝最處老生汝等偏須優愛梵本先有表文付智積才藝等百德豐碑須為吾立衣鉢錫杖持律者收吾別有語已屬才藝京城貞法師莊法師傘法師恆律師昭上座海都師等天骨神授器深智達為衆生之眼目作佛法之棟梁吾貴之重之感通千萬東京玄秀懷秀十二及諸州弟子門人法明敬忠慧福等雖不相見如上處分齊州孤妹諸親眷屬並言好住慧日阿湛相去既遠吾何忘之各寫一本待諸後人知吾之情稟吾之意汝等努力吾亦自憂耳先天二年正月十七日夜二更塢波弟耶付弟子門人智積崇俊玄暉曇傑寶嚴等時二更遺書訖至後夜分寂然而終矣時門人號踊具狀上聞至二十八日睿宗大聖真皇帝令內侍伯趙元福宣奉誥問寂闍梨三藏義淨法師何日葬於何處葬報來至二十九日招福寺主寂狀進故翻經三藏法師義淨右昨晨時內至口宣奉誥問寂闍梨義淨三藏法師何日葬於何處葬報來者為正誥未行不敢定日具狀奏訖其日未後曹司奉誥其葬事準例又得門人等狀師徒至重纍劫恩深攀號荼毒不勝悲戀奉承恩誥不敢延停請取來月七日於京延興門東陳張村閣院內葬謹録狀進伏聽誥旨同日中書令崔湜宣誥旨故翻經三藏義淨宜贈鴻臚卿贈物一百五十段葬事量準例官供正月三十日銀青光祿大夫撿校中書令太子左庶子昭文館學士上柱國中山郡開國公臣崔湜宣門下故三藏義淨道心惟微德宇增峻既韞瀉瓶之智方通慧鏡之明幽詣絶域躬傳祕藏遺文大備比羅什之總持析理入微等生公之懸解境對而現緣離示滅嗟法雲之無影歎宗師之不留雖道門恆寂已證無生之忍而朝序褒賢宜加飾終之命可贈鴻臚卿主者施行至二月六日內品官馬孝忠掌扇劉普賜同送內出贈絹幡花等香花盤二十八輿香花樹大小十八輿幢四輿錢財四輿已上共五十四輿百尺幡四口并竿夾侍幡八十口四十九尺幡二十口夾侍幡二百四十口道場幡一百口雜色大小幡一百口并輿皅已上五百四十四口絹四百匹像一鋪牒奉誥出上件香花盤輿幡及竿絹等令品官馬孝忠劉普賜送薦福寺付弟子崇俊等贈故義淨三藏法師謹牒洎乎明日京城四衆陳布威儀鹵簿供養香花內出誥使弔贈聖眷殊深錫賚增優以旌傳法之功也輟舂罷相悽慘郊衢望焉慕焉終于掩坎建乎反哭痛焉疑焉門人萬餘或躄或踊洎五月三日和上卒哭中書令蕭志忠宣誥旨故翻經三藏義淨宜為度一七人仍令所司準格試至其月十五日靈塔修成銀青光祿大夫行祕書少監同安侯盧璨撰文開業寺沙門智詳書字題云大唐龍興翻經三藏義淨法師之塔銘并序師諱文明字義淨俗姓張氏齊郡山莊人也師特達英靈天生慧晤弱冠圓具便講毗尼慨七歲之文虧歎五明之未具乃裹糧負笈躡屩擔簦以咸亨二年發自全齊達于廣府泛舶南海達指中天周流三十餘國凡經二十五載探貝葉微言四百餘部得真容舍利三百餘粒傳燈願滿振錫而還以證聖元年屆于東洛敕命有司具禮兼遣洛邑僧衆盡出城迎緇素駢闐延于授記之寺尋又敕加三藏之號便於福先授記兩寺翻經神龍二年駕幸西京又敕薦福寺翻經前後所翻經總一百七部都四百二十八卷並敕編入一切經目而夜舟潛徙朝景不留奠楹之夢忽臻曳杖之歌奄及以先天二年正月乙丑朔十七日辛巳示疾終于薦福譯經之院春秋七十有九恩誥贈鴻臚卿賻物一百五十段為度七僧給羽葆鼓吹一部加武賁班劍八十人粵以二月乙未朔七日辛巳葬于京城延興門東之平原葬日誥遣中使弔慰又內出花樹香盤幢幡蓋輿等六百餘事絹四百匹像一鋪令充葬儀及贈孝子門人動餘萬數輟舂罷相悽慘城邑聲明文物暉曜郊衢弘法之功遠矣哀榮之典備矣門人智積等仰千仞之崇峻奄歎崩頽挹萬頃之波瀾俄驚逝閲探遺美於緗簡式言時於翠竭其詞曰彼遍知兮出現比利物乎大仙有開士兮傳譯邁羅什於秦年修多因而遠被毗奈由是遐宣法方煥於朝景舟忽移於夜川明主悼兮流賻贈門人慕兮緝遺編紀丹文於萬古扃白日於三千其時復有摩訶支那東都盟津北四由旬太行左麓假名隱居撰頌德碑文廣不敘至肅宗文明武德大聖大宣孝皇帝乾元元年於塔院所置金光明寺以表譯經之最勝力也時至德三年戊戌二月五日改為乾元元年八月十二日敕度七人僧出額名金光明寺十二月日迎至寺所
