錄第二譯右二經同本異譯其初譯本貝葉交錯文少失次千手千眼觀世音菩薩大身呪本一卷南天竺國三藏金剛智譯貞元新入目錄千手千眼觀世音菩薩廣大圓滿無礙大悲心陀羅尼經大唐西天竺沙門伽梵達摩譯拾遺編入單行右此心經雖是單本隨前身經編之於此千手千眼觀自在菩薩廣大圓滿無礙大悲心陀羅尼呪本一卷南天竺國三藏沙門金剛智譯貞元新入目錄觀世音菩薩祕密藏神呪經一卷大唐天后代于闐三藏實叉難陀譯新編入錄第一譯觀世音菩薩如意摩尼陀羅尼經一卷大唐三藏寶思惟譯新編入錄第二譯右二經同本異譯上二本經雖有廣略據其梵文並譯未盡義淨譯者其法最略金剛頂瑜伽千手千眼觀自在念誦法一卷經內云菩薩修行儀軌大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄上十二經十五卷同帙觀自在菩薩如意心陀羅尼呪經一卷大唐三藏義淨譯新編入錄第三譯如意輪陀羅尼經一卷大唐天竺三藏菩提流志譯新編入錄第四譯右二經與前二經同本異譯上四本經雖有廣略據其梵文並譯未盡義淨出者其法最略觀自在菩薩說普賢陀羅尼經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄文殊師利根本一字陀羅尼經一卷亦名一字呪王經大唐天后代天竺三藏寶思惟譯新編入錄第一譯曼殊室利菩薩呪藏中一字呪王經一卷大唐天后代三藏義淨譯新編入錄第二譯右二經同本異譯十二佛名神呪經一卷隋天竺三藏闍那崛多等譯第一譯稱讚如來功德神呪經一卷大唐三藏義淨譯開元新編入錄第二譯右二經同本異譯其五千五百佛名經第一卷初十二佛號與前十二佛名同而不別十二佛名經舊錄為單本新勘為重譯佛說三十五佛名經一卷經內題云佛說三十五佛禮懺文出鄔波離所問經大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄孔雀王呪經一卷亦名大金色孔雀王經并結界場法姚秦三藏鳩摩羅什譯第四譯大金色孔雀王呪經一卷失譯今附秦錄拾遺編入第五譯佛說大金色孔雀王呪經一卷失譯亦附秦錄拾遺編入第六譯孔雀王呪經二卷梁扶南三藏僧伽婆羅譯第七譯孔雀呪王經三卷大唐三藏義淨於東都內道場譯新編入錄第八譯右五經同本異譯新舊八譯五存三闕前六文略後二稍廣大孔雀明王經三卷經內題云佛母大孔雀明王經初有啟請法在上卷經前大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄佛說大孔雀明王畫像壇場儀軌一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄上十五經二十卷同帙陀羅尼集經十二卷大唐中天竺三藏阿地瞿多譯出大周錄單重合譯右出金剛大道場經大明呪藏之少分也撮要而譯此集之中大般若呪經等有別行者錄不具顯又多生疑恐非正典今為除疑故別條亦別之如後第一卷佛部卷上大神力陀羅尼釋迦佛頂三昧陀羅尼品第二卷佛部卷下初盡一切佛頂像法次有二七六印并呪諸佛呪印法第三阿彌陀佛大思惟經序分呪印法并說持誦得往生事及數珠法第四大金輪陀羅尼第五拔羅功能法相品第三卷摩訶般若波羅蜜多心經佛在舍衛國說大般若理趣中呪及般若心呪皆在此中於中第十二印并呪名般若無盡藏注云是一印呪筏唎耶思蠅伽法師譯卷末復有大輪金剛陀羅尼若誦此呪即當入壇及得用印不成盜法第四卷觀世音卷上十一面觀世音神呪經第五卷觀世音卷中初有二印及呪千囀觀世音菩薩呪次有六印及呪觀世音雜呪印第三千臂觀世音菩薩印并呪第四不空羂索觀世音四印并呪第五畫像觀世音像法第六觀世音毘俱胝菩薩三昧法印呪品第六卷觀世音等諸菩薩卷下初阿耶揭唎婆觀世音菩薩法印呪唐云馬頭第二諸大菩薩法會印呪品大勢至菩薩文殊師利菩薩彌勒菩薩地藏菩薩普賢菩薩虛空藏菩薩等並有印呪法第七卷金剛部卷上初金剛藏大威神力三昧法印呪品第二金剛眷法印呪品諸眷屬金剛說呪并印第八卷金剛部卷中初金剛阿蜜哩多軍荼利菩薩自在神力呪印品第二跋折羅吒訶婆印呪法唐云大笈金剛第九卷金剛部卷下初金剛烏樞沙摩法印呪品唐云不淨潔金剛印火頭金剛是第二大青金剛呪法第十卷諸天卷上初摩利支天經第二功德天法中天竺國菩提寺僧阿難律木叉師迦葉師等於經行寺翻流行於唐國第十一卷諸天卷下諸天等獻佛助成三昧法印呪品大梵摩天帝釋摩醯首羅四天王日天月天星宿天地天火天閻羅天一切龍王呪印并祈雨法那羅延天乾闥婆緊那羅摩乎囉伽孔雀王師子王伽嚕荼大辦天神王㷔摩檀沱水天風天阿修羅王遮文荼天法一切毘那夜迦法一切藥叉法一切羅剎法右大梵摩天等皆獻呪印第十二卷諸佛陀羅尼都會道場印呪品是灌頂普集會壇池也十一面觀世音神呪經一卷周宇文代天竺三藏耶舍崛多等譯第一譯十一面神呪心經一卷大唐三藏玄奘譯第二譯出內典錄右二經與前陀羅尼集第四卷十一面神呪經同本異譯而集經中印法稍廣十一面觀自在菩薩經三卷經內題云十一面觀自在菩薩心密言儀軌經大興善寺三藏沙門大廣智不空奉詔譯貞元新編入目錄摩利支天經一卷或上加小字失譯今附梁錄拾遺編入右一經是集經第十卷初摩利支天經少分異譯佛說摩利支天經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄末利支提婆華鬘經一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄訶利帝母經一卷經內題云訶利帝母真言法大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄大藥叉女歡喜母并愛子成就法一卷亦名呵哩底母法大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄呪五首經一卷大唐三藏玄奘譯出翻經圖單重合譯呪五首者能滅諸罪千囀陀羅尼呪一六字陀羅尼二七俱胝佛所說神呪三道隨一切如來意神呪四觀自在菩薩隨心呪五其千囀呪亦有別寫以為一經在此中故不別出大周錄中分為五經者非也千囀陀羅尼觀世音菩薩呪經一卷大唐總持寺沙門釋智通譯拾遺編入第二譯右千囀呪二首與上集經第五卷初千囀觀世音呪及雜呪中千轉陀羅尼同本異譯六字神呪經一卷或六字呪法大唐天后代天竺三藏菩提流志譯新編入錄第四譯右一經與上集經第六卷中文殊師利菩薩呪法及呪五首經六字陀羅尼并雜呪中六字陀羅尼呪同本異譯七俱胝佛大心准提陀羅尼經一卷大唐中天竺三藏地婆訶羅譯出大周錄第一譯七俱胝佛母准泥大明陀羅尼經一卷大唐南天竺三藏金剛智譯新編入錄第二譯右二經同本異譯比於舊新者稍廣然據梵文譯仍未盡呪五首中及雜呪內惟獨譯呪更無餘法七俱胝佛母陀羅尼經一卷經內題云七俱胝佛母所說准提陀羅尼經大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄上十五經二十八卷三帙上帙七卷中帙七卷下帙十四卷
