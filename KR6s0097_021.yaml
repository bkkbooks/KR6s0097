body:
  text: 西京西明寺沙門圓照撰有譯有本錄中菩薩三藏錄之二大乘經重單合譯中華嚴部華嚴本部及眷屬經皆纂於此總四十部二百四十八卷二十四帙大方廣佛華嚴經六十卷或五十卷六帙東晉天竺三藏佛陀跋陀羅等譯大本初譯右此經總七處八會合三十四品會列如左第一寂滅道場會合二品四卷第二普光法堂會合六品三卷第三忉利天宮會合六品三卷第四夜摩天宮會合四品三卷第五兜率天宮會合三品十卷第六他化天宮會合十一品十三卷新經開為二會第七普光法堂重會一品七卷第八給孤獨園會一品十六卷大方廣佛花嚴經八十卷八帙大唐天后代于闐三藏實叉難陀等譯新編入錄大本再譯右二經同本異譯其部譯經總七處九會合三十九品會列如左第一會菩提場中說合六品十一卷第二會普光明殿說合六品四卷第三會忉利天宮說合六品三卷第四會夜摩天宮說合四品三卷第五會兜率天宮說合三品十二卷第六會他化自在天宮說合一品六卷第七重會普光明殿說合十一品十三卷第八重會普光明殿說合一品七卷第九會給孤獨園說一品二十一卷新譯大方廣佛花嚴經四十卷罽賓國三藏賜紫沙門般若奉詔譯貞元新入目錄四帙普賢行願讚一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄文殊問字母品經一卷大興善寺三藏沙門不空奉詔譯貞元新入目錄瑜伽金剛頂經釋字母品一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄華嚴入法界四十二字觀門一卷內題大方廣佛花嚴經大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄金剛頂經瑜伽文殊師利菩薩儀軌供養法一品并梵字亦名文殊五字念誦法大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄金剛頂瑜伽文殊師利菩薩經一卷經內題云法一品亦名五字呪法大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄曼殊室利童子菩薩五字瑜伽法一卷並梵字大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄五字陀羅尼頌一卷并梵字大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄金剛頂超勝三界經說文殊五字真言勝相一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄文殊讚佛法身禮一卷經內題云大聖文殊師利菩薩讚法身禮并序大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄信力入印法門經五卷元魏天竺三藏曇摩流支譯單本上十一經十五卷同一帙度諸佛境界智光嚴經一卷失譯今附秦錄第一譯右一經大周錄云元魏三藏菩提流支譯出長房錄今按長房等錄留支所譯無此經名今為失譯附於秦錄又云與如來莊嚴智慧光明入一切佛境界智嚴經同本異譯者誤也今尋文理義旨各殊名雖似同所詮乃異求其旨趣乃與佛華嚴經入如來德智不思議境界經同本異譯故移編此佛華嚴入如來德智不思議境界經二卷隋天竺三藏闍那崛多等譯出內典錄第三譯大方廣入如來智德不思議經一卷大唐天后代于闐三藏實叉難陀譯新編入錄第四譯右三經同本異譯新舊四譯一譯本闕大方廣佛華嚴經不思議佛境界分一卷或二卷大唐天后代于闐三藏提雲般若譯出大周錄第一譯大方廣如來不思議境界經一卷大唐天后代于闐三藏實叉難陀譯新編入錄第二譯右二經同本異譯大乘金剛髻珠菩薩修行分一卷亦云金剛鬘菩薩加行品大唐天后代天竺三藏菩提流支譯出大周錄單本大方廣佛花嚴經修慈分一卷大唐天后代于闐三藏提雲般若譯新編入目錄單本大方廣普賢菩薩所說經一卷大唐天后代于闐三藏實叉難陀譯新編入錄單本莊嚴菩提心經一卷姚秦三藏鳩摩羅什譯第四譯上九經十卷同帙大方廣菩薩十地經一卷元魏西域三藏吉迦夜共曇曜譯第五譯右二經同本異譯前後五譯三譯闕本此菩薩十地經大周錄云是華嚴十住品異譯者謬也尋閱文句義旨懸殊但可為華嚴眷屬耳右信力入印法門等十一經並與華嚴分有相似是眷屬攝而非正部以其三種世間嚴事劣故佛說十力經一卷安西三藏勿提提犀魚於蓮華寺譯貞元新入目錄佛說迴向輪經一卷于闐國三藏尸羅達摩於北庭龍興寺譯貞元新入目錄佛說十地經九卷于闐國三藏沙門尸羅達摩於北庭龍興寺譯安西北庭進入貞元新入目錄上四經十二卷同一帙兜沙經一卷後漢月支三藏支婁迦讖譯右一經是華嚴經如來名號品異譯舊經在第五卷新經在第十二比於大本此經稍略菩薩本業經一卷亦直云本業經亦云淨行品經吳月支優婆塞支謙譯諸菩薩求佛本業經一卷或無諸字西晉清信士聶道真譯右二經是花嚴淨行品異譯舊經在第六卷新經在第十四其支謙譯者兼十住品略無偈大周入藏錄中更有菩薩本業經一卷亦是異譯淨行品尋本不獲故闕之耳菩薩十住行道品一卷亦直云菩薩十住西晉三藏竺法護譯出法經錄拾遺編入菩薩十住經二卷東晉西域三藏祇多蜜譯右二經是華嚴菩薩十住品異譯舊經在第九卷新經在第十六卷略無偈漸備一切智德經五卷或十卷一名十住又名大慧光三昧西晉三藏竺法護譯上六經十一卷同一帙十住經四卷或五卷姚秦三藏鳩摩羅什共佛陀耶舍譯右二經是華嚴十地品異譯舊經從第二十五卷至第二十九新經從第三十四卷至第三十九天親菩薩造十地釋論一十二卷等目菩薩所問三昧經一名普賢定意或三卷西晉三藏竺法護譯右一經是新花嚴十定品異譯從第四十卷至第四十三舊華嚴經無十定品此等目所問經周錄為單本今勘為重譯顯無邊佛土功德經一卷大唐三藏玄奘譯出內典錄右一經是華嚴壽量品異譯舊經在第三十新經在四十五如來興顯經四卷一名興顯如幻經右一經是舊華嚴寶王如來性起品及十忍品異譯從第三十五卷半至三十七卷盡其十忍品在三十卷此略無偈不知何故前後差別新經名如來出現從第五十卷至第五十二其十忍品在第四十舊錄中又有如來性起微密藏經二卷即是舊經性起品抄出別行其文不異但取第二會初緣起標於經首加證信序即非別翻故不重載上四經十一卷同帙度世品經六卷或五卷西晉三藏竺法護譯右一經是華嚴離世間品異譯舊經從第三十八卷至第四十四新經從第五十三卷至第五十九羅摩伽經三卷乞伏秦沙門釋聖堅譯出內典錄右一經是華嚴入法界品異譯此羅摩伽經比於本品文闕不足於其中間譯出少分舊經從第五十一卷無上勝長者至第五十二卷初妙德救護眾生夜天所其文即盡新經第六十七卷半至第七十卷初大方廣佛花嚴經續入法界品一卷或無續字大唐中天竺三藏地婆訶羅譯出大周錄右一經續舊華嚴經入法界品或有經大續入本部之中在第五十七卷上三經十卷同帙從兜沙下二十三經並是大部之中別品異譯涅槃部及支流經並纂於此總六部五十八卷六帙大般涅槃經四十卷或三十六卷四帙北涼天竺三藏曇無讖於姑臧譯第五單重合譯其涅槃經宋文帝代元嘉年中達于建業時有𤡸州沙門范惠嚴清河沙門崔惠觀陳郡處士謝靈運等以讖前經品數踈簡乃依舊泥洹經加之品目文有過質頗亦改結為三十卷行於江左比於前經時小異有論一卷略釋大經又論一卷釋本有今無一偈大般涅槃經後譯荼毘分二卷亦名闍維分亦名後分大唐南海波凌國沙門若那跋陀羅共唐國沙門會寧於彼國共譯出大周錄單本右一經是前大般涅槃經之餘憍陳如品之末兼說滅度已後焚燒等事義淨三藏求法傳云益府城都沙門會寧麟德年中往遊天竺到南海波凌國遂與彼國三藏沙門若那跋陀羅唐云智賢於阿笈摩經抄出如來涅槃焚燒之事非大乘涅槃經也遣使寄來方之天竺今尋此經與長阿含初分遊行經少分相似而不全同經中復言法身常在常樂我淨佛菩薩境界非二乘所知與大涅槃義理相涉經初復題陳如品末文勢相接且編於此諸博識知詳而定之大般泥洹經六卷或十卷東晉平陽沙門釋法顯共覺賢譯第四譯右一經是大般涅槃經之前分盡大眾問品同本異譯兼茶毘分前後七譯四譯闕本上二經八卷同帙方等般泥洹經二卷亦名大般泥洹經或三卷西晉三藏竺法護譯第一譯四童子三昧經三卷或直名四童子經隋天竺三藏闍那崛多等譯第二譯右二經同本異譯按群錄中又有哀泣經二卷或二卷云與方等泥洹同本異譯亦不述其翻譯所由尋其文句即是方等泥洹更無有異其方等泥洹初品名為哀泣但取此品題目以作經名比於方等泥洹仍闕三品餘並無別既是繁重刪之不錄大悲經五卷高齊天竺三藏那連提耶舍共法智譯單本上三經十卷同帙方等般泥洹等三經涅槃支流五大部外諸重譯經三百七十三部五百八十八卷五十一帙方廣大莊嚴經十二卷一名神通遊戲大唐中天竺三藏地婆訶羅譯出大周錄第四譯普曜經八卷一名方等本起西晉三藏竺法護譯第二譯四譯二𨵗右二經同本異譯其大莊嚴經問錄編為單譯或有以普曜經入小乘藏者二俱誤也上二經二十卷二帙法華三昧經一卷法華支流宋京州沙門釋智嚴譯單本無量義經一卷法華前說蕭齊天竺沙門曇摩伽陀耶舍譯第二譯兩譯一𨵗薩曇分陀利經一卷是異出法華寶塔天授二品各少分僧祐錄云安公錄中失譯今附西晉錄拾遺編入妙法蓮華經八卷二十八品或七卷姚秦三藏鳩摩羅什譯第五譯右上四經此妙法蓮華經第五卷初提婆達多品蕭梁武帝時外國三藏摩提共揚都僧正沙門法獻於瓦官寺譯其經梵本是法獻於于闐將來其第八卷初普門品中重誦偈周武帝時北天竺三藏闍那崛多於益州龍淵寺譯秦本並闕後續編入又第八卷中藥王菩薩等呪六首大唐三藏玄奘重譯在音義中此不別出成就妙法蓮華經王瑜伽觀智儀軌一卷大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄上五經十二卷同一帙正法華經十卷或云方等正法華或七卷一帙西晉三藏竺法護譯第三譯妙法蓮華經七卷二十七品或八卷隋天竺三藏崛多笈多二法師添品譯出經前序及內典錄右二經同本異譯其添品序略云正法法護翻妙法什譯撿驗二本文皆有闕護所闕者普門品偈也什所闕者藥草喻品之半富樓那及法師二品之初提婆達多品普門偈也什移囑累在藥王之前二本陀羅尼並置普門之後其間異同言不能極竊是提婆達多品及普門品偈先賢續出補闕流行余景仰道風憲章成範大隋仁壽元年辛酉之歲因普曜寺沙門上行所請遂共崛多笈多二法師於大興善寺重勘天竺多羅葉本富樓那及法師等二品之初勘本猶闕藥草喻品更益其半提婆達多通人塔品陀羅尼次神力之後囑累結其終字句差互頗亦改正儻有披尋幸勿疑惑兼此添品總成六譯三在三闕維摩詰所說經二卷一名不可思議解脫或云維摩詰經姚秦三藏鳩摩羅什譯第六譯上二經十卷同帙維摩詰經二卷或三卷吳月支優婆塞支謙譯第二譯說無垢稱經六卷大唐三藏玄奘譯出內典錄第七譯右三經同本異譯前後七譯四譯闕本大方等頂王經一卷一名維摩詰子問經亦名善思童子經西晉三藏竺法護譯第一譯大乘頂王經一卷亦名維摩兒經梁優禪尼國王子月婆首那譯第二譯上四經十卷同帙善思童子經二卷隋天竺三藏闍那崛多等譯第四譯右三經同本異譯其善思童子經周錄在單本中誤也前後四譯第二本闕大悲分陀利經八卷亦名大悲今附秦錄第二譯失譯上二經十卷同帙悲華經十卷一帙北涼天竺三藏曇無讖於姑臧譯第四譯右二經同本異譯前後四譯兩譯闕本金光明最勝王經十卷一帙大唐天后代三藏義淨譯新編入錄第五譯金光明經八卷二十四品隋大興善寺沙門寶貴合出當第四本右二經同本異譯其序略云而金光明見有三本初在涼世有曇無讖譯為四卷止十八品其大周世闍那崛多譯為五卷成二十品後梁世真諦三藏於建康譯三身分別業障滅陀羅尼最靜地依空滿願等四品足前出沒為二十四品寶貴每歎此經祕奧後分如何竟無囑累舊雖三譯本疑未周長想梵文願言逢遇大隋十七年法席小間因勸請北天竺揵達國三藏法師此云志德重尋後本果有囑累品復得銀主陀羅尼品在京大興善寺即為翻譯并前先出合二十四品寫為八卷學士成都費長房筆受通梵沙門日嚴寺釋彥琮校練撰錄者曰此合部經文義備足其無讖四卷真譯七卷崛多五卷並皆有闕故此三經無繁重載謹按長房等錄周武帝代天竺三藏耶舍崛多譯出一本名金光明經更廣壽量大辯陀羅尼經五卷成部今詳此名乃非全譯但於無讖四卷經中續演二品其壽量品更續其文大辯品中更廣呪法餘品之中亦有續者故云更廣壽量大辯陀羅尼經故六卷合經序云壽量大辯又補其闕以此證知但是續闕非是別翻又經序闍那崛多譯為五卷房等諸錄乃云耶舍崛多者此二三藏乃是同師當時共翻互載皆得其合部經有六卷與此八卷明同異者其六卷經一品顛倒比校新經八卷者是又二經囑累文意全別六卷囑累乃與法華囑累大況相似未詳所以今勘八卷之者亦乃與新經苻同二本少殊不可雙載故存八卷為正編之入藏後尋覽者幸無惑焉兼此合經總成五譯兩本在藏三本入刪繁錄純真陀羅所問經二卷或三卷後漢月支三藏支婁迦讖譯第一譯上二經十卷同帙大樹緊那羅王所問經四卷亦名說不可思議品姚秦三藏鳩摩羅什譯第二譯右二經同本異譯佛昇忉利天為母說法經二卷亦名佛昇忉利天品經或三卷西晉三藏竺法護譯道神足無極變化經四卷一名道神足經或二卷或三卷西晉安息三藏安法欽譯第二譯右二經同本異譯上三經十卷同帙寶雨經十卷一帙大唐天后代南印度三藏達摩流支等譯出周錄第三譯寶雲經七卷梁扶南三藏曼陀羅仙共僧伽婆羅譯第一譯右二經同本異譯新舊三譯第二本闕阿惟越致遮經三卷或無遮字或四卷西晉三藏竺法護譯第一譯上二經十卷同帙不退轉法輪經四卷僧祐錄云安公涼土異經在北涼譯第二譯廣博嚴淨不退轉輪經四卷或六卷宋涼州沙門智嚴共寶雲譯第三譯右三經同本異譯其阿惟越致遮周錄在單本誤也不必定入定入印經一卷元魏婆羅門瞿曇般若流支譯出序記第一譯右經初序記云魏興和四年歲次降婁月建在戌朔次甲子壬午之日瞿曇流支沙門曇林於尚書令儀同三司高公第譯九千一百九十三字諸錄皆云菩提留支譯者誤也今依序記為正入定不定印經一卷大唐天后代三藏義淨譯新編入錄第二譯右二經同本異譯其舊譯經周錄為單本新勘重譯上四經十卷同帙等集眾德三昧經三卷或二卷西晉三藏竺法護譯第一譯集一切福德三昧經三卷姚秦三藏鳩摩羅什譯出真寂寺錄第二譯右二經同本異譯前後三譯一譯本闕持心梵天經四卷一名莊嚴佛法經又名等御諸法經西晉三藏竺法護譯或六卷七十品第一譯上三經十卷同帙姚秦釋僧叡思益序云恭明前譯頗麗其辭而迷其旨今按群錄吳時月支國優婆塞支謙字恭明翻譯眾經而無思益同本之者其持心經與思益同乃是西晉竺法護譯叡云恭明先譯失旨者誤思益梵天所問經四卷或直云思益經祐云思益義經姚秦三藏鳩摩羅什譯第二譯勝思惟梵天所問經二卷元魏天竺三藏菩提留支譯第二譯右三經同本異譯其勝思惟經有釋論四卷上二經六卷同帙持人菩薩經四卷有加所問二字或三卷西晉三藏竺法護譯第一譯持世經四卷一名法印經或三卷姚秦三藏鳩摩羅什譯第三譯右二經同本異譯前後三譯第二本闕濟諸方等學經一卷或無學字西晉三藏竺法護譯第一譯大乘方廣總持經一卷或無乘字隋天竺三藏毘尼多流支譯第二譯右二經同本異譯周錄為單本新勘為重譯上四經十卷同帙文殊師利現寶藏經三卷或直云寶藏經或二卷西晉三藏竺法護譯第一譯大方廣寶篋經二卷或三卷宋天竺三藏求那跋陀羅譯第四譯右二經同本異譯前後四譯兩譯闕本寶篋經一卷經內題云一切如來心祕密全身舍利寶篋印陀羅尼經大興善寺三藏沙門大廣智不空奉詔譯貞元新入目錄大乘同性經二卷亦名一切佛行入智毘盧遮那藏說經或四卷周宇文代天竺三藏闍那耶舍譯出大周錄第二譯證契大乘經二卷亦名入一切佛境智毘盧遮那藏大唐中天竺三藏地婆訶羅譯出大周錄第二譯右二經同本異譯上五經十卷同帙深密解脫經五卷元魏天竺三藏菩提留支譯全本初譯解深密經五卷大唐三藏玄奘譯出內典錄全本再譯上二經十卷同帙解節經一卷陳天竺三藏真諦譯右一經是解深密經初五品異譯出第一卷相續解脫地波羅蜜了義經一卷亦名解脫了義經亦名相續解脫經宋天竺三藏求羅陀羅譯右一經是解深密經後二品異譯出四五二卷右四經同本異譯二是全本二是抄譯緣生初勝分法本經二卷隋天竺三藏達摩笈多譯出內典錄第一譯分別緣起初勝法門經二卷大唐三藏玄奘譯出內典錄第二譯右二經同本異譯楞伽阿跋多羅寶經四卷宋天竺三藏求那跋陀羅譯第二譯上五經十卷同帙入楞伽經十卷一帙元魏天竺三藏菩提留支譯第三譯大乘入楞伽經七卷大唐天后代