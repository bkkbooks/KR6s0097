景雲二年已來兩京翻譯未入開元釋教録今搜撿入貞元釋教録上缺三卷訪本未獲其上律等洛京魏府已來並收入貞元目闕本中載毗尼摩得勒伽十卷一帙宋天竺三藏僧伽跋摩譯單本鼻奈耶律十卷一名戒因緣經一帙姚秦涼州沙門竺佛念於符代譯單本善見律毗婆沙十八卷或云毗婆沙律亦直云善見律蕭齊外國沙門僧伽跋陀羅譯單本佛阿毗曇經二卷亦云佛阿毗曇論陳天竺三藏真諦譯單本上二經二十卷二帙其佛阿毗曇論群録並云九卷未詳所以今只有二卷舊編在大乘論中今者尋其文理多說度人受戒等事與此相應故移編此毗尼母經八卷亦云毗尼母論失譯今附秦録單本大比丘三千威儀經二卷亦云大僧威儀經或四卷後漢安息三藏安世高譯單本上二經十卷同帙其毗尼母經大周録云東晉太安年符蘭譯出法上録謹按帝王代於東晉代無太安年其太安年乃在西晉慧帝代其法上録尋之未獲年代既錯未可依準又撿文中有翻梵語處皆曰秦言故是秦時譯也今為失涼編於秦録其三千威儀經僧祐失譯録中分為兩部各二卷房等諸録並云兩本各之成其四卷今只有二餘二莫存也薩婆多毗尼毗婆沙九卷失譯今附秦録單本律二十二明了論一卷亦直云明了論陳天竺三藏真諦譯單本上二經十卷同帙其明了論出正量部波羅提木叉論中其大論未譯凡有六千頌彼部法師阿那含人厥名覺護依律毗婆沙及足論等造於中與律相應者略成一卷謂明了論此論解釋律藏中二十二條真實要義能除正法人迷暗心通達律義故稱明了隋沙門法經録及長房入藏録中並分為兩部律二十二卷編在律中明了論一卷載於論録又律二十二乃是明了論半題彼存二十二卷者誤之甚也聲聞對法藏三十六部六百九十八卷七十二帙此對法藏諸部不同流布此方比諸為衆今者據其有部根本身論為初足論居次毗沙等支派編末餘部既衆難以科條以俟將來此無先後阿毗曇八揵度論三十卷迦旃延子造或二十卷三帙符秦罽賓三藏僧伽提婆共竺佛念譯第一譯阿毗達磨發智論二十卷迦多衍尼子造二帙大唐三藏玄奘譯出內典録第二譯右上二論同本異譯即是說一切有部對法藏之根本佛圓寂後三百年中論師迦多衍尼子之所造也後代傳人本有廣略此發智論文義具足傳習之者號為身論以餘六論各辨一支有異於身故名為足次編於後諸部繼焉一阿毗達磨法蘊足論十二卷尊者大採菽氏造一帙大唐三藏玄奘譯出內典録單本二阿毗達磨集異門足論二十卷尊者舍利子說二帙大唐三藏玄奘譯出內典録單本第三施設足論有一萬八千頌尊者大迦多衍那造迦多此云剪剃衍此云種那是男聲婆羅門中一姓其論未譯上三足論並佛在世時造四阿毗達磨識身足論十六卷大唐三藏玄奘譯出內典録單本右一論佛圓寂後一百年尊者提婆設摩唐云天寂阿羅漢造五阿毗達磨品類足論十八卷大唐三藏玄奘譯出內典録第二譯右一論佛圓寂後三百年中尊者筏蘇蜜多羅唐云世友造衆事分阿毗曇論十二卷宋天竺三藏求那陀羅共菩提舍譯第一譯右二論同本異譯上二論二十卷三帙六阿毗達磨界身足論三卷大唐三藏玄奘譯出翻經圖單本右一論佛圓寂後三百年中尊者世友造與上識身足論共十九卷二帙阿毗曇毗婆沙論六十卷或八十四卷或一百九卷北涼天竺沙門浮陀跋摩共道泰等譯第一譯右此論創譯百卷成部沙門道挻製序屬魏併涼失四十卷今唯六十卷在但畢第三揵度下五揵度時闕其本新譯之者八蘊並足其八十四卷本及一百九卷者後人分六十卷成非是元來不闕又按梁僧祐法苑云天監十一年二月敕僧伽婆羅更出婆沙餘五揵度雖有此說本仍未覩阿毗達磨大毗婆沙論二百卷二十帙大唐三藏玄奘譯出內典録右上二論同本異譯即釋上發智論佛圓寂後四百年中五百大阿羅漢等於迦濕彌羅國造阿毗達磨俱舍論二十二卷婆藪盤豆造陳天竺三藏真諦譯第一譯阿毗達磨俱舍論本頌一卷尊者世親造或三卷大唐三藏玄奘譯出內典録第二譯真諦譯者闕本上二論二十三卷三帙阿毗達磨俱舍論三十卷尊者世親造三帙大唐三藏玄奘譯出內典録第二譯右二論及頌同本異譯阿毗達磨順正理論八十卷尊者衆賢造八帙大唐三藏玄奘譯出內典録單本阿毗達磨顯宗論四十卷尊者衆賢造四帙大唐三藏玄奘譯出內典録單本右二部論與俱舍論頌同釋異並衆賢造衆賢尊者先述正理文廣難尋後造顯宗略而易曉所以重譯阿毗曇心論四卷尊者法勝造或無論字東晉罽賓三藏瞿曇僧伽提婆譯單本法勝阿毗曇心論經六卷大德復波扇多造或七卷高齊天竺三藏那連提耶舍共法智譯單本上二論十卷同帙雜阿毗曇心論十一卷亦云雜阿毗曇毗婆沙尊者法救造或十四卷宋天竺三藏僧伽跋摩譯第四譯四譯三闕上三論俱名阿毗曇心然其所釋廣略有異雜阿毗曇心論第一卷初注云諸師釋法略也優波扇多有八千偈釋又有一師萬二千偈釋二論名為廣也修槃頭以六千偈釋又論初頌云敬禮尊法勝所說我頂受我達摩多羅說彼未曾說故上三論初四卷者是法勝本論次六卷者是優波扇多釋故彼論末云大德優波扇多為利益弟子故造此阿毗曇心論故知此即釋法勝論非法勝造而論外題云有法勝字者或恐不然論卷中題無二字群録皆云法勝阿毗曇或云別譯法勝阿毗曇後雜心論是法救造比前二論文義稍廣阿毗曇甘露味論二卷或云甘露味阿毗曇尊者瞿沙造曹魏代譯失論三藏名單本隨相論一卷或云求那跋摩諦隨相論德慧法師造或二卷陳天竺三藏真諦譯單本上三論十四卷二帙尊婆須蜜菩薩所集論十卷尊者婆須密造或十四卷或十二卷符秦罽賓三藏僧伽跋澄等譯單本二法度論二卷或無論字或云經或三卷或云一卷東晉罽賓三藏瞿曇僧伽提婆譯第二譯兩譯一闕右此三法度論有本有釋本有三章九真度釋亦有九品盧山遠法師序云本是尊者山賢造釋是天竺大乘居士僧伽先撰經後記云大乘比丘釋僧伽撰二說少殊未詳孰正之也入阿毗達磨論二卷塞建陀羅阿羅漢造大唐三藏玄奘譯出內典録單本上三論十四卷二帙成實論二十卷訶梨跋摩造凡二百二品或二十四卷姚秦三藏鳩摩羅什譯單本立世阿毗曇論十卷或無論字一帙或十五卷陳天竺三藏真諦譯單本解脫道論十二卷或十三卷一帙梁扶南三藏僧伽婆羅譯單本舍利弗阿毗曇論二十二卷或二十卷或三十卷姚秦罽賓三藏曇摩耶舍共曇摩崛多譯單本五事毗婆沙論二卷亦云阿毗達磨五事論尊者法救造大唐三藏玄奘譯出翻經圖單本上二論二十四卷二帙大周録中別載阿毗達磨五事論者誤也鞞婆沙論十四卷亦云鞞婆沙阿毗曇論阿羅漢七陀槃尼撰符秦罽賓三藏僧伽跋登譯單本三彌底部論三卷或無部字或云四卷失譯三彌底者此云正量即正量部中論也今附秦録單本上二論十七卷二帙分別功德論四卷或云分別功德經或三卷或五卷失譯在後漢録單本右此一論釋增一阿含經義初序品至弟子品過半釋王比丘即止法上録云竺法護譯者不然此中牒經解釋文句並同本經似與增一阿含同一人譯而餘録並云失源且依此定僧祐録云迦葉阿難撰者此亦不然如論第一卷中引外國師薩婆多說故知非是二尊所撰四諦論四卷婆藪跋摩造陳天竺三藏真諦譯單本辟支佛因緣論二卷失譯今附秦録單本十八部論一卷新為失譯附三秦録第一譯右十八部論按尋群録並云梁代三藏真諦譯今詳真諦三藏已譯十八部論不合更譯部異執論其十八部論初首引文殊問經分別品品後次云羅什師集後方是論若是羅什所翻秦時未有文殊問經不合引之置於初也或可準別録中文殊問經編為失譯秦時引證此亦無疑若是真諦再譯論中子注不合有秦言之字詳其文理多是秦時羅什譯出諸録脫漏致有疑焉其真諦十八部疏即部異執疏是雖有斯理未敢指南後諸傳聞請求實録部執異論一卷亦名部異執論陳天竺三藏真諦譯第一譯異部宗輪論一卷世友菩薩造大唐三藏玄奘譯出翻經圖第三譯右三論同本異譯上六論十三卷同帙有譯有本録中聖賢傳記録第三一百一十二部五百九十五卷六十四帙傳記録者佛圓寂後聖賢弟子之所撰集雖非三藏正典然亦助揚玄化於此之中總為五類一讚佛德二明法真理三述僧行軌四摧邪護法五外宗異執讚佛德者佛所行讚傳釋迦譜等也明法理者修行道地經經律異相等也述僧行者龍樹馬鳴法顯玄奘等傳也摧邪護法者辨正弘明破邪辨惑論等也外宗異計者數勝二論是也以類科分莫過此五五中所辨通大小乘又於此中更開二例梵本翻譯者居先此土傳揚者於後庶東西不雜覽者除疑焉梵本翻譯集傳六十八部一百七十三卷一十四帙佛所行讚經傳五卷馬鳴菩薩撰亦云佛本行經北涼天竺三藏曇無讖譯單本佛本行經七卷一名佛本行讚傳宋涼州沙門釋寶雲譯單本右大周録編在大乘重譯經中云與六十卷佛本行集經同本異譯者誤也上二集十二卷同帙撰集百緣經十卷一帙吳月支優婆塞支謙譯出內典録單本拾遺編入出曜經二十卷或云出曜論或十九卷姚秦涼州沙門竺佛念於符秦代譯單本賢愚經十三卷或十五卷或十六或十七元魏涼州沙門慧覺等在高昌郡譯出翻經圖單本謹按梁沙門僧祐賢愚序云河西慧覺等八僧遊方問道到于闐大寺遇五年大會八人分聽各記所聞還至高昌乃集為一部即上賢愚經是上代群録皆編經藏今以共集所聞則非慶喜本誦與餘集等亦復何殊編入正經理將未當故今移附集傳録中其出曜百緣二經亦是別集還非本誦亦附此焉上二集三十三卷四帙上三帙各八第四帙九卷道地經一卷或加大字是修行經抄無外國略本後漢安息三藏安世高譯拾遺編入第二譯右一經是後修行道地經之少分異譯準安法師序云沙門衆護撰述經要以為一部二十七章世高折護所集者七章以為漢文今以章名與數二種皆同故知即是安世高所出此經七章總十八紙群録皆云二卷者誤也修行道地經六卷或直云修行經或七卷西晉三藏竺法護譯第三譯三譯一闕右二經同本異譯佛圓寂後七百年西域沙門衆護所撰衆護者是此方言天竺梵音名僧伽羅剎舊録編入經者理不然也與後僧伽羅剎集經撰人不殊何得一載正經一編集內例既如此故附此中僧伽羅剎所集經三卷僧伽羅剎撰或五卷符秦代譯上三集十卷同帙百喻經四卷僧伽斯那撰或五卷蕭齊天竺三藏求那地譯單本菩薩本緣經三卷僧伽斯那撰或四卷或兩卷吳月支優婆塞支謙譯單本大乘修行菩薩行門諸經要集三卷大唐至相寺沙門釋智嚴譯新編入録上三集十卷同帙付法藏因緣傳六卷或無因緣字或四卷二卷元魏西域三藏吉迦夜共曇曜譯第三譯三譯二闕坐禪三昧經三卷或名菩薩禪法經或云禪經或二卷姚秦三藏鳩摩羅什譯第一譯兩譯一闕又群録中復有阿蘭若習禪法經二卷云與坐禪三昧經同本異譯亦云羅什法師所出尋閲文句首末全同但為殊名分成兩部既非別譯未可雙行佛醫經一卷亦云佛醫王經吳天竺沙門竺律炎共支越譯拾遺編入單本惟日雜難經一卷吳月支優婆塞支謙譯拾遺編入單本佛般泥洹摩訶迦葉赴佛經一卷亦云迦葉赴佛般涅槃經東晉西域沙門竺曇無蘭譯單本菩薩呵色欲法一卷亦云經姚秦三藏鳩摩羅什譯第一譯兩譯一闕四品學法經一卷或無經字宋天竺三藏求那跋陀羅譯單本佛入涅槃密迹金剛力士哀戀經一卷失譯今附秦録單本迦旃延說法沒盡偈經一卷僧祐録云安公失譯經今附西秦録單本佛治身經一卷或云治身經僧祐録云安公失譯今附西晉録單本拾遺編入治意經一卷或云佛治意經僧祐録云安公失譯經今附西晉録拾遺編入單本上十一集十八卷同帙雜寶藏經八卷或云十二卷元魏西域三藏吉迦夜共曇曜譯單本那先比丘經二卷或直云那先經或三卷失譯在東晉録第一本兩譯一闕上二集十卷同帙五門禪經要用法一卷大禪師佛陀蜜多撰宋罽賓三藏曇摩蜜多譯拾遺編入第二譯達摩多羅禪經二卷一名不淨觀禪經修行方便東晉天竺三藏佛陀跋陀羅譯單本右達摩多羅及佛大先所造先罽賓人也彼國禪匠佛陀跋陀羅師智嚴往遊西域亦於先所學禪從坐禪三昧下一十四經周録之中編在經內今以並非佛說移之於此其雜寶藏經雖集佛語兼雜餘緣非全佛說故編集內禪法要解二卷一名禪要經姚秦三藏鳩摩羅什譯第一譯兩譯一闕禪要呵欲經一卷是云禪要經呵欲品後漢失譯拾遺編入單本內身觀章句經一卷後漢失譯拾遺編入單本法觀經一卷西晉三藏竺法護譯拾遺編入思惟要略法一卷或加經字姚秦三藏鳩摩羅什譯拾遺編入第二譯兩譯一闕十二遊經一卷東晉西域沙門迦留陀伽譯拾遺編入第二譯三譯二闕舊雜譬喻經二卷亦云雜譬喻集經吳天竺三藏康僧會譯拾遺編入單本雜譬喻經一卷後漢月支三藏支婁迦讖譯拾遺編入單本上十集十三卷同帙雜譬喻經二卷一名菩薩度人經失譯在後漢録單本拾遺編入雜譬喻經一卷比丘道略集姚秦三藏鳩摩羅什譯拾遺編入單本阿育王譬喻經一卷失譯今附東晉録拾遺編入單本阿育王經十卷或加大字梁扶南三藏僧伽婆羅譯拾遺編入第二譯上四集十四卷同帙阿育王傳七卷亦云大阿育王經或五卷西晉安息三藏安法欽譯第一譯右二傳同本異譯佛圓寂後一百餘年育王出世方有此傳大周録中編在大乘經中者誤也長房等録復云僧伽婆羅更出育王傳五卷者誤也前經即傳不合重載阿育王息懷目因緣經一卷一名王子法益懷目因緣經符秦天竺三藏曇摩難提於秦代譯拾遺編入第二譯三譯二闕四阿含暮抄解二卷阿羅漢婆素跋陀撰符秦西域沙門鳩摩羅佛提等譯拾遺編入單本上三集十卷同帙法句經二卷亦云法句集尊者法救撰吳天竺沙門維祇難等譯第一譯兩譯一闕阿毗曇毗婆沙論第一云如法句經世尊於處方邑為衆生故種種演說尊者達摩多羅此云法救於佛滅後種種說中無常義者立無常品乃至梵志義者立梵志品故知此經是法救撰周入藏録編在大乘經中及集傳內前後重載誤之甚也法句譬喻經四卷一名法句本末經或五卷或六卷西晉沙門釋法立共法炬譯第二譯兩譯一闕右與前法句經明同異前經但纂偈句不兼長行今此後經兼說偈之由起有某因緣世尊方說比前偈文此略不備又前後偈文互有增減周録編在大乘經中者誤也迦葉結經一卷後漢安息三藏安世高譯拾遺編入第一譯三譯二闕撰集三藏及雜藏傳一卷失譯今附東晉録單本拾遺編入三慧經一卷僧祐録云安公涼土異經今附涼録單本拾遺編入阿毗曇五法行經一卷亦云阿毗曇苦惠經或無行字後漢安息三藏安世高譯拾遺編入單本阿含口解十二因緣經一卷亦直云阿含口解經亦名斷十二因緣經後漢安息優婆塞安玄共嚴佛調譯單本小道地經一卷後漢西域三藏支曜譯拾遺編入單本文殊師利發願經一卷或加偈字東晉天竺三藏佛陀跋陀羅譯拾遺編入單本六菩薩名一卷房入藏録云亦菩薩名亦當誦持後漢失譯拾遺編入單本一百五十讚佛頌一卷尊者摩嘻利制吒造大唐三藏義淨譯新編入録單本讚觀世音菩薩頌一卷大唐天后代佛授記沙門釋智慧譯出大周録拾遺編入單本上十二集十六卷同帙無明羅剎集一卷亦名無明羅剎經或二卷拾遺編入單本今附秦録失譯馬鳴菩薩傳一卷姚秦三藏鳩摩羅什譯拾遺編入單本龍樹菩薩傳一卷姚秦三藏鳩摩羅什譯拾遺編入單本提婆菩薩傳一卷姚秦三藏鳩摩羅什譯拾遺編入單本婆藪槃豆法師傳一卷此曰天親陳天竺三藏真諦譯拾遺編入第二譯兩譯一闕龍神菩薩為禪陀迦王說法要偈一卷宋罽賓三藏求那跋摩譯出唐舊録第一譯勸發諸王要偈一卷龍樹菩薩撰宋天竺三藏僧伽跋摩譯拾遺編入第二譯龍樹菩薩勸誡王頌一卷大唐天后代三藏義淨譯新編入録第三譯右三集同本異譯前二本偈諸經藏中連為一卷今分二軸賓頭盧跋羅闍為優陀延王說法經一卷宋天竺三藏求那跋陀譯單本又有賓頭盧為王說法經一卷文與此同故不雙出請賓頭盧法一卷或加經字宋沙門釋慧簡譯第二譯兩譯一闕分別業報略一卷大勇菩薩撰或加集字宋天竺三藏僧伽跋摩譯拾遺編入單本迦丁比丘說當來變經一卷僧祐録中失譯經今附宋録拾遺編入單本大阿羅漢難提蜜多羅所說法住記一卷大唐三藏玄奘譯出內典録單本金七十論三卷亦云僧佉論或二卷陳天竺三藏真諦譯單本右一論外道迦毗羅仙人造明二十五諦所謂數論經中云迦毗羅論是也長房內典二録真諦譯中有金七十論二卷復有僧佉論三卷二目俱存者誤也勝宗十句義論一卷大唐三藏玄奘譯出翻經圖單本右一論勝者慧月造明十句義鵂鶹仙人本所造但六句義慧月四足成十句本末通論故名勝宗十句論也中云衛世師論是也其數勝二論非是佛法諸外道宗此二為上欲令博學之者委悉異道之宗故釋之耳上十五集十七卷同帙此方撰述集傳四十四部四百二十二卷五十帙大佛名經一十六卷或十四卷貞元十五年十月二十三日別敕入録二帙釋迦譜十卷別有五卷本與此廣略異蕭齊建初寺沙門釋僧祐録出房録新編入藏釋迦氏略譜一卷或無略字大唐西明寺沙門釋道宣撰出內典録新編入藏釋迦方志二卷大唐西明寺沙門釋道宣撰出內典録新編入藏上三集十三卷二帙上帙七下帙六經律異相五十卷五帙梁天監十五年敕沙門寶唱等撰出長房録新編入藏陀羅尼品集十卷一帙未詳撰者今附梁録右一呪集大周録中為大乘單本復云失譯者不然尋撿其文乃是此方抄集而非梵本別翻所以知者如七佛神呪經及陀鄰尼鉢經等並是晉朝所翻護諸童子陀羅尼經元魏菩提留支所譯又陀鄰尼鉢經苦最勝燈王經二是同本如此等經並皆集入故非梵本所傳必是此方撰集未知的是何人所撰故此述之諸經要集二十卷大唐西明寺沙門釋玄輝撰新編入藏上一集二十卷分為三帙上下各七中帙六卷出三藏記集十五卷梁建初寺沙門釋僧祐録出長房録新編入藏衆經目録七卷隋開皇十四年敕翻經沙門法經等撰出長房録新編入藏上二集二十二卷二帙上帙十卷下帙十二開皇三寶録十五卷內題云歷代三寶記隋開皇七年翻經學士成都費長房撰出內典録新編入藏衆經目録五卷隋仁壽二年敕翻經沙門及學士等撰出內典録新編入藏上二集二十卷二帙大唐內典録十卷一帙大唐西明寺沙門釋道宣撰出內典録新編入藏續大唐內典録一卷大唐西崇福寺沙門釋智升撰新編入藏古今譯經圖紀四卷大唐翻經沙門釋靖邁撰新編入藏續古今譯經圖紀一卷大唐西崇福寺沙門釋智升撰新編入藏大周刊定衆經目録十五卷大唐天后敕佛授記寺沙門明佺等撰新編入藏上四集二十一卷二帙上帙十一卷下帙十卷開元釋教録二十卷二帙大唐西崇福寺沙門釋智升撰新編入藏續開元釋教録一部三卷大唐西明寺沙門圓照奉敕集編入目録貞元新定釋教目録三十卷三帙大唐西明寺沙門圓照奉敕撰新編入藏一切經音義二十五卷大唐翻經沙門釋玄應撰出內典録新譯大方廣佛花嚴經音義二卷大唐淨法寺沙門釋慧苑撰新編入藏上二集二十七卷四帙第一帙六卷下三帙各七大唐西域記十二卷大唐三藏玄奘撰出內典録新編入藏集古今佛道論衡四卷或二卷大唐西明寺沙門釋道宣撰出內典録新編入藏續集古今佛道論衡一卷大唐西崇福寺沙門釋智升撰新編入藏上三集十七卷二帙上帙八下帙九東夏三寶感通録三卷大唐西明寺沙門釋道宣撰出內典録新編入藏集沙門不拜俗議六卷大唐弘福寺沙門釋彥琮撰出內典録新編入藏上二集九卷同帙大唐慈恩寺三藏法師傳十卷一帙大唐西太原寺沙門釋慧立等撰新編入録大唐西域求法高僧傳二卷大唐三藏義淨撰新編入藏法顯傳一卷亦云歷遊天竺記傳東晉沙門釋法顯自記遊天竺事出長房録新編入録高僧傳十四卷一卷是目録梁會稽嘉祥寺沙門釋慧晈撰出長房録上三集十七卷二帙上帙九下帙八續高僧傳三十卷大唐西明寺沙門釋道宣撰出內典録新編入藏上一集三十卷分為四帙第一第二各八第三第四各七辨正論八卷一帙大唐終南山龍田寺釋氏法琳撰出內典録新編入藏破邪論二卷或一卷大唐終南山龍田寺釋氏法琳撰出內典録新編入藏別傳三卷法琳撰甄正論三卷大唐天后代佛授記寺沙門釋玄嶷撰新編入藏十門辨惑論二卷或三卷大唐大興善寺沙門釋復禮撰新編入藏弘明集十四卷梁建初寺沙門釋僧祐撰出長房録新編入藏上五集二十四卷二帙上十二卷下帙十二卷廣弘明集三十卷大唐西明寺沙門釋道宣撰出內典録新編入藏上一集三十卷分為四帙第一帙十第二帙七第三帙七卷第四帙六卷集諸經禮懺儀二卷大唐西崇福寺沙門釋智升撰新編入藏大唐南海寄歸內法傳四卷大唐三藏義淨撰新編入藏比丘尼傳四卷梁莊嚴寺沙門釋寶唱撰新編入藏別說罪要行法一卷或無別字大唐三藏義淨撰新編入藏受用三水要法一卷大唐三藏義淨撰護命放生軌儀一卷大唐三藏義淨撰上六集十三卷同帙從大佛名經及釋迦譜下四十四部合四百二十二卷並是此方賢德撰集然於大法裨助光揚季代維持實為綱要故編此録繕布流行若寫藏經隨情取捨諸傳記雖涉釋宗非護法者此中不録都計小乘經律論及賢聖集傳見流行者總四百五十九部合二千四百二卷二百三十四帙沙門法琳傳三卷沙門彥琮撰右一部傳舊録云明敕禁斷不許流行故不編載今詳此意蓋在一時然不入格文望許編入貞元目録
