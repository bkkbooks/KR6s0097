body:
  text: 西京西明寺沙門圓照撰有譯有本録中聲聞三藏録第四聲聞藏者小乘所詮之教也能說教主則示生滅應物隨緣所詮之教則九部四含毗曇戒律善男善女稟之而脫屣塵勞緣覺聲聞奉之而升乎彼岸蓋真乘之小駕乃菩提之化城誘進初心莫斯為勝始乎仙苑迄彼金河所詮半字之文是謂聲聞之藏洎乎百川同會三車共適齊登妙覺俱證泥洹豈有小大之異名信為我尊之漸誘者也始自漢明丁卯之歲終我開元庚辰之年小乘三藏見行者總三百三十七部一千八百九卷一百七十帙為聲聞法藏科條別顯具如後列聲聞契經藏二百四十部六百一十八卷聲聞調伏藏六十一部四百九十三卷四十五帙聲聞對法藏三十六部六百九十八卷七十二帙小乘經重單合譯一百五十三部三百九十四卷三十一帙四阿笈摩經小乘契經之本故標初首後列餘經長阿含經二十二卷二帙姚秦罽賓三藏佛陀耶舍共竺佛念譯單重合譯右此部經凡有四分總三十經僧肇序云長含四分四誦合三十經以為一部中阿含經六十卷或五十八卷六帙東晉罽賓三藏瞿曇僧伽提婆譯第二譯兩譯一闕右此部經凡有五誦都十八品總二百二十二經別僧肇長含序云中含四分五誦增一阿含經五十一卷或五十卷或四十卷或三十二卷五帙東晉罽賓三藏瞿曇僧伽提婆譯第二譯兩譯一闕右此部經凡有五十品總四百七十二經別僧肇長含序云謂增一阿含四分八誦雜阿含經五十卷五帙宋天竺三藏求那跋陀羅譯單重合譯右此部經說事既雜故無品次誦等差別僧肇長含序云雜含四分十誦別譯雜阿含經二十卷二帙失譯經中子注有秦言字雖不的知譯人姓名必是三秦代譯今附秦録右此部與前經文雖先後不次子細尋究不出前經此但撮要故為別部佛般泥洹下諸經並是四含中別經異譯佛般泥洹經二卷或直云泥洹經西晉河內沙門白法祖譯大般涅槃經三卷或二卷東晉平陽沙門釋法顯譯今為法顯譯如總録中述般泥洹經二卷或無般字新為失譯附東晉録右三經出長阿含經第二至第四卷與初分遊行經同本異譯其般泥洹經群録皆云宋代求那跋陀羅譯者非也尋其文句多是古譯與功德賢所翻全不相類諸藏之中但有上卷無其下卷今為失源編在晉録或有經本其佛般泥洹經上卷與般泥洹經上卷文句全同者本錯也人本欲生經一卷後漢安息三藏安世高譯右出長阿含經第十卷與第二分大方便經同本異譯此人本欲生經上代群録皆編在大乘經中者誤也尸迦羅越六向拜經一卷或云尸迦羅越六方禮經後漢安息三藏安世高譯右出長阿含經第十一卷與第二分善生經同本異譯比於本經此稍略耳中阿含三十三卷中亦有此經梵志阿颰經一卷一本有佛門解字一名阿颰摩納經吳月氏優婆塞支謙譯右出長阿含經第十三卷與第三分阿摩晝經同本異譯梵網六十二見經一卷一名梵網經吳月支優婆塞支謙譯右出長阿含經第十四卷與第三分梵動經同本異譯寂志果經一卷東晉西域沙門竺曇無蘭譯右出長阿含經第十七卷與第三分沙門果經同本異譯上八經十二卷同帙起世經十卷一帙隋天竺三藏闍那崛多等譯出經題上第五譯起世因本經十卷恐濫前本題下別云起世因本經一帙隋天竺三藏達摩笈多譯出內典録第六譯拾遺編入謹按唐內典録及靖邁經圖並云笈多三藏大業年中於東都上林園翻經館譯起世經十卷今撿尋諸藏乃有兩本大意雖同文句稍異至於品目時有差殊前經初云婆伽婆在舍婆提城後經乃云婆伽婆在舍羅婆悉帝城若據梵言後經為正今謂崛多笈多各翻一本又前經初首題云崛多笈多二師同出今以前為崛多所譯後是笈多再翻二經文既有殊今故雙存二部故緣生經亦云婆伽婆在舍羅婆悉帝城故知同是笈多譯也恐二本相濫題下別云起世因本焉樓炭經六卷或云大樓炭經或五卷或八卷西晉沙門釋法立共法炬譯第二譯右三經出長阿含經第十八至二十卷與第四分記世經同本異譯長阿含十報法經二卷一名多僧道經或直云十報經後漢安息三藏安世高譯右出長阿含經第九卷與第二分十上經同本異譯廣略少異中本起經二卷或云太子中起經初題云出長阿含後漢西域沙門曇果共康孟詳譯上二經十卷同帙其中本起經題云出長阿含撿尋大本無此一經或恐梵文譯之未盡既云出彼且編於末大周録云與過去現在因果修行本起瑞應本起經等同本異譯者誤也又此中本起經群録咸云後漢代譯其經本中有翻梵語處乃曰晉未詳何以從佛般泥洹下一十三經並出長阿含中別經異譯七知經一卷或云七智經吳月支優婆塞支謙譯右出中阿含經第一卷與初善法經同本異譯鹹水喻經一卷或云鹹水譬喻僧祐録云安公失譯經今附西晉録右出中阿含經第一卷與水喻經同本異譯一切流攝守因經一卷後漢安息三藏安世高譯右出中阿含經第二卷與漏盡經同本異譯四諦經一卷後漢安息三藏安世高譯右出中阿含經第七卷與分別聖諦經同本異譯恆水經一卷亦云恆河喻經西晉沙門釋法炬譯右出中阿含經第九卷與瞻波經同本異譯本相倚致經一卷亦云大相倚致後漢安息三藏安世高譯緣本致經一卷失譯今附東晉録右二經同本異譯出中阿含經第十卷與本際經同本頂生王故事經一卷或直云頂生王經西晉沙門釋法炬譯文陀竭王經一卷北涼天竺三藏曇無讖譯拾遺編入右二經同本異譯出中阿含經第十一卷與四洲經同本閻羅王五天使者經一卷或一名鐵城泥黎經宋沙門釋慧簡譯鐵城泥黎經一卷東晉西域沙門竺曇無蘭譯拾遺編入右二經同本異譯出中阿含經第十二卷與天使經同本比於本經此稍略耳古來世時經一卷失譯今附東晉録右出中阿含經第十三卷與說本經同本異譯比於本經此文稍略阿那律八念經一卷一名禪行斂意經或直云八念經後漢西域三藏支曜譯右出中阿含經第十八卷與八念經同本異譯離睡經一卷西晉三藏竺法護譯拾遺編入右出中阿含經第二十卷與長老上尊睡眠經同本異譯是法非法經一卷後漢安息三藏安世高譯右出中阿含經第二十一卷與真人經同本異譯求欲經一卷西晉沙門釋法炬譯右出中阿含經第二十二卷與穢經同本異譯受歲經一卷西晉三藏竺法護譯拾遺編入右出中阿含經第二十三卷初與比丘請經同本異譯梵志計水淨經一卷失譯今附東晉録拾遺編入右出中阿含經第二十三卷與水淨梵志經同本異譯苦陰經一卷失譯在後漢録拾遺編入右出中阿含經第二十五卷與前苦陰經同本異譯釋摩男本經一卷一名五陰因事經吳月支優婆塞支謙譯苦陰因事經一卷西晉沙門釋法炬譯拾遺編入右二經同本異譯出中阿含經第二十五卷與後苦陰經同本樂想經一卷西晉三藏竺法護譯拾遺編入右出中阿含經第二十六卷與想經同本異譯漏分布經一卷後漢安息三藏安世高譯右出中阿含經第二十七卷與達梵行經同本異譯阿耨風經一卷晉言依次東晉西域沙門竺曇無蘭譯拾遺編入右出中阿含經第二十七卷與阿奴波經同本異譯諸法本經一卷吳月支優婆塞支謙譯右出中阿含經第二十八卷初與諸法本經同本異譯瞿曇彌記果經一卷宋沙門釋慧簡譯右出中阿含經第二十八卷與瞿曇彌經同本異譯瞻婆比丘經一卷或云瞻波西晉沙門釋法炬譯拾遺編入右出中阿含經第二十九卷與瞻波經同本異譯伏淫經一卷西晉沙門釋法炬譯拾遺編入右出中阿含經第三十卷與行欲經同本異譯魔嬈亂經一卷一名弊魔試目連經一名魔王目連爛腹經失譯在後漢録弊魔試目連經一卷一名魔嬈亂經吳月支優婆塞支謙譯拾遺編入右二經同本異譯出中阿含經第三十卷與降魔經同本上三十經三十卷同帙賴吒和羅經一卷一名羅漢賴吒和羅經吳月支優婆塞支謙譯右出中阿含經第三十一卷與賴吒惒羅經同本異譯善生子經一卷西晉沙門支法度譯拾遺編入右出中阿含經第三十三卷與善生經同本異譯數經一卷西晉沙門釋法炬譯拾遺編入右出中阿含經第三十五卷與算數目揵連經同本異譯梵志頞波羅延問種尊經一卷東晉西域沙門竺曇無蘭譯拾遺編入右出中阿含經第三十七卷與阿攝和羅經同本異譯三歸五戒慈心厭離功德經一卷失譯今附東晉録拾遺編入須達經一卷一名須達長者經蕭齊天竺三藏求那毗地譯右二經同本異譯出中阿含經第三十九卷與須達哆經同本其慈心厭功德經文句稍同或有題云出增一阿含第十二者非也佛為黃竹園老婆羅門說學經一卷僧祐録中失譯經今附宋録拾遺編入右出中阿含經第四十卷與黃蘆園經同本異譯梵摩喻經一卷吳月支優婆塞支謙譯右出中阿含經第四十一卷與梵摩經同本異譯比於本經此稍略耳尊上經一卷西晉三藏竺法護譯拾遺編入右出中阿含經第四十三卷與釋中禪室尊經同本異譯鸚鵡經一卷亦名兜調經宋天竺三藏求那跋陀羅譯兜調經一卷僧祐録云安公失譯今附西晉録拾遺編入右二經同本異譯出中阿含經第四十四卷與鸚鵡經同本意經一卷西晉三藏竺法護譯拾遺編入右出中阿含經第四十五卷與心經同本異譯應法經一卷西晉三藏竺法護譯拾遺編入右出中阿含經第四十五卷與後受法經同本異譯泥犁經一卷或云中阿含泥犁經東晉西域沙門竺曇無蘭譯右出中阿含經第五十三卷與癡慧地經同本異譯優婆夷墮舍迦經一卷僧祐録中失譯經今附宋録齊經一卷一名持齊吳月支優婆塞支謙譯拾遺編入右二經同本異譯出中阿含經第五十五卷與持齊經同本鞞摩肅經一卷宋天竺三藏求那跋陀羅譯拾遺編入右出中阿含經第五十七卷與鞞摩那修經同本異譯婆羅門子命終愛念不離經一卷後漢安息三藏安世高譯拾遺編入右出中阿含經第六十卷與愛生經同本異譯十支居士八城人經一卷亦直云支後漢安息三藏安世高譯右出中阿含經第六十卷與八城經同本異譯邪見經一卷僧祐録中失譯經拾遺編入今附宋録右出中阿含經第六十卷與見經同本異譯箭喻經一卷失譯拾遺編入今附晉録右出中阿含經第六十卷與箭喻經同本異譯普法義經一卷一名具法行經亦名普義經後漢安息三藏安世高譯第一譯廣義法門經一卷陳天竺三藏真諦譯第三譯一闕右二經同本異譯其廣義法門經初題云是中阿含一品別譯今檢中阿含大本無此一經或恐梵文譯之未盡既云出彼且編於末其大周藏録中編為大乘單本者誤又普法此一經或恐梵文譯之未盡既云出彼且編於末其大周入藏録中編為大乘單本者誤也又普法義經作舍日具法行經作舍利弗但此二字別餘文並無異也從七知經下五十三經並出中阿含中別經異譯誡德香經一卷或云戒德經東晉西域沙門竺曇無蘭譯右出增一阿含經第十三卷地主品異譯四人出現世間經一卷宋天竺三藏求那跋陀譯拾遺編入右出增一阿含經第十八卷四意斷品異譯波斯匿王太后崩塵土坌身經一卷西晉沙門釋法炬譯右出增一阿含經第十八卷四意斷品異譯須摩提女經一卷吳月氏優婆塞支謙譯拾遺編入右出增一阿含經第二十卷須陀品異譯比於本經此文稍略婆羅門避死經一卷後漢安息三藏安世高譯右出增一阿含經第二十三卷增上品異譯施食獲五福報經一卷一名施色力經一名福德經失譯今附東晉録右出增一阿含經第二十四