body:
  text: 西京西明寺沙門圓照撰別録中有譯無本録第二之一有譯無本者謂三藏教文及聖賢集傳名存本闕之類也自聖教東移殆乎千祀質文亟改鐘鼎屢遷重以周武陵夷緇徒喪滅致使法燈藏耀慧日韜光三藏要文多從散缺或東都近譯未達西京或創出本稀尋求匪獲詎聞精奧空閲名題引領既勞撫膺奚及今者討求諸録備載遺亡冀望多賢共垂詢訪合大小乘經律論及聖賢集傳闕本者總一千五十五部二千三十卷大乘經闕本二十二部二十五卷大乘論闕本二十部四十八卷小乘經闕本六百五部八百一十五卷小乘律闕本四十四部九十二卷小乘論闕本九部六十五卷賢聖集傳闕本四十七部一百八十四卷大乘經重譯闕本二百部四百八十四卷吳品經五卷即是小品般若天竺三藏康僧會譯第三譯新道行經十卷亦名小品或七卷祐録名更出小品西晉三藏竺法護譯第四譯右按長房等録竺法護譯中更有小品經七卷者不然護公既有新道行經不合別録中有大智度無極經四卷亦云護公所出既與道行同本更亦不合別翻既並繁重故不存也大智度經四卷東晉西域三藏祇多蜜譯右三經與大般若第四會同本前後八譯五本在藏三本闕長房等録羅什經數復有放光般若二十二卷者不然什公既譯大品不合重出放光有者誤也濡首菩薩無上清淨分衛經二卷一名決了諸法如幻三昧經後漢臨淮沙門嚴佛調譯第一譯右一經與大般若第八會同本前後三譯兩本在藏一本闕仁王般若經一卷或二卷三十一紙西晉三藏竺法護譯第一譯仁王般若經一卷梁天竺三藏真諦譯右前後三譯一本在藏二本闕般若波羅蜜多那經一卷大唐天后代天竺三藏菩提流志譯新編入録右與大明呪經等同本前後三譯兩本在藏一本闕道行經一卷安公云是般若抄外國高明者所撰安為之製序後漢天竺沙門竺佛朔譯右一經雖名道行卷部全小不可與前道行等以為同本且別記之摩訶般若波羅蜜呪經一卷或無摩訶字吳月支優婆塞支謙譯摩訶般若隨心經一卷大唐天后代于闐三藏實叉難陀譯新編入録右吳品經下十部二十七卷般若部中闕本無量壽經二卷後漢安息三藏安世高譯第一譯無量清淨平等覺經二卷曹魏西域三藏帛延譯第五譯右長房等録帛延譯中更有平等覺經一卷即是前經無繁重載無量壽經二卷亦云無量清淨平等覺經西晉三藏竺法護譯第六譯無量壽至真等正覺經一卷一名樂佛土經一名極樂土經東晉外國沙門竺法力譯第七譯新無量壽經二卷亦云宋永初二年出東晉天竺三藏佛陀跋陀羅譯第八譯新無量壽經二卷宋涼州沙門釋寶雲譯第九譯新無量壽經二卷宋罽賓三藏曇摩蜜多譯出真寂寺録第十譯右七經與大寶積第五無量壽會同本此經十一譯四本在藏七本闕阿閦佛剎諸菩薩學成品經二卷東晉沙門支道根譯第三譯右一經與第六不動如來會同本前後三譯二存一闕法界體性無分別經二卷姚秦三藏鳩摩羅什譯出法上録第一譯右一經與第八法界體性會同本前後兩譯一存一闕普門品經一卷東晉西域三藏祇多蜜譯第二譯右一經與第十文殊普門會同本前後三譯兩在一闕嚴淨佛土經二卷亦云淨土經西晉河內沙門白法祖譯第二譯右一經與第十五文殊授記會同本前後三譯二存一闕菩薩藏經三卷西晉三藏竺法護譯第一譯右一經與第十七富樓會同本前後兩譯一存一闕法鏡經二卷或一卷吳月支優婆塞支謙譯第二譯右長房等録支謙所譯更有郁伽長者經二卷即法鏡經是不繁重載郁伽羅越問菩薩經一卷西晉河內沙門白法祖譯第五譯郁伽長者所問經一卷宋罽賓三藏曇摩蜜多譯第六譯右三經與第十九郁伽長者會同本前後六譯三存三闕妙慧童女所問經一卷大唐天后代天竺三藏菩提流志譯新編入録第三譯右一經與第三十妙慧童女會同本前後四譯存三闕一阿闍世王女阿術達菩薩經一卷吳月支優婆塞支謙譯第一譯阿術達經一卷東晉西域三藏祇多蜜譯第三譯阿術達菩薩經一卷宋天竺三藏竺法眷譯第四譯右三經與第三十二無畏德菩薩會同本前後五譯二存三闕又長房等録竺法護更有阿闍世王女無憂施經一卷此乃楚晉音異不合重出阿術達是梵言無憂施是晉語二經雙載録家誤也如幻三昧經二卷或一卷後漢安息三藏安世高譯第一譯如幻三昧經二卷東晉西域三藏祇多蜜譯第三譯如幻三昧經二卷前涼月支優婆塞支施崙譯出首楞嚴後記第四譯新編入藏聖善住意天子所問經四卷隋天竺三藏闍那崛多譯第六譯右四經與第三十六善住意天子會同本前後七譯三存四闕慧上菩薩問大善權經二卷或無菩薩字或一卷後漢臨淮沙門嚴佛調譯第一譯大善權經二卷姚秦三藏鳩摩羅什譯第四譯慧上菩薩問大善權經二卷一名慧上菩薩一直名大善權一名大乘方便北涼西域三藏伽陀譯第五譯右三經與第三十八大乘方便會同本前後五譯二存三闕彌勒所問大願經一卷東晉西域三藏祇多蜜譯第二譯右一經與第四十二彌勒所問會同本前後三譯二存一闕菩薩淨行經二卷亦云淨律經吳天竺三藏康僧會譯別品初譯右一經與第四十七寶髻菩薩會同本此是大集寶髻品除其本經前後兩譯一存一闕勝鬘經一卷亦云勝鬘師子吼一乘大方便經北涼天竺三藏曇無讖譯第一譯右一經與第四十八勝鬘夫人會同本前後三譯一闕寶積經三卷周宇文代三藏禪師闍那耶舍譯右一經雖云寶積既無本可挍不知與何會同本且記於末從無量壽經下三十部五十四卷寶積部中闕本大方等大集經二十七卷後漢月支三藏支婁迦讖譯第一譯大方等大集經三十卷或有新字或二十四卷姚秦三藏鳩摩羅什譯第二譯右二經同本前後三譯一本在藏兩本闕虛空藏菩薩經一卷宋天竺三藏求那跋陀羅譯第二譯右一經前後四譯三存一闕般舟三昧經二卷或加大字或一卷後漢天竺三藏竺佛朔譯第二譯般舟三昧經一卷是後十品重翻祐録有一卷三卷者後漢月支三藏支婁迦讖譯出靜泰録第三譯般舟三昧念佛章經一卷是行品別翻後漢代失譯第四譯般舟三昧經二卷安公録云更出般舟三昧經西晉三藏竺法護譯第六譯右四經同本前後七譯三存四闕四是全本三是抄譯阿差末菩薩經四卷吳天竺沙門維祇難譯第一譯阿差末菩薩經四卷吳月支優婆塞支謙譯第二譯無盡意經十卷宋天竺三藏竺法護譯第五譯右三經同本前後五譯二本藏存三本闕又長房等録竺法護譯更有無盡意經四卷據其法護已出阿差末經不合再出無盡意其阿差末經題云晉曰無盡意録中腳注云或四卷此是梵晉名異理實一經録存二本誤之甚也小阿差末經二卷吳月支優婆塞支謙譯右一經既加小字與前諸經應非同本方等主虛空藏經八卷亦云虛空藏所問或五卷乞伏秦沙門釋聖堅譯右一經是大集虛空藏品異譯藏中縱有乃是別生虛空藏品無讖所翻非異譯者或即此經是無讖譯非聖堅出定意天子所問經五卷出大集今疑為善住意經同本周宇文代三藏禪師闍那耶舍譯從大集經下一十三部九十七卷大集部中闕本入如來智不思議經三卷周宇文代三藏禪師闍那耶舍譯出翻經圖第二譯右一經前後四譯三存一闕菩薩十地經一卷亦云大方廣經亦直云十地經西晉三藏竺法護譯第一譯大方廣菩薩十地經一卷西晉清信士聶道真譯第二譯十地經一卷東晉西域三藏祇多蜜譯第三譯右三經同本前後五譯二存三闕大方廣不生不滅經一卷大唐天后代于闐三藏實叉難陀譯新編入録單本大方廣如來難思議境界經一卷大唐天后代于闐三藏實叉難陀譯編入録單本佛藏大方等經一卷亦名問明顯經宋沙門釋道嚴譯右一經隋代沙門法經録云花嚴經明難品異譯今闕此經舊經在第六卷新經在第十三菩薩本業經一卷是華嚴淨行品亦直云本業經東晉天竺三藏佛陀跋陀羅譯第二譯右兼本品前後五譯四本在藏一本闕其舊花嚴經既覺賢所譯不合別出此本業經以大周録入藏中有未見其本且此述之又長房録中支謙再出淨行品者誤也其淨行經腳注云一名菩薩本業經菩薩十法住經是十住品西晉清信士聶道真譯第二譯右兼本品前後五譯四本在藏一本闕長房等録更有菩薩十住經一卷云是東晉佛陀跋多羅譯詳其覺賢既譯大本不合別出此經房録誤也十住經十二卷是十地品西晉清信士聶道真譯第三譯右兼本品前後五譯四本在藏一本闕羅摩伽經三卷是入法界品少分曹魏西域三藏安賢譯第一譯羅摩伽經一卷北涼天竺三藏曇無讖譯第四譯右兼本品前後五譯三本在藏二本闕從入如來智不思議經下一十二部十七卷花嚴部中闕梵般泥洹經二卷舊録云胡般今改為梵字或一卷後漢月支三藏支婁迦讖譯第一譯大般涅槃經二卷曹魏外國三藏安法賢略前品為三卷第一譯大般泥洹經二卷北涼雍州沙門智猛於涼州譯第六譯般泥洹經二十卷吳優婆塞支謙譯序品哀歎品為二卷第二譯右兼涅槃大本及新譯後分前後七譯三本在藏四本闕又大周録中指竺道祖録東晉義熙十二年佛陀跋陀羅於道場寺譯大般泥洹一卷或云十卷是大本前分十卷盡大衆問品今尋諸録及傳記等其法顯譯大般泥洹亦是義熙十三年於道場寺譯其法顯所出諸經竝與覺賢共譯諸録題注多相參涉時處既同必非再出今故為一更不別存從梵般泥洹經下四部二十六卷涅槃部中闕本蜀普曜經八卷失譯似是蜀土所譯第一譯在魏吳録普曜經八卷或六卷或四卷宋沙門智嚴共寶雲譯第三譯右二經與方廣莊嚴經同本前後四譯二存二闕無量義經一卷宋天竺三藏求那跋陀羅譯第一譯右一經前後兩譯一存一闕法華三昧經六卷一本加正字吳外國三藏支疆良接譯出翻經圖第一譯薩藝芬陀利經六卷西晉三藏竺法護太始年譯第二譯謹按長房等録其正法華是竺法護大康七年譯見聶道真録復云太始元年譯薩藝芬陀利經六卷出竺道祖録同是一經不合再出名目既殊本復存後未詳所以或可薩藝芬陀利是梵語正法花是晉名梵晉俱存録家誤也方等法華經五卷東晉沙門支道恨譯第四譯右三經同本兼及添品前後六譯三存三闕佛以三車喚經一卷吳月支優婆塞支謙譯右一經出法華經中異譯應是譬品古維摩詰經二卷後漢臨淮沙門嚴佛調譯第一譯異毗摩羅詰經三卷祐云異維摩詰經或作思字或二卷西晉西域優婆塞竺叔蘭譯第三譯維摩詰所說法門經一卷或云維摩詰經西晉三藏竺法護譯第四譯謹按僧祐録中更有維摩詰經一卷亦云竺法護譯下注云祐意謂先出維摩繁重護刪出逸偈也今意與前無異故不別存又周録中更有毗摩羅詰經二卷亦云吳黃武年支謙譯出長房録撿長房録無此經名周録誤也維摩詰經四卷東晉西域三藏祇多蜜譯第五譯右四經同本前後七譯三存四闕其西晉沙門支敏度合一支兩竺三本共為五卷者以非別翻又闕其本故不存之大方等頂王經一卷姚秦三藏鳩摩羅什譯第二譯右一經前後四譯三存一闕間居經十卷西晉三藏竺法護譯第一譯悲華經十卷北涼沙門釋道龔譯第三譯右二經同本前後四譯二存二闕佛升忉利天為母說法經一卷宋罽賓三藏曇摩蜜多譯第三譯右一經前後三譯二存一闕大乘寶雲經八卷陳扶南國沙門須菩提譯第二譯右一經前後三譯二存一闕等集三昧經一卷西