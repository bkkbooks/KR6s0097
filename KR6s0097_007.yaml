body:
  text: 西京西明寺沙門圓照撰總集群經録上之七宋劉氏都建業自初帝永初元年庚申至順帝升明三年己未凡八主六十年緇素共有二十二人所出經論等并新集失譯諸經總四百六十五部七百一十七卷於中九十三部二百四十三卷見在三百七十三部四百七十四卷闕本宋沙門佛陀什三部三十二卷律戒羯磨沙門疆良耶舍二部二卷經沙門曇摩蜜多一十二部一十七卷沙門釋智嚴一十部三十一卷經沙門釋寶雲四部一十七卷經沙門伊業波羅一部一十三卷論沙門求那跋摩一十部一十八卷律集沙門僧伽跋摩五部二十四卷律論集沙門求那跋陀羅五十二部一百三十四卷經論集沙門釋曇無竭一部一卷經居士沮渠京聲二十八部二十八卷經律沙門釋慧簡一十部一十卷經集沙門功德直二部七卷經沙門釋僧璩一部一卷羯磨沙門釋法頴一部一卷尼戒沙門竺法眷六部二十九卷經沙門釋翔公一部二卷經沙門釋道嚴二部三卷經律沙門釋勇公三部三卷經沙門釋法海二部二卷經律沙門釋先公一部一卷經沙門僧伽跋彌一部一卷律抄新集失譯諸經三百七部三百四十卷五分律三十卷亦云彌沙塞律戒三十四卷別録云二十四卷恐誤見道慧宋齊録及僧祐録五分比丘戒本一卷亦云彌沙塞戒本見竺道祖録及僧祐録彌沙塞羯磨一卷見竺道祖録及僧祐録右三部三十二卷律戒見在羯磨本闕沙門佛陀什宋言覺壽罽賓國人少受業於彌沙塞部專精律品兼達禪要以廢帝義符景平元年癸亥七月屆於楊都先沙門法顯於師子國得彌沙塞律梵本末及翻譯而顯遷化建業諸僧聞什既善此學於是請令出焉即以其年冬十一月集龍光寺譯稱為五分律付執梵文于填沙門智勝傳語龍光沙門竺道生東安沙門釋慧嚴共執筆參正宋侍中琅瑘王練為檀越至來年十二月方訖仍出戒心及羯磨文等並行於世後不知所終觀無量壽佛經一卷亦云無量壽觀經初出見道慧録及高僧傳觀藥王藥上二菩薩經一卷第二出見宋齊録及高僧傳右二部二卷其本見在沙門疆良耶舍宋云時稱西域人性剛直寡嗜欲善誦阿毗曇博涉律部其餘諸經多所該綜雖三藏兼明而以禪門專業每一遊觀或七日不起常以三昧正受傳化諸國以元嘉元年甲子遠冒沙河萃于建業文帝義隆深加歎異敕止鍾山道林精舍沙門寶志崇其禪法沙門僧含請譯觀無量壽及藥王藥上觀含即筆受以此二經是淨土之洪因轉鄣之祕術故沈吟嗟味流通宋國平昌孟顗承風欽敬資給豐厚顗出守會稽固請不去後移憩江陵元嘉十九年西遊岷蜀處處弘道禪學成群後還卒於江陵春秋六十矣虛空藏菩薩神呪經一卷第三出與姚秦耶舍虛空藏及隋崛多虛空孕經等同本見李廓魏世録觀虛空藏菩薩經一卷亦名虛空藏觀經亦直云虛空藏菩薩經見道惠宋齊録及僧祐録象腋經一卷第四出與無所希望經等同本見李廓録諸法勇王經一卷第二出與一切法高王經等同本見李廓録轉女身經一卷第四出與無垢賢女經等同本見李廓録觀普賢菩薩行法經一卷下注云出深功德經中或無行法字亦云普賢觀經第三出見僧祐録五門禪經要用法一卷第二出與安高出者同本見僧祐録及寶唱録新無量壽經二卷第十出與世高無量壽經及寶積無量壽會等同本見真寂寺録郁伽長者所問經一卷第六出與安法鏡經及寶積郁伽長者會等同本見李廓録佛升忉利天為母説法經一卷第三出與法護佛升忉利天經等同本見李廓録觀無量壽佛經一卷第二出與疆良耶舍出者同本見寶唱録禪祕要經五卷或無經字一名禪法要元嘉十八年於祇洹寺或三卷見僧祐録第三出有今禪祕要經五卷文極交錯不可流行如刪繁録中述右一十二部一十七卷五門禪經上七部七卷見在無量壽經下五部十卷闕本沙門曇摩蜜多宋言法秀罽賓人也年六七歲神明澄正每見法事輒自然欣躍其親愛而異之遂令出家罽賓多出聖達屢值明師博好群經持深禪法所得之要極其微奧為人沈邃有慧解儀軌詳整生而連眉故世稱連眉禪師焉少好遊方誓志宣化周歷諸國遂適龜茲未至一日王夢神告曰有大福德人明當入國汝應供養明旦即敕外司若有異人入境必馳聞奏俄而蜜多果至王自出郊迎延請入宮遂從稟戒盡四事之供蜜多安而能遷不滯利養居數年蜜有去志神又降夢曰福德人捨王去矣王惕然驚覺既而君臣固留莫之能止遂度流沙進到燉煌於曠野之地建立精舍植㮈千株開園百畝房閣池林極為嚴淨頃之復適涼州仍於公府舊寺更營堂宇學徒濟濟禪業甚盛常以江左多民志欲傳法以元嘉元年展轉至蜀俄而出峽停止荊州於長沙寺造立禪館翹誠懇惻祈請舍利旬有餘日遂感一枚衝器出聲放光滿室門徒道俗莫不更增勇猛人百其心居頃之沿流東下至于建業初止中興寺晚憩祇洹其道聲素著傾都禮謁自宋文袁皇后及王子公主莫不設齋桂宮請戒椒掖參候之使旬日相屬蜜從元嘉元年甲子至十八年辛巳譯虛空藏神呪等經一十二部常以禪道教授學徒凡所歸投不遠千里四輩遠近皆號大禪師焉會稽太守孟顗深信真諦以三寶為己任素好禪味敬心殷重及臨浙河請與同遊乃以鄮縣之山建立塔寺東境舊俗多趣巫祝及妙化所移比屋歸正自西徂東無思不服後還建業憩定林下寺禪師天性凝靜雅愛山水以為鐘山鎮嶽將美嵩華常嘆下寺基搆未窮形勝於是乘高相地揆卜山勢斬石刊木營建上寺殿房禪室肅然深遠實依俙鷲巖髣佛祇樹矣於是息心之衆萬里來集諷誦肅雍望風成化爰自西域至于南土凡所遊履靡不興造檀會敷陳教法初禪師之發罽賓也有迦毗羅神衛送遂至龜茲於中路欲返乃現形告辭禪師曰汝神力通變自在遊處將不相隨共往南方語畢即收影不見遂遠從至于楊都故仍於上寺圖像著壁迄至于今猶有聲影之驗潔誠祈福莫不享願以元嘉十九年七月六日卒于上寺春秋八十有七道俗四部行哭相趨仍葬于鍾山宋熙寺前無盡意菩薩經六卷初題云大集經中無盡意所説不可盡義品第三十二亦直云無盡意經亦名阿差末經第四出與法護阿差末等同本見李廓録法華三昧經一卷法華支派見長房録廣博嚴淨不退轉輪經四卷第三出或六卷或直云廣博嚴淨經亦直云不退轉法輪經與法護阿惟越致遮經等本元嘉四年出見宋齊録及僧祐録四天王經一卷見僧祐録及高僧傳普曜經八卷第三出或六卷或四卷與蜀普曜竺法護普曜及唐録方廣等並同本見宋齊録及僧祐録高僧傳等淨度三昧經一卷初出見長房録菩薩瓔珞本業經二卷第二出見房録生經五卷第二出與法護出者同本房云見別録善德優婆塞經一卷見長房録阿那含經二卷見長房録右一十部三十一卷四天王經上四部一十二卷見在普曜經下六部一十九卷闕本沙門釋智嚴西涼州人弱冠出家便以精勤著稱納衣宴坐蔬食永年每欲博事名師廣求經論遂周流西國進到罽賓入摩天陀羅精舍從佛馱先比丘咨受禪法漸染三年功踰十載佛馱先見其禪思有緒持深器異彼諸道俗聞而嘆曰秦地乃有求道沙門矣始不輕秦類敬接遠人時有佛陀跋陀羅比丘亦是彼國禪匠嚴乃要請東歸欲傳法中土跋陀嘉其懇至遂共東行踰越歲時達于關內恆相依附共止長安頃之跋陀橫為秦僧所擯嚴與西來徒衆並分散出關仍憩山東精舍坐禪誦經力精修學晉義熙十三年宋武西代姚泓剋捷旋旆塗出山東時始興公王恢從駕遊觀山川至嚴精舍見其同志三僧各坐繩床禪思湛然恢乃彈指三人開目俄而還閉不與交言恢心敬其奇訪諸耆老皆云隱居積歲未嘗輕出恢即啓宋武延請還都莫肯行者屢請既至三人推嚴隨行恢道懷素舊禮事甚備還都即住始興寺嚴性虛靜志避囂塵恢乃於東郊之際更起精舍即枳園寺也嚴前還於西域所得梵本衆經未及譯寫到元嘉四年丁卯乃共沙門寶雲譯出無盡意等經十部嚴在寺不受別請分衛自資道化所被幽顯咸服嚴清素寡欲隨受隨施少而遊方無所滯著稟性沖邈不自陳敘故雖多美行世無得而盡傳嚴昔未出家時嘗受五戒有所虧犯後入道受具足常疑不得戒每以為懼積年禪觀而不能自了遂更泛海重到天竺咨諸明達值羅漢比丘具以事問羅漢不敢判決乃為嚴入定往兜率宮咨啓彌勒彌勒答云得戒嚴大喜躍於是步歸行至罽賓無疾而卒時年七十八彼國凡聖燒身各處嚴雖戒操高明而實行未辦始移尸向凡僧墓地而尸重不起改向聖墓則飄然自輕嚴弟子智羽智遠故從西來報此徵瑞俱還外國以此推嚴信是得道人也但未知果向中間若深淺耳調伏衆生業經出大集經一音顯正法經或云一音演正法出悲華經善德婆羅門問提婆達多經出大雲經毗羅三昧經二卷祐等諸録皆注為疑大周録中刊之為正今尋文言淺鄙義理疏遺故入疑科用除稗穢調伏衆生等四部五卷長房等録皆云嚴譯今以前三別生後一疑偽今為實録故並刪之佛本行經七卷或云佛本行讚傳於六合山寺出或云五卷見僧祐寶唱內典等録高傳云佛本行讚經新無量壽經二卷永初二年於道場寺出一録云於六合山寺出第九譯與寶積無量壽會等同本見道惠僧祐等録淨度三昧經二卷第二出見竺道祖雜録付法藏經六卷初出見李廓録右四部一十七卷前一部七卷見在後三部十卷闕本沙門釋寶雲涼州人也弱年出家精勤有學行志韻剛潔不偶於世故少以直方純業為名而求法懇惻忘身徇道誓欲躬覩靈迹廣尋經教以晉隆安之初遠適西域與法顯智嚴先後相隨涉履流沙登踰雪嶺勤苦艱至不以為難遂歷于填天竺諸國備覩靈異乃經羅剎之野聞天鼓之音釋迦影迹多所瞻禮雲在外域遍學梵書天竺諸國音字詁訓悉皆貫練後還長安隨禪師佛陀跋陀受業修學禪門孜孜不怠及禪師橫為秦僧所擯雲亦奔亡會廬山遠公解其擯事共歸楊都安止道場寺僧衆以雲志力堅猛弘道絶域莫不披襟咨問敬而愛焉初共智嚴同出諸經嚴既遷化雲獨宣譯以元嘉年中譯佛本行經等四部雲手執梵本口自宣譯華戎兼通音訓元正雲之所定衆咸信服初關中沙門竺佛念善於宣譯於符姚二代翻出衆經江左莫踰於雲故於晉宋之際弘通法藏沙門慧觀等咸友而善之雲性好幽居以保間寂遂適六合山寺山多荒民俗好草竊雲説法教誘多有改惡禮事供養十室而九頃之道場慧觀臨卒請雲還都總理寺任雲不得已而還居道場遂許復還六合以元嘉二十六年終於山寺春秋七十有四其遊履外國別有記傳雜阿毗曇心十三卷第三出見高僧傳及僧祐録或十四卷右一部一十三卷闕本沙門伊葉波羅宋云自在西域人妙通三藏明解四含以元嘉三年景寅遊於彭城為北徐州刺史太原王仲德譯雜阿毗曇心譯至擇品緣礙未竟遂輟但成十卷刺史親自筆受至八年辛未更請求那跋摩續譯都成十三卷菩薩善戒經九卷一名菩薩地或十卷於祇洹寺出見竺道祖僧祐二録及高僧傳長房等録並云善戒經二十卷又云弟子更出二品成二十卷並非也菩薩善戒經一卷優波離問菩薩戒法見寶唱録若唯祐記將此為初卷兼前九卷共成十卷然北地經本雜之已久不可合之且依舊定菩薩內戒經一卷見法上録優婆塞五戒儀經一卷見寶唱録沙彌威儀一卷或云沙彌威儀經見長房録四分比丘尼羯磨法一卷祐云曇無德羯磨亦云雜羯磨元嘉八年於祇洹寺出見僧祐寶唱二録及高僧傳等亦直云四分羯磨優婆塞五戒相經一卷一名優婆塞五戒略論元嘉八年於祇洹寺出第一譯見僧祐寶唱二録及高僧傳龍樹菩薩為禪陀迦王説法要偈一卷見唐舊録善信二十二戒一卷亦云離欲優婆夷具行二十二戒文亦云優婆塞戒祐云三歸及優婆塞三十二戒或云優婆塞戒見高僧傳及僧祐録經律分異記一卷見長房録右一十部一十八卷龍樹説法要偈上八部一十六卷見在善信二十二戒下二部二卷闕本沙門求那跋摩宋言功德鎧本剎利種纍世為王治在罽賓國祖父呵利跋陀此云師子賢以剛直徙從父僧伽阿難此云衆嘉因潛隱山澤跋摩年十四便機見俊達深有遠度仁愛泛博崇德務善其母嘗須野肉令跋摩辦之跋摩啓曰有命之類莫不貪生夭彼之命非仁人矣母怒曰設令得罪吾當代汝跋摩他日煮油誤澆其指因謂母曰代兒忍痛母曰痛在汝身吾何能代跋摩曰眼前之苦尚不能代況三塗耶母乃悔悟終身斷殺至年十八相士見而謂曰君年三十當撫臨大國南面稱尊若不樂世榮當獲聖果至年二十出家受戒洞明九部博曉四含誦經百餘萬言深達律品妙入禪要時號曰三藏法師至年三十罽賓王薨絶無紹嗣衆咸議曰跋摩帝室之胤又才明德重可請令還俗以紹國位群臣數百再三固請跋摩不納乃辭師違衆林栖谷飲孤行山野遁迹人世後到師子國觀風弘教識真之衆咸謂已得初果儀形感物見者發心後至闍婆國初未至一日闍婆王母夢見一道士飛舶入國明旦果是跋摩來至王母敬以聖禮從受五戒母因勸王曰宿世因緣得為母子我已受戒而汝不信恐後生之因永絶今果王迫以母敕即奉命受戒染習既久專精漸篤頃之鄰兵犯境王謂跋摩曰外賊恃力欲見侵侮若與鬪戰傷殺必多如其不拒危亡將至今唯歸命師尊不知何計跋摩曰暴寇相攻宜須禦捍但當起慈悲心勿興害念耳王自領兵擬之旗鼓始交賊便退散王遇流矢傷腳跋摩為呪水洗之信宿平復王恭信稍殷乃欲出家修道因告群臣曰吾欲躬栖法門卿等更擇明主群臣皆拜伏勸請曰王若捨國則子民無依且敵國凶強恃險相對如失恩覆則黔首奚處大王天慈寧不愍命王不忍固違乃就群臣請三願若許者當留治國一願凡所王境同奉和上二願盡所治內一切斷殺三願所有儲財賑給貧病群臣歡喜僉然敬諾於是一國皆從受戒王後為跋摩立精舍躬自引村傷王腳指跋摩又為呪治有頃平復道化之聲播於遐邇鄰國聞風皆遣使要請時楊都名德沙門慧觀慧聰等遠挹風猷思欲餐稟以元嘉元年九月面啓文帝求迎請跋摩帝即敕交州刺史令泛舶延致觀等又遣沙門法長道沖道俊等往彼祈請并致書於跋摩及闍婆王婆多伽等必希顧臨宋境流行道教跋摩以聖化宜廣不憚遊方先已隨商人竺難提舶欲向一小國會值便風遂至廣州故其遺文云業行風所吹遂之於宋境此之謂也文帝知跋摩已至南海於是復敕州郡令資發至都路由始興經停歲許始興有虎匝山山形聳峭峯嶺高絶跋摩謂其髣佛耆闍崛乃改名靈鷲於山寺之外別立禪室去寺數里磬音不聞每至鳴椎跋摩已至或致雨不沾或履泥不濕時衆道俗莫不肅然增敬寺有寶月殿跋摩於殿北壁手自畫作羅云像及定光儒童布髮之形像成之後每夕放光久之乃歇始興太守蔡茂之深加敬仰後茂之將死跋摩躬自往視説法安慰後家人夢見茂之在寺中與衆僧講法實由跋摩化導之力也此山本多虎災自跋摩居之晝行夜往或時值虎以杖按頭弄之而去於是山旅水賓去來無梗感德歸化者十有七八焉跋摩嘗於別室入禪纍日不出寺僧遣沙彌往候之見一白師子緣柱而立亘空彌漫生青蓮華沙彌驚恐大呼往逐師子豁無所見其靈異無方類多如此後文帝重敕觀等復更敦請乃泛舟下都以元嘉八年正月達于建業文帝引見勞問殷勤因又言曰弟子常欲持齋不殺迫以身徇物不獲從志法師既不遠萬里來化此國將何以教之跋摩曰夫道在心不在事法由己非由人且帝王與匹夫所修各異匹夫身賤名劣言令不威若不剋己苦躬將何為用帝王以四海為家萬民為子出一嘉言則士女咸悅布一善政則人神以和刑不夭命役無勞力則使風雨適時寒暖應節百穀滋繁桑麻鬱茂如此持齋齋亦大矣不殺亦衆矣寧在闕半日之餐全一禽之命然後方為弘濟耶帝乃撫几歎曰夫俗人迷於遠理沙門滯於近教迷遠理者至道虛説滯近教者則拘攣篇章至如跋摩法師所言真謂開悟明遠可與談於天人之際矣乃敕住祇洹寺供給隆厚公王英彥莫不宗奉俄而於寺開講法華及十地法席之日軒蓋盈衢觀矚往還肩隨踵接跋摩神府自然妙辨天絶或時假譯人而往復懸悟跋摩即於祇洹寺譯菩薩戒經等十部其善戒經長房等録並云二十卷注云後弟子於定林更出二品成三十卷者非也今但九卷或云十卷此是傳寫差誤加其二字僧祐録中只云十卷故知餘録傳寫誤也又按高僧傳云祇洹慧義請出菩薩善戒始得二十八品後弟子代出二品成三十品房等云續成三十卷者誤之甚也又長房等録復云跋摩譯雜阿毗曇心十三卷今以伊葉波羅譯出十卷跋摩後續成其十二非謂跋摩更別翻出二處俱載此亦不然今此刪之載於前録並文義詳允梵宋弗差時影福寺尼慧果淨音等共請跋摩云去六年有師子國八尼至都云宋地先未經有尼那得二衆受戒恐戒品不全跋摩云戒法本在大僧衆發設不本事無妨得戒如愛道之緣諸尼又恐年月不滿苦欲更受跋摩稱云善哉苟欲增明甚助隨喜但西國尼年臘未登又十人不滿且令學宋語別因西域居士更請外國尼來足滿十數其年夏在定林下寺安居時有信者採花布席唯跋摩所坐花采更鮮衆咸崇以聖禮夏竟還祇洹其年九月二十八日中食未畢先起還閣其弟子至奄然已終春秋六十有五未終之前預造遺文偈頌三十六行自説因緣云已證二果手自封緘付弟子阿沙羅云我終後可以此文還示天竺僧亦可示此境僧也既終之後即扶坐繩床顏貌不異似若入定道俗赴者千有餘人並聞香氣芬烈咸見一物狀若龍蛇可長一尺許起於尸側直上衝天莫能名者即於南林戒壇前依外國法闍毗之四部鱗集香薪成𧂐灌之香油以燒遺陰五色焰起氣氳麗空是時天景澄朗道俗哀嘆仍於其處起立白塔欲重受戒諸尼悲泣望斷不能自勝初跋摩至宋文帝欲從受菩薩戒未及咨稟奄而遷化以本意不遂傷恨彌深乃令衆僧譯出其遺文云遺文在傳恐繁故止毗尼摩得勒伽十卷初卷云薩婆多部毗尼摩得勒伽元嘉十二年乙亥正月於秣陵平樂寺出至九月二十日訖見道慧宋齊録及僧祐録雜阿毗曇心論十一卷或無論字亦云雜阿毗曇經房云雜阿毗曇毗波沙或十四卷第四譯元嘉十一年甲戌九月於長干寺出周年乃訖見僧祐録及經序勸發諸王要偈一卷龍樹菩薩撰第二出見僧祐録及高僧傳分別業報略集一卷大勇菩薩撰或云大勇菩薩分別業報略集見僧祐録及高僧傳請聖僧浴文一卷見僧祐録及高僧傳右五部二十四卷前四部二十三卷見在後一部一卷闕本沙門僧伽跋摩宋言衆鎧印度人也少而棄俗清峻有戒德明解律藏尤精雜心以元嘉十年癸酉步自流沙屆于建業風宇宏肅道俗敬異咸宗而事之號曰三藏法師初景平元年平陸令許桑捨宅建剎因名平陸寺後道場慧觀以跋摩道行純備請住此寺崇其供養以表其德跋摩共觀加塔三層行道諷誦日夜不輟僧衆歸集道化流布初三藏法師深明戒品將為影福寺尼慧果等重受具戒是時二衆未備而三藏遷化俄而師子國比丘尼鐵薩羅等至衆乃共請跋摩為師繼軌三藏祇洹慧義擅步揚都謂為矯異執志不同親與跋摩拒論翻覆跋摩摽宗顯法理證明允慧義遂回其剛褊靡然推服乃率其弟子服膺稟戒僧尼受者數百許人宋彭城王義康嵩其戒範廣設齋供四衆殷盛傾于都邑頃之名德大僧慧觀等以跋摩妙解雜心諷誦通達先三藏雖譯未及繕寫以十一年九月於長干寺招集學士更請出焉寶雲譯語觀自筆受研校精悉周年方就續出摩得勒伽等凡五部跋摩遊化為志不滯一方既傳經事畢將還本土衆咸祈請莫之能留以元嘉十九年隨西域賈人舶還外國莫詳其終勝鬘師子吼一乘大方便方廣經一卷第二出與寶積勝鬘夫人會等同本元嘉十三年八月十四日於丹陽郡出寶雲傳譯惠觀筆受兼製序見道惠僧祐李廓等録大方廣寶篋經三卷第四出或二卷與文殊現寶藏經等同本見李廓録相續解脫地波羅蜜了義經一卷或二卷亦名解了義經亦直云相續解脫經於東安寺出是解深密經後二品見道慧僧祐李廓法上等四録高僧傳云於荊州出楞伽阿跋多羅寶經四卷第二出元嘉二年於道場寺譯慧觀筆受與入楞伽及大乘入楞伽經等同本見道慧僧祐法上等録高僧傳云丹陽郡出菩薩行方便境界神通變化經三卷初出與大薩遮尼乾子經同本或無境界字見李廓録老母女六英經一卷亦云老母經第三出與老女人經等同本房云見別録申日兒本經一卷或云申兒本第三出與月光童子等同本房云見別録録云申兜本誤也阿難陀目佉尼呵離陀經一卷或云出無量門持經第六譯與無量門微密持經等同本房云見別録房録別載出無量門持經者誤也央崛魔羅經四卷道場寺出見道慧僧祐法上等録高僧傳云於荊州辛寺出大法鼓經二卷東安寺出見道慧僧祐李廓法上等四録大意經一卷房云見別録十二頭陀經一卷房云見別録樹提伽經一卷房云見別録雜阿含經五十卷於瓦官寺譯梵本法顯齎來高僧傳云祇洹寺出見道慧録及宋齊僧祐録鸚鵡經一卷亦名兜調經出中阿含第四十四異譯房云見別録鞞摩肅經一卷出中阿含第五十七異譯房云見別録四人出現世間經一卷出增一阿含第十八卷異譯房云見別録十一想思念如來經一卷或云十一思惟念如來經出增一阿含第四十八初譯長房云見別録阿遬達經一卷第三出與玉耶經等同本房云見別録過去現在因果經四卷於荊州辛寺出第六譯與修行本起瑞應本起等同本見始興及李廓僧祐等録摩訶迦葉度貧女經一卷房云見別録十二品生死經一卷房云見別録罪福報應經一卷一名輪轉五道罪福報應經亦云輪轉五道經亦云五道輪經房云見別録衆事分阿毗曇論十二卷或無論字共弟子菩提耶舍譯初出與唐譯品類足論同本房録不題所出四品覺法經一卷或無經字房云見別録賓頭盧突羅闍為優陀延王説經一卷亦云賓頭盧為王説法經房云見別録上見在已後闕虛空藏菩薩經一卷第二出與姚秦佛陀耶舍所出虛空藏經等同本房云見別録無量義經一卷初出與蕭齊曇摩伽陀耶舍出者同本見李廓録諸法無行經一卷第二出與羅什所出二卷者及諸法本無經同本房云見別録小無量壽經一卷或無小字第二出與羅什阿彌陀及唐譯稱讚淨土同本孝建年出一名阿彌陀見道慧僧祐二録高僧傳云於荊州出房録別在阿彌陀經者誤也八吉祥經一卷第三出與支謙八吉祥呪法護八陽神呪經等同本元嘉二十九年正月三日於荊州城內為司空荊州刺史南譙王劉義宣出六日訖見僧祐寶唱二録無崖際持法門經一卷第二出與聖堅出者及尊勝菩薩所問經同本房云見別録貧子須賴經一卷第四出與白延支謙等出者同本見李廓録現在佛名經三卷亦名華敷現在佛名第二出與稱揚諸佛功德經等同本元嘉二十九年正月二十七日於荊州為南譙王出見始興録及高僧傳淨度三昧經三卷第三出見李廓録無憂王經一卷於荊州辛寺譯見吳録及僧祐録本行六波羅蜜經一卷房云見別録異處七處三觀經一卷或無異處字出雜阿含異譯房云見別録雜藏經一卷第四出與鬼問目連經等同本房云見別録目連降龍王經一卷或無王字或云降龍經或云降龍王經第二出與龍王兄弟同本房云見別録曰難經一卷一云越難經第三出與聶承遠越難經等同本房云見別録釋六十二見經四卷房云見別録祐録云一卷請般特比丘經一卷或作般持亦云般持房云見別録十二頭陀經二卷房云見別録阿那律七念章經一卷房云見別録十報法三統略經一卷房云見別録六齋八戒經一卷房云見別録阿蘭若習禪經一卷第三出與羅什坐禪三昧經同本見李廓録菩薩訶欲經一卷第三出與羅什出者同本房云見別録那先經一卷第二出與二卷者同本房云見別録十二遊經一卷第三出房云見舊録第一義五相略集一卷於東安寺出見僧祐録高僧傳云於荊州辛寺出右五十二部一百三十四卷賓頭盧上二十六部一百卷見在虛空藏下二十六部三十四卷闕本沙門求那跋陀羅宋言功德賢中印度人也以大乘學故世號摩訶衍本婆羅門種幼學五明諸論天文書算醫方呪術靡不博慣後遇見雜心尋讀驚悟乃深崇佛法焉其家世外道禁絶沙門乃捨家潛遁遠求師匠即落髮改服專志學業及受具戒博通三藏為人慈和恭順事師盡勤頃之辭小乘師進學大乘大乘師試令探取經匣即得大品華嚴師喜而嘆曰汝於大乘有重緣矣於是讀誦講義莫能酬抗進受菩薩戒法乃奉書父母勸歸正法曰若專守外道則雖還無益若歸依三寶則長得相見其父感其至言遂棄邪從正跋陀前到師子諸國皆傳送資供既有緣東方乃隨舶泛海中塗風止淡水復竭舉舶憂惶跋陀曰可同心并力念十方佛稱觀世音何往不感乃密誦呪經懇到禮懺俄而信風暴至密雲降雨一舶蒙濟其誠感如此元嘉十二年乙亥至廣州時刺史車朗表聞文帝遣使迎接既至楊都敕名僧慧嚴慧觀於新亭郊勞其神情朗徹莫不虔敬雖因譯交言而欣若傾蓋初住祇洹寺而文帝延請深加崇敬琅瑘顏延之通才碩學束帶造門於是楊都遠近冠蓋相望大將軍彭城王義康承相南譙王義宣並師事焉頃之衆僧共請出經於祇洹寺集義學諸僧譯出雜阿含經東安寺出法鼓經後於丹陽郡譯出勝鬘楞伽經徒衆七百餘人寶雲傳譯慧觀執筆往復咨祈妙得本旨後譙王鎮荊州請與俱行安止辛寺更創殿房即於辛寺出無憂王過現因果小無量壽央崛魔羅相續解脫波羅蜜了義現在佛名第一義五相略八吉祥等諸經并前所出凡五十二部多是弟子法勇傳度譙王欲請講華嚴等經而跋陀自忖未善宋語愧歎積旬即旦夕禮懺請乞冥應夢有人白服持劍擎一人首來至其前曰何故憂耶跋陀具以事對答曰無所多憂即以劍易首更安新頭語令回轉曰得無痛耶答曰不痛豁然便覺心神喜悅旦起言義皆通備領宋語於是就講弟子法勇傳譯僧念為都講雖因譯人而玄解往復元嘉將末譙王屢有怪夢跋陀曰都中將有禍亂未及一年而二凶搆逆及孝建之初譙王陰謀即跋陀顏容憂慘而未及發言譙王問其故跋陀諫爭懇切乃流涕而出曰必無所冀貧道不容扈從譙王以其物情所信乃逼與俱下梁山之敗火艦轉迫去岸懸遠判無濟理唯一心稱觀世音手捉笻竹杖投身江中水齊至膝以杖刺水水深流駛見一童子尋後而至以手牽之顧其童子曰汝少兒何能渡我愰惚之間覺行十餘步仍得上岸即脫納衣欲賞童子顧覓不見舉身毛竪方知神力焉時王玄謨督軍梁山孝武帝駿敕軍中得摩訶衍善加料理驛信送臺俄而尋得合舸送都孝武即時引見顧問委曲曰企望日久今始相遇跋陀對曰既染舋戾分為灰粉今得接見重荷生造敕問並誰為賊答曰出家之人不預戎事然張暢宗靈秀等並是驅逼貧道所明但不圖宿緣乃逢此事孝武曰無所懼也是日敕住後堂供施衣物給以人乘初跋陀在荊州十載每與譙王書疏無不記録及軍敗簡撿無片言及軍事者孝武明其純謹益加禮遇後因間談聊戲問曰念丞相不答曰受供十年何可忘德今從陛下乞願為丞相三年燒香帝悽然動容義而許焉及中興寺成敕令移住為開三間房後於東府宴會王公畢集敕見跋陀時未及淨髮白首皓然孝武遙望顧謂尚書謝莊曰摩訶衍聰明機解但老期已至朕試問之其必悟人意也跋陀上階因迎謂之曰摩訶衍不負遠來之意但有一在即應聲答曰貧道遠歸帝京垂三十載天子恩遇銜愧罔極但七十老病唯一死在帝嘉其機辨敕延御而坐舉朝矚目後於陵界鳳皇樓西起寺每至夜半輒有推戶而喚視不見人衆屢魘夢跋陀燒香呪願曰汝宿緣居此我今起寺行道禮懺常為汝等若住者為護寺善神善不能居各隨所安既而道俗十餘人同夕夢見鬼神千數皆荷擔移寺去寺衆遂安大明七年天下亢旱祈禱山川纍月無驗帝遂請令祈雨必使有感如其無效不須相見跋陀答曰仰憑三寶陛下天威冀必降澤如其無獲不復重見即往北湖釣臺燒香祈請不復飲食默而誦經密加祕呪明日晡時西北角雲起初如車蓋日在桑榆風震雲合連日降雨明旦公卿入賀見慰敕見慰勞嚫施相續跋陀自幼以來蔬食終身常執持香爐未嘗輟手每食竟輟分食飛鳥鳥乃集手取食至明帝之世禮供彌盛到太始四年正月覺體不平便預與明帝及公卿等告辭臨終之日延佇而望云見天花聖像禺中遂卒春秋七十有五明帝慟惜贈送殷厚公卿會葬榮哀備焉般泥洹經一卷或無般字孝建元年於辛寺譯見道惠宋齊録今尋此單卷泥洹上下文句非是跋陀所翻似是謙護等譯今尋得二卷且附東晉録中釋摩男本經一卷吳支謙譯三藏法師自述喻一卷非梵本出故亦刪之當來選擇諸惡世界經過去行檀波羅蜜經上二經並出悲華經殺龍濟一國經出六度集三國緣經出長阿含三小劫經出樓炭經佛入甘露調正意經出大十二門經阿蘭那經出中阿含舍利弗等比丘得身作證經出雜阿含那賴經隨珠著海中經舅甥經舍利弗般泥洹經負債為牛經君臣經上六經並出生經四食經小乘雜抄阿難見妓樂啼哭無常經佛往慰迦葉病經佛命阿難詣最勝長者經二僑士經目連弟布施望即報經上五經並出出曜經般泥洹等二十三部二十三卷或是別生抄經或非跋陀所出今為實録故總刪之
